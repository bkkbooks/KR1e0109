body:
  text: 春秋宗朱辨義卷三髙淳張自超撰莊公元年春王正月莊公不修即位之禮似猶有隠先君之心者有隠先君之心則必仇齊然而不敢也畏齊之强而兼欲匿文姜之醜也葢徒隠先君之死而不隠先君之所以死則以為彭生殺而仇已復矣若莊公者畏齊之强而終身事仇則為無志欲匿文姜之醜而不絶之於廟則為不知義也文定以内無所承上不請命故春秋絀之不書即位夫以閔僖為内無所承可也至於莊公生十四年其為世子久矣莊公之為世子即非誓之於王葢亦受之於父者父命之為世子則其𫝊國繼世夫復何疑豈猶待先君告終之日諄諄遺言而始為得其正乎春秋之時諸侯之卒於㑹盟卒於侵伐者有之矣雖在外而實無故則其子以世適承祀不可謂之内無所承也如謂雖為世子而先君外卒未命其立猶為擅國則李斯趙髙假始皇之命以立胡亥而絀扶蘇為猶竊春秋之義以行其私者矣烏乎可哉三月夫人孫于齊削姜氏而書孫桓之不得其死夫人之與弑情事了然朱子所謂雖無𫝊亦可曉也夏單伯逆王姬逆左作送以諸侯而擅殺諸侯也其人擅殺之故以與内女亂也其内女即所擅殺諸侯之夫人也天王不問其罪而乃以女嫁之而乃以所擅殺諸侯之子主之是與齊侯之壊法而亂倫也是與文姜之淫而與弑也是與其子之忘仇而滅性也故一書單伯逆王姬而王之使魯魯之不辭王之不王莊之不子皆可知矣於是而孫者可以歸矣單伯左氏以為周大夫故經文作送王姬公穀以為吾大夫之命於天子者故經文作逆王姬按自此至文十四年單伯屢見於經必非一人當如召伯毛伯之世其爵氏而為周大夫也然使為周大夫則宋之師不當如書内大夫之㑹伐於鄄之會不當如書内大夫之㑹諸侯而請子叔姬又當如書祭伯來遂逆王后於紀之法書單伯來遂如齊不當以齊商人之擅執王臣而春秋無異文矣趙氏曰王人以内辭書之然如書王人子突救衞既非内辭至如公㑹宰周公公㑹尹子單子公㑹劉子之類王臣與諸侯同辭又豈所以内之哉故左氏未可據也但既内大夫而為天子所命世臣於魯則魯應有加禮而顧不一書卒何耶其書逆王姬又與書内逆女同文王氏曰魯監國之大夫有單伯費伯夷伯三人而費伯夷伯不聞用事而見於經則公穀亦未可據也春秋如此之類後儒従左氏則經文作送従公穀則經文作逆固難為定論矣今且以春秋書法裁之張氏曰築館在秋如單伯以天子大夫送王姬必俟築成之後方至魯豈得預書送王姬哉葢使夏送王姬則王姬已出京師魯至秋方築館至冬方歸於齊經歴三時則與書齊侯送姜氏書公㑹齊侯書夫人姜氏至皆在九月内事者有異宜其不然也又如鄭有祭仲則魯有單伯従公穀作天子命大夫為説而春秋書伐宋㑹鄄請子叔姬之文皆可以通矣秋築王姬之館于外築館於外為衰麻之不可以接弁冕也非為仇讎之不可以接婚姻也如謂仇讎不可接婚姻則當假衰麻不可接弁冕之禮以辭之既築館於外是與齊侯為禮矣穀梁以為不言齊侯來逆為不使齊侯得與吾為禮者非也呉氏以為魯不敢辭主婚之事故築館於外以為姬之舍而俟齊侯之迎然魯至桓莊敢於逆王命者多矣況匿其仇讎之痛而辭以衰麻之哀合乎情當乎義禮何不可之有哉汪氏責其非畏王命而不敢辭實畏齊而不肯辭者未為苛也冬十月乙亥陳侯林卒王使榮叔來錫桓公命諸侯􅁇世則有命桓既薨而錫命諸儒以為追命之者是已錫命有詞有物攷於左氏襄王命晉侯曰王謂叔父敬服王命以綏四國糾逖王慝景王追命衞侯曰叔父陟恪在我先王之左右以佐事上帝余敢忘髙圉亞圉則追命桓公之詞與命文公成公之詞自各不同矣夫王之寵簒弑已於桓公在位時直書來聘以著其失其來錫命又為失之失者也桓公簒弑不申司馬九伐之法既寵其生又寵其死吾不知其所命何以為襃嘉之詞也一為襃嘉之詞而桓公簒弑之事隠而罪貸矣桓雖簒弑齊襄實以私殺之魯之臣子即畏齊而不敢報未嘗不冀天王申正其罪也桓不得其正命死於悍侯死於艷妻目且不暝吾不知其所命又何以為令終善後之詞也一為令終善後之詞而齊襄檀殺之事隠而罪貸矣王之不王至此極哉而莊方以主齊婚得邀王命以寵其父又豈孝子之所以為孝乎王姬歸于齊書單伯逆王姬著王之命魯主王姬也書築王姬之館著魯受王之命而主王姬也書王姬歸齊而後知所主下嫁之王姬葢魯之仇國也事有以叠書而後知罪之所在者此類是也齊師遷紀郱鄑郚書遷紀邑者紀來告也紀托於魯魯之為紀謀者亦至矣而此時之魯於齊有殺君父之仇而不能復顧能庇紀哉宜乎紀侯無可告訴而至於去其國也二年春王二月塟陳莊公夏公子慶父帥師伐於餘丘伐於餘丘于大故無闗可以不書書公子書帥師書伐者出慶父也文定以為誌慶父之得兵權是矣張氏責莊公不用師以報父仇而有事於無罪之小國於義尤精杜氏兼責慶父為公之子而不知君父之仇亦善春秋書一事而數義皆寓者此類是也雖夫子當日不必果有此意而無不可因事以發明之也如以書爵書人書名書氏書字為襃貶然則慶父書公子為予慶父耶秋七月齊王姬卒魯主王姬故王姬之卒來告舊史書之夫子不削者張氏所謂特書屢書詞繁不殺以著其汨大倫滅天理之罪也文定據檀弓以為比於内女而為之服故書卒然莊公未必為王姬服檀弓因春秋書王姬卒乃曰齊告王姬之喪莊公為之服大功未可信也何以知之於不書塟知之如為之服必往㑹塟如往㑹塟舊史必書舊史既書夫子必不削必詳書以著其罪也觀公子友塟原仲亦書則知塟王姬之不削矣冬十有二月夫人姜氏㑹齊侯于禚禚公作郜夫人孫齊已自知罪矣惟魯人不絶夫人故夫人可歸惟魯人不仇齊故夫人與齊侯可㑹七八年間主王姬㑹伐衞狩禚再㑹伐衞次郎圍郕無非親齊尊齊之事宜乎夫人齊侯無所忌憚而淫於道塗未有虛嵗也乙酉宋公馮卒三年春王正月溺㑹齊師伐衞文定據穀梁以為公子溺也不稱公子貶而名之夫㑹仇讎抗天王而納不義之朔莊公之罪也舉魯之人之罪也貶溺而名去其公子何足以盡厥辜哉如王不稱天以書他事皆稱天惟錫桓公命含賵㑹塟成風不稱天則不稱天之義了然矣使内外大夫有事叠見其稱公子及有氏者或削或書則削公子削氏為貶不削公子不削氏為無貶可知矣何以春秋一書前則大夫多稱名而後則為公子者始終稱公子有氏者始終稱氏而不見一削以示義乎溺之為公子為世族皆不可知或公子而未命為公子或世族而未賜族則其書名為常也夏四月塟宋莊公五月塟桓王秋紀季以酅入于齊紀季之入齊不得比於㣲子之入周紀侯非有紂之暴齊侯非有周之仁也夫酅紀之邑也先王先公之所分守也一旦迫於强鄰析國君之守土入以事仇即以為出於兄之意而亦有所不可太王事狄以土地而不得免者猶太王自為之紀之邑季安得而以之哉以齊襄之貪淫暴亂又假先世之仇以必滅紀而甘心必不因季之來而釋於紀侯也紀既亡亦未必以季來之故而存其五廟也季特近觀許叔之復許而冀倖於後日之相時而動耳而不知其入之不得為義也故以為春秋憫其不得已而恕其罪則可以為賢而襃之則非也觀下書公次於滑以援紀則季之以酅入齊必遭齊之逼迫原非出於紀侯之意而季不能免於擅析國土歸附仇人之罪矣冬公次于滑滑公穀作郎文定謂魯於紀有婚姻之好當恤其患於齊有殺父之讎不共戴天苟能救紀抑齊一舉而兩善并矣此猶失於本末輕重之衡者也夫報父之仇豈得後於恤鄰之患而以救難之師為報怨之師哉方桓之受斃於齊也魯苟有人告於天王赴於鄰國即天王不能討鄰國不敢問而我之師直氣壯彼之理屈辭窮天理在人人心不死魯之人當莫不效死赴仇齊之人亦應屈於助淫人而黨不道退舍以避成言而還縦不能使凶人授首而氣焰亦少衰矣則齊所欲吞併而我之婚姻如紀者不必謀所以存之而自存矣而魯固不能也公之次滑不能救紀固魯之恥公即能結鄭却齊以救紀尤魯之恥也興師動衆不以復父之仇而以恤鄰之患哉然公亦豈能為紀背齊者亦聊以塞紀之望而實不能解齊之交也觀於前後之曲従齊命而文姜無年不㑹則其次滑徒次滑而已此紀侯所以望絶而決於去國矣四年春王二月夫人姜氏享齊侯于祝丘享公穀作饗書如齊師者一書㑹禚會防㑹穀者三祝丘則不徒㑹而又行享禮也祝丘非享之地夫人非享諸侯之人當時魯人當莫不知其非禮而舊史書之亦見史臣之直筆雖莊公不得而奪之者也三月紀伯姬卒卒伯姬者詳伯姬之始末所以詳紀之始末也詳紀之始末者所以詳紀托於魯魯不能存之之始末也夏齊侯陳侯鄭伯遇于垂突初為魯助紀今齊謀紀而與陳侯為垂之遇者突方徳齊之殺子亹又日求諸侯納己齊强魯弱可以失魯不可以失齊故滑之次辭魯而垂之遇不辭齊也紀侯大去其國不書滅紀者齊師未至而紀侯先去也不書奔者已不自有其國不得謂之出此而奔彼也不書紀亡者不因其亡之實而没其去之實也故以不書滅為齊襄諱者非也以不書奔為不加紀侯之罪者非也以不書亡為明紀侯無亡之道者非也齊襄貪淫暴亂滅同姓之國而遷其五廟安得聴其假九世之逺仇而以為賢而為之諱乎奔者有歸之道弟入不返夫人在殯不塟土地人民尺寸孑遺不顧何者為己之所有而以為我之國而我奔乎季之在酅乞憐圖存獨冀齊人之憫之耳五廟之得祀不得祀皆聴命於齊其實則侯去而紀亡非紀亡而侯去由後觀之則紀亡矣而就當日之事觀之則侯去也侯去而齊之怒平不見其夷城郭毁宗廟與亡者不類安可槩以為亡乎春秋葢紀其實也齊以强暴逼一諸侯委國而去即不書滅而齊固不能無罪也紀不自强於前又不效死於後齊師未至脱屣一諸侯數百年之國即不書奔書亡而紀侯亦不能無罪也六月乙丑齊侯塟紀伯姬伯姬以三月卒紀侯以夏去非不能塟伯姬而去也紀侯委之而不塟者所以甚齊襄之暴而益魯人之恥也書齊侯塟紀伯姬而齊襄之暴極矣魯人之恥深矣秋七月冬公及齊人狩于禚禚公穀作郜齊侯殺魯君父日望魯之臣子有以報之也報齊之事一日不可緩報齊之心終身不可釋為齊而主王姬猶可曰尊王命以為禮而我之報之尚有日也㑹齊師以伐衞猶可曰為衞朔以用齊非為齊諸兒以謀衞大夫用師君未即戎也夫人㑹齊侯享齊侯猶可曰子不可以制母也至於莊公親與齊侯狩而後報齊之望絶矣夫一匹之夫仇人相見未有不氣填於胸怒形於色拔劍而起者顧乃與之従禽以為樂哉公羊以為齊侯稱人諱與仇狩然夫人之㑹享如師不諱而諱公狩耶穀梁以為卑公之敵所以卑公文定従之然書齊人以卑之何如直書齊侯以罪之耶或是齊弱魯而卑莊公齊襄不與之同狩而使大夫從事耳如實為齊侯而夫子書人則是畧齊侯不著以専罪公也葢夫人㑹齊侯則夫人齊侯皆有罪公及齊侯狩則公獨有罪故目公以罪公不目齊侯以釋齊侯釋齊侯然後知罪之在公也若此書公及齊侯則似兼譏兩人之狩而狩之不足譏譏公與讎狩之義不著矣五年春王正月夏夫人姜氏如齊師莊公可以狩則文姜亦可以如師莊公可役車徒以同狩於原則文姜亦可盛侍從以同驅於道人責莊公不能治其母夫莊公且不能自治而顧能治母哉秋郳黎來來朝郳公作倪黎左作犂桓公簒弑故來朝者皆譏莊公有父不得其死而日親仇人有母宣淫不制而貽羞宗國是不有其父不有其母也雖罪減於桓之加刃於其兄而忘仇而死其父縱淫而賤其母其悖天滅性隳倫害理仁孝之心既絶義理之勇全無殆又甚於桓也嗟乎天下固有無父母之國哉郳黎來之來朝文定謂其來朝而進於禮不可矣葢與朝桓之黨簒弑同貶也觀於公狩於禚夫人如師之下㑹齊宋陳蔡伐衞之上忘仇縱母抗王伐正之間乃有脩禮而朝於其廷者是耶非耶可立而㫁之矣冬公㑹齊人宋人陳人蔡人伐衞齊抗王命罪一而已宋陳蔡不從王命而從齊命罪有加也魯則不報齊仇而曲從齊命以抗王命罪尤甚也春秋目公以治不臣而又治其不子也四國稱人恐亦是大夫帥師如以抗王命伐衞而貶稱人然則三國從王伐鄭而亦稱人何耶使三國之伐鄭為大夫又安知四國之伐衞非大夫耶觀於下書王人救衞則諸侯之抗王命即舉爵亦知其罪不必稱人以示貶絶矣六年春王正月公穀作三月王人子突救衞衞朔搆兄簒國法所當誅者也黔牟天王所立者也使政敎號令得行於天下則諸侯莫不稟受而衞朔無所容於諸侯之國矣諸侯有黨朔者則天王申司馬九伐之法以并問其罪矣今乃五國之君抗逆王命納不正而伐天王所立是天王之法不行於諸侯至出不得已而救衞與諸侯之恤鄰救患者等其亦凌替衰㣲之徵也諸儒乃以救為善之張氏以為王旅之出而合司馬九伐之法者春秋惟此一事何耶夫法不行於諸侯而與諸侯争於黔牟與朔之閒即朔終不克納黔牟終得立而王師之出已無可襃矣春秋書救者以傷天王之與諸侯敵也王人書字何足以定義哉夏六月衞侯朔入于衞去年冬諸侯伐衞今年春王人救衞夏衞朔入衞秋公至自伐衞經歴四時不閒他事比而觀之諸侯之罪衞朔之罪魯莊之罪顯然朔書入衞以著朔以諸侯納之抗王以入也如以復歸為文則同於衞衎之自復而諸侯之罪朔之罪皆不著矣秋公至自伐衞至伐衞於王人救衞衞朔入衞之後明以著朔以諸侯之師入諸侯實抗王師以納朔其罪甚於桓之伐鄭納突也如不書至則似王人來救而諸侯之師已散衞朔自入於衞莊公之罪諸侯之罪皆不著矣故莊之至伐衞與桓之至伐鄭書法同而義不同彼以著突有諸侯之師而不得入鄭此以著朔以諸侯之師入衞也螟冬齊人來歸衞俘俘公穀作寳不曰衞寳而曰衞俘葢其所虜獲也其所虜獲之寳器也五國伐衞宜各有虜獲然而五國之師惟齊為强而齊又主其事宜四國無而齊獨有也魯既聴命為齊納朔是以來歸也一書來歸衞俘而齊之主兵可知魯之聴命於齊可和齊師之暴而有虜獲可知魯師之受制於齊而不敢有虜獲可知左氏以為文姜請之者未必然也文定謂受朔之賂汪氏以朔入而後歸為非得之黔牟而得之朔者亦非也若賂得之朔當書衞來歸寳而齊之得賂宋陳蔡之各有賂皆著矣何必改其事實以罪齊哉春秋書此既以罪齊之虜於衞而尤以罪魯之聴齊命而受齊之歸俘也七年春夫人姜氏㑹齊侯于防主王姬之後而㑹禚卿㑹伐衞紀亡不救之後而享祝丘狩禚之後而如齊師親會伐衞來歸衞俘之後而㑹防㑹穀然則夫人齊侯之無忌憚皆視魯人之柔懦庸劣不義無志而後恣意以行也閒事以書而春秋之罪魯人者至矣夏四月辛卯夜恒星不見夜中星隕如雨秋大水無麥苗一年書四事春冬則㑹防㑹穀夏則天變秋則天災天變即不専為魯而大水之異則魯親受之也㑹防不禁而又㑹穀於天變天災之後文姜即色膽包天而魯君臣絶不設計以為之防何哉冬夫人姜氏㑹齊侯于穀夫人之㑹齊侯所事何事齊人猶作詩以刺之豈魯不知其恥而以為兄弟姊妹至親無嫌哉史臣載筆直書雖莊公亦無如之何雖以𫝊之後世而後世子孫亦有所不能改也使舊史不書夫子亦無憑得其年時月日而言之極詳舊史既書則夫子立義垂訓亦不得以先世夫人之醜忌其子孫而為之諱故刪詩而録敝笱載驅作春秋而㑹禚享祝丘如齊師㑹防㑹穀一事不削也使弑君而舊史直書則夫子亦仍其文而書之不諱矣又何他事之目公不目公而以為有諱有不諱哉八年春王正月師次于郎以俟陳人蔡人此為受齊命出師㑹陳蔡伐郕無疑齊師未出而魯師先行不敢後於諸侯也陳蔡聴齊納朔固為罪矣伐郕而不出猶能却齊之徵師也魯既與齊有仇而顧不能自强如陳蔡哉其俟陳蔡當是俟其師出非俟其來也文定以陳蔡距魯逺既欲伐郕必不踰郕而來㑹魯魯之次郎以俟者或是陳蔡過我或是與陳蔡有他事於鄰國然觀前後魯與陳蔡無㑹盟侵伐事必非别有他也使有他事而無闗於前後無是非功罪以示義則亦可以不書矣甲午治兵治公作祠此為治兵於郎無疑文定以為譏瀆武孫氏以為惡内不知戰皆非也受齊命而出齊師愆期陳蔡變約暴師露衆役久不用不得已而申明約束訓齊其衆而不敢歸其事齊可謂謹而畏齊可謂至矣使春秋削而不書則未知上之次郎為㑹伐郕而下之及齊師圍郕或疑其既歸而再出師矣夏師及齊師圍郕郕降于齊師郕公作成師及齊師是蒙上文次郎治兵來以見其役之久而専為圍郕也諸儒泥於書及不書㑹謂魯欲取郕而結陳蔡同伐陳蔡不至乃藉力於齊者非也呉氏辨之是矣若春秋書㑹齊師則讀者必疑次郎為他事而治兵又安知其非於國内乎郕降於齊穀梁以為諱滅同姓然則郕果降魯師而夫子改其事實以脱魯而罪齊耶文定以為伐國無義而不能服然則魯果以齊伐郕而郕服於齊不服於魯以是為魯之恥耶皆不然也春秋書郕降齊者以著次郎治兵圍郕以至師還無非曲意従齊滅一同姓之國而并於己無利為尤可惡也秋師還春秋未有書師還者獨書師還以著自正月次郎以來暴師露衆歴三時之久而無非為齊也次郎書師圍郕書師還書師者非公自將也不名大夫者以不罪大夫而専罪公也按莊公嗣位至此八年春秋書事三十九條天變一天災二王錫命一來朝一塟王一卒塟諸侯四皆非魯之有事也其所有者一事則伐於餘丘而已餘二十八條則夫人孫者一㑹齊侯者五公與狩者一矣其事則齊娶王姬也齊滅紀也齊納朔也齊伐郕也娶王姬則魯為之主也滅紀則魯之婚姻而不能救也納朔則魯助之也圍郕則陳蔡皆不從而魯獨為之役也春秋所以詳書齊事者詳書魯之以齊事為己事也嗚呼父為其所殺母為其所賤雖手刃兇淫之賊猶當終身慙恨以至于死忘之已可罪釋之已當誅而乃敬之若天王親之若嚴父服其役若僕𨽻効其力若犬馬勞國之大夫士糜府庫之財捐生民之命以忠靖於仇人嗚呼諸兒不死尚不知所底也人之無恥喪心有至於是者哉春秋惡莊甚於惡桓故於天道王事來朝卒塟之外他書皆畧而不書獨於此詳書以暴其醜惡而重誅之也冬十有一月癸未齊無知弑其君諸兒齊襄􅂽淫暴亂積不善之餘殃必有殺身之禍即不寵無知絀無知亦於理不應得免也文定以無知不稱公孫罪齊僖不以公孫之道待無知使之恃寵而當國使春秋果有罪齊僖寵無知之義則當明書公孫以著其遇弑之由不當反没其實也夫子作春秋於州吁之為公子無知之為公孫未嘗於他事先見之於弑君書名何以使後人知其為公子公孫而黙㑹其削之之義耶九年春齊人殺無知無知以連稱管至父而行弑得國必有助之者非雍廩一人能殺之也亦必有助雍廩以與無知之黨為敵者也如衞殺州吁必非石碏一人所能為故書衞人殺州吁齊人殺無知亦據其實而書之也使弑君之賊實為一人所殺春秋必别立書法異於棄疾殺比之文以示人人得討之義不當没其能討之人隠其獨討之事推之衆人而後為討賊之辭也又文定以無知不稱君為己不能君齊人亦莫之君夫謂齊人莫之君則是矣而謂已不能君春秋遂不君然則弑君得國而能君者春秋豈予其能君而君之耶若因其能君而遂君之則春秋為長亂之書矣後此弑君之賊在位有年乃遭賊殺而仍以弑君書者所以罪其國人不能速於討賊既君之而又賊殺之也無知弑君雖逾年而止數月耳其未成為君不當稱君也宜矣公及齊大夫盟于蔇蔇公穀作暨忘父母之仇而約糾以定其國文定譏其以徳報怨是矣汪氏謂莊公本無仇齊之心而自以為齊出倚齊為援盟齊大夫以納糾者直是以徳報徳推論亦善但既盟矣而又伐齊以納之者必齊大夫於糾與小白之間各有援立之私而來受盟之大夫不能得之於欲求小白之大夫也葢蔇魯地齊大夫既來受盟必不速渝公既盟而不即納必知齊人有不欲立糾者而整師徒以壓齊衆也夏公伐齊納糾左作納子糾穀梁以為可納而不納齊變而後伐使盟之時可納魯胡為而不使糾入哉春秋之惡内者惡其納糾以定仇人之國雖克納亦譏也觀書小白入於伐齊之後是齊人拒糾而入小白伊川以後稱子糾謂既已立之故須以未逾年之君稱之者亦恐不然齊人雖盟實未嘗立之也齊小白入于齊糾與小白其為僖公子或襄公子皆不可攷得其實則孰兄孰弟亦難以臆斷矣但兩人居皆有傅出皆有從則皆國之貴公子也齊大夫初盟糾繼入小白於彼於此不審於義而君其先入者殺其不克約者則糾與小白固以争入之勝負為得失者也夫譲者生人之美徳而争則君子所惡固知春秋於小白不能無譏也使小白告於天王赴於鄰國召國之大夫平其兄弟之分而後入於得國有光矣即當時天王不能行其令諸侯不能行其義國之大夫各有援立之私而不可恃至於入國之後内大夫皆屬而位固矣因是正其兄弟之義以却魯師而明責子糾魯人素弱其能挾弟以争兄哉觀後之急殺子糾則桓兄糾弟之説恐亦未有定也文定但以不稱公子謂春秋以王法絶之則猶以公子為凡為子者之公稱而泥之者也秋七月丁酉塟齊襄公齊襄之仇生不能報之死猶往㑹其塟固知莊公原未嘗有仇襄之心也若以魯方納糾用師必不往㑹其書塟以討賊故非以魯往㑹故然桓公親敗宋齊衞燕之師及年而塟衞宣逾年而塟齊僖文定以為怨不棄義怒不廢禮古人以喪為重何獨於此而疑之又如哀公㑹呉伐齊聞喪不還閱月逾時公至自齊之後即塟悼公豈不以往㑹之故哉若以齊襄為見弑之君必書塟以示賊之既討魯即不往㑹而亦書然衞塟桓公春秋書四月而失其日文定猶以為往㑹故書則齊襄之塟使不以魯之往㑹而舊史所書何以若是之詳而不失其日哉八月庚申及齊師戰于乾時我師敗績小白既入齊襄既塟齊之君已定矣魯當自度其力之不足以勝齊而挾糾全師以歸矣乃猶殘吾民而與之一戰何哉此時魯人必以為魯雖素弱於齊而齊方内亂未嘗不可戰而勝之而納糾之義納糾之利又不可以失也然不能以一戰復仇而納仇人之後以定仇人之國雖戰勝烏足以為榮乎此蒙上文伐齊納糾來以著戰者公戰也罪公之不以戰復仇而以戰納糾也戰而敗辱益甚矣九月齊人取子糾殺之左氏鮑叔帥師來言曰子糾親也請君討之乃殺子糾於生竇則其殺子糾雖齊迫魯以師而實魯殺之也然書取書殺之則似齊取於魯魯畀於齊而齊加刃焉者所以罪小白也然不徒曰殺子糾而曰取者亦以罪魯人之不能庇糾也然曰取曰殺之而書齊人者小白之入齊與陽生同則齊人之殺子糾與陳乞之弑君荼同也其復稱子文定以為明不當殺也使小白兄而子糾弟是小白正而子糾不正魯之納糾為黨不正齊大夫之盟蔇為援立不正子糾以不正而外托隣國内結大夫將奪兄以再亂齊焉得無罪即小白殺之已甚而春秋可以削而不書何以既書齊人以罪小白又復稱子以正糾哉觀於無知既殺齊大夫即先來蔇受盟小白既入魯師既敗而齊人急於殺糾則公穀以糾為宜君以小白為簒宜可従也文定以前不稱子後稱子為各有義然如鄭忽奔不稱世子復歸稱世子是一正世子之稱以明忽之正也則於殺糾一正子糾之稱以明糾之正何害於前後之異文乎冬浚洙前既伐齊受敗而殘民命今又浚洙備敵以勞民力為義之不當為以重累吾民其罪多矣使早為戰守之計以報齊仇則春秋何譏也十年春王正月公敗齊師于長勺乾時之戰既為所敗矣子糾既取而殺之矣而齊師猶壓其境是欺我也此時乃責其不修文告之詞為非己亂之道亦太苛矣故雖用詐取勝而春秋不當深罪之也春秋所以罪之者謂大夫既能用謀士既能効死齊雖强未嘗不可一戰而勝而十年以來何不用以報怨哉故前之為齊所敗為辱而此之敗齊亦不得為榮也二月公侵宋魯自合鄭敗宋之後宋未嘗一報我也十餘年來各以無事而忽以勝齊之師侵之春秋所以惡而書之也東方諸侯莫大於齊宋能敗齊則不畏於宋魯駸駸乎有自强之勢矣然十年俯首聴命於齊者誠何心哉既忘大仇而失其所以為心故其所為無一而可者也三月宋人遷宿書遷宿於侵宋之後則髙氏以為宿屬於宋而親魯宋人以其貳而遷之者雖未必有所攷據亦可因以推其情事但春秋書此以著宋遷人國之罪義不係乎親魯不親魯也夏六月齊師宋師次于郎公敗宋師于乗丘齊敗於長勺非魯之有加於彼也郎之次誠為無名宋以報二月之侵非無名也文定概謂次者不以其事汪氏於書次皆謂其出師之無名未為當也若云奉其辭令則二國去夫以責齊之三蹂我疆則我有辭而齊無辭以解我之不當有二月之侵則宋有辭而我無辭故亦未可以一槩論也然既不引義以却齊又不能引過以謝宋而徼幸一戰之勝其於齊則無毫釐憤怨於仇人而兵交禍結於仇人之後於宋則無故以侵其境又用詐以敗其師魯之為魯不得為義而公之為公亦不得謂之能武也陳氏以齊宋之次郎比之楚蔡之次厥貉謂齊桓欲伯諸侯將以絀魯然齊桓立甫逾年内難初平外勢未集豈遽有圖伯之心哉郎之次思以報長勺耳自敗宋師於乗丘明年又敗宋師於鄑齊桓乃知不能速得志於魯而為柯之盟也故以義言則無取乎公之用武以勢言則魯之為齊弱已久以一敗齊師兩敗宋師而得强立於齊桓創伯之時此莊公之所以諡莊歟秋九月荆敗蔡師于莘以蔡侯獻舞歸舞穀作武荆初見經而其事則為敗蔡師虜蔡侯甚矣荆之强而暴也故前此敗鄧敗鄭伐羅伐隨不書至於敗蔡而又虜其國君春秋然後書之以起齊桓之所以攘楚而成伯功也又外不書戰而言敗者七先儒日月例以為楚敗中國不日雞父之呉敗六國而日者為胡子沈子滅故故於殽日而於莘不日然楚滅陳滅蔡則與衞之滅邢同言日矣何以滅中國之言日同而敗中國之言日不同耶内如長勺乗丘於偃亦不日矣何以荆敗蔡之不日遂以為例耶又何以中國之於狄魯之於鹹日晉之於箕交剛太原不月不日而時耶内事可詳則詳之外事告詞有詳畧則月日不可以悉先儒既定為例而于變其例者則又以為聖人有襃譏之義殊不可以通也冬十月齊師滅譚譚子奔莒陳蔡近楚中國諸侯有事未嘗不従齊襄之世獻舞猶聴命焉今齊桓得國方治兵以圖伯而獻舞為楚所虜若弗與聞焉者而猶用師以滅隣近之小國夫齊可以滅譚則楚何不可以敗蔡齊庸愈於楚哉且蔡侯雖虜而蔡未亡譚子雖奔而譚已滅則楚之勢張於中國而齊之惡甚於荆蠻也比事以觀而春秋之義可見矣十有一年春王正月夏五月戊寅公敗宋師于鄑兵以侵宋而搆怨以乗丘而深至此而宋師又至正引過請釋之時也而再敗之罪益甚矣葢自此而宋之好絶也又内書戰者七來戰不言敗者一齊衞鄭於郎是也及戰不言敗者三及鄭師伐宋戰於宋及齊師戰奚及邾人戰升陘是也及戰而外敗者二公㑹紀鄭及齊宋衞燕四卿㑹晉衞曹大夫及齊侯於鞍是也及戰而内敗者一及齊師於乾時是也不言戰而外敗者八於菅於長勺於乗丘於鄑於偃於酈於蚡泉於鹹是也先儒以為用詐以敗之故不言戰然何以魯八敗人師而皆用詐耶據左氏則長勺之齊師亦以戰而敗之若以曹劌之謀為詐則城濮晉君臣之謀獨非詐耶當是戰有大小如野戰薄戰之類不成其為戰故不言戰耳觀孟子鄒之於魯有司死者三十三人而言閧不言戰可知矣又戰以日成者長勺乗丘於偃不紀日崔氏以長勺乗丘為譏莊之一嵗而再敗人師以偃為譏僖之忘喪而即戎然則莊既一敗宋逾年又再敗宋春秋何不并削於鄑之日以譏之耶僖公既忘親喪而敗邾公子友即於是年又忘國喪而敗莒春秋何不并削於酈之日以譏之耶其不日者或失其日或數戰而數敗之不可以一日紀耳故諸儒日月之例而又以變為有譏者不可以通也秋宋大水外災以來告往弔而書左氏之義也然春秋紀外災亦罕矣豈來告者少而往弔之禮闕乎非也書宋大水者以大而書非常之水也其他水旱螟螽之災有不足書者矣故雖來告往弔舊史或書而或夫子削之者不勝書也冬王姬歸于齊著莊公之再主王姬也王氏曰主齊桓之婚其罪小故書之畧然奉王命而主桓婚雖謂之無罪可矣無罪而亦従畧書之者葢畧於此以著前之詳於主襄婚者罪莊之主襄婚也十有二年春王三月紀叔姬歸于酅叔姬之歸酅自魯而歸也前之來歸不書者國亡君去非得已也歸酅書者以著叔姬之賢也賢叔姬所以罪魯也葢酅已為齊邑矣伯姬則塟於齊侯而叔姬則又歸於齊邑魯親仇讎而不能庇其婚姻也賢叔姬亦所以罪文姜也叔姬國亡來歸逮其君之既死而不留於母家文姜弑魯桓死齊襄而猶不能禁十五年如齊之足也夏四月秋八月甲午宋萬弑其君捷及其大夫仇牧君弑而大夫見殺予以死節之義者必其人為君之所重為弑君之賊所忌又其人力可以討賊志必欲死君與弑君之賊不兩立賊必并殺之而後可以得志春秋乃書而予之不然則亦不勝書抑或舊史失之夫子無憑而書也諸儒每於死節不書者往往追咎其人不足書夫有死君之大節顧不足以葢其夙愆而猶煩議其後哉故荀息雖成君之邪志而春秋猶以死節予之況如恵伯之死而以非君命責之亦太苛矣至太宰督之不書則真不足書也冬十月宋萬出奔陳衞州吁弑君得國閱七月衞人以計出之於陳請而殺之春秋書衞人殺州吁宋萬弑君立君閱二月宋人以師迫之於陳而殺之春秋不書宋人殺萬而書宋萬出奔陳何也蔡人殺陳陀楚人殺夏徵舒皆書而陳人殺宋萬不書何也惟其可以兩書此其所以兩不可書也宋人以公族之衆而又濟之以曹師不急於殺元凶而急於殺所立之公子公子既殺南宫牛既殺而猶使長萬得以輦母而奔不得謂力之不足矣奔而請於陳幸而得之耳使陳不聴賊竟失矣吾國人之衆勢不足恃而恃鄰人哉州吁好兵羽翼者衆衞人力不足以勝之故不得已而用謀宋之力足以殺萬而縱之奔既奔於陳則陳為政而非宋之所能必討也左氏載醢萬未詳月日不知閱幾何時而後殺葢既奔而討得討不得討未可知之事即得討亦不可謂之能討也則直書奔而已蔡人之殺陳陀以私不以私皆不可知即云以私勢必隠其私殺之意而假以殺簒賊之名不得忖其私憤而没其公討也楚人殺夏徵舒則又公然以荆蠻之君而討中國之賊矣衞陳皆受宋賊之奔必宋請而後歸之無論陳以賂為非義即衞不以賂而亦有所遲疑於其閒也故春秋簒弑之賊國人既君之則亦君之以罪國人諸侯既君之則亦君之以罪諸侯後雖或殺之或執之不以為討賊而以為弑君以為執諸侯矣況陳之於宋萬既受其奔即不行賂而亦不得謂之討賊也則直書奔陳而已然後知春秋書宋萬出奔陳不特不予宋人之討賊而且罪宋人之失賊不特不予陳人之討賊而且罪陳人之黨賊也范氏責其久不討賊孫氏亦罪其緩夫果有必討之心而得討賊之義何害於緩而且久而衞之閱七月顧不緩且久於宋之閱二月哉至閔公之不塟則宋方與魯交惡宋或不來告魯或不往㑹也不必强為之説十有三年春齊侯宋人陳人蔡人邾人㑹于北杏齊侯穀作齊人文定以為桓非受命之伯諸侯自相推戴以為盟主是無君矣若是則桓為無君之尤者而又以為上無天子下無方伯有能㑹諸侯安中國而免民於左袵則雖與之可也其意總泥於齊侯舉爵為襃四國稱人為貶也其謂與桓公者權也誅諸侯者正也亦不解於孟子小徳役大徳小賢役大賢小役大弱役强二者皆天之意矣既以推戴盟主為無君則受諸侯之推戴者尤為無君誅諸侯當先誅桓公従正可也既以㑹諸侯安中國免民左袵之齊桓為有功則従齊桓安中國免民左袵之諸侯為無罪與齊桓當并與諸侯従權可也夫子従權以與齊桓従正以誅諸侯用法若此其曲哉葢記齊桓合諸侯之始其辭從畧非襃貶所寓也陳蔡近楚蔡君方為楚虜新君未立大夫來㑹宜矣蔡為大夫陳亦未必其君來也邾未有爵命雖其君來亦應稱人宋有長萬之亂御説初立内難甫平且是時齊桓所為未見信於天下宋能料齊桓之無他而敢以新君出㑹哉然則北杏之稱人宋蔡皆大夫無疑謂其君來而人以貶之者非也又文定以為齊桓始平宋亂遂得諸侯夫使宋亂果藉齊以平不應急背以致明年之伐當是宋大夫與㑹齊桓怒其君之不出而合陳曹以加兵也夫㑹者四國而宋先不服亦未見其能得諸侯也張氏責其不舉兵討萬於弑君之時呉氏謂其列國僅有陳蔡小國僅有邾齊桓之信未孚於諸侯者是矣夏六月齊人滅遂左氏以為遂人不㑹北杏而滅之夫北杏之㑹者四國而已小國之來自邾以外無聞焉胡為獨罪遂哉如謂附庸之國雖與㑹不列於載書則又安知其㑹與不㑹耶齊侯之所求於大國者㑹而所求於小國者非㑹也徵兵則兵従索餉則餉入嵗朝於庭而身為之役名為列國而實則外邑也世稱齊桓滅國甚多春秋獨書譚遂者必譚遂之於齊素以列國相抗故滅之以為小國之威不必怒其不㑹北杏也其他之不煩興師動衆而自入於齊者春秋不書矣秋七月冬公㑹齊侯盟于柯齊桓欲得志於諸侯而汲汲以求魯者魯東諸侯之望也或謂莊公不應釋怨以與齊好夫莊公之大怨己身與仇人親釋之矣近日之怨所結者小納糾不克齊師三至郎與長勺魯再敗之獨恐齊不能釋而魯則無不可釋者也故北杏㑹四國不盟而柯之㑹盟桓欲示信於莊耳文定謂敵恵敵怨不在後嗣猶若以莊之所釋為殺父之怨者夫殺父之怨未結於襄何釋於桓哉若莊果怨其殺父不得及襄之身而報之一旦遽釋於後嗣猶不能無譏也春秋之義以為莊於大怨且不能報小怨之釋無庸譏矣十有四年春齊人陳人曹人伐宋鄭背鄄之㑹而侵宋故三國伐鄭魯背幽之盟而受鄭詹故三國伐其西鄙經皆明白宋背北杏之㑹未有實跡左氏想當然之詞也故以為北杏之㑹宋公未出而齊怒之耳夫仁義不足而諸侯不服不能増修文徳徒以威力摟諸侯以伐諸侯而謂春秋無貶豈其然耶伊川以為管仲得政未嘗興大衆其稱人者將卑師少文定用其説然自莊十一年後侵伐遷滅書人者十數見即皆將卑師少豈無一用大夫帥師之舉耶春秋之初政尚不在大夫故不必名其人而従畧書人也夏單伯㑹伐宋文定以北杏之㑹諸侯推戴盟主是為無君單伯㑹伐宋又以為㑹伐無貶夫天王之命則抗逆不從伯主伐國徵師則遣大夫以㑹推戴從順若此而謂其無譏哉然齊桓九合諸合一匡天下夫子稱之則從桓以伐不順者當亦無深責焉葢天下無王桓假尊周之虛名而行攘楚之實事其功固不可没也但跡其所為條分縷析以觀之桓與天下諸侯可貶者多矣秋七月荆入蔡北杏之㑹蔡人先來葢自獻舞就虜之後懼楚而托於齊也逾年而楚又入之而齊不能救受日至之近禍而望無濟之遠援宜乎蔡人之屈首楚廷而甘棄中國矣王氏曰入蔡之書以病齊桓呉氏曰病中國之不競皆是也而或者以為齊伯初創諸侯未從已之力尚不足用苟憤而加兵强楚其勢必敗敗則楚益强而中國益病故捐蔡於楚蓄力積時先為不可勝以待楚之可勝是以召陵一舉而楚服楚服而中國安此桓公管仲之謀也然而蔡之從楚豈得已哉虜其君而隣國不問入其國而伯主不問都邑殘破而人民駭散非若陳之國勢猶可力支至不得已而去華夏而從荆蠻亦當有以原之也且蔡即從楚而蔡姬在齊猶通婚姻使齊桓以致江黄者致蔡蔡宜即來蔡即不來亦當憫其不得已之故而召陵之師不當連諸侯之師以侵之夫用我屈敵之謀而絶不恤此困敝之國蔡於是乎絶望矣是葢齊之棄蔡非蔡之果於服楚也則春秋之書入蔡誠哉其病齊桓也冬單伯㑹齊侯宋公衞侯鄭伯于鄄髙氏以為諸侯伐宋逾時不解至是宋公始服而為此㑹非也當是伐宋宋服此為再㑹耳呉氏之説為是但謂陳蔡曹邾已歸齊者不復與㑹為齊桓之不欲煩諸侯亦恐不然當是陳曹之師已歸蔡有楚難不至邾非齊所重可以不至耳觀明年再㑹又煩諸侯不得以此而謂春秋子齊桓伯政之善也十有五年春齊侯宋公陳侯衞侯鄭伯㑹于鄄許氏謂三合諸侯而不盟以示重慎獨不知屢㑹之過於煩瀆耶此衞鄭所以變而魯猶不免姜氏越禮之行也又謂盟則衆信莫敢渝然同盟於幽而魯鄭渝矣此諸侯之心不一亦以見伯者以威力制諸侯之難也夏夫人姜氏如齊文姜越境之醜八年不聞矣魯再通齊好而文姜復出是非文姜之欲而莊公欲之齊桓欲之也齊桓欲得諸侯不顧跡涉襄公之惡以致哀姜踵亂魯弑二君殺兩公子而哀姜亦不得其死與其行義以戮哀姜於後何如執禮以防文姜於前耶葢伯者之不知義而所為之苟且如此也秋宋人齊人邾人伐郳郳公作兒郳小國宋之力足以勝之齊桓初合諸侯不聞申大義一用師於有罪之國又不能扶弱小以抑强大乃役邾興師為宋以伐郳宜諸侯之心不一而合之難也鄭人侵宋鄭突以宋而得國入櫟之後宋猶捐前怨㑹諸侯以伐鄭而謀納之在櫟幾二十年而不為忽亹子儀所圖者猶諸侯之力也今既有鄭而即背二鄄之㑹出師以掠宋境亦不道之甚矣此其所以為厲歟冬十月十有六年春王正月夏宋人齊人衞人伐鄭桓既為宋伐郳又為宋伐鄭所以堅宋人附已之心故桓之伯業惟宋實心輔以成之也此葢齊之為宋伐鄭以為南北争鄭之始者非也南北之争鄭始於僖六年諸侯圍鄭新城楚人伐許諸侯救許故此年荆伐鄭二十八年荆伐鄭三國救鄭僖元年楚人伐鄭二年楚人救鄭三年楚人伐鄭猶為楚之欲得鄭而未成南北争鄭之勢也秋荆伐鄭此為楚伐鄭之始葢既入蔡而又漸以及於鄭也楚得鄭則可以窺中國故中國必不肯使鄭失於楚齊晉繼伯終春秋之世遂成南北争鄭之勢也冬十有二月㑹齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟于幽公作公㑹許男下公穀有曹伯文定以不稱公為惡公之叛盟失信而諱之夫春秋於魯惡未有諱者何諱於莊之叛盟耶公羊有公左穀無公文定不従公羊從左穀而以為諱恐是多生議論必欲深索春秋之義當云惡公之叛盟失信而削公不書如王不稱天以罪之為妥也然王不稱天如錫命㑹塟之類恐後人疑於禮之當然而不知其失故不稱天以明示其罪之之義至於諸侯之事前後直書詳書而是非了然如下書魯之受鄭詹而致西鄙之伐則公之叛盟失信著矣何必削公以示義哉至於同盟之義説各不同穀梁曰同尊周也然如齊桓之盟首止以定世子盟葵丘以尊王人晉文之盟踐土以朝天王獨非尊周乎何以不同即如初盟於幽而王室有子頽之亂不見出師以救難何為尊周又曰同外楚也然如齊桓之伐楚而盟晉文之敗楚而盟晉昭之侵楚而盟獨非外楚乎何以不同且如趙氏以二幽之外同為外楚而重丘之後逾年㑹宋即為諸侯交見之盟是與楚合矣何為外楚文定曰同欲也然而何盟無欲何欲不同而有同有不同者何耶又曰惡其反覆也然而入春秋之初盟而反覆者多矣何以不同而獨於後之反覆惡之也左氏曰伐某也某服故也杜氏因以為服異謂其昔異而今同也如伐鄭而同於幽陳鄭服而同於幽鄭服而同蟲牢諸侯服而同於蒲伐鄭而同柯陵服宋而同虛朾鄭服而同雞澤兩伐鄭而同於戲於亳城北伐齊齊服而同重丘平丘皆是矣然救鄭而盟馬陵不可云服異也何以同新城清丘斷道於戚未見有異而服之也何以同有不可以通者矣此惟陳氏於二幽則曰同衆辭也猶未與以専主是盟也呉氏於二幽亦曰未敢専主盟之權故曰同盟也二説頗合但陳氏謂未與専主是盟則似當日本不言同而夫子稱同以示不與為主之義者呉氏謂未敢専主盟之權則是桓盟而不主當日本言同也二家之説呉氏為是而又甚得孔氏所云載書稱同之義顧於後半部書同之故未見有所發明故致汪氏疑於鄟陵臯鼬而不取其説也汪氏於伯業盛衰之説又疑於齊桓二幽之盛而同牡丘之衰而不同晉悼之盛而始終書同祝柯澶淵既衰而不書同是猶泥於同不同為春秋所書而不知因乎載書之詞者也葢春秋之初無伯而有盟無主盟亦無同盟各盟其事而已故自參盟以上如瓦屋惡曹於析曲池穀丘於黄其載書之詞亦載其所盟之事而已至齊桓而變矣至晉靈而再變矣齊桓志在合諸侯以自伯將以一人命諸侯使諸侯尊一人也殆不欲與諸侯同者而其始猶未能一諸侯之心故二幽之盟以同諸侯為辭若曰子一人未敢専惟諸侯同此也其後威力既行諸侯漸服盟江黄而専之矣至於定世子於首止則諸侯不敢不推之以主是盟而齊桓亦不復讓矣自此而盟甯母盟洮盟葵丘盟牡丘諸侯皆不得而同之矣故葵丘直以五命命諸侯而諸侯唯命是聴也欲如二幽豈可復得哉宋之曹南鹿上諸侯之薄僖公之於洮於向及諸侯之於宋猶瓦屋惡曹之類不必不同不必同而已矣晉文一戰勝楚諸侯畏服不敢不以尊齊桓者尊之而晉文亦儼然以伯主自處雖春秋於翟泉書人諸侯葢莫不受約束於晉也晉襄繼伯襲晉文之餘烈垂隴之盟雖以士縠㑹諸侯而諸侯誰敢背之乎然自兹以往乃漸衰矣雖云晉世主夏盟而自度其力外不足以制楚内不足以服諸侯於是晉靈於新城之盟不敢自専而推於諸侯同之矣新城前後兩扈不同者諸侯既不序同不同不足論也辰陵之盟蜀之盟疑楚主之晉景之世清丘則四國稱人㫁道則諸侯至者亦少晉不足以致諸侯故蟲牢馬陵於蒲皆讓而不主況晉厲之於戚於柯陵尚能不推與諸侯同之哉惟是晉悼之伯不讓文襄然其為人謹厚而寛和有醇醇之功而不争赫赫之名觀其初立而尋晉厲之故使士魴乞師則虚朾以致宋雞澤以懼楚伐鄭而盟戲再伐鄭而盟亳城北當亦讓而不主而諸侯亦未必以尊文襄者尊之也若夫晉平之不逮晉悼多矣祝柯澶淵不與諸侯同者何哉葢圍齊之役晉師武競諸侯莫不稟命焉故澶淵猶振祝柯之餘威至伐齊受賂慾則不剛色雖厲而内荏重丘之盟又同諸侯矣晉楚大夫之盟宋則不可以同不可以言同者也晉昭之於平丘猶先世讓而不居之意而後復主盟於臯鼬者自晉楚争伯以來楚雖有盛有衰而晉亦有盛有衰中國之師憚於戰楚論事者或以不戰為得服楚之道然亦其心之怯而氣之餒也而昭公㑹王臣合十八國之師親臨其地雖不若桓之聲罪以討文之一戰而勝悼之三駕以服而以視襄靈景平之不能以一矢相加既為有光即比於厲公鄢陵之戰終不得鄭者尤為極盛矣雖欲不主諸侯之盟而諸侯孰敢不推之以為主哉然而為力易竭諸侯亦自此而散矣而春秋亦將終矣然則主盟創自齊桓同盟之詞亦創自齊桓先為同盟之謙而後得行其主盟之倨後之視桓而起者能主則主之不能主則同之故同不同出於載書之詞而非春秋有所筆削於其聞也邾子克卒諸儒皆以邾為附庸従齊尊周齊桓請而進爵故克卒稱子然觀僖元年齊桓列邾君于檉之㑹猶稱邾人則此時尚未進爵可知當是魯邾通好齊桓又屢列之於㑹於其卒而來赴魯人紀以諸侯之末爵夫子仍而不削以著魯之僭而妄紀小侯之爵也十有七年春齊人執鄭詹詹公作瞻下同鄭既同幽之盟矣胡為又執鄭詹左氏以為鄭不朝也文定因之夫齊豈必責嵗朝於諸侯乃自背十二月之盟而即於春執其臣哉文定又以鄭既侵宋又不朝齊詹為執政見執為宜然則春秋豈以諸侯朝盟主為義哉葢鄭雖同幽盟而侵宋未見屈服故為宋而執詹也夫既不能平宋鄭之怨而又無徳足以服人徒以威力强執其臣以脅制其君不得謂之義矣公穀皆以詹為㣲者詹果㣲者則權不足以主鄭事齊無用執之也詹當如祭仲傅瑕之類桓葢度鄭之權在臣而謂執詹可以得志於鄭不顧夫義之不可耳夏齊人殱于遂遂既滅矣殱齊戍卒於體不合書遂人殱齊戍也張氏以不書遂人殱齊戍為伸遂人復仇之志者不然如以伸復仇之志却以書遂人殱齊戍為當汪氏従穀梁以為存遂者亦非經意葢春秋滅國多矣使非因事而書如殱戍陳災之類春秋能一一搜其事以存之哉此獨以著齊滅人國之不義遂雖亡尚能殱戍以垂後戒耳秋鄭詹自齊逃來詹來而魯背盟公羊疑魯人入詹説詞故以為佞人也然莊公之於齊桓原有隔礙信之不堅又嘗有侵宋敗宋師之嫌詹知其㣲是以逃齊不遽歸而先來魯葢欲搆魯合鄭以敵齊宋耳使魯堅信齊説詞能動之耶冬多慶十有八年春王三月日有食之此及僖十五年皆不日不朔食不在朔而又失其日也穀梁以為夜食家氏謂夜食當在丑寅之閒若在丑寅亦當紀日何以不日耶此及僖十五年長厯皆不入食限大衍厯此年五月壬子食差近後兩月十五年四月癸丑食差近前一月或置閏之在前在後抑或用朔之法不同而食有晦朔之差耳夏公追戎于濟西戎既去可以無追追亦不必親往故書以示譏左氏公穀之説啖氏劉氏辨之最詳文定謂未言侵伐而書追是不覺其來已去而追之者亦未盡當當是覺之而追耳故以為國無武備啟戎心而不知警者失其情事矣秋有􅈮冬十月十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟鄄衞地鄄之巨室必衞之公族也陳人亦必陳之公族也公羊以陳人為陳侯固非文定以為㣲者亦非也又文定以遂為専事之詞責公子結之矯亦恐不然夫齊侯宋公何以在鄄又未有他國當是齊桓因鄭詹逃來之故恐魯與鄭合約公出㑹公亦因納鄭詹之故疑於出㑹而使結往結則有媵婦之事挾之以行也而伊川罪其以私事之小取怒大國又恐不然如媵婦為結之私事則不當書於國史矣國史書之者是必以君命而媵也夫子仍舊史書之以著魯之結好大國不専遣㑹盟之使而使媵婦之公子結也夫人姜氏如莒齊者夫人之母家如齊且不可掩而況如莒哉姜氏八年不出一自齊桓失其防又致如莒之醜於姜氏何誅冬齊人宋人陳人伐我西鄙諸儒皆以為討結盟之不恭若齊桓怒結盟之不恭則爾時不當與之盟矣既與之盟又何怒哉當是因魯既背幽之盟又有結之盟而仍不解鄭之交以共事於齊故以兵臨之耳汪氏以為苟為鄭詹則不在斯時興兵者不知齊桓不輕用兵曲以致魯魯始終遲疑然後一聲背盟之罪也二十年春王二月夫人姜氏如莒再如莒皆書觀春秋於國母之醜一書再書屢書不諱則他事以為諱者皆曲説矣夏齊大災天火曰災亦以來告往弔書也然春秋書災者五書火者一諸儒因書他國災異不數乃各為之説謂此以大而書與書宋大水同宣榭之火以成周而書襄三十年之宋災以伯姬而書昭十八年之宋衞陳鄭災以四國而書也猶得其義至如襄九年之宋災髙氏以為敗亂相屬人事不終書以示戒昭九年之陳災穀梁以為存陳者不必然也葢春秋以天火為大變故悉書之其他小變不足書而不書其書者亦非必其有為也秋七月冬齊人伐戎戎穀作我夏大災而冬伐戎亦見齊桓之不畏天恤民也家氏責其不討子頽之亂而伐戎伐魯為逐利以自私亦得春秋事外示貶之義二十有一年春王正月夏五月辛酉鄭伯突卒鄭突因宋以有鄭得國之後即與宋為難失位入櫟能使諸侯傾心納之在櫟二十年以區區一邑與全鄭之人相抗既自櫟入鄭以患難艱苦之餘力又逆齊桓初伯之命又能殺子頽定王室之亂雄桀之材一時莫及不可不謂之能君矣突之不當有鄭於忽之歸鄭一書世子以著其簒逆之罪其後二十年閒忽亹子儀不得一事見經者舊史不書夫子不得而益也舊史所以不書者諸侯始終以突為君魯始終以突為君故也葢鄭突與衞衎不同鄭忽亹儀與衞剽不同春秋紀事之書因㑹盟侵伐而書諸侯則忽亹儀之不與不可得而書剽之與不可得而削従其實也不然以忽之正而不爵以剽之亂而爵之春秋其為鋤正扶亂之書哉諸儒以鄭突始終書爵為春秋明其能君者非也秋七月戊戌夫人姜氏薨薨稱夫人塟稱小君是魯不絶文姜於廟矣直書以著魯君臣之失也冬十有二月塟鄭厲公鄭突諡厲王氏以為周室雖衰公議尚在臣子私諡不敢妄加美名然則魯軌之諡桓齊諸兒之謚襄鄭寤生之諡莊公議安在耶突之諡厲葢國人惡之也以簒得國昭公因而不終其位子亹因之而殺子儀因之而弑在櫟則與諸侯親入鄭則與諸侯仇失位則搆諸侯伐鄭得國則惡諸侯而連年搆兵突之為厲也甚矣故於其死一著其惡也於此則可以知鄭人之君突迫於諸侯而不得已也二十有二年春王正月肆大眚肆大眚於文姜既薨之後將塟之前恐亦如後世有大故而布恩肆赦之類為文姜施遺澤於後人也癸丑葬我小君文姜陸氏以為母有罪子不可得而貶然則名之曰幽厲雖孝子慈孫不可得改者何耶縦不可貶而又亂禮而加美諡毋乃欲葢彌章乎但魯臣子失討賊之義於前而於其孫而復歸仍以夫人尊之則薨塟亦不得不如禮矣陳人殺其公子御宼左氏稱殺其太子御寇杜氏云陳人惡殺太子之名故以國討公子告張氏以為不稱世子未誓於天子也未誓則稱公子重王命也然春秋時已無尊王命而請誓世子者故春秋一書無未誓稱公子之義如晉殺世子申生宋殺世子痤陳殺世子偃師亦未必曽誓於天子也使以未誓立義則與先公之子稱公子何别名實不幾亂耶春秋書公子祗當以公子論不必論其實世子也孫氏専命専殺之説最合大夫且不可専殺況殺世子母弟乎此語最為周匝文定稱君稱國稱人其説甚辨夏五月孫氏以為下有脱事呉氏以為四訛為五也二説皆可不必穿鑿秋七月丙申及齊髙傒盟于防出國而盟大夫其故則忘舊仇而締新婚也諸儒以不書公及為諱公之與齊大夫盟然春秋諸侯之盟大夫大夫之盟諸侯公盟私盟習以為常何必諱哉如公子遂及齊侯盟郪丘臧孫許及晉侯盟赤棘内大夫可以私盟諸侯公何不可以私盟外大夫哉春秋凡公與外大夫盟名外大夫而不目公者其書法則然非事事皆諱之也但如及荀庚盟及孫良夫盟及郤犫盟及孫林父盟皆書來聘此不書來聘又如及向戍盟劉亦書來聘此則書地同而不書來聘不書來聘而書及盟者惟此與及處父盟而已彼不書地而此書防防魯邑也則其來聘不書可知矣夫髙傒之來聘為婚姻也齊侯使之來則齊魯之再通昏亦齊侯欲之也春秋不書齊侯使髙傒來者見莊之欲昏於齊急於桓之欲昏於魯以著其忘仇之實也冬公如齊納幣直書公如齊納幣正以示貶非不行貶也莊公因髙傒之來親往以固齊之志伊川以齊疑婚議故公自行後二年方逆為齊難之者殆不然也使傒盟為非議婚則可如傒盟為婚而不出齊桓意傒敢専之耶既出桓意桓又何疑既行納幣又何故難之其遲至二年方逆者終文姜三年之喪也而不知喪未闋而納幣亦不可不謂之失禮矣二十有三年春公至自齊公羊曰公一陳陀也葢公羊於蔡人之殺陳陀謂陀淫於蔡而蔡人殺之於此甚惡莊之娶仇女而親納幣故賤其事謂若陳陀之淫而必當見殺於齊乃為之巧語曰公一陳陀也説公羊者遂謂公如齊淫固憒憒而汪氏辨其不然亦未了了也公娶仇女其罪甚於納糾以定仇人之國故伐齊納糾不至而至納幣至觀社至親迎以著其罪也祭叔來聘諸儒譏私交之説皆是夏公如齊觀社莊公急於親齊故假觀社以往齊急於親魯故桓亦不之拒葢議婚既成兩相為好而不顧君舉之不法也公至自齊王氏因穀梁尸女之云以公之意實窺齊女而以觀社為名故書至以危之然則窺所納幣之女耶齊防恐不若是之不謹窺士民他女耶莊公恐不若是其不肖也葢以著君舉之不法故書至於至納幣之後至逆女之前以罪之而不至遇穀不至盟扈以明示其義也荆人來聘以禮來聘既不可以州舉又不書爵書名而書荆人者畧之也不得比於中國諸侯而史亦不以書中國諸侯者書之也其後㑹盟侵伐交政既久則於其來聘一如書中國諸侯者書之矣諸儒以為進之者非也夫楚豈真有慕義修禮之實哉張氏逺交近攻之説最是汪氏以始書荆人繼書屈完然後書楚子使椒楚子使薳罷者始則嘉其慕義繼則予其服義及其浸慕中國荐講聘好則稱名稱人然如書楚人使宜申來獻捷豈嘉其執中國諸侯而人其君名其臣哉公及齊侯遇于穀觀社而不拒相約而即遇齊魯之君以昏故而相親也葢齊桓求合諸侯必欲得魯故北杏之㑹不與而為柯之盟鄄之㑹不與而受文姜之如齊豈髙傒來盟既定莊公親往納幣而猶難其昏耶必不然矣蕭叔朝公蕭叔朝公與公朝於王所以譏非其地之失禮一也蕭既不以禮而公亦受之而不辭者方以小國朝已為幸而不暇以禮責之也秋丹桓宫楹丹楹刻桷書以譏僭同一義也然何以五廟並列獨於桓宫踰制而盛飾之耶家氏以為娶仇女為夫人知有母而不知有父丹楹刻桷以葢其無父之恥既知有母不知有父又隆於其父而薄於其祖無父無祖禽獸之道所以罪莊公者至矣但當時獨於桓廟加意者或以文姜新入廟以配桓公丹其楹而刻其桷者非以崇桓公以崇文姜也崇文姜者以崇齊也在廟者齊女入見者亦齊女崇先姑以悦新婦在莊公藉以掩文姜之醜而哀姜則己視為閨中之範矣冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈盟防而婚議既定故親納幣遇穀而親迎有期故丹桓宫楹至此兩君又為扈之盟者所以尋防之盟也葢文姜之喪既終齊女將歸齊桓猶恐莊公之信不堅故再盟以一其心非三年以來齊之盟防遇穀其昏尚疑至此而始決也二十有四年春王三月刻桓宫桷前秋丹楹今春刻桷不一時並飾逾年而踵事増華可見莊公原無僭禮成見不過求悦齊女不能禁其侈靡夸大之私心也故以為有意以葢父之恥掩母之醜者猶深文也嗚呼亦可嗤矣塟曹莊公夏公如齊逆女莊公年三十七始娶哀姜先儒謂受制文姜使不得他娶而必娶齊女也葢嘗疑之莊生十四年而即位即位之八年而齊㐮見弑是時已二十一嵗矣文姜何不使之早娶齊女耶如云必使娶齊襄之女則齊襄既弑十七年而莊公始娶不知哀姜生於何年大約見弑時猶在襁褓以二十餘嵗之子制之不娶使待其襁褓之女必不然矣且使莊公制於文姜不敢他娶則逮其既死可以他娶矣而又何必齊女是娶哉當是文姜横主内政制其子使不得有正嫡而其淫行不特内媿其婦而亦外慙齊女故莊公不得他娶雖於齊女而亦無心議婚及之也於其既死而急於娶齊女者魯人藉婚姻於强鄰宋之好既絶矣而齊桓又以子糾之故不我好也而此時之桓方合諸侯以創伯乾時之役既仇而長勺又敗其師桓之不能一日忘我我幾無以解之夫人如齊而尚未能釋然也髙傒之來葢魯人夙夜望者約婚既定親往納幣又觀社以親之遇穀以合之盟扈以堅之而親迎有期托於禮以自往而後依强隣通婚姻之志始得也凡所以媚齊女者皆所以媚齊桓也殆莊公之志魯人之志而以為文姜之志者恐非也秋公至自齊大夫逆夫人皆書以夫人至公親逆而獨書公至夫人非大夫所宜以者以夫人至非禮也故書以譏之公親逆當以夫人至而先自至非禮也故亦書以譏之親迎之禮所以明授受也大夫逆而授之大夫大夫受之授受不明矣公自逆而齊不授公公無所受於齊授受不明矣八月丁丑夫人姜氏入穀梁曰日入惡入者也陳氏曰書入以惡哀姜也夫女子之嫁也父母命之齊襄既殁當受齊桓之命莊公親如齊而不使之従莊以歸則非哀姜之罪齊桓之罪也書入以惡哀姜者惡齊桓也不正其従夫之道而以驕悍訓之致啟後日淫弑之禍而身不得其死故正其罪於後者桓也而兆其禍於先者亦桓也文定謂不可見乎宗廟者以為仇人之女宗廟弗受春秋書入以示義非謂莊公不行見廟之禮也家氏辨之非是戊寅大夫宗婦覿用幣莊公以幾四十之年為一齊女始則曲意以求之繼則飾禮以誇耀之似不應昏庸若此故以崇齊女者所以崇齊侯以為其猶有藉援保國之深心也然而觀社則曹劌諫之丹楹刻桷則御叔諫之至於用幣而御叔又諫之魯猶有人焉而莊公一切拒而不納則直昏庸之至矣然則公羊以為公一陳佗穀梁所謂尸女者毋亦稔其寵夫人之事而深惡之因以意其必然耶大水冬戎侵曹曹羈出奔陳赤歸于曹曹羈赤之名實不可攷諸儒因書法與鄭忽突同故皆以為羈係曹必曹之世子赤不係曹必曹之庶公子也此當然矣鄭莊卒而鄭亂曹莊卒而曹亂以為公子争立亦當然矣宋人執祭仲而鄭亂戎侵曹而曹亂以為戎之助赤奪羈猶宋之助突奪忽亦當然矣後書曹殺其大夫以為如鄭之殺𫝊瑕原繁及治雍糾之黨類亦當然矣然則羈赤之名實可知也但鄭莊卒未逾年忽之出奔不稱爵曹莊卒已逾年羈既即位而出奔猶不稱爵忽於復歸得一正其世子之稱羈後不見於經并不得一正其世子之稱突歸鄭為君其後出奔入櫟交政諸侯至於卒塟歴歴分明赤歸曹之後未嘗一與諸侯盟㑹説左氏者以赤為僖公卒於三十二年而不見於經僖元年檉之㑹始列曹伯又七年書曹伯卒則班也班亦不知於羈赤何屬然則羈赤之名實終不可得而知耶宜乎公羊又有曹大夫之説也顧於赤言之不詳則亦不可従葢曹在春秋其國小舊史記其事畧夫子亦無従攷其始末而備書則従諸儒作鄭忽突比者可也而赤奪正之罪戎不義而亂曹之罪皆著矣郭公文定郭亡之義為是二十有五年春陳侯使女叔來聘左氏嘉之不名非也諸儒乃引以説齊仲孫齊髙子之類皆嘉之不名亦不是總之春秋無稱字為襃之義也穀梁以為天子之命大夫諸儒従之孫氏謂如鄭祭仲魯單伯之類皆是也然觀下書公子友報聘及再如陳塟原仲則友與陳有私交而此為書諸侯聘使之始未必恰好陳有命大夫來而得異於尋常來聘之使也又如仲孫髙子不皆命大夫何獨於女叔之書氏書字而知其為命大夫哉夫天子之使禮當以官爵氏字通諸侯之使則當以名通魯於天子使臣有直書其名者矣而於陳大夫之來舉氏舉字此後於齊仲孫亦然甚而於髙傒稱子於華耦并紀其官又甚而内臣公子友稱季子外而宋之來奔者稱子哀葢挹損王臣而尊異諸侯之人凌替僭亂公然書於國史而不知其非禮夫子作春秋一仍之而魯之失不可掩矣此則以著友與陳既有私交而魯因友交好之故并尊異其來使之臣而稱氏稱字也夏五月癸丑衞侯朔卒朔不書塟諸儒以為朔逆王命故春秋削其塟以治其罪然朔逆王命其罪固大而鄭寤生親與王戰射王中肩其罪不尤大耶不削鄭莊之塟而削衞恵之塟有治罪有不治罪不可以通矣當是衞立子頽以亂王室莊王告於諸侯齊桓方以尊周為名故於朔之卒諸侯不往㑹塟魯亦視齊桓命闕于禮焉舊史不書夫子亦不得而書矣觀於逾此兩年衞新君不與幽之盟齊桓猶聲立子頽之罪奉王命以伐之則朔之卒其為不往㑹塟何疑六月辛未朔日有食之鼓用牲于社文定曰諸侯用幣於社伐鼓於朝退而自責吕氏曰天子伐鼓於社社隂之神日食則隂勝陽也二説合之其義始得葢日者陽徳天子之象也日而有食之者陽不勝隂而隂侵之如强臣之逼君后之惑主四逺之侵中國也以天子視諸侯則天子君道為陽諸侯臣道為隂天子伐鼓於社者社隂神伐隂使不得勝陽也諸侯伐鼓於朝者諸侯臣道所以自伐以明不敢干天子也天子所為恐懼修省者惟恐已之立徳有虧謫見于天而思所以補救之也諸侯所為恐懼修省者惟恐已之行事或悖天變於上而思所以挹損之也以諸侯而鼓於社是不知上有天子而儼然以君道自處不思自伐而伐社以勝羣隂為昧於在天之垂象非僅如他事之僭制踰禮而已也伯姬歸于把此以誌魯把昏姻之始亦以起㑹洮來歸朝子求婦之端也秋大水鼓用牲于社于門冬公子友如陳友魯之貴公子也報陳之聘而使友行汪氏以為此友私行之階李氏以為魯陳之交出於季友原仲之私行者皆是也觀於前後之文魯與陳未見有邦交之實而陳使之來聘既書氏書字以尊異之而後又有塟原仲之事葢莫非季友之私也春秋來聘之使書氏書字只此一見外塟大夫亦只此一見夫子仍而不削者以罪友之私交昧於義而越於禮亦以著友托陳以自固所以能討牙與慶父之亂以定僖公而其後季孫行父之世結於陳其由來者久也二十有六年春公伐戎公無春字先公失之于盟戎而戎狄之來禦之有道必欲報復而相尋干戈以倖一朝之勝是為以亂易亂春秋書以譏之也夏公至自伐戎戎狄是膺魯史以頌僖公之功莊公伐戎何至遂以為罪然而道在有以禦之不在有以勝之故桓之盟戎固失而莊之伐戎亦未為得也春秋至桓之盟至莊之伐其義一而已矣諸儒危之罪之之例於桓莊兩公之書至大約可通曹殺其大夫諸儒皆以不稱名者殺無罪也然則稱名者皆為殺有罪乎文定義係乎殺則止書官義係乎人則兼書其名氏説為近之然以為罪在専殺而見殺者之是非有不足紀則又不合使果有是非則義又係乎人而當書其名氏矣何云不足紀耶陳氏以為赤簒曹而殺大夫宋杼臼無道而殺大夫必皆大夫而不義其君者也故皆不名然大夫而不義其君亦有是有非既有是非亦當書名以著之何為而别立不書名之義耶葢春秋大義固在罪其専殺大夫又於罪専殺之中見所殺者之是非其不書名如曹宋殺其大夫或史失之而非夫子削其名氏以别立義也但如宋三殺大夫皆不名一則不紀名而紀司馬之官何以史失其名而獨詳於官耶此等處義不可以强通也秋公㑹宋人齊人伐徐宋序齊上杜氏曰主兵也然宋齊稱人莊公親將文定曰戎徐為魯患既伐戎又伐徐也二説合之情事始得葢使魯聴齊以為宋或宋聴齊以為魯則魯宋合矣觀其前怨未釋後好弗通則伐徐之役必魯宋皆有怨于徐而齊出師兩助之耳齊兩助魯宋者所以堅二國輔伯之心也春秋書此以誌魯宋之合于齊所以明年有幽之盟也冬十有二月癸亥朔日有食之春秋日食之變而頻年者始見于此不鼓不用牲于社觀三十年鼔而用牲則此年偶不行耳非知其非禮而止也二十有七年春公㑹把伯姬于洮伯姬念父歸寧可也莊公念女受其歸寧可也必為洮之㑹何哉飾車服宴飲之盛以侈國人以悦其女猶其所以媚哀姜者也然則公以父子而㑹不自以為非禮則齊襄文姜以兄弟而㑹亦不以為非禮矣葢其昏庸之性然也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽前幽之盟猶得八諸侯今盟而衞許滕滑復不至齊桓猶未信于天下諸侯也故不敢自主而再推于諸侯同之穀梁以為得衆而所得者四國未為衆也汪氏以為陳鄭心服不復攜貳故書同以美之然得陳鄭而失衞許未可云盛也家氏以為後有合十八國不為得衆而于四國與其同者大齊桓之不以兵車也然齊桓九合諸侯不以兵車不當二幽同而其餘不同也秋公子友如陳塟原仲公子友如陳直書塟原仲文定以為無貶者非也其意總以書公子不書公子為襃貶故以友不去公子為無貶耳呉氏以為公之遣行友之㑹塟原氏之受皆非禮而參譏之者是也文定取禮記縣子之言謂春秋深貶王臣以明始亂備書諸國大夫而無譏然則㑹塟成風則王不稱天以示貶而成公之塟晉侯襄公之塟楚子其不書晉侯楚子之塟亦以示無譏而春秋果有此義耶使古禮可廢而末流可従則春秋之世諸侯而僭天子抗天子大夫而僭諸侯抗諸侯皆可以無譏而春秋亦可以不作矣即如縣子所云大夫赴喪諸侯受哭其是耶非耶其得己耶不得己耶従末流而廢古禮烏得無譏季友之塟原仲烏得無譏冬把伯姬來歸寧禮也伯姬春㑹于洮而冬又來故書以譏之莒慶來逆叔姬諸儒譏公自主之説于義當亦有之但莒習于束鄙之風與魯素不相睦故好㑹不數雖莒子卒塟亦并不通其喪紀而乃嫁女于其臣春秋所為書以譏之也把伯來朝焦薊陳備賔三恪杞宋二王之後宋為公陳杞疑皆稱公也但見于春秋宋稱公而陳則稱侯不聞陳何以降公爵為侯也桓公朝左氏所書杞侯公穀皆作紀侯攷前後事實則公穀為是杞君今始見經爵書把伯則把之降公而侯降侯而伯皆無憑而知也當是三國雖同為周賔而爵有差等宋為公陳為侯杞為伯原來如此耳此後之降而稱子則或為時王所貶或自貶以損朝覲貢賦之禮其説為妥二説又以自貶為無弊春秋従其實以書之也公㑹齊侯于城濮城濮之㑹謂謀伐衞也謀伐衞而魯師不㑹何也葢齊以衞不與幽之盟將假王命聲衞罪以伐之而魯衞兄弟之國恐魯又背而親衞故㑹城濮以堅魯人之心也二十有八年春王三月甲寅齊人伐衞衞人及齊人戰衞人敗績左氏以為數之以王命是齊以王命伐衞矣而實則齊怒衞不與幽之盟也衞不與盟齊不返求其所以不信于衞之故而即興兵以臨其境齊之罪也即假王命以聲立子頽之罪夫不及衞朔之時以治衞朔而罰及後嗣亦齊之罪也衞于齊人之來伐如申之以王命則當追原先世以自引過即問我以不與幽盟之故亦當托諸辭令以謝齊人兩俱不然憤而與戰則衞之罪也義自明白文定以齊稱人為將卑師少而又主左氏奉王命以立説使齊桓果請王命以討衞罪既不親行又不遣大夫將可乎衞朔立子頽以叛王鄭突且能入救王難桓方圖霸置之不問今其人已死其子一不與盟而即假王命以伐之是叛王無罪而不服伯主有罪矣以公濟私豈非春秋所惡哉如是則當従左氏作齊侯伐衞而經書人為貶矣如果將卑師少則不當以請王命立説也葢春秋之初外諸侯侵伐不名大夫而是非曲直則因事以見不在乎書爵書人書師以為襃貶也左氏又因衞人戰敗之後徵師而衞不従約㑹而衞不至而齊桓不興再伐之師至于狄入不救城楚丘示恩而衞始與伐楚之役求其故不得疑為取賂而還而不知桓之伐衞即不取賂亦不得為問罪之師而桓方圖伯亦必不取賂以解諸侯之體也又戰書衞人敗亦書衞人穀梁以為人齊不得不人衞李氏以為紀戰之燕人城濮柏舉之楚人敗皆稱師此不書衞師書衞人則貶衞可知然衞之及戰其貶無疑不以稱人為貶也葢紀之戰燕助三國以攻紀城濮之戰楚得臣來救衞柏舉之戰楚囊瓦先圍蔡葢皆興師動衆以行軍之律有事于外故敗皆稱師齊來伐衞衞倉猝與戰徵調未齊約束未定不成為師故敗不稱師觀于伐戰敗之上總紀一日亦可知其事勢之促矣春秋従實以書原非立義而諸儒紛紛異説此春秋之義所以晦于後儒之過于深求也夏四月丁未邾子瑣卒秋荆伐鄭荆以州舉諸儒皆以為外之也來聘稱人又以為嘉其慕義而進之也伐鄭復以州舉又以為惡其凌弱暴寡而外之也然則越此不十年而伐鄭稱楚人為復進之耶文定知其不可以通而遷其詞曰浸强也豈楚自入蔡以來至此尚未强又必遲之十年而始强耶仍不可以通也葢自此以後紀齊晉攘楚之事為多詳于内諸侯則不可以不詳楚不詳則其事之是非不著也其初之或稱國或稱人不定者猶後書呉事之稱國稱人不定皆不必詳之之意也公㑹齊人宋人救鄭莊公親與齊宋稱人如果將卑師少則于善救鄭之中有譏矣楚憑凌中夏諸侯未嘗合兵一戰今以鄭故而三大國出師則天下大勢所係也諸侯勝則中國之氣振楚勝則楚之勢張子元以六百乗伐鄭縦鄭能整暇示武而知勢不敵將奔桐丘齊桓卑其將少其師以往一戰不勝天下大勢去矣諸儒每以桓不輕舉大衆為善當此强敵而不親行有攘荆蠻安中國之志者當如是耶子元初有邪志出師無名其師不直其氣不壯聞諸侯師至而退齊桓徼天之幸而成伯業為天下後世之功顧以當日事勢度之莊公親與齊宋必非將卑師少葢皆大夫而不名也僖十五年盟牡丘之後救徐之師始書公孫敖反諸侯之大夫猶未歴叙其名氏外大夫獨帥師書名自文三年晉陽處父始外大夫連兵伐國書名自宣六年晉趙盾衞孫免始至鞍之戰然後内大夫外大夫之名歴書也春秋之初尚未有也文定每以稱人為貶至如救鄭之類不可云貶則曰將卑師少不特失于春秋之事而夫子所云禮樂征伐自諸侯出自大夫出者亦并昧其世矣冬築郿郿公穀作㣲冬雖用民力之時而下書大無麥禾則為凶年而興工作矣故書以譏之文定及張氏之説皆是大無麥禾諸儒疑于不書水旱不書螟螽不書饑而書大無麥禾于是文定為倉廩告竭之説劉氏為初不蓄積日侵月削以至于無非一嵗之事之説汪氏為人事之變非天時之灾之説皆不若張氏天時人事兩不足之説為合也麥熟于夏禾熟于秋天時有為麥害而禾無傷者有為禾害而麥無傷者有傷而不書者故雖水旱螟螽而不至于麥禾大無也至于麥禾大無而災甚矣故水旱螟螽不必書麥禾無而民飢大無而民大飢矣故飢不必書然使國與民内外有積猶可也卿出告糴而知内之虛竭矣故曰天時人事兩不足也臧孫辰告糴于齊春秋書内災多矣未有書告糴者此書告糴以著莊公奢侈如娶婦㑹女之類務為靡盛又大興工作築邑新廏極臺池園囿之觀遊而國實空虛全不知恤也書臧孫辰者亦以著辰為國卿既不能遏君之欲又不能通國之用至不得已而奔走道途乞憐鄰國也二十有九年春新延廏書築郿于大無告糴之前書新廏于大無告糴之後其譏可知矣夏鄭人侵許鄭許之怨終春秋之世不解張氏以為齊桓盟幽而許不與鄭人或受齊命而侵之觀于書侵不書伐理當然也許叔入許之後鄭人凌許之端再肇于此秋有蜚冬十有二月紀叔姬卒紀侯之卒塟不書叔姬之卒塟書者魯女故也亦可以傷紀侯失其國而卒塟不得聞于諸侯矣城諸及防文定于新延廏論之極是所謂有利不利時也然一時而城兩邑雖不值大無告糴之後書之猶譏矣三十年春王正月夏師次于成鄣未必為紀之遺邑亦未必為紀之附庸啖氏以為全紀不能自存況能以一邑抗齊二十年者是也即紀之附庸魯不能救紀而又救其附庸乎趙氏以為㑹齊圍鄣者是也葢莊公此時堅與齊好既同幽之盟而又助伐鄭之師必不為鄣以背齊明矣秋七月齊人降鄣郕受圍而後降此但書齊人降鄣者必齊師將出鄣自度不能支及其未至而降之以免攻圍之害也觀此則知魯次成之師為俟齊師之出以鄣既降而止矣然不書鄣降于齊而書齊人降鄣者以未見侵伐而鄣降如書鄣降于齊則似鄣無故自降而齊人迫鄣以降之惡不著也八月癸亥塟紀叔姬書齊侯塟紀伯姬魯不往㑹也書塟紀叔姬魯往㑹也魯前欲存紀齊必滅紀魯與齊相背故伯姬之塟勢不能往叔姬卒于酅齊魯相好義不可不往夫皆魯女也一為夫人一為夫人之娣而魯于往塟之禮一視乎齊之喜怒可歎也已又酅塟叔姬緩必齊將用師于鄣鄣近于酅紀季懼齊師之及故俟鄣降難平而後塟也則以鄣為紀之附庸者亦或然也九月庚午朔日有食之鼓用牲于社冬公及齊侯遇于魯濟齊伐山戎既不徵師于魯何用與魯謀許氏以為齊桓不自恃而取策于莊公者不必然也葢桓所仗于内諸侯以為信附者魯宋也衞則伐而未服鄭猶攜于齊楚之間一旦逺伐山戎用兵于外宋之與我雖堅而猶恐魯為衞鄭所搆故假謀伐山戎以通好示信使不我背耳伐戎而遇莊公于魯濟即伐衞而㑹莊公于城濮之故智也齊人伐山戎齊之伐山戎以山戎可以得志得志于山戎則可以威楚此管仲之謀也然而非强本治内柔服逺人之道亦不可謂春秋無譏也文定必以不稱爵稱人然後為貶然則獻㨗而稱齊侯為無貶耶又以獻捷稱齊侯知伐戎之非將卑師少夫使命將往伐而自來獻捷如楚子執宋公而使宜申獻捷不親伐而親獻親執而不親獻各自為事非有定體何以必伐山戎之為齊桓親往耶文定總泥于書人為貶非貶即將卑師少而不通于前半部春秋不名大夫之義故其論多紛糾耳三十有一年春築臺于郎莊公興作皆舉于昏齊之後葢依强隣鮮外患而其氣驕其志荒矣至此又恣為臺觀之娯也抑又甚矣夏四月薛伯卒薛入春秋于隠十一年來朝稱侯歴桓莊兩公之世幾五十年不見于經至此書薛伯卒其為㣲弱而自降可知矣築臺于薛六月齊侯來獻戎捷齊桓遇魯濟以謀山戎既得志于山戎而來獻捷既以自誇示亦以報魯濟之謀而結莊公之心也故不憚自卑屈以伸其糾合諸侯之志文定謂獻捷為書以示抑之之義極是秋築臺于秦三時而三築臺示譏之義顯然冬不雨三時築臺一冬不雨書以警戒後世者切矣三十有二年春城小穀築郿之後無麥禾而又新延廏城諸及防三築臺之後不雨而又城小穀莊公可謂不恤天災不愛民力之至矣葢未有昏庸而不泰侈者也夏宋公齊侯遇于梁丘魯宋輔齊齊親魯宋梁丘之遇宋公即㑹莊公于城濮遇莊公于魯濟之意皆齊桓就之以示昵好不必其有事也左氏以為楚伐鄭之故齊請㑹諸侯宋公請先見此時不聞鄭有楚師楚之伐鄭諸侯為檉之㑹在三年之後于此不當云云也秋七月癸巳公子牙卒牙殺而諱卒公子友諱之也牙有逆心因而有逆言友及其難之未發明正其罪誅不避兄君臣之義未有為友罪者即謀而酖之不彰其惡而消其難以為恩義兩立亦未為失也牙死而慶父在卒弑兩君為禍于國為友解者曰慶父主兵日久不能遽去又曰牙死而慶父勢孤雖弑兩君而卒不成然友能以君命殺牙牙奉命以死不可謂無權也乗時以君命逐慶父慶父雖主兵權而莊公餘息尚存魯之人必不敢従慶父為亂則一再舉手而魯難靖矣友曲意彌縫以為牙死而慶父可制則内惡不彰而嗣子可定釀成禍亂幾致削亡即恕其事勢之難而又忌一時殺兩兄之名不以此為友罪可也而又従而賢之謂得親親之道殆不然矣葢友殺牙而諱卒舊史亦因而諱之夫子作春秋不得而改文定取陸氏之説以為變而得中夫子書其自卒以示無譏者非也八月癸亥公薨于路寢莊公私于孟任而生子般其為子也㣲又屈于哀姜不得早立為嗣于閔僖之間般為長故公子友以為般也存君何憂也而閔為哀姜之娣子慶父之亂所由以生使莊公早娶夫人或不至于無適使後不娶齊女亦或不致逆臣資以為亂莊公葢受禍于齊也冬十月己未子般卒莊公在殯子般即位而次于黨氏何也毋乃季友知慶父之必為難而次黨氏以避之耶夫不知慶父之為難猶之可也知之而不明告于國之卿大夫䕶嗣君而逐亂人失于計矣葢季友于内事意在彌縫掩覆而又不能消難于未萌難作禍成而踉蹌出奔謂之賢而能斷不可也文定謂慶父主兵勢傾公室非季友力所能支然試思慶父之弑子般何為哉將以自取也再弑閔公何為哉又將以自取也夫久握兵權弑兩君如反掌而卒不能得志必有所畏忌而不敢矣因其所畏忌者斷以治之固知慶父必無能為也況牙以欲立慶父之言而友致之死友與慶父相軋之形跡已見而猶欲隂消其慝以漸制其所為愚矣公子慶父如齊閔公齊娣之所出慶父如齊以定新君而亦因以自固實非出奔而何以宜書出奔哉穀梁以齊仲孫為慶父故以此為出奔而以不書奔書如為諱耳狄伐邢齊桓伐山戎而獻捷誇功謂足以内服諸侯而外警逺人矣狄乃于内地肆伐諸侯無所忌憚然則以力服人者誠不足以服人也春秋宗朱辨義卷三
