body:
  text: 春秋宗朱辨義卷四髙淳張自超撰閔公元年春王正月先君卒逾年而即位禮也莊僖繼故不忍修即位之禮是已桓宣繼故而修即位之禮者翬遂以即位掩覆其弒逆之跡也慶父弒般亦似宜修禮以掩覆之而不奉閔公即位者何也慶父殺般意在自取非若翬遂之決志奉桓宣者獨內迫于國人外制于齊又忌季友在陳將告于諸侯以聲其罪故權宜奉閔而實不欲定閔之為君則且蔽罪于圉人犖托為繼故不修禮而自取之逆志仍在也齊人救邢伐山戎稱齊人文定以為齊侯也貶而稱人救邢稱齊人文定以為將卑師少夫伐山戎則親往而救邢則卑其將而少其師宜李氏議其不力于救患謂救而書人救而書次同一伯者之心也歟然而皆非也齊桓之救諸國春秋皆善之救邢之稱人亦未必將卑師少蓋書救以善其救而將之尊卑師之衆寡非義所係也夏六月辛酉葬我君莊公莊公之薨將及期年而始克葬其以國亂而緩可知矣左氏于閔不即位以為亂故後儒駁之謂般卒已三月亂有定矣使亂已定何以緩葬先公耶可知慶父雖立閔而自取之志未絶故不使早成禮以葬先公而定閔之為君也使戴已者有黨而亂勢可乘則將速斃閔以自立而後以葬先公為己事也則其出于慶父之制閔公使不修即位之禮何疑秋八月公及齊侯盟于落姑先公甫葬輕出國都求盟齊侯藉以定國未嘗非譏也左氏以為請復季友夫哀姜主于內慶父主于外雖國人欲復季友其能强閔公出㑹以公然請于齊侯哉吳氏以為必魯之世臣有若石碏者隂謀于齊故齊桓以伯主召閔公至齊而與之盟使季友得以歸魯者其說近之李氏季友如齊間之之論亦有理也季子來歸季子書來歸則前之出奔不書可知文定以為沒其恥者非也稱季子者朱子以為魯國內亂得一季子歸國國人皆有慰望之意故魯史喜而書之夫子直書史家之辭其說最合如書仲孫髙子及司馬華孫之類皆可通矣若以為春秋嘉之而書季子然則嘉其能討賊耶則哀姜慶父如故也嘉其能已亂耶則閔公再弒也何賢乎季友而嘉之哉且友之兩出奔皆不書者固不必書亦不可書也閔之再弒方以書哀姜遜慶父奔著其為賊如并書季友奔則疑于友之與聞故矣即不書奔而書公子友來歸于般弒之後閔弒之前則亦混于慶父之一出一入而無以定弒君之主名矣如并來歸削而不書則友之立僖公以定魯既隱而不著而後之生而賜族亦昧其所由矣故仍舊史書季子以示别而情事可以推而得之也冬齊仲孫來齊仲孫來左氏以其來省難書曰仲孫嘉之也文定責其不能勸齊桓討賊為事君之不以忠夫桓既不能討賊又納慶父之如齊定其所立桓之罪也以請討責仲孫人臣之義當如是矣但寬于待季友而謂書季子為賢之嚴于論仲孫而罪其不能請討是所謂室中失盜不責家人而責路人者也夫季友以公室至親能斷于未發難之牙何愛于已弒君之慶父使匍匐齊廷號泣以告桓曰敝邑不造變生骨肉慶父逆天躬弒嗣君惟伯主加刃以扶大義則又請之曰慶父弒一君而立一君意在自取慶父不誅孺君安危殆不可知假大國之威除逆已亂靖宗國而得諸侯在此舉也是時齊桓方親魯以合諸侯未有不聽者落姑既盟宴然來歸而國難再作友有罪焉舍季友不責又嘉之而苛責仲孫誤矣然而左氏以為嘉仲孫者亦不然也書慶父如齊書盟于落姑書季子來歸書仲孫來以著魯人縱賊與齊桓之不能討賊也二年春王正月齊人遷陽自齊桓有國以來滅談滅遂降鄣遷陽莫不悉書以著桓之吞併小國也然則存邢撫衛豈有救難恤患之真心哉可取則取之以擴其土不可取則存之以示其義固功過之不相掩而亦心跡之不能一者也夏五月乙酉吉禘于莊公記云不王不禘王者禘其祖之所自出而以其祖配之觀于夫子答或人之問而推其說于天下朱子以為甚大甚逺則非諸侯之祭可知矣夫子于禘則推其說于天下而于郊社之禮禘嘗之義則達其說于治國有天子之國有諸侯之國則天子有郊有社有禘有嘗諸侯不郊而社不禘而嘗可知矣漢人集禮誤于春秋兩書禘一于夏五月一于秋七月謂禘為時祭而又以五月七月之不同時或以為春祭或以為夏祭又知其說之不可以通而以時禘為夏殷之禮後儒辨之詳矣夫魯禘之僭禮無疑也而禘之為祭或以為合祭羣廟之主或以為不兼羣廟之主以義揆之則當以朱子不主合食為是但所疑于合食不合食者以追文王配周公祭于太廟言耳如僖之致夫人而禘太廟追配不追配合食不合食已不可知至閔之禘于莊公則不可必其追配又可必其合食哉趙氏伯循曰魯之用禘蓋于周公廟而上及文王閔公僭于莊公廟行之以其不追配故言莊公不言莊宫明其直用禮物耳不追文王配周公也趙氏子常則謂魯有周廟以追文王而配周公羣主不得而與太廟羣廟則皆合食而以禘代祫故從左氏作大事有事從祀皆禘也又引鄭康成天子諸侯喪畢合先君之主于祖廟而祭之謂之祫因謂魯惟以禘代祫故閔二年吉禘于莊公文二年大事于太廟即喪畢之祭其後每三年一禘故僖八年之禘太廟宣八年之有事太廟定八年之從祀先公其年數皆合也又引鄭之有厲王廟以證魯之有周廟謂魯追文王配周公必于周廟不于太廟而僖之禘于太廟閔之禘于莊公皆所以代祫也朱子云古禮盡亡不可詳考子常據左氏為說則追配文周祭于周廟曰禘祭于太廟亦曰禘祭于羣公亦曰禘是魯既僭禘而又錯用之既昧禘之義又廢祫之名而于太廟羣廟之祭皆無所别一以禘冒行之名從其同義無所取魯之于禮顧若是其瀆亂無紀耶伯循但用禮物之說疑若可從又疑于閟宫侈言郊廟郊則詞及后稷而廟不及文王則所云廟祭非禘也四時之祭雖但舉嘗而白牡以享周公騂剛以享魯公器物之備樂舞之盛亦云侈矣禘之禮物當更有加不追配文王周公則莊公何以當之耶既不追配則子常合食之說不可盡非而又疑喪畢之祭當舉羣主合食于太廟不于太廟而于莊公又可迎周公魯公之主就饗于莊公耶說皆難以通也大約慶父亂人敢于賊殺兩君又何所不亂于禮喪未及吉而吉祭不于宫于寢以魯得用禘則竟用禘而已後儒斟酌于追配不追配合食不合食烏能于亂人之禮有當哉以三家之堂而相維辟公天子穆穆歌之不疑則慶父之亂不公然于莊公而追配文周即迎大廟世室之主就莊公而合食矣亦或竟不追配不合食而追配合食之殷禮盛樂莊公當之矣春秋書此不但以譏其僭于禮也吳氏以為是時閔公幼事出慶父之所為無知不孝非禮非義而其名非實一舉而五惡具書法五字而諸惡畢見者亦頗得之蓋致夫人而禘猶行于周公之廟則魯僭禘之常而于莊公行之則為禮之至變此聖人所以致嚴于其文也秋八月辛丑公薨左氏曰共仲使卜齮賊公于武闈文定以為魯史舊文必以實書陳氏以為春秋必書公子慶父弒公于武闈也然則于子般舊史必書公子慶父弒君于黨氏矣前于隱公亦書公子翬弒公于蒍氏耶後于子赤亦書公子遂弒子赤于某耶使舊史明書弒君之賊以著其罪夫子何為而諱弒書薨書卒以隱其賊之名乎若必互相容隱以綴骨肉之恩是教後世之為臣子者于君父之變但當討賊而不必直書弒君以其存不忍言之意又曲為不地不葬之法以著其實恐于理于法不應爾也或是舊史蔽罪于人夫子惡其失賊而又不可改得其實以重得罪于魯之君臣不得已而變例立法書薨書卒不地不葬于即位不即位及其人之或奔或用事于國以顯目其為弒君之人所謂諱不終諱而其實存也又或有書得其實有書不得其實夫子因其不一而恐疑惑後人故立為書薨書卒不地不葬之法以一之也然而舊史不可考不必多為之說得夫子書薨不地之義可以知其見弒之實又書奔書孫而弒君之賊無所逃矣是夫子于無可如何之中立法以使其事之無可隱而非故書薨卒以隱之也文定以為弒殺之言非臣子所當施于君父而書薨以示臣子之情然則弒君而討賊殺父而報仇明言君父之弒殺而討賊報仇乎抑隱其弒殺而討賊報仇乎將毋討賊報仇之後其登于史冊者不書弒殺而書薨卒耶然則董狐直筆為不近人情而莊公終身不言父仇猶有其不忍之心者也可乎哉且臣子于君父即無故者亦不忍斥言其死故有崩薨終卒之云及宴駕捐館却賔違養無祿即世之語其有故者弒殺字憤恨而不能出于口自然之理也其見于言語文字或為遭變遇逆而亦不改言薨卒以沒其實況夫子于其先世國君反有所不忍而沒其實耶九月夫人姜氏孫于邾文姜與弒其夫當時未討故春秋去姜氏以誅之哀姜與弒二子齊桓討之已明正其罪矣而春秋去姓于歸喪之時公羊曰貶必于其重者莫重乎其以喪至也文定以為不去姓氏降文姜也范氏曰婦殺夫母殺子罪有輕重之差然恐弒國君不可以輕重言也觀夫子同一書孫而哀姜猶削姓于既戮之後則以為殺子之罪降于文姜者非也觀夫子一削姓氏于孫一削姓于歸喪以示誅絶之意則以為文姜哀姜之葬皆無譏者非也公子慶父出奔莒魯自孝公之後皆一繼一及而桓弒君兄又享國十有八年𫝊之其子此牙與慶父之邪謀所以生也衛州吁弒君得國猶歷三時齊無知亦强支數月慶父主兵三十年哀姜持之于內弒閔不一月而夫人孫慶父奔何其敗之速也固知魯人無與之者也據左氏則成季以僖公出奔內無主而逆臣竄魯之人必非空言義理以迫逐强暴其必有謀動干戈致死于凶淫賊亂者而後無所容于國中而孫者孫奔者奔也然則魯人之義勇固可用乎使季友于來歸之後內謀于國人外告于方伯執慶父戮之或迫之去國魯難靖矣因循彌縫國君再弒誰之罪哉慶父出奔文定以為譏失賊也亦思此賊為誰即前之弒子般者也養賊于國已經兩年至于今日始譏其失晚已夫失賊之譏譏宗臣也宗臣為誰季友也今之奔于他國猶譏前之養于國中何獨無譏而文定乃曲為季友原者大失春秋之教也夫君子志在討賊則成敗利鈍不當逆計即謂權在慶父奪之甚難慶父既奔其權已失何以不速致辟甸人以明正其弒君之罪哉且季友許其君以立子般荀息許其君以立奚齊友之立子般以正息之立奚齊以不正不正之立春秋猶不沒其死立子般不終而謂春秋不罪其奔乎固知季友之奔不如彭生之死也又書夫人孫慶父奔于公薨之後則公為遇弒而賊為夫人慶父可知矣夫人慶父弒公而不書弒書薨則為有諱可知矣雖諱弒書薨而薨不書地則以不地見弒之實而隱之不地亦以見弒之實可知矣隱弒而賊不見討又不見奔則賊為桓公可知矣賊為桓公而桓所寵者公子翬則翬為助逆可知矣閔薨而夫人之孫為賊則桓薨而夫人之孫為賊可知矣夫人皆以孫為與聞乎故則閔之薨不地桓之薨雖地其皆為有故可知矣哀姜孫而慶父奔其主弒閔者必慶父則文姜孫無奔者而桓薨于齊文姜奔于齊其主弒桓者必齊可知矣蓋事實義理明于閔之見弒而隱桓之弒皆著也然則子般子赤之卒而不地亦與隱閔之薨而不地同以著其見弒之實耶而子野之卒無故而亦不地又何以别也子般卒而慶父如齊閔不即位落姑之盟季子之歸仲孫之來皆以示內亂求定之象子赤卒而夫人歸齊行父如齊公子遂逆女行父遂又兩如齊亦皆以示內亂求定之象故知兩子皆不得其死也子野之卒逾月而葬襄公滕于來㑹逾年而昭公即位叔孫豹即出㑹諸侯之大夫于虢其國無事則知其卒與子般子赤異矣其卒而不地則未成為君而不地不葬與大夫同而非一例以不地示義也冬齊髙子來盟閔公既立而仲孫來僖公未立而髙子來落姑既盟故仲孫之來不盟哀姜慶父甫奔而魯君不定故髙子之來盟事勢不同故也仲孫來而閔公不終髙子來而僖公得立非兩人所能為也桓之不能討慶父于書慶父如齊見之于仲孫之來無涉也桓之能討哀姜于書哀姜薨于夷見之于髙子之來無涉也仲孫之來不言使髙子之來亦不言使若來為責其私來則盟亦當責其専盟然而非私來也非専盟也齊侯使之也齊侯使之而不言使者不持國書不將君命故不言使也不言使故不名而稱仲孫稱髙子也公羊曰魯人至今以為美談曰猶望髙子則以為魯人喜之而稱字稱氏如喜公子友之來歸而稱季子者是也但魯人喜髙子之來甚于仲孫何也閔公既立而仲孫來僖公未定而髙子來也兩人之來既非私來則不稱使為譏齊桓而于兩人無譏若以仲孫之來為省難髙子之來為定難雖不稱使亦于齊桓無譏則嘉齊桓而非嘉兩人也然則春秋于兩人何所褒貶哉左氏于仲孫則以為嘉之公穀于髙子則以為喜之文定責仲孫而賢髙子則又以稱子為更優于稱氏稱字也其意總以不稱使為責其君稱氏稱字稱子為豫其臣故左氏撰為魯可取乎之語文定用公羊之說謂齊桓使髙子將南陽之甲以謀其國皆不然也齊桓合諸侯以圖伯方以大義示天下伐山戎以恤燕却狄以救邢而豈苟于乘亂以取魯哉以理言之則周公之祀非齊桓所敢殄以勢言之則七百里之國非一戰所能并非特賢明之君不動取魯之心即智謀之士亦不建取魯之策而謂齊桓不度德不量力不顧大義不審時揣勢一則曰魯可取再則曰魯可取哉左氏浮夸其言本不足信文定精于義理而猶失斷于此故不可以不辨又來盟不稱使惟此及司馬華孫宋難將作而華孫至魯考于前後之文則華孫之盟為私齊桓前盟閔公後戮哀姜方有意以寧魯髙子受命而來雖盟非私不可以一例論也十有二月狄入衛一舉而盡有其都邑其君或臣屬或死或奔他國則謂之滅衛大國狄不能據有全衛故宋桓立戴公以廬于漕漕衛邑也左氏所謂共滕之民共滕亦衛邑也蓋狄但入其國都而已此于法當書入不當書滅如鄭處許叔于許之東偏未有全許故亦書入不書滅先儒以不書滅為諱齊桓之不能救者非也狄伐邢而齊救入衛而齊不救即不書滅亦不能諱其不救之跡但衛不與幽之盟桓怒而伐之相惡未解也或狄來而衛不告難而又喪師失國若此其速不能若邢之力支以待齊援雖欲救之亦無及矣何必為桓諱滅哉又以不書滅為美齊桓之能存之者亦非也滅而存之乃見其功苟沒其滅之實何以著其存之實且下書城楚丘而不書齊人則春秋亦未有美之之義也鄭棄其師如書鄭人棄其師則似専罪髙克如書鄭伯棄其師則似鄭伯自棄師而髙克之事不著故以國稱而鄭伯之咎難辭髙克之故亦可推求而得之矣春秋宗朱辨義卷四
