body:
  text: 春秋宗朱辨義卷七髙淳張自超撰宣公元年春王正月公即位修即位之禮以掩覆其弑君之跡桓宣翬遂逆志隠謀先後一轍也公子遂如齊逆女即位未歴時逾月而速謀逆女必其請昏納幣已行於前也不在公子遂叔孫得臣如齊之日即在季孫行父如齊之日也以情事度之當在遂得臣如齊之日葢二臣有弑子赤之心而懼齊以為討故先為公子接求昏齊元初立欲親于魯而許公子接之昏約昏既定然後歸弑子赤而立之其私計必以為惡視者齊之自出而接者齊之舘甥殺其所自出而立其舘甥庶幾可以厭齊人之心而平其怒耳不然夫人大歸之後獨無所訴于齊者齊顧默不一言而反以女嫁殺我自出之公子接哉三月遂以夫人婦姜至自齊文定于出姜不氏謂責出姜之冒禮以往于穆姜不氏又以為責敬嬴之請昏納婦然則前何以不責聲姜此何以不責穆姜耶夏季孫行父如齊行父納賂請㑹所以謀定宣公者至矣得毋有愧于其祖耶季友定僖公以正行父定宣公以不正或亦有見于仲遂之惡不可得討宣公之位不可得易而姑以結于齊者結新君以自固耶晉放其大夫胥甲父于衛今年胥甲父放明年而夷臯見弑此必趙盾之所忌也文定以為河曲之戰討不用命吳氏以為不當討于八年之後必胥甲父以他事取怨于盾而逐之然使盾欲加其罪而洗垢無瘢則追論于縱敵長宼而責其事于八年以前以為討罪之辭權奸之去人望而孤君勢往往如此陳殺洩冶而平國見弑晉放胥甲父而夷臯見弑一也公㑹齊侯于平州齊元不討商人之弑舍又不討歜職之弑商人因亂得國偃然在位其愈魯接無幾也豈惟魯欲㑹齊侯以定接齊亦欲㑹魯侯以定元平州之㑹同惡相濟耳遂與得臣行父事則乗乎齊之隙而心實怯乎齊之强故雖往來齊廷若無忌者而猶賂之濟田以求安也公子遂如齊如齊拜成兼以致田也再使公子遂則遂之主逆不可掩矣季友受成風之屬而立僖公仲遂受敬嬴之屬而立宣公遂效友之所為者而為之宣亦效僖之報友者以報之三桓之後並以東門仲氏而為四家則遂固所云有志者事竟成也然友誅亂賊而遂身為亂賊僖以討弑君而立而宣以與謀弑君而立若宣遂君臣者志存乎僖友而事同于桓翬也六月齊人取濟西田齊殺魯之自出而叔姬見執齊師猶三及魯疆納賄請盟而怒未息甚矣齊之强而商人之暴也魯殺齊之自出而夫人大歸大夫乃四入齊廷請昏賂田而位始定甚矣魯之弱而宣公之恇也秋邾子來朝邾在桓十五年一同牟葛來朝歴莊閔僖文之世邾不朝魯矣近以須句之怨文十四年猶興南鄙之師纔逾五年而來朝新君者齊魯講好而邾人懼也夫邾前則朝弑逆之桓今則朝弑逆之宣修怨于僖文而修禮于桓宣春秋立書而是非著矣何必人邾子而後知其貶耶楚子鄭人侵陳遂侵宋兩扈之一盟一㑹不序諸侯則晉不足以援諸侯矣此鄭所以貳于楚也若鄭伯實從楚子于師則當如次厥貉之直書蔡侯以罪之不當以稱人為貶文定必以稱人為貶然則成十八年楚鄭伐宋納魚石何以楚子鄭伯並舉爵而又不人鄭伯耶其侵陳及宋宋之弑君已逾四年楚亦原不聲討弑君非春秋不予其討亂也晉趙盾帥師救陳楚初侵陳陳告難於晉而趙盾帥師往救其後楚移侵陳之師以侵宋而晉救陳之師已在途遂合四國以伐鄭固知趙盾之出原為救陳故春秋祗書救陳左氏以為救陳宋者因上文侵陳侵宋而率筆及之也文定乃以春秋不書救宋為聖人削之若晉果出師兼救宋聖人果惡其前不討宋弑君而今又救之則當明書救宋以罪趙盾之黨惡不當反没其事以為盾隠惡矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭公作斐林晉師者晉趙盾之師也盾受命出師原為救陳今觀陳宋之君出㑹棐林則楚鄭已去陳宋矣楚鄭既去則盾亦當歸不當次于棐林㑹四國以伐鄭也葢盾之出師受救陳之命未受伐鄭之命故書晉師者以著趙盾專晉之師也如書㑹趙盾則或疑于救陳之後晉師已歸棐林為盾再㑹諸侯而盾專師之罪反不著矣冬晉趙穿帥師侵崇崇公作栁秦晉搆兵數十年來如武成少梁之役經或不書侵崇之用兵微矣可以無書而書者出趙穿也以晉而侵弱小之崇必不用大衆其事甚畧書晉人可矣不畧書人而詳書趙穿帥師者著趙穿之為卿也葢穿為盾之族子穿弑君而春秋書盾恐後人疑穿為微者而歸獄于盾也夫穿為晉卿又帥師而主兵權使弑君實出于穿而非盾則穿不可縱而盾不可枉今觀春秋直書趙盾弑君則知穿之操刄盾實使之也何以見盾實使之盾當國用事穿為其族子未弑君之前則嘗使之帥師侵崇矣穿固為盾用者也用以帥師即用以弑君不誅盾而誰誅哉晉人宋人伐鄭晉人宋人並書則知晉為弑君之國報怨矣既不討弑君而又助以報怨典刑紊矣然則何惡于救宋之紊典刑而削而不書哉固知趙盾之帥師為救陳非為救宋春秋紀其實而非聖人削之也文定于此以為貶而人之然則㑹于棐林直書宋公又何以無貶耶固知棐林之㑹宋公親與則書宋公此則大夫不名葢鄭從楚以虐宋伐之不為非義故從畧書人而非以宋弑君之故非以晉黨弑君之故而貶也二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元鄭附楚侵宋宋報之宜矣鄭不自反而率大衆以伐之是鄭之罪也宋既兩請晉師以報一侵之恨鄭師之來宜稍自引咎以平鄭怒而遽出大衆以敵之是宋之罪也兩軍相遇忿怒以戰則華元歸生之罪也故春秋名兩大夫稱帥師以均罪之而不書鄭之伐宋以專罪二臣之專師以戰也文定泥于書名書帥師為無貶而于此戰義不可通故置是非不論而論其書敗書獲夫書敗書獲但以紀其事之實非義所係也義係乎並名兩國大夫並稱帥師也葢外大夫專師書名自晉始專師以伐以救者始于陽處父專師以伐以入者始于郤缺專師以侵者始于趙穿至此而華元歸生專師以戰矣故春秋詳書之以示惡絶之義而可謂之無貶乎哉秦師伐晉晉師侵崇而秦不救逾年而起大衆以報之秦固仇晉而非䘏崇也又據左氏伐晉報崇遂圍焦夫晉殘附秦之崇秦復殘附晉之焦大國搆兵禍移小國尤春秋所惡而何以不書圍焦耶葢趙穿侵崇以挑秦釁春秋欲專治其罪故不書圍焦以恕秦也夏晉人宋人衛人陳人侵鄭左氏以為移救焦之師侵鄭以報大棘非也師連四國必有期㑹必非西向敵秦而又勞千里之師以東向爭鄭也又文定據左氏謂鄭惡晉之不討宋弑君而附楚非也是時鄭之用事者公子歸生歸生弑君于三年之後豈有惡宋弑君之義者哉鄭葢省于晉靈之不足以君國而趙盾專政志不在存恤諸侯故附楚以自固也夫新城之盟鄭許内屬晉不能撫之以堅其志致鄭即楚晉宜自反不自反而謀動干戈威脅力制既兩伐之又再侵之鄭固有罪而晉亦不為有道也春秋烏得無譏哉春秋譏之而不名大夫者義不係乎罪四國之大夫也罪晉也雖得鄭何取哉秋九月乙丑晉趙盾弑其君夷皋皋公作獆盾弑晉靈比之司馬昭之弑曹髦先後一轍也靈惡盾之專而欲殺盾髦惡昭之專而欲殺昭勢固不兩立矣趙穿為盾而刃靈賈充為昭而刃髦盾昭其主而穿充其助之者也聖人不誅主者而誅助之者哉董狐以反不討賊間執趙盾之口此猶為原盾之詞盾專國無君弄晉靈于掌股之間而又任穿為卿以樹逆黨穿既弑靈而又使穿逆黒臀為君其為使穿弑何疑而猶以討穿責之耶陳泰議殺賈充昭問其次泰云有進于此者意在昭也昭乃族誅成濟以塞衆口昭不誅賈充固不能逃弑君之罪昭即誅賈充而又豈能逃弑君之罪哉然則盾即討穿而春秋亦必以趙盾弑其君書也朱全忠盡殺友恭叔琮弑君之罪固不可得而逃矣冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望此以魯郊僭禮因變而書為正義其喪制未滿改罷行事及天王崩不服斬衰而忘哀從吉之罪皆當比事以見義也又春秋書魯之郊不郊皆在四月或五月故從陳氏魯以祈榖而郊不于日至之説惟此書不郊猶三望即在正月則與成七年書五月不郊猶三望異然彼則改卜牛鼷鼠再食其角故及郊之期始不郊而三望此則改卜牛而牛遽死故不必及郊之期即不郊而三望也不得以此疑祈穀之説矣葬匡王宣葬匡王與莊之葬桓王襄之葬簡王皆使微者往其禮與㑹葬諸侯同雖愈于并不往㑹者而春秋亦書以示譏也楚子伐陸渾之戎楚師東向伐戎侵鄭文定于侵鄭稱楚人為罪其侵掠諸夏然伐戎而觀兵周疆稱楚子為予之耶如曰以楚伐戎不足為罪其觀兵周疆問鼎大小未有實跡然獨不曰春秋誅意耶戎楚相距素無嫌隙楚莊有窺周室移周鼎之意故假伐戎為名以内向此其意亦可誅矣而又舉爵何耶當是楚莊親主伐戎之師戎既服而歸留大夫以侵鄭故伐戎稱楚子侵鄭書楚人皆據其實耳夏楚人侵鄭文定謂鄭本以晉靈不君取賂失賊為不足與似已而往從楚非矣今晉成初立鄭背僭竊偽邦而歸諸夏則反之正也春秋大改過許遷善故書楚人侵鄭以與鄭伯之能反正而著楚人侵掠諸夏之罪其説非也夫齊宋弑君晉為盟主而不討鄭以靈之不足與而背之尚不以為非今晉親弑君晉成為弑君之賊所立而不討晉成之罪不大于靈耶親弑君之晉庸愈于不討弑君之晉耶鄭前背之而此歸之顧與其能反正豈不害于義哉又據左氏晉侯伐鄭鄭及晉平而經不書為聖人削之者非也觀前書四國㑹棐林伐鄭又書晉宋伐鄭又書晉宋衛陳侵鄭而楚不救此書楚人侵鄭則鄭之舍楚即晉不書可知矣其鄭之及晉平當在四國侵鄭晉靈未弑之時若晉成新立尚未逾時不應有晉侯伐鄭鄭及晉平之事所云晉侯伐鄭鄭及晉平者左氏偽撰事實為楚人侵鄭張本也秋赤狄侵齊赤狄狄之别種齊五受狄侵而不能却至此而赤狄又侵之齊惠之不能于其國可知矣宋師圍曹殺母弟及昭公子不書戴桓之族攻武氏不書武穆之族以曹師伐宋不書而但書宋師圍曹無以見事之本末春秋何以示教哉宋以衆人弑君而立公子鮑四國來討未見得賊及楚鄭來侵即合晉以報鄭又出强師以與鄭戰至此又以師圍曹可見鄰國之不與宋而宋文不能返已内治徒以强兵四出搆怨結仇非正國睦隣之道而春秋書以示譏也冬十月丙戌鄭伯蘭卒葬鄭穆公穆公作繆鄭未有外難又無内亂速葬何也此必有故而左氏無傳殆不可攷豈歸生弑君之基耶四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向平莒郯書公及齊侯伐莒獨書公明以著此出公志非齊志也固未知所平為何事及莒郯曲直若何然觀莒人受伐不受平則可以知魯之有所偏矣觀于齊不怒莒則亦可以知曲不在莒矣郯為魯所自出魯必有私于郯也秦伯稻卒夏六月乙酉鄭公子歸生弑其君夷春秋書歸生弑君與書趙盾弑君不同晉靈惡盾之專屢欲殺盾君臣之間勢不兩立靈不能殺盾勢必為盾所弑盾不受靈之殺勢必弑靈穿為盾之私人盾亡而靈弑靈弑而盾返盾返而穿用是穿為盾弑而盾使之也賈充之語成濟曰司馬公養汝正為今日則盾穿之謂也鄭靈所欲殺者公子宋非歸生也宋即憚死而謀先不當謀之歸生又染指之嫌罪不至死靈即怒宋欲殺不過有其志未有其事觀宋尚可譖歸生于靈則靈未必真有殺宋之心歸生一言可解而宋胡必以弑君為名哉如歸生無弑君之心則宋不敢與之謀先如歸生惡宋為弑君之謀則當發其逆言告于國人而尸之于市乃始則聽其謀而隠之繼則畏其讒而從之國政在歸生兵權在歸生左氏所云懼而從之者豈宋為首而歸生為從哉從宋之謀以行弑君之事耳陳氏以為歸生之弑公子宋啟之呉氏以為歸生必有不獲于君者因宋有邪謀陽為畜老憚殺之言隂實假手于宋以除其君者得之矣如但責其據生殺之柄足以制人而反受制于人故舍公子宋而以弑君之獄歸之其義猶疎也葢盾之弑夷皋盾隠用穿也歸生之弑夷歸生明用宋也赤狄侵齊秋公如齊公至自齊宣公德齊惠之立已屢朝于齊以為朝聘之常而實則屈已以事齊侯也文定以為比年如齊而皆至者危之也張氏汪氏遂以為當與桓公盟戎書至唐同意葢皆危桓宣之不返非也如謂同于桓之至唐則元年㑹齊侯于平州宜至平州以危之不當危于請昏賂田之後而至五如齊矣既請昏賂田而齊悦之凡宣之如齊葢安而不危也冬楚子伐鄭鄭歸生弑君天王不討方伯不討鄰國不討而楚討之春秋詎不予楚以討賊之義哉但楚名為討賊而實則爭鄭春秋未必大其討賊之公義而恕其爭鄭之私心也故謂春秋予荆蠻以罪中國義非不正乃謂以此而稱楚子則今年不得賊而明年又至為有必討賊之實意何以又書楚人耶汪氏以為三年所伐者穆公也此年所伐者襄公也穆公舍楚歸晉則討之為無名襄公為弑君者之所立則伐之為有名亦自有義然自此以往楚連年伐鄭何必以討弑君為名哉鄭從晉即以貳晉為名何為無名而春秋顧以稱爵稱人書侵書伐示義哉五年春公如齊夏公至自齊宣公勤事齊惠君朝臣聘至于親奔其喪卿㑹其葬皆出于常禮之外則其比年以朝不必有故然觀于逾時始至似亦有事而然獨左氏所云止公為髙固請昏者未可信也秋九月齊髙固來逆子叔姬如齊逾時而始至因有髙固逆叔姬事左氏遂謂止公請昏也然以齊之强魯方賂田求庇使齊果為髙固請昏則遣使一言而魯未必不從諸侯而娶于大夫大夫而娶于諸侯禮固有之不為辱也何煩止公而要之哉即齊惠待公來朝而親訂之亦一言可定如止之逾時是必齊侯初言而公辭再三言而公再三辭至不獲已而勉强以從遲之數月之久而後得歸也有是情事乎哉觀去年秋如齊今年春又如齊朝齊之數至不及期必有他事攖齊之怒而齊適以止公既解而歸因有髙固請昏之事也諸儒責宣公以女嫁大夫又自為之主謂屈于齊之强而忍其恥辱然莊嫁女于莒慶亦自為主非屈于莒之强也故譏其自主之非禮則可不必苛論而厚責之也叔孫得臣卒附仲遂而殺適立庶行父之罪與得臣同行父之卒日則得臣之不日恐亦史氏失其日而非削之以示貶也夫以仲遂之專能脅行父從其所為則得臣之俯首聽命宜矣葢仲遂親為公子視行父得臣為近文公寵之而行父得臣聽之行父得臣之罪既均而行父尤用事于國春秋不當重治得臣而末減行父也冬齊髙固及子叔姬來書以示譏諸儒之論皆是楚人伐鄭此楚師三至鄭也楚之爭鄭于晉者急矣荀林父救鄭何以不書以下有侵陳之文故不書也家氏謂歸生弑君宜討而不宜救如是則以弑君之晉而救弑君之鄭為同惡相濟春秋宜急書之以著其罪矣而不書者以治兩國弑君之罪不係乎書救也故雖有其事而省其文耳六年春晉趙盾衛孫免侵陳宣元年楚鄭侵陳晉趙盾救陳晉勤于陳而陳宜德之矣陳何以背晉即楚而致趙盾孫免之侵乎毋亦盾未弑君之前陳親晉盾既弑君之後陳始背晉耶若是則陳為知君臣之大義而黑壤之㑹不與猶為能自强者也然觀八年楚師伐陳九年扈之㑹不與而荀林父伐陳則陳之為陳亦不過楚來從楚晉來從晉反覆向背于晉楚之間而無適主也此陳靈之所為無道身卒見弑國亂而幾于亡與公羊以弑君之賊不見經而趙盾見經遂謂盾非親弑君以不討賊而加以弑君之罪陳氏以為趙盾再見春秋無貶自宋萬以下無討賊者則凡人而已矣皆非也弑君之賊不見經無此例也前則其賊既討後之不討者無事得書則亦不書非春秋有意削之以示誅絶之義也于魯則公子翬見經矣然猶可曰罪分首從魯之弑隠當歸獄于桓翬罪或可貸也至如桓十八年間所書之公即桓也何以見經耶宣公仲遂又皆見經矣然猶可曰隠公諱弑書薨子赤諱弑書卒春秋于桓宣亦不得不從寛也若楚商臣弑君而所書使椒來聘次厥貉伐麇之楚子非商臣耶齊商人弑君而所書盟郪丘盟穀伐我西鄙之齊侯非商人耶蔡般弑君而所書伐呉㑹申之蔡侯非般耶豈弑君而自立者見經為人臣而弑君者不見經耶不可以通矣春秋書趙盾正以著弑君之賊非惟不討而且寵任之使用事于國侵伐諸侯為隳先王之法而失古今之義也夏四月秋八月螽冬十月七年春衛侯使孫良夫來盟魯衛兄弟之國齊桓創伯之後僖公與衛成為洮向之盟晉文之時衛多故矣文公四年甯俞來聘衛成猶未解于晉也沓之㑹實藉文公以通晉然後同與新城之盟今越十年而衛使又至説春秋者以沓之㑹魯通衛于晉良夫之來盟衛將通魯于晉以報之也似已然沓之㑹衛之從晉成有其志而藉口于魯良夫之來盟則非魯之欲從晉而衛成實為晉以致魯故新城之盟衛不變而黑壤之㑹魯卒不以事齊者事晉也葢文公自盟處父以來其事晉不為不勤及受商人之辱屢遣使告難而晉不為一興問罪之師魯知晉之不足恃矣宣公之得國齊惠實忍于出姜而助之以立魯既怨晉又新德齊宜于齊之交不可卒解而于晉之好未能遽通歟晉不見原而止公于㑹故魯益怨晉而扈之㑹不與晉成之卒不㑹葬而亦兼怨良夫之盟為衛成之紿我至衛成之卒而亦不㑹葬也夏公㑹齊侯伐萊應齊侯之命興兵以伐弱小之國罪魯兼罪齊也髙氏責其方與衛盟將復從晉而又應齊侯之命為取辱之道然則有志從晉即當背齊耶夫與齊未有隙固不可速背之也必欲從晉即無故而背齊則是反覆向背于齊晉之間忽好忽仇狄之道矣秋公至自伐萊宣公之世始伐莒不至終伐邾不至其㑹齊侯伐萊用師微矣而書至者屈從强大以伐弱小其罪與乞師荆蠻以伐昏姻同故僖公至伐齊而宣公至伐萊也大旱冬公㑹晉侯宋公衛侯鄭伯曹伯于黒壤冬㑹而春始至左氏以為止公子㑹不與黄父之盟夫以公之屢朝齊而不朝晉又不使大夫聘晉之怒公可知黑壤之後扈之㑹不與清丘之盟不與晉成衛成之卒皆不往㑹葬想魯亦怨晉而不禮焉則止公之説亦可考而知矣若諸侯盟而公不與盟則春秋何以不書沙隨之㑹不見公可書平丘之盟公不與可書黄父之不與何以不可書哉文定謂直書不諱者曲不在公諱而不書者曲在公也公之曲朝齊而不朝晉又不使大夫聘則止公非晉人之咎故春秋諱而不書然公之不朝晉晉以為罪春秋不當罪之也魯不自强而朝于大國原非賢君立國之道論宣公者當以朝齊為公之辱不當以不朝晉為公之罪又晉成為弑君之賊所立而不能討鄭伯背之尚不以為非而顧責宣公朝之哉此年㑹晉侯于黒壤者公之外為宋公衛侯鄭伯曹伯九年㑹晉侯于扈者亦宋公衛侯鄭伯曹伯于扈㑹而不盟則黒壤當亦㑹而不盟左氏不與盟之説不足據也八年春公至自㑹逾時始至以為止公則可攷于後之事而知之若云因止公而書至則桓文以後凡㑹盟皆至矣獨危黒壤哉夏六月公子遂如齊至黄乃復罪同于公孫敖之不至而復但遂有疾而敖奔莒雖壅君命則一而視敖稍減也不稱有疾者髙氏曰不可以疾廢君命也昭公如晉有疾而復則書以别于前之至河乃復為晉或辭而或拒也此則下書卒于垂則有疾可知有疾而不書則不可以疾廢命之義著矣辛巳有事于太廟仲遂卒于垂諸儒以有事為時祭譏不在祭故書有事不書祭名若為時祭則此當是夏禴按時祭舉于四仲則禴祭當在五月即如諸儒周之烝享猶用夏時則又當在七月此書六月故知未必是禴祭而書有事者是魯史本不舉祭名非夫子譏不在祭而書有事也仲遂之卒諸儒以當祭不告之禮責之然與叔弓之卒不同叔弓在武宫蒞事而卒書去樂卒事此若當事而告亦當以卒事書觀明日猶繹則此日之卒事可知不書卒事則或以事卒而後告不必以不當告責之矣書仲遂者生而賜氏與季友同也不書公子者本上文而省之也書卒者諸儒謂當與公子翬同不書卒因事之變而卒之非也卿卒而繹其失禮小若春秋欲以不卒示誅絶之義則雖有不當繹而繹之小失亦并削而不書矣葢翬之不卒是桓莊之世不加禮于大夫原非春秋因其弑君削而不書則仲遂之卒與諸大夫之書卒同為加禮之故而豈有别義哉其兩人弑君之實則一以前不稱公子後稱公子著之一以卒而稱氏著之壬午猶繹萬入去籥爾雅繹以陳昨日之禮檀弓卿卒不繹此皆因春秋經文而為之説也經書辛巳壬午則有今日昨日之説經書猶繹則有卿卒不繹之説漢儒言禮多如此然于義皆得則亦可以互證也宣公既寵遂而賜之氏又失遇卿大夫之禮私恩不可加而加之典禮不可廢而廢之諸儒之論皆是陳舞容而去樂聲是以意為禮矣葢與叔弓之卒去樂卒事同譏一則卿喪不廢正祭樂不可去而去樂卒事書以譏之也一則卿卒不繹繹而萬舞雖去籥亦不得為禮則亦書以譏之也此一事也㑹黑壤而懼齊以貳晉來讓急遣如齊之使一也公子遂將事而廢君命一也公子遂生而賜氏一也卿卒猶繹一也萬入去籥知其不當繹而繹一也一事而臣之罪君之過備著矣戊子夫人嬴氏薨成風之薨有含賵㑹葬歸襚之事故因事以示貶敬嬴無其事則亦無從示義非從同同而無貶也諸儒前立例至後不可通則為從同同之説然而春秋無此義也晉師白狄伐秦晉連白狄以伐秦興師動衆報復無已罪一不攘秋而用狄罪一如諸儒之例則當稱人以貶矣不稱人而稱師文定亦知義不可通故又以為直書于冊而貶自見矣楚人滅舒蓼穀作舒鄝據左氏楚子滅舒蓼及滑汭盟呉越而還而經書楚人是楚子而貶稱人矣夫滅國而殄人祀豈稱人示貶所能盡厥辜哉荆舒相滅不足詳也秋七月甲子日有食之既前月有辛巳壬午戊子自辛巳至甲子四十有四日經不言朔食在晦也冬十月己丑葬我小君敬嬴哀姜薨稱夫人喪至稱夫人葬稱小君是不絶哀姜於廟也成風薨以夫人葬以小君將祔于廟此為有二夫人出姜既去而薨葬不聞是絶出姜于廟也敬嬴以夫人薨以小君葬則祔于廟以獨配文公不為有二夫人此兩妾母之不同也雨不克葬庚寅日中而克葬雨不克葬亦適然之事春秋書以譏其無備耳文定以為敬嬴殺太子及母弟之咎徵然文姜與弑其夫哀姜與弑兩君而葬皆無事天道遠而難知報應之説文定儒者不宜道也然則定公之雨不克葬亦受獾臣之推戴奪嫡簒國之咎徵耶桓宣之葬又無事何也城平陽楚師伐陳晉衛侵陳陳及晉平不書楚伐陳陳及楚平不書觀晉楚之交相加兵于陳則陳之晉來平晉楚來平楚不書可知矣陳鄭皆用此道則所謂犧牲玉帛陳于境上以待强者也九年春王正月公如齊㑹黒壤而懼齊來討公子遂聘不卒事故公急往朝之雖冒忘哀即吉之譏而有不顧也齊不辭而受亦不能無罪矣公至自齊夏仲孫蔑如京師前魯數公未有先施而聘京師者仲孫蔑之行猶為能尊天王故天王明年即有王季子之來也然即位九年而始行又屢如齊以朝而于天王則不朝而聘固知春秋書此非以美之也諸儒每以春秋不書魯之朝聘京師疑于常事不書如此年之聘亦未有事故而書則知二百四十年魯之加禮于天王亦寥寥矣蔑為敖孫仲孫氏始見于經齊侯伐萊齊兩伐萊皆書齊侯罪齊侯之凌小國也如以舉爵為無貶則失春秋之義矣秋取根牟陳氏曰取不言公非公命也自宣以下征伐在大夫矣其説亦好然何以不書大夫帥師耶觀明年書歸父帥師伐邾取繹則明以著大夫之專伐專取未嘗不書名也當以汪氏根牟小國諱滅書取之説為妥八月滕子卒九月晉侯宋公衛侯鄭伯曹伯㑹於扈晉荀林父帥師伐陳陳背中國而即楚不為無罪晉主夏盟内用賊臣盾外不能安方來之魯而止于㑹以辱之陳既附晉又不能救楚之來伐一不㑹扈而即興師動衆以驚恐其臣民豈得為仗義之師哉辛酉晉侯黑臀卒於扈桓公之世衛惠在喪助齊以戰我而衛宣之葬猶往㑹焉齊僖以紀之故仇我嵗尋干戈及其卒而葬焉亦往㑹之怨不棄義怒不廢禮古人以葬為重也晉主夏盟黒壤之㑹雖辱而晉成之卒竟不往㑹其葬豈非罪歟冬十月癸酉衛侯鄭卒魯衛兄弟之國衛成在位三十五年魯三世同㑹盟而通聘問良夫之來盟通魯於晉意非不善晉之止公黒壤非衛之罪也魯之怒晉何至遷于衛耶魯即怒衛何至廢其喪紀耶蔑禮忘親以長怨仇亦非謀國之道矣宋人圍滕宋執滕子嬰齊之後滕久屬於宋今必有逆宋之故而圍之圍之不服而又伐之也然而伐喪甚矣楚子伐鄭晉郤缺帥師救鄭楚之憑凌中國春秋未嘗因事以善之也始則畧之後則詳之君親將則舉爵大夫將則書人大夫用事則書名用衆則稱師從其事之實而非以是為褒貶也文定既以歸生弑君楚伐鄭舉爵為予之至此伐鄭義不可通又以為罪其以重兵臨鄭而以善晉師之救鄭為解夫既以救者善則伐者不善不善而何以舉爵耶既罪其以重兵臨鄭而不予之又何以舉爵耶義仍不可以通也陳殺其大夫洩冶洩公榖作泄依諸儒之例既云稱國以殺累上之辭則洩冶無罪矣又云不去其官為不當其罪則洩冶有他罪而所以殺之者非其罪也據左氏則洩冶不特無罪而且可附古諫臣之列何為稱國以殺而又書名哉左氏既引無自立辟之詩文定又以仕於昏亂之朝不能潔身以去為洩冶罪以解所以書名之故以强合凡殺大夫稱國書名不去其官之例是皆强經文以就我説者也十年春公如齊再比年以朝齊不顧其身之辱而求悦于强大葢黑壤取怒於晉既不㑹扈又不㑹晉成之葬惟恐晉人來責而勤事齊以望援也公至自齊齊人歸我濟西田外取我邑不書諱取也齊取鄆以居昭公則不必諱矣以田賂齊而書齊人取田則又以取諱賂也書齊人取濟田與書齊人取讙及闡同故公羊於兩取一則為弑子赤之賂一則為以邾子益來之賂伊川從其説而不從鮑牧帥師取讙及闡之説最為得之歸讙及闡不書我歸濟西田書我者魯以邾子益之故而賂二邑以弑子赤之故而賂濟田賂同而所以賂者不同故春秋于歸田書我以别于歸二邑以著我田之所以賂齊齊之所以歸我田者必有其故非如邾子益來邾子益歸之相間而書取邑歸邑之明白可考也夫以弑子赤之故而賂齊以事齊恭謹之故而歸我葢曰我田也我田何為而入齊我田何為而自齊歸哉其故顯然矣夏四月丙辰日有食之言日不言朔月内有己巳食在既朔也己巳齊侯元卒齊崔氏出奔衛崔氏左氏以為崔杼自此至崔杼弑君五十二年杼即耄而為逆此時之年尚幼髙國何以畏其逼耶然左氏必非不檢而漫以崔氏為崔杼大約弑君之人其性必殘刻暴戾雖童年而有惡才當出奔之時未為大夫不得書名又或并其父兄而逐之而罪不在其父兄又不得以父兄之名書故為舉族之詞而書崔氏則杼在其中矣公如齊公四朝于齊至奔其喪極矣葢徳齊惠之立己也既親奔其喪又使卿㑹其葬此後成奔晉景之喪魯宣成之于齊晉直以事天王之禮事之而于天王則通春秋無有奔其喪者即使卿㑹葬亦兩見而已葢其事天王不如事强侯也魯且如此列國可知春秋之世有伯無王即一崩薨卒葬春秋據直書之而諸侯之罪俱見矣五月公至自齊癸巳陳夏徵舒弑其君平國春秋原無殺無道稱國之義弑君而舉亂賊之名以為罪不及民者原不是文定謂書夏徵舒名氏以驗洩冶之忠諫者其説曲也弑平國者實出徵舒一人之手則書徴舒有何他義乎六月宋師伐滕公孫歸父如齊葬齊惠公歸父者仲遂之子仲遂以八年夏卒歸父喪制未滿宣公急使之如齊以葬惠公而歸父不辭皆罪也葢宣以仲遂得位君臣之間皆托于齊遂卒而㑹葬之使季孫行父仲孫蔑叔孫僑如臧孫許皆國卿不于其間擇一人以往而獨遣有喪之歸父固宣之德仲而寵其子亦襄仲于親較三桓為近且令歸父借㑹葬以結于齊為自固之計也此後伐邾伐莒㑹齊侯㑹楚子皆歸父一人擅之于是三桓無權而側目東門仲氏矣欲去歸父則不得不間齊欲間齊則不得不事晉㑹斷道以同晉盟三桓隂謀以迫公往也不然齊方歸我濟西之田公方親奔惠公之喪齊未有罪我之端我未有怨齊之跡胡為而遽背之以向晉耶惟三桓有不平于中故宣公薨而歸父即見逐歸父逐而臧孫即與晉為赤棘之盟盟晉者為齊也背齊者為歸父也夫新君即位無故而棄先公之好北鄙之伐齊師不為無名昏姻之國原非仇讎引咎謝過可以相釋何至四卿並將㑹晉衛曹師而急戰于鞌哉葢三桓積忿于齊之黨仲氏而歸父又奔在齊不得不傾國兵挾强晉以决一戰也晉人宋人衛人曹人伐鄭陳鄭皆反覆向背于晉楚之間陳有弑君之罪而晉不討者陳方即晉也舍弑君之陳而連四國之師以伐即楚之鄭春秋能不罪之哉文定於諸侯㑹扈之後荀林父帥師伐陳為與晉罪陳之詞其所以罪陳者以為晉主夏盟又嘗救陳陳所宜與而惟楚之即夫豈義乎夫晉主夏盟陳鄭一也楚子伐鄭晉郤缺亦嘗帥師救之而鄭又即楚亦不得為義矣何以四國伐鄭又釋鄭而罪晉耶其舛總泥于前稱荀林父帥師為褒此稱人為貶故説不𠂻于義耳晉不能制楚以安諸侯而但責陳鄭之即楚伐陳伐鄭皆貶非以稱帥師稱人為褒貶此又不討陳之弑君而伐鄭之即楚其貶何疑而亦非以稱人示貶也前書荀林父帥師者義係乎林父之帥師也此書人者義不係乎名四國之大夫也秋天王使王季子來聘報前年仲孫蔑之聘也夫王聘有不報者矣魯臣一至京師而王即遣母弟以來報何其如響應聲也公孫歸父帥師伐邾取繹繹公作蘱邾子十年不朝魯怒而伐之取繹甚矣亦歸父欲得兵權宣公欲以兵權假歸父耳故春秋詳之而書歸父帥師也大水季孫行父如齊行父如齊左氏以為初聘也嵗之初春公朝齊矣夏則公親奔惠公之喪公孫歸父㑹葬矣魯之事齊己勤此年聘問之使不可以已乎將以朝聘新君則俟行禮于明年即位可也而行父遄往此何故哉葢行父意非公意也行父忌歸父之專將以間歸父于新君故假初聘以行也冬公孫歸父如齊歸父繼行于行父之後以云聘則不當冇四時之聘左氏求其故不得以為伐邾故也夫使以伐邾恐得齊罪則行父聘時可以申辭以解齊怒而又何煩歸父往哉且宣公歸父事齊謹使齊果庇邾必不伐邾以失齊之歡使齊果以伐邾來討必歸父親往謝過則必不在喪而使國佐報聘然則歸父之如齊胡為耶歸父繼仲遂而專國非三桓所欲形跡已著矣歸父知行父之如齊將以間己于齊故復假聘以彌縫齊也齊侯使國佐來聘一嵗之間公與大夫凡五如齊齊受其加禮之勤則不得不一來報雖在喪忘哀失禮取譏有不顧矣然亦或欲伐莒而來謀也稱齊侯者髙氏曰著其惡也似猶為夫子書以著之者然如葵丘之㑹稱宋子當是載書之辭則然此即齊使之來在喪稱子而魯史不敢稱齊子夫子亦第仍之而已饑楚子伐鄭楚又伐鄭經書楚子褒耶貶耶文定不能為褒貶之説而遷其義曰以實屬辭矣觀明年夏為辰陵之盟則鄭又服楚而左氏士㑹救鄭逐楚師戍鄭之事皆不足據也歴此僅二時諸侯戍鄭之師皆安在而鄭遽舍之而㑹楚子盟辰陵耶十有一年春王正月夏楚子陳侯鄭伯盟于辰陵榖作夷陵齊桓之伯也自僖公三年經書救邢城邢侵蔡伐楚侵陳伐鄭救許而後為葵丘之盟則桓公伯業之成也晉文之伯也經書侵曹伐衛執曹伯戰楚師而後為踐土之盟則文公伯業之成也楚莊自宣元年初為陳宋之侵三年伐戎侵鄭四年伐鄭五年伐鄭八年滅舒蓼伐陳九年伐鄭十年伐鄭至此為辰陵之盟與桓之葵丘文之踐土幾無以異然則春秋其予楚莊以伯哉非也春秋貴王而賤伯至不得已而于桓文之事不深罪者猶取其内中國而外楚尊周室而攘楚夫以外楚攘楚而予桓文以伯其必不予所外所攘者之憑凌中國為伯以躋于桓文明矣辰陵之盟葢傷中國之不競也然而楚莊經營十六年而所得者僅陳鄭二國則猶幸中諸侯之不肯背華而即楚者多有義理之公心也至于勢不能為力不能支宋楚之平豈得已哉苟楚莊再延嵗月則不知所底矣公孫歸父㑹齊人伐莒杜氏以為稱齊人以示貶非也使齊侯親將則在喪而凶服即戎宜舉爵以貶之使謀出于髙國諸卿而挾新主以用兵宜書其名氏以貶之乃皆不然而從畧書人者莒本事齊齊魯平莒郯而莒不肯故魯怒而伐之伐而不服故再㑹齊人伐之齊以魯從伐萊故亦不得不從魯以伐莒此役魯為之主故魯卿名而齊大夫不名也左氏以為莒恃晉而不事齊然莒逺于晉必不無故舍近齊而附逺晉或是莒以齊助魯加兵于已此後始改事晉而致動十三年之齊師耳秋晉侯㑹狄於欑函以盟主而與狄講㑹禮其貶何疑而書于楚盟辰陵之後殺夏徵舒之前春秋所以罪晉也又陳鄭既受楚盟于辰陵而楚復入陳圍鄭似陳鄭背辰陵之盟向晉而楚乃入之圍之者故中間書晉侯㑹狄以見晉未嘗有事于陳鄭陳鄭未嘗背楚楚既盟之而又乗其不備以入之圍之荆蠻之無信而盟不足恃也冬十月楚人殺陳夏徴舒書楚人殺陳夏徴舒與書蔡人殺陳佗一也蔡雖以私殺佗而佗實亂國之賊楚雖以公孫寧儀行父之故志在得陳而徴舒實弑君之賊故皆為討賊之詞也丁亥楚子入陳楚子入陳書日明是先殺徴舒而後入陳也左氏入陳殺徵舒者屬筆之誤文定以左氏先入後殺而經先書殺後書入者為與楚子之能討賊是信傳不信經也楚莊果真心討賊則徵舒既殺而陳可以無入既殺徵舒而又入陳是其志在入陳矣且使以左氏為據而春秋先書殺後書入是不與楚子之能討賊也葢賊在國都不入國都不可以得賊則楚子先入陳而後殺徵舒其入陳以必討徵舒之故據事實書不晦于與楚子討賊之義而何必變其文哉春秋直書殺徵舒于前是與其殺徵舒直書入陳于後是罪其入陳是非不掩而予奪俱見矣納公孫寧儀行父于陳寧公作甯楚之入陳聼公孫寧儀行父之訴志在入陳以納二臣也陳既受盟逾時而即以兵臨之欺其不備又失晉援以為必得陳之計也春秋書入陳于殺徵舒之後所以著其伐既服之國納亂國之臣之私而亦不廢其討賊之公也使楚子伐陳而殺徵舒殺徵舒而盟陳侯為討賊而來既定亂而去則雖于楚子何譏哉十有二年春葬陳靈公陳殺宋萬不書陳不以殺宋萬告諸侯也楚殺陳夏徵舒書楚以殺陳夏徵舒告諸侯也宋葬閔公不書宋不以討萬葬閔公告諸侯也陳葬靈公書陳以討夏徵舒葬靈公告諸侯也陳人之久不葬靈公待討徵舒而後葬靈公其事實可見矣陳人之欲討徵舒力不能討而假手于楚以討之而後告于諸侯以葬靈公其情實亦可見矣楚子圍鄭前年春陳鄭同受盟辰陵及冬而入陳乘陳之不備也自冬至春即移入陳之師以圍鄭又乘鄭之不備也陳鄭既服而又乗其不備以兵殘之者惡陳鄭之反覆即晉而以威力强制之也既得陳鄭不因而夷其國都虜其君臣而據其土地者懼晉也髙氏于陳謂予楚莊有遷善改過之美于鄭謂予楚莊不為利謀所誘豈其然哉文定謂滅陳書入入鄭書圍春秋之從輕典為予其有討賊之義而因以恕其憑凌諸夏之罪亦非也據左氏楚莊善申叔時之言乃復封陳是楚原未滅陳又據左氏楚莊退三十里而許鄭平是楚原未入鄭春秋書入陳圍鄭據其實也何為末減楚罪哉使楚莊有討賊之義入陳而不圍鄭則殺徵舒𦵏靈公即齊晉伯主不能及也一圍鄭而楚莊利陳鄭之心著矣使夫子予楚莊討賊之義書入陳而不書圍鄭則書殺徵舒書葬靈公雖通春秋之事所僅見也一書圍鄭而誅楚莊利陳鄭之㫖著矣夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績楚成憑凌中國召陵受盟之後滅弦滅黄伐徐伐隨遂至㑹盂而執宋公滅䕫而虜䕫子城濮一戰而楚以衰今楚莊之勢熾于楚成入陳圉鄭若振槁然晉師救鄭三軍皆出六卿並將既遇楚子而謂其宜與楚平不宜與楚戰豈春秋之義哉襄二十七年宋合晉楚為諸侯交見之盟説春秋者猶罪其中外為一楚莊之横行中國若此而晉又與之平是晉楚合而中外為一之勢不及遲于五十八年後矣夫春秋所惡者楚也齊桓創伯之後中國所恃以與楚敵者晉也晉之戰楚奈何以成敗論之耶所可譏者陳有弑君之賊晉不能討而楚討之則楚直而晉曲楚子親在軍而晉以重兵委之大夫則楚子勤而晉侯怠又荀林父不能整軍容集衆謀務為必勝之計知其必敗而狥先縠以棄師辱國為有罪焉耳秋七月冬十有二月戊寅楚子滅蕭楚莊之罪至於滅蕭甚矣所以懼諸侯之不服者也與入陳圍鄭戰邲一例書楚子則知非書舉爵以予之矣晉人宋人衛人曹人同盟于清丘四國大夫何以不名葢名四國之大夫則似惡大夫之專盟而名之矣楚勢方張晉師新敗宋衛曹不畏縮以謀附楚而來同晉盟晉不畏縮而辭諸侯猶合志以為禦楚之盟其事猶可取也從之渝不渝原非所論但諸侯不㑹而委之大夫則譏在四國之君耳宋師伐陳衛人救陳陳方被楚師而宋乘危以報怨固有罪矣四國方同盟以禦楚而衛乃救陳以解宋亦春秋所惡也十有三年春齊師伐莒公作伐衛左氏作伐莒公羊作伐衛依經考之前有歸父㑹伐莒之文則此為再伐莒莒之得罪于齊者以平莒郯不肯故魯伐之齊魯再伐之莒不服而事晉齊因獨用師以伐之也則以左氏為是後有晉侯衛世子伐齊之文有侵齊戰新築之文衛苟無怨不當用師兩加于齊則此為伐衛以公羊為是然齊久不合晉斷道之盟又不與惟衛堅助晉故晉合衛以致師于齊而衛不得不從亦不必因齊之伐已而以為報也當從左氏無疑夏楚子伐宋楚欲盡得諸侯陳鄭既服以次及宋固不因其救蕭伐陳而始為有辭之伐也葢得宋則又及魯衛而晉之勢孤難以與之為敵長驅中原莫不臣屬此楚莊之志也伐宋無功圍宋不下而後伯業不成宋固中流砥柱哉秋螽冬晉殺其大夫先縠楚敗城濮既殺得臣晉以邲之敗坐罪先縠不殺于師還之日逾年而後殺之何其緩也宜左氏謂以赤狄淸之師而追討邲之敗歟夫喪師辱國于法宜討然如秦穆三用孟明亦伯西戎晉可貸林父之罪則亦可貸先縠之罪不貸先縠之罪則當即申敗師之令正國法以肅三軍始縱之而卒戮之是以意為生殺也兩失之矣十有四年春衛殺其大夫孔達背盟失信誠孔達謀國之罪而用其謀者誰耶始則信孔達以結于陳繼則殺孔達以説于晉失其道矣至于晉為盟主不能制强楚以庇諸侯而迫侯國而殺其大夫亦豈得為義哉夏五月壬申曹伯夀卒晉侯伐鄭楚之圍鄭鄭㡬于亡晉以六卿鄲楚而敗力固不能庇鄭矣楚子方退而晉即興問罪之師者其問罪之詞不過謂邲之役士卒忘死大夫就戮凡以為鄭也鄭奈何即虐鄭之楚而背救鄭之晉哉然而恤小之道亦當諒鄭之不得已也文定于晉侯舉爵義無所處亦不得不為直書其事而義自見之説矣秋九月楚子圍宋宋殺楚使楚師必至而宋岸然為之者亦必有敵楚之先謀也然而挑釁强楚驅士民受其鋒鏑以徼倖不亡豈非罪哉文定但責其要結盟誓欲以禦楚非持國之道其意以恤民固本輕徭薄賦使民效死親上以待敵要亦不可無交結鄰國互相援救之義也乃宋則不以備楚患而以召楚師為有罪焉耳葬曹文公冬公孫歸父㑹齊侯于穀㑹必有事以大夫而往㑹諸侯尤非無事而空行者左氏但撰晏桓子之言以為歸父後日奔齊之騐而不言其相㑹之故諸儒亦但責其以卑㑹尊之抗謂為非禮觀下歸父㑹楚子于宋則此㑹當是齊魯悚于楚師之强合謀以交于楚也據左氏楚子使申舟聘于齊齊亦應有報聘之使又據左氏成元年傳臧宣叔之言曰齊楚結好我新與晉盟云云則此為合謀以覲楚無疑矣十有五年春公孫歸父㑹楚子于宋歸父繼仲遂而專國乃為舍中華以即荆楚之謀妄矣况宋受圍逾年歸父苟知大義勸齊合兵以救宋退楚則齊可以再伯而魯亦有轉齊扶義之美計不出此而越國往㑹蔿賄求免辱國甚矣夏五月宋人及楚人平楚子前年伐宋矣未見宋人如何屈服而楚師退楚固不能得宋也雖其救蕭伐陳挑釁强楚然亦足以壯中國之氣葢是時陳鄭服于楚矣宋伐陳而衛救之衛又貳于楚矣歸父㑹宋魯又即于楚矣楚之勢足以移周鼎而中國諸侯無有敢抗者矣宋殺楚使楚子投袂而起勢將吞宋乃自前秋至于今夏歴時成嵗而宋人堅志城守盟主不救鄰國無援極而易子而食析骸以炊猶不肯為城下之盟則宋楚之平不特宋欲平楚而亦楚欲平宋也自宋人抗楚楚莊于是四年不至中國以迄於死然則孰謂宋聾哉春秋書宋人及楚人平為敵國相抗釋怨修好之詞不為屈服受盟之詞葢恕宋之不得已而未有譏也用書九月平書五月以圍之久著楚之必欲得宋以平之遲著宋之不下于楚也文定較量華元子反之是非以稱人為貶是為傳作傳非為經作傳矣如春秋有貶兩人義則當直書華元子反以著其專不當反没其名也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸晉敗于楚心怯氣餒聼楚之圍宋逾年而不敢救又恐諸侯弱之故用師赤狄以示武然春秋書于楚人圍宋宋及楚平之後而罪不可掩矣至于赤狄之屢侵諸侯未嘗不當伐潞氏甲氏留吁之不當滅又可因事而知之也秦人伐晉秦晉不相侵伐十餘年矣秦桓晉景之世未有爭端此忽起伐晉之師則秦桓之挑釁也王札子殺召伯毛伯胡氏以為聖人之意罪挾王命而專殺然亦不見有挾王命意恐亦祗是專殺耳觀左氏後文稱王室亂王孫蘇奔晉則無王命而擅殺之罪見矣秋螽仲孫蔑㑹齊髙固于無婁公作牟婁髙氏以為㑹楚子于宋齊疑我之從楚蔑于是復㑹以修舊好非也魯之㑹楚歸父㑹齊侯于穀謀而行者况齊亦與楚合必不怒魯之從楚但考于前後之文無有㑹而相關之事或當以非國事而私相㑹之説為是初税畝變制税畝開後世虐取于民之端罪莫大矣而值秋螽之後是為不恤天灾而朘民以生也冬蝝生饑秋螽而税畝税畝而蝝又生民安得不饑哉備書于冊以為後世鑒也十有六年春王正月晉人滅赤狄甲氏及留吁前滅潞氏此又滅甲氏刄留吁必欲盡殄赤狄之種類亦太酷矣文定以董是役者士㑹上將主兵稱人以貶非也如書士㑹是貶士㑹稱晉人者罪晉也夏成周宣榭火汪氏曰宣王講武之所遂以為廟其制如榭李氏曰榭是講武屋皆是秋郯伯姬來歸左氏曰出也諸儒發明皆有義理冬大有年以宣之大有年與桓之有年一例看則伊川所云宜有凶災而有年為異者是已然而天道渺而難知未必皆驗而又恐後世荒滛殘暴之主適遇屢豐自為得志而益肆為無忌也故當以孫氏張氏之説為無病十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公六月癸卯日有食之月内有已未經不言朔食在既朔也已未公㑹晉侯衛侯曹伯邾子同盟于斷道伊川以為諸國同心欲伐齊文定謂同心謀欲伐齊釋其憤怒非有不得已而要之者殆不然也魯宣公歸父方勤事齊非有怒齊之事曹邾皆與齊無忌觀下伐齊之師惟晉侯及衛世子臧而魯曹邾不與可見矣葢是時楚氣日熾齊與楚好晉既怒齊以伯主之後抗不一與盟㑹而又結好于楚俾楚得無忌以肆侵諸侯故徵㑹斷道以謀之也魯自黒壤之後扈之㑹淸丘之盟皆不與矣而忽同斷道之盟者行父惡歸父之專乗晉之徵㑹斷道謂晉世主夏盟不可終失其好其實則陷公于晉以激怒齊使齊仇魯而絶歸父之援也宣豈真心背齊以即晉者哉不主盟而同盟書同者載書之詞也秋公至自㑹㑹盟書至文宣成襄皆然矣汪氏以為黒壤危晉之見討斷道危齊之見討然則成之蟲牢于蒲于戚襄之雞澤湨梁澶淵啇任沙隨夷儀無有不至者又何以云耶冬十有一月壬午公弟叔肸卒肸卒稱叔當與季友仲遂一例看作生而賜氏説為妥觀公孫嬰齊叔老叔弓世為魯卿可見矣肸未用事于魯亦未必惡宣公之弑而不仕也若據穀梁肸惡宣弑終身織履不食宣食宣亦未必始終親愛又使有後于魯而世為卿矣親愛其弟使有後于魯而世為卿則宣公之私也春秋直書以著宣公之私其母弟也陳氏以稱弟為春秋之惡宣公比之宋公弟辰秦伯弟鍼及陳招之既稱公子招又稱陳侯弟招然叔肸生不見于春秋則其未嘗命為公子以用事于國可知矣生未用事子國則非魯卿非卿則卒不當書書卒者是魯以卿禮卒之也以卿禮卒之者尊之為公弟親之而賜氏也使肸之後不世為叔氏則諸儒賢肸稱字之説或可通矣十有八年春晉侯衛世子臧伐齊齊自翟泉之後不與晉盟㑹者四十年矣埀隴新城清丘之盟黒壤之㑹三扈之兩盟一㑹齊皆不與而晉未嘗一問也至此惡其親楚而伐之未為非義然齊楚通好未有助虐黨惡之實事何以又舍陳鄭不討而興師動衆以加于齊哉怨起于郤克而假大義以為名兵連禍結至于新築之戰鞍之戰而殘民毒衆甚矣衛侯不出以初無怨于齊也衛侯既不出而使世子帥師晉不辭而用其世子以伐人國皆失其道也公伐杞杞桓母妻皆魯女杞之托魯已久終宣之世不朝似猶能惡宣之所為者然宣何以忍之十八年而始一加兵耶或亦因叔姬之不安于杞而興師以問其故也夏四月左氏云公使如楚乞師欲以伐齊此時齊魯未見有怨何為乞師以伐之哉左氏有臧宣叔齊楚結好我新盟晉晉楚爭盟齊師必至之言則是年必不乞師以伐齊也齊楚既好亦必不為魯興師左氏乞師之説不足信矣秋七月邾人戕鄫子于鄫鄫穀作繒邾人戕鄫子專罪邾也文定以為于鄫者深責鄫之臣子恐春秋未有此義甲戌楚子旅卒旅榖作吕楚子紀名書卒楚以喪通于魯也魯自歸父㑹宋薦賄交好故楚子卒而稱名來赴一如中國之禮而舊史書之夫子仍之以著楚與中國之通喪紀自此始也榖梁以書卒為進之者非也不書葬魯不徃㑹也公羊以為辟其號者非也文定用公羊辟號之説及坊記恐民惑之之義謂為夫子削而不書然漢儒集禮多有附春秋傳為説者不足以據而公羊以為辟其號者義亦難通也朱子謂楚之稱王當是稱于其國未必稱于㑹盟之地此論最確猶之内諸侯之爵非公者在其國中皆稱公臣子之辭也故葬皆稱公其子皆稱公子而于㑹盟之地則侯伯子男不敢亂其本爵矣春秋于㑹盟侵伐書楚子必是舊史原來從其本爵故其子之為大夫見經者亦稱公子不稱王子則既從其本爵而生書楚于卒書楚子何不可同列侯之通稱而書葬楚某公耶諸儒必疑于魯葬秦伯不應不葬楚子又盟宋以後且朝于楚不應不㑹其葬然魯之徃㑹秦葬亦在昭公以後是以文十八年之春伯罃宣四年之秦伯稻雖來赴而不往㑹則此年之楚子旅襄十三年之楚子審與秦罃秦稻之不葬一也二十八年之楚昭則襄公親在楚不可以一論矣至于昭元年之楚麇十三年之楚䖍不與秦伯之葬同者彼有簒弑之變尚告于内諸侯以期㑹葬哉二十六年之楚居則昭公在外意如必不加禮于從不㑹葬之楚矣若哀公之世四年葬秦惠六年不葬楚軫楚自定四年栢舉戰敗于呉呉人入其國都勢亦稍衰中國已不畏之又㑹其葬耶則楚子之不葬其為魯不往㑹何疑公孫歸父如晉左氏以為聘晉以謀去三桓夫宣公仲遂歸父皆托于齊齊之庇其君臣甚篤如歸父欲去三桓何不謀于久好之齊而謀于新盟之晉哉此必三桓忌歸父而造為比言以塞魯人之耳而加之罪也歸父之如晉者葢既㑹晉斷道知必召怨于齊而不得不轉托於晉以自固也冬十月壬戌公薨于路寢歸父還自晉至笙遂奔齊三桓側目歸父非一日矣宣公存而意猶有所忌宣公薨而歸父尚能保有其家哉宜其逐之速也行父殺適立庶之言顯出其口目無新主雖成公亦不能為歸父謀矣文定取榖梁捐殯而奔其父之臣是亦奔父之云以罪成公非也至云當國者有無君之心則得經意矣春秋宗朱辨義卷七
