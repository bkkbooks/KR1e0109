body:
  text: 春秋宗朱辨義卷六髙淳張自超撰文公元年春王正月公即位先公無故而薨又未有他變逾年未葬而嗣子即位者惟文公成公乃宣公薨於十月成公逾年即位則宣公在殯矣僖公薨於十二月其日為乙巳觀明年二月有癸亥則日不在月終而文公逾年即位僖公亦在殯矣然則逾年即位之禮固不論已葬未葬獨不知亦論已殯未殯否也文定以為國君嗣世聽於冢宰未可吉服以告廟臨羣臣而皆冢宰攝行則當即位於三年之後而又不譏魯君之逾年即位為非禮或當如朱子所云易世傳授國之大事而王侯以國為家雖先君之喪猶為私服宜行即位之禮吉服以告廟臨羣臣耶是必三年之喪不廢而權吉於即位之一日也觀春秋未逾年稱子逾年而魯君稱公外侯舉爵則嗣君逾年而即位改元固為禮矣雖或君薨於嵗月之盡日祗取既殯而行禮不逾正月不必如虞書所云月正元日正月朔旦耶二月癸亥日有食之日上公有朔字公羊有朔字左氏穀梁皆無朔字以前後所紀之日攷之則無朔字者是有朔字者非食在晦也若食在朔則本年四月不當有丁巳四月有丁巳必三月有閏而後可自癸亥至丁巳加一週甲算合一百一十五日也然使食果在朔則前年十二月又不當有乙巳十二月有乙巳亦必十二月有閏而後可自乙巳至癸亥加一週甲算合七十九日也古歴雖疎豈前年十月閏今年三月又閏相距四月之近而兩置閏耶故决其食不在朔不在既朔而在晦也惟食在晦則自十二月之乙巳加一週甲算至二月之癸亥七十九日不置閏而可通自二月之癸亥不加週甲算至四月之丁巳五十五日不置閏而亦可通矣左氏經文既無朔字而亦誤以為在朔故曰於是閏三月非禮也葢左氏不解於周歴日食有或在朔或在既朔或在晦之占而以經文不言朔者疑於官失之於此四月之有丁巳不可以通意其閏三月而不攷於前年之有乙巳又不可以通也史記歴書失於不訂左氏之誤亦曰周襄王二十六年閏三月春秋譏之而不知是年實不閏三月也大約左氏之説難以為信如襄公二十七年日食十二月乙亥朔左氏作十一月曰於是辰在申司歴過也再失閏矣哀公十二年十二月螽左氏曰火伏而後蟄者畢今火猶西流司歴過也若是則又再失閏矣班史律歴志亦引用其説以譏周道既衰天子不班朔魯歴不正夫閏以定時成嵗一失閏則子入於丑三失閏則春入於夏六失閏則春秋冬夏皆變左氏屢譏春秋失閏失而不補豈復成嵗功哉歴算之法莫難於交食而置閏為易春秋日食不差而差閏故不可信古歴之疎或日食之時刻分數閏之在前月後月不能如後世之密則當有之屢失閏而變四時之侯久而不改未必然也天王使叔服來㑹葬㑹葬雖禮然魯十二公不見有㑹葬而㑹葬僖公僖雖賢侯而襄王或感其輔齊桓以定己位也其私心亦可譏已夏四月丁巳葬我君僖公天王使毛伯來錫公命來錫命非禮也喪未畢而命之非禮也襄王感僖公之推戴既㑹葬其身又錫命其子惟其不能以義制私遂流而至於歸成風之含賵又㑹其葬而淪替極矣晉侯伐衛前伐許張氏責其忘喪毒民今喪未滿而又伐衛王氏以為克纘父功繼為盟主春秋因以貴之何所見之各殊也總是泥於例以稱人為貶故曲求其所以貶之之故以舉爵為褒故曲求其所以褒之之故也如以為忘喪毒民則伐許伐衛宜一例從貶如以為克纘父功繼為盟主則不特伐許伐衛即敗秦敗狄宜一例從褒要之春秋之義原不以稱人舉爵為褒貶也大夫將則稱人君自即戎則舉爵其事不合於義則稱人舉爵皆貶其事合於義則稱人舉爵皆非貶通春秋書事皆然不特此也又陳氏以為苟其君意雖卿帥不書亦非也舊史據赴告傳聞而書書事非書意也其出於君之意與否史氏何從而知之夫子繼魯史以作春秋其遠年以前之人之意又何從而知之亦據其事之實而已觀下文書公孫敖於戚㑹晉侯則知晉侯親主伐衛之師而書晉侯非原其僅有伐衛之意矣又汪氏以為文宣以後大夫專政凡侵伐㑹盟君雖在而大夫任其事故經書晉侯而傳言大夫者亦未盡然也文宣以後大夫專政如大夫主其事則直書大夫之名此時晉大夫尚未能專襄公之政故雖實以大夫帥師亦不目大夫也此後垂隴之盟士縠主之救江之師陽處父帥之春秋以譏襄公之失馭則直書名以著之矣而豈以稱人為貶哉又左氏稱襄公既祥使告於諸侯以伐衛亦因經書晉侯以舉爵非貶而為此曲貸之説也晉文以僖三十二年十二月卒未期而敗秦敗狄逾年十二月而伐許如以為小祥則伐許已及小祥之期如以為大祥則伐衛尚未及大祥之期何為有貶有不貶耶左氏於敗秦敗狄經稱人而實坐為晉侯於伐衛經舉爵而實坐為先且居胥臣而後儒遂因為有貶有不貶之説然則伐許是君是大夫耶左氏未詳而後儒亦不復論則所謂褒貶之例亦不得不自破矣叔孫得臣如京師文公受命而使卿往拜僅勝於成公受命而并不遣京師之使耳而不親朝之罪則雖有徃拜之禮不可得而掩也衛人伐晉衛成受晉文囚執之辱宜省已修德節用愛人以為自强之道使晉人惧而謝過通好乃乗晉文之卒而侵鄭以攖其怒晉之來伐固自取之也其志本欲與晉相抗則稱兵報伐亦其事勢之所必至張氏以為伯主聲罪致討宜自反其不仁無禮之罪夫衛之自反當責之於未討之前不當責之於既討之後使既討而能自反則其先不仇晉而已之背中國而即荆蠻當亦翻然自悔其失矣又汪氏以為春秋不書晉之取戚而人衛孔達為予晉而罪衛觀下書公孫敖㑹晉侯於戚則晉侯在戚而晉之取戚不書可見不必其予晉也孔達帥師不書者義不係乎名孔達不必以不書孔達為罪衛也秋公孫敖㑹晉侯於戚魯原曲意事齊及晉文伯而改事晉然猶未朝晉也晉文伯事方興而遽卒晉襄之能繼伯與否勢未有定故雖敗秦敗狄而僖公復朝齊以自托至此見晉之伐許伐衛大用兵於諸侯而心畏之故使敖急㑹晉侯於戚也此為内大夫專㑹諸侯之始或是晉侯在戚約文公出㑹魯以喪故使公孫敖往觀下又書公孫敖如齊則以著魯之既結好於晉又修禮於齊或彼或此惟人是托絶不為自强之計非但以專㑹諸侯為敖之罪也冬十月丁未楚世子商臣弑其君頵頵公穀作髠書世子商臣弑君是著商臣以臣弑君以子弑父之大惡為天下後世戒也楚頵雖有僭王猾夏之罪而商臣則其臣也則其子也君即不君臣不可以不臣父即不父子不可以不子文定顧猶責楚頵之黜兄立弟汪氏亦謂世子之弑君其君實有以致之何哉夫以商臣之蠭目豺聲子上知其為忍人使楚頵早從子上之言則商臣不立使早廢商臣而立子職斷以行之則宫甲之難不發楚頵始則不明繼則不斷自貽其禍此為疚耳如必執立嫡立長之義是明知其子之足以亡國亡天下而必立之必不可以廢之聽其亡國亡天下而絶不為付托得人之計如宗廟社稷何夫古有教世子之法左右前後莫非正人則雖中材不至於為不善使其性之不移敎之不悛則當告於廟而廢之楚頵固不足以語此而亦不當以黜兄立弟為罪謂其君實有以致之也公孫敖如齊當喪而使大夫聘齊惟恐失好於齊也何氏以為譏喪娶觀明年冬始納幣恐公孫敖未必為請昏而行即為請昏亦於書納幣譏之此但譏其喪甫及期而㑹晉聘齊之汲汲耳二年春王二月甲子晉侯及秦師戰於彭衙秦師敗績彭衙秦地晉侯敗秦師於此非秦師未出境即既出而退去也秦師未出晉逆而敗之固晉之罪秦師既去晉追而敗之亦晉之罪伊川以書及為罪晉之不諭秦而與戰文定以遽與之戰為以桀攻桀家氏以為晉襄負氣好勝以怨報德君子責之皆是也然則何以不貶稱人而舉爵哉可以知前之稱晉人實晉大夫非晉侯矣又秦穆報晉至再至三其悔過之言悔不用蹇叔而襲鄭以致敗非悔兵之不可用也故其報晉之心必勝而後已如悔兵之不可用而保境息民何至復有彭衙之敗哉汪氏以為不書伐晉為罪晉而免秦者非也丁丑作僖公主書作主以譏其緩是已但文公雖慢而不敬何至緩於作主恐是欲躋僖於閔之上羣議未定因是以緩至此議决而始作主也三月乙巳及晉處父盟比於及髙徯盟防則此不書地比於及荀庚盟及孫良夫盟及郤犫盟及孫林父盟則此不書來聘左氏曰公如晉晉人使處父盟公以恥之又曰適晉不書諱之也公穀大義皆同諸儒未有易其説者夫自晉文伯業之盛僖公朝齊而不朝晉晉襄即位繼伯魯又不使大夫聘則以為晉之怒魯者勢或有之但文公既背喪往朝矣晉怒顧不可釋哉即公果如晉晉果以處父盟公觀前則公孫敖㑹晉侯後則士縠主諸侯之盟公孫敖亦與又如郪丘以公子遂盟齊侯赤棘以臧孫許盟晉侯則内大夫之專盟諸侯公之專盟外大夫亦春秋之常晉之以處父盟公何為恥公哉若云在其國都為恥何以不書如晉若云適晉不書返國不至為公諱恥則何不并及盟而削之耶竊以不書來聘與髙徯之不書來聘同不書地與及荀庚及孫良夫及郤犫及孫林父之在我國都而不地同不書公及則與凡及外大夫專盟之不書公同也不然晉襄南則抗楚西則仇秦内則伐許伐衛而又無禮於來朝之魯不義甚矣何以合諸侯哉葢文公喪制未滿即不朝晉晉亦必不來討晉即來討魯亦謝之有辭故垂隴之公不親與亦必以喪故而使敖往也左氏乃謂公未返故不與夫作主丁丑日及盟乙巳日相間纔及一月自魯如晉何其速自三月至六月自晉返魯何其遲左氏固未可據也此惟胡氏以處父盟於我之國都者為是當是晉將盟垂隴而使處父來聘公以喪辭而先親盟處父以信之春秋不書來聘但書及盟者大約與書及髙徯盟防同莊公有文姜之喪而盟髙徯文公有僖公之喪而盟處父故不書髙徯聘以别於及向戌之盟劉不書處父聘以别於及荀庚良夫郤犫林父之盟國都葢以專罪莊文之忘哀而以吉禮盟大夫也但彼則出國都以盟此則盟於國都為有異耳而程氏以書及為微者及之則正不然齊晉大夫魯固未必敢以微者盟之而如及荀庚良夫郤犫林父之盟則又决知其非皆微者也至處父初見經及盟不氏而救江氏安知不如翬之前不稱公子後稱公子命之公子而後公子賜之氏而後氏乎諸儒謂削氏以治其抗夫春秋内大夫之盟諸侯公之盟外大夫多矣而獨削處父之氏其義不可以通也夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴縠公穀作穀垂隴公穀作垂斂此晉大夫盟諸侯書名之始即外大夫㑹諸侯盟而書名之始前此有外大夫與諸侯之盟者矣不名而人之者大夫未專政也前此有大夫與諸侯之盟而書名者矣非天下諸侯之公㑹公盟也晉以士縠主諸侯之盟是晉之輕諸侯而委權於大夫也是士縠之抗諸侯而專國之政也而公孫敖亦與其責同焉晉襄繼伯未嘗為衣裳之㑹而垂隴一盟乃以士縠主之天下諸侯懾於晉之强雖得以世主夏盟而伯之道亦降矣此夫子所以有取於齊桓也夫自十有二月不雨至于秋七月八月丁卯大事于太廟躋僖公公穀皆以大事為大祫劉氏曰時祭稱有事祫祭稱大事李氏曰於祭無譏則不書祭名其郊禘大雩書祭名者祭之僭也若是則舊史於此年書大祫於宣八年書禴於昭十五年書祠而夫子改為大事有事以著凡書祭名者之非禮矣然當大祫而大祫當時祭而時祭即實書祭名讀者亦知譏不在祭在祭而舉行之事何混於非禮之祭而於此没其祭之名耶竊疑因躋僖公而舉祭未必恰值大祫之期宣八年之於太廟亦未必是禴昭十五年之於武宫亦未必是祠恐當時史氏難於實舉祭名原來書大事有事而夫子仍之也躋僖公者躋於閔公之上魯以為順兄弟之次而不顧乎逆先公為君之次故曰逆祀也三傳皆以閔公為祖孔氏曰父子異昭穆兄弟昭穆同閔僖不得為父子躋僖於閔是位次之逆非昭穆之亂也文定依三傳為説而斥以世指父子不指兄弟者為非汪氏疑於兄弟迭為君者如齊之孝昭懿惠衛之懿戴文若兄弟各為世而異昭穆則齊項不得祭其祖衛成不得祭曽祖矣其説甚辨攷於春秋書桓宫僖宫災又書立武宫立煬宫不曰廟曰宫則似廟中為同堂異室之制隠桓一廟而各為宫閔僖一廟而各為宫兄弟不分世數而同昭穆者然劉歆周廟昭穆世次於共懿孝夷四王分昭穆為四廟以言乎為君則自共次懿次孝次夷以言乎祖孫父子兄弟則懿者共之子孝者共之弟夷者懿之子共之孫當孝之時則祖共而禰懿是祖其兄而禰其姪矣當夷之時則祖懿而禰孝是祖其父而禰其叔祖矣父子祖孫至於互易而朱子取其説以為南北宋諸宗之廟次意者天下國家之大以傳繼為重雖父子猶為私恩而所云髙曽祖禰者以嗣位為先後不以生世為先後即至如齊頃之不得祭其祖衛成之不得祭曽祖而亦不可牽於情以傷於義耶但朱子謂文昭武穆子孫亦以為序而不易致汪氏疑於兄昭弟穆者其子孫之昭穆易紊然而朱子固曰不以昭穆為尊卑則兄弟之子孫亦無不可以昭穆分序也葢商家兄終弟及則昭穆不得以父子論周正傳子之統而父昭子穆之義始定父死子繼世適相承昭穆何至於亂即有大故而或君卒無嗣大臣依世次援立雖百世而昭穆不亂倘廢舊典而變宗法或舍子授弟或遭變遇逆國人推戴失次如懿王崩而立共王之弟孝王崩而立懿王之子之類則為自亂父子昭穆之緒而昭穆亦不得以父子論矣不得以父子論則不得不以兄弟論也故文定於嬰齊之後歸父譏其亂於昭穆而汪氏疑其説之不定者非也若是則魯不特躋僖於閔之逆祀而隠桓閔僖之共廟各宫亦亂於禮矣所以疑於魯之亂禮者葢以事勢情理度之先閔後僖則文公祖閔而禰僖閔僖於兄弟則逆而僖文於父子則順也躋僖於閔則文公祖僖而禰閔僖閔之兄弟雖順而文不得父僖而反以閔為考廟矣異時文薨而祔則以子祔父太廟合食則父子並向其子孫不同為昭則同為穆四世之後僖又當先閔而祧情理之不合者多矣魯人何不思而出此哉若共懿孝夷之先後為君以致懿孝父子而同為穆則出於事勢之不得不然僖文父子昭穆本順一躋而自亂其緒非情理也故疑隠之於桓閔之於僖皆一廟而各為宫文公以閔僖之廟為禰其後隠祧而桓不祧閔祧而僖不祧是以桓僖各安於其宫歴世猶存至哀公之時而災也冬晉人宋人陳人鄭人伐秦彭衙既敗秦秦未嘗來報而晉又連四國以伐之其殘民結怨春秋所譏而非大夫稱人以為貶也公子遂如齊納幣春秋書納幣者二莊公有文姜之喪甫逾年而納幣公又親行則書以示譏也文公喪制未終圖昏於齊而又使公子遂往則亦書以示譏也葢文之於遂視三家其屬較親故獨使之以結於齊而其後殺其子而逐其母者即是人也嗚呼凶人其可托哉三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰晉不伐楚以討商臣弑君之罪而連諸侯以毒弱小之沈其貶何疑文定以為辭無褒貶者固非王氏以為貶而人之不與大夫之專政者亦非也春秋後半正以名大夫著其專政之實非惡其專政而故殁其名以示不與之意也又王氏以為不言帥師不成為師者亦非也文公之世一書行父帥師以著行父得專兵柄之始一書彭生帥師以著彭生亦用事之臣而後不書卒為死於君難而仲叔兩家及公子遂之專師已於僖公之世示之義不取乎再書得臣帥師也夏五月王子虎卒春秋於三王臣尹氏不名不來赴也王子虎名來赴也不葬不往㑹也劉卷名而葬來赴而往㑹也固因事而異文亦可以觀世變矣始則王臣雖有外交而不赴喪於諸侯繼則來赴而諸侯猶不遣㑹葬之使也至於其後則喪紀之通與外諸侯之往來一禮矣秦人伐晉秦穆既有悔過之言而猶兩報敗殽之恥必濟河焚舟晉師不出而後忿洩志快葢非真能悔過者也文定以為自此以後見伐不報始能踐自誓之言不知此後晉復報王官之役而伐秦逾二年穆公卒使穆公而在未知其果不報晉否也書終秦誓者夫子獨因詞之善而取其義耳汪氏以為書取其言而春秋賁其事者是也秋楚人圍江晉伐附楚之沈楚伐附晉之江其不義一也江沈皆近於楚而逺於晉晉得沈不足以益國而楚得江則可以拓地沈雖見怒於晉而楚之近援可恃江一受毒於楚而晉之逺救不及故沈雖潰而不亡江即有晉救而速滅然則小國非不知有從晉之義而正不能支其入楚之勢也雨螽於宋冬公如晉十有二月己巳公及晉侯盟公既盟處父矣而晉侯再與公盟者或以垂隴之盟公未親與故也此公朝晉之始即魯諸公朝晉之始凡魯之前後朝齊未有因其來朝而盟者晉悼猶出國都盟襄公於長樗惟公則一朝晉襄而受其盟再朝晉靈而受其盟辱亦甚矣左氏以前之及處父盟為公朝晉而晉人使大夫盟公以恥之於此則曰晉人懼無禮於公請改盟夫外大夫來盟内大夫蒞盟春秋之常也晉若懼前盟之無禮則當兩君相約出㑹於他所即不然亦當如晉悼之出其國都乃復致其往朝而與之盟是再無禮於公矣當不然也晉陽處父帥師伐楚以救江公穀無以字書陽處父帥師而大其事則伐楚也善其義則救江也使夫子果大伐楚之事則不必書救江使夫子果善救江之義則不必書伐楚而春秋書法如此者葢當日晉師之出原為救江而其實則振旅向楚陳師境上有似乎聲罪而致討者也春秋於此有二義焉一則商臣弑君雖逾兩年而罪在當討不嫌其遲如直書伐楚則後人疑於得討賊之義故曰以救江猶諸侯㑹稷而曰成宋亂大夫㑹澶淵而曰宋災故也一則楚横暴於江漢之間侵蝕諸侯强兵四出書於春秋侵伐圍入戰滅八十餘見而内諸侯之用師於楚者齊桓之召陵一書伐楚晉定之召陵一書侵楚而已使於處父之師而直書曰伐楚則前繼齊桓而後駕晉定矣故曰以救江葢救江非不善既張皇其事以號伐楚而但一救江而止惜乎其事小而義輕也文定較量於召陵城濮謂救之不得其道而書伐楚以救江者春秋紀用兵之法失其義矣名陽處父者外大夫專師書名之始與垂隴名士縠同士縠主盟於垂隴禮樂自大夫出也陽處父帥師征伐自大夫出也四年春公至自晉文公兩如晉皆至見迫於晉不得已也孫氏曰文公之出六其至者四危之也其不至者二安之也然使以盟新城為危則盟扈亦不得為安而盟扈所以不至者不序諸侯不名晉大夫不成其為㑹盟故不至不必以安危論也夏逆婦姜于齊魯十二公六娶齊女惟僖公聲姜逆至皆不書其書者五書法各不同而獨畧於文公之逆出姜何也書法不同者其事不同故詞亦不同也畧於文公之逆出姜者其事畧故其詞亦畧也娶文姜使逆臣公子翬往欲著桓之寵逆臣則不得不以公子翬如齊逆女作一事書矣莊娶哀姜自行親迎之禮欲著莊之親迎仇女則不得不以公如齊逆女作一事書矣宣娶穆姜而使公子遂猶桓之使公子翬也成娶齊姜而使叔孫僑如雖未若翬遂之為逆臣而亦無宗臣逆女之禮也故皆各作一事書也既作一事書則在國稱女不可以稱如齊逆婦也婦者有姑之詞文之逆出姜非親迎非逆臣非宗臣不必别作一事書則從有姑稱婦之禮而以逆婦為文亦其常也夫是以往逆而稱婦也桓娶文姜有齊侯送之文公㑹齊侯之文則不得不書夫人至矣莊娶哀姜有親迎之文公至之文則不得不書夫人入矣宣娶穆姜公子遂以夫人至欲著遂以夫人之非禮則不得不至夫人也成娶齊姜叔孫僑如以夫人至欲著僑如以夫人之非禮則不得不至夫人也文之逆出姜無異事則亦無異文夫是以入國不至也有姑則稱婦姑為主之詞也無姑則不得不稱夫人文姜至而稱夫人哀姜入而稱夫人無姑之文也宣之穆姜成之齊姜既從有姑稱婦而又稱夫人者因遂與僑如之以之也如書遂以婦姜至自齊僑如以婦姜氏至自齊則無以别其為君夫人矣文之逆出姜但為姑逆婦之文夫是以稱逆婦姜不稱夫人姜也然則無譏乎有譏也譏公之不親迎而畧於禮也先儒以為譏喪娶然不譏莊宣而譏文公何耶文定從穀梁之説以為不稱夫人姜氏者姜氏亦與有貶焉然不貶哀姜穆姜而貶出姜何耶夫納幣則喪制未終而逆婦則三年已滿視宣公為愈矣汪氏以為宣公篡立其罪已極於喪娶何誅而穆姜亦不能避喪娶之辱冒大禮以往乃得不同出姜之貶豈亦有幸有不幸歟如謂春秋削夫人以貶文公之喪娶則哀姜穆姜稱夫人矣如謂春秋削氏以貶出姜穆姜之冒禮以往則哀姜書氏矣又文定以文公違禮而行使國亂子弑齊人冒禮而往使其女不允於魯皆失於不正其始之過故春秋交貶之以為後鑒然哀姜之不允至以為戮矣何不於夫人入國時一削氏以示誡耶若穆姜則既同出姜之削氏而身為夫人適子有國抑又未嘗不允於魯者何耶葢魯娶齊女禮有隆殺事有繁簡史臣之登於冊者不得不有詳畧夫子因其詳畧隨事書之而示貶之義巨細具著矣而謂筆削於氏不氏夫人不夫人一字兩字之間者政不然也狄侵齊秋楚人滅江處父一救江無濟而即聽江之滅於楚晉實不恤江也而晉猶用兵於秦則知非力之不足矣夫救江則處父帥師伐秦則晉襄親往比而觀之晉固不急於扶大義而急於報私怨也晉侯伐秦秦蓄兩敗之怨而一報王官未為大過晉襄又親即戎以伐之而圍其邑故春秋直書晉侯以著其罪也文定泥於舉爵非貶謂是以常情待晉襄而以王事責秦穆其説曲矣晉襄繼伯可謂有為而秦晉之怨則由於敗殽競勝一時而失結秦攘楚之䇿故及身而急於報秦不得不緩於治楚以故商臣弑君而不問滅江滅六而不救其後卒至秦楚合而中國不競為可惜也葢晉文城濮之戰實用秦師天王狩河陽諸侯皆朝而秦則不至晉私秦為己之助不以歸周也明年㑹翟泉則秦人與矣又明年伐鄭則晉人秦人共之矣其怨起於秦之私與鄭盟而留戍以去使晉不得志於鄭耳秦之襲鄭固為不義之師而知鄭有備滅滑而還無損於晉也襄之凶服即戎實報秦盟鄭之怨非有恤鄭之公心也兵連禍結罪實在晉秦恥敗殽不能忘報人情之常孟明師來急宜修詞以謝而再敗之於彭衙豈非己甚哉王官之役濟河焚舟封殽尸而還晉未有喪師失地之辱又興師以伐之何其忿戾之至耶且以當日大勢計之周之東遷周自失計而秦則有勤王定難之功蠶食諸侯憑凌中國天下苦楚未苦秦也文公之伯秦實輔之内諸侯㑹盟秦頗與焉城濮之戰又助晉以敗楚師秦交東諸侯以勤勞中夏未可以督過之也使晉實有安内攘外之心西結秦好而南抗楚師藉强隣合諸侯并力一隅則亦足以弱楚矣楚弱而諸侯安諸侯安而中國尊矣晉主夏盟豈不於齊桓有光哉乃不忍一朝之忿僥倖殽師秦好遂失好失而怨成怨成而兵結遂不得不釋楚而一意向秦由是楚無所忌而益肆吞併矣由是秦知東諸侯之不我與而為自强之計矣由是而秦楚合矣至於秦楚合而晉事益難為矣謂非晉襄之失䇿哉故伐秦而書晉侯罪晉侯也衛侯使甯俞來聘甯俞衛之世族夫子常稱其賢觀其免衛君於難愚不可及則晉衛交伐之後即㑹伐沈之師而又聘魯交好大約出於甯俞謀國之忠也冬十有一月壬寅夫人風氏薨成風敬嬴之稱夫人或者以哀姜既戮出姜既去皆義與廟絶而莊公文公不可以無配故尊成風以配莊公尊敬嬴以配文公耶若是則前之用致夫人者宜如諸儒為致成風而左氏以為致哀姜者非矣然成公之齊姜無故而襄公又尊妾母定姒為夫人襄公之敬歸未見經亦未有故而昭公又尊妾母齊歸為夫人則是魯以子為君母為夫人自成風以後相沿成故而成風敬嬴之為夫人非為哀姜出姜之不入廟與否也觀於含賵㑹葬王不稱天則知既致哀姜於廟以配莊公而不可有二夫人也五年春王正月王使榮叔歸含且賵前書惠公仲子此何以不書僖公成風仲子薨葬不見於經不書惠公仲子則不知歸何人之賵此於成風則薨以夫人葬以小君及時而含賵雖不書亦可以知其為僖公成風也前書天王此何以王不稱天惠公之嫡夫人為孟子雖寵仲子而未見有尊為夫人之文則其下賵諸侯之妾其失易明即不去天而王之瀆禮可知矣莊公之哀姜有罪見戮義與廟絶僖公為君而尊其生母薨稱夫人葬稱小君天王乃歸含賵又㑹其葬使不去天以示貶則疑於成風應為夫人以入廟配莊公而天王之含賵㑹葬若出於禮之當然者矣此春秋書法所以異也大約春秋於其人其事似若無異而書法或不同者無疑則同其文有疑則異其詞此類是也季氏以天王天子王三稱並行為王者之通稱史氏之異辭然以從王伐鄭及朝王所之類為通稱異辭則可錫桓公命含賵㑹葬成風而王不稱天非通稱異辭也程氏又直以為闕文然何以他處不闕文而獨闕於錫命含賵㑹葬耶三月辛亥葬我小君成風僖公之妾母文公之妾王母也僖公既以夫人尊之則文公亦不得不以夫人喪之程氏謂以義斷之可改而不改文公與有責者亦似太過不赴於諸侯可也既以夫人之禮薨之而又赴於諸侯以來㑹葬則文公之罪也向使魯人能持大義竟絶哀姜於廟則尊成風以配莊公猶之可也稱以小君葬之以禮是哀姜已為莊公在廟之配矣安可有二夫人哉王使召伯來㑹葬召穀作毛含賵之使逾兩月始來㑹葬之使既葬始來當是襄王聞而遣使非魯人告薨葬於京師也葢感僖公推戴之恩既㑹葬其身錫命其子又含賵㑹葬其母加禮無已忘其瀆亂春秋所為再去天以示貶也夏公孫敖如晉不遣京師拜禮之使而急於聘晉觀于前後之文非有不可己之事是必晉亦與有弔㑹之禮而敖往以謝之也晉使來而春秋不書必其微者也視天王不若晉侯視天王之榮叔召伯不若晉之微者罪可解哉即不謂然而甫葬急聘亦春秋所譏也秦人入鄀秦穆既入滑以啟晉釁連兵數年干戈未靖今又入鄀以搆怨於楚固知秦穆自誓乃悔一時不聽蹇叔之過亦非有撫字弱小之義文定所謂以王事責秦穆者誠非也秋楚人滅六既書滅江又書滅六著商臣之横暴亦以著晉襄之無志於攘楚而聽其蠶食小侯也冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳行父初見經而書如陳葢季氏於陳世有舊好春秋書之以著其私也但公子友如陳書葬原仲行父如陳不書所事似亦未必罪其假公以圖昏者然陳使不來而行父獨往又前則陳穆公之卒不往㑹葬後則陳共公之卒復不往㑹葬魯與陳未見有交好之實故雖不言其故而行父之以私往可知矣左氏謂以陳衛之睦欲求好於陳夫甯俞來聘不見報使而聘於睦衛之陳毋乃紆耶秋季孫行父如晉比年而聘於晉魯之事晉不應若此之勤當是行父假聘以自托於晉也葢季友有功於魯友卒之後其子不見於經而行父則其孫也季友卒二十餘年行父始為卿以用事於國其時公孫敖公子遂同專魯政敖在季友未卒之前一年春秋書帥師救徐以著其掌魯兵權則其專政久矣行父欲得國柄必忌敖遂而遂與文公屬親不可遽去殆將去敖以奪其政故先如陳以講世好繼如晉以托大國無非自為牽固之計以漸為圖敖之謀也不然敖以三十年當國之宗卿未有大罪何一旦出奔之速耶已氏之事或亦有之而行父因得藉口以加其罪矣觀春秋初錄行父於經而即書如陳若祗為昏故則未為有過而不必書以罪之又比連書如晉也八月乙亥晉侯驩卒驩公作讙齊桓之後伯業遽衰晉文之後世主夏盟則晉襄之克纘父功也然在喪而敗秦敗狄伐許伐衛㑹大夫盟諸侯功固在此而罪亦在此矣又春秋書外大夫與盟自士縠主垂隴之盟始書外大夫帥師自陽處父救江始禮樂征伐自大夫出春秋葢以罪晉襄之失馭也冬十月公子遂如晉杜氏以為卿共葬事文襄之制然魯未遣卿葬晉文而使公子遂葬晉襄則是魯之加禮於襄而非晉文昉為伯令以致諸侯之卿也觀公之於襄加禮則其及處父盟謂因往朝而使大夫盟公以辱之者洵無其事也葬晉襄公三月而速葬汪氏以為患秦送公子雍欲禦秦師故急於襄事者是已是必既定嗣子之位而後葬先公也此距敗秦令狐之時尚六越月趙盾宜遣使告秦以中悔之故晉即不告秦亦宜預聞之而罷納雍之師兩皆不然則皆有罪也晉殺其大夫陽處父晉狐射姑出奔狄據傳以論幼主甫立趙盾專謀而狐射姑敢於殺久用事於國之陽處父則當國者之罪也故稱國以殺者罪趙盾也射姑擅殺之罪不正而縱之出奔則書出奔者亦罪趙盾也竊疑處父專盟專伐久主晉政趙盾既殺公子樂將拒公子雍忌處父異已有利於射姑之殺之而故縱之也不然射姑召公子樂於陳而盾殺之豈不知射姑之怨已宜因其殺處父而除其敵不宜反縱之矣閏月不告月猶朝于廟閏月不告月者見閏月宜告而不告也猶朝于廟者雖不告月猶朝于廟以見十六年之書四不視朔為併不朝廟也既朝廟何以不告月天子以季冬月頒明年十二朔於諸侯諸侯藏之祖廟至朔則朝於廟告而受行之也不告月而朝於廟者雖朝於廟不告而受行之也七年春公伐邾文公怠政事多廢緩然獨廢緩於告月修廟而不畏天勤民尊王敬祖耳親將伐邾而取須句城郚又何其勤也比事觀之春秋之義見矣三月甲戌取須句句公作朐僖公二十二年取須句如謂取以復封須句子則此之取須句於邾是魯既復其君邾再滅之而并其國矣魯雖再取於邾亦不為不義也邾再滅須句春秋不書而獨再書魯取何其寛邾滅國之罪而嚴治魯之取邑耶必不然矣遂城郚明是城郚以備邾而保須句也可見前是取須句於邾中間復為邾所取此再取之於邾惟恐其不保而急於城郚矣伐邾罪一也取邑罪一也重勞民力成城而非其時罪一也故春秋詳書以譏之夏四月宋公王臣卒穀作壬臣王臣之卒不葬諸儒皆無説葢不攷魯宋失好不往㑹葬之故而説窮也髙氏以為國亂禮畧故不日不葬然既討禦立柞臼國亂定矣何以不禮葬先公耶禦殺世子國人殺禦經皆不書左氏亦不詳未可為據據左氏昭公欲去羣公子穆襄之族攻公殺公孫固公孫鄭六卿和公室昭公即位而葬春秋何以不書葬耶故當以魯不往㑹為定論也宋人殺其大夫左氏大夫不稱名言非其罪榖梁稱人以殺為誅有罪皆非也春秋殺無罪而稱名殺有罪而不稱人者多矣此以文定書宋人者國亂無政非君命而擅殺大夫不名義繫乎殺大夫而其名不足紀為是春秋之義忠而見殺則書名才賢而見殺則書名重臣見殺則書名喪師辱國見殺則書名弑逆叛亂見殺則書名專國政見殺則書名殺而有闗乎國之大故則書名但書殺大夫者義不繫乎其人也據左氏則所殺者公孫固公孫鄭誠為不足名者也然既為國之大夫矣其人不足書而殺大夫不可不書也葢義係乎殺大夫也戊子晉人及秦人戰于令狐晉先蔑奔秦蔑公作昧奔上有以師字晉使先蔑逆公子雍於秦使秦引大義而責晉之舍適嗣而外求君則秦康幾於王者之義矣顧秦康能若是之賢乎春秋之世而有若是之賢君乎春秋亦不以此望秦康也不以此望秦康則因其逆君而納雍定晉亦不以此深責之也此時之趙盾宜諭秦以中悔之故引愆請罪而所立者又即秦之自出秦人或亦意釋而師退矣師即不退而嚴兵相拒久而不戰秦人深入晉地師老事變知必不能得志於晉亦未有不挾雍全師以退者也師退則怨不成不戰而敗則不思報而異日之患亦不深矣潛師夜起敗之令狐是何為哉文定罪晉人之志乎是戰者是已諸儒秦伯趙盾貶而稱人夫秦送公子雍必非康公親至左氏所云多與之徒衛者當是大夫在軍春秋之稱人非貶秦伯也若趙盾既主謀逆雍又主謀以敗秦師可謂事専而謀亂矣宜書名以顯罪之不宜殁而稱人反若為之諱者則知其稱人為散罪晉國之人非專罪盾也又孫氏以為秦人乗喪而求戰趙氏以為晉人修怨而及戰皆不用左氏先蔑士㑹逆雍秦人納雍之説然觀春秋書法不同於宋襄四國之伐齊則不得罪秦人之伐喪不同於魯之納子糾晉之納捷菑則不得罪秦人之强納公子而又先蔑之奔不言出則明為在師而奔故左氏之説不可廢也狄侵我西鄙狄在僖公時桓文相繼稱伯悍然肆虐於諸侯侵伐圍滅凡九見於經齊晉衛鄭諸大國無不被其毒者而衛至兩遷其國都晉雖一敗之於箕而未創也獨不見肆志於魯則魯人頌僖公所云戎狄是膺者亦必有撫馭抑制之實矣至此而侵其西鄙毋亦失先公所以治之之道耶秋八月公㑹諸侯晉大夫盟于扈凡盟稱諸侯者前目後凡也於扈之二盟一㑹皆不序諸侯此并不名晉大夫而於上事並無所承不見有諸侯之目左氏以為公後至故不書所㑹而諸儒因之遂以責文公之怠於政事然經既書公㑹何以見其不及㑹耶如果公不及㑹則當書諸侯晉大夫㑹於扈公及盟不當與他書公㑹某侯某伯盟于某同文而但為不序不名之異矣穀梁以為畧之也而又不言所以畧之之故大約諸侯㑹盟㑹必有相見之禮盟必有載書之辭是時為晉立君趙盾㑹諸侯於扈不敢自主諸侯之中亦未敢有主者無主盟則無受盟而諸侯之序不可以次盾亦不得而名非如新城之盟晉靈立已八年盾可假君命以為同盟之主以序諸侯也葢垂隴名士縠新城名趙盾者所以著士縠趙盾主盟諸侯之罪此以立晉君盾雖同諸侯之盟亦出於事勢之不得不然春秋不以為罪故不名之既不名趙盾則亦不序諸侯矣至十五年之盟扈晉靈立已九年十七年之㑹扈晉靈立已十一年而諸侯皆不序者左氏以為公不與則不書然春秋諸侯㑹盟魯君不與者多矣未有不序者何獨畧於二扈哉文定以為齊宋弑君而不能討故畧之而等於狄然襄二十五年齊崔杼弑君晉平㑹諸侯於夷儀受賂不討何以獨序諸侯而不狄之耶雖曰夷儀之㑹原以報朝歌之役非為崔杼弑君而㑹然商臣弑君已逾一年扈之盟何以知其為討齊弑君而盟耶宋之弑君已興四國伐宋之師扈之㑹又何以必其為討宋弑君而㑹耶葢是時晉靈年穉趙盾專國目無少主新城之盟假君命以主諸侯之盟二扈之一盟一㑹晉靈雖在而主其事者趙盾也使春秋列晉靈而序諸侯則似晉靈實能自主諸侯之盟㑹而趙盾之罪不著矣故畧之也葢晉靈在位十有四年惟公及晉侯盟一盡晉侯其他㑹盟侵伐納捷舊殺大夫之類事十八見皆晉靈所不與而一盟一㑹晉靈既與猶不舉爵以列於諸侯之上者以著趙盾之無君而靈所以卒為盾弑也又左氏以諸侯中有齊侯齊自晉文卒後凡晉㑹盟侵伐之事久不與矣前此垂隴後此新城皆無齊侯此何以獨有齊侯左氏非也冬徐伐莒書徐伐莒為公孫敖涖盟起也書公孫敖如莒涖盟為奔莒起也公孫敖如莒涖盟季孫行父何以如陳有舊也向者公子友嘗書如陳矣故知其有舊也公孫敖何以如莒有舊也向者公子慶父嘗書奔莒矣故知其有舊也行父如陳何為耶私于陳以結外援也敖如莒何為耶私於莒以結外援也行父如陳何以不書所事著行父之出於私也敖如莒何以書涖盟著敖之不盡出於私也葢是時敖當國已久行父新出用事行父忌敖將以去之故托於陳以自固敖知行父之將去已故亦托於莒以自固其後敖委君命廢王事倉猝奔莒敖固不能無罪矣春秋既以著敖之罪而又欲著行父逼敖出奔之罪故初錄行父即書如陳如晉以著其私而於敖之如莒獨詳其事為涖盟以見其非私而又於涖盟之前書徐伐莒以見敖非無故而假托涖盟也左氏以如莒奔莒皆為己氏夫使春秋罪其以己氏之故則如莒不書涖盟矣葢雖有己氏之事春秋固惡行父借事以遂其逐敖之私而以涖盟蔽之以罪行父也觀後書敖卒於齊既以著敖挾大國求復之罪而亦以著敖之挾齊猶行父之挾晉則知前書行父如晉非以譏魯聘晉之勤而實以譏行父托晉之私也則春秋之法既有以明治敖亦有以隠治行父矣八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍天王之訃已在諸侯魯雖遣如京師之公孫敖而後於盟趙盾盟雒戎之公子遂春秋紀月紀日而示貶之義著矣趙盾之盟左氏謂晉以扈之盟來討非也如晉果來討非公往朝則卿往聘矣何為趙盾出在鄭地以盟公子遂哉此為大夫專盟之始晉君新立晉欲得魯盾知魯政在遂名為約盟於遂以為晉得魯而亦結於遂以自固也遂知晉政在盾名為求盟於盾以為魯托晉而亦結於盾以自固也此盾遂所以弑君也乙酉公子遂㑹雒戎盟于暴公作伊雒戎張氏曰盟盾未幾遂盟雒戎不以遂事言者為其雒戎所以别之以示内外之辨即文定明族類别内外之説然則如京師如晉何獨以遂事言而不為君臣上下之辨乎如京師如晉以遂事言者罪其以二事出也以見王事綦重不可以二事出魯不行獨尊天王之禮而以周下等於晉為不嚴天王諸侯之分也盟趙盾盟雒戎不以遂事言者罪其不以二事出也以見雒戎至微不妨以二事出魯並行敵國㑹盟之禮而以雒戎上儕於中國為不知内外之别也故彼以書遂示譏此以不書遂示譏也但遂既盟盾又無故而盟戎恐亦比行父而為擠敖之謀戎近在王畿敖或有所忌而廢京師之命以奔乎公孫敖如京師不至而復丙戌奔莒公無而字穀梁以為不言所至未如也汪氏以為受命而不行范氏以為若其已行者當如公子遂書至黄乃復皆非也未行不當言復言復者既受命而出也公子遂書至黄者黄齊地自齊地而復故不可不書所至今敖未出魯境不當書所至也惟其既受如京師之命出在魯之内境不為至彼之皇皇而為復此之遲遲越宿奔莒故其奔亦併不言出也至于敖之不敬所事魯之不治敖罪則諸儒論之詳矣文定專罪其從己氏然則不為己氏而顧可委君命于草莽耶據經文祇有罪敖廢命而奔之義無罪其從己氏之義如罪其從己氏則于不至而復之下書丙戌如莒再書自莒奔齊而義即了然可想矣不書如書奔是明著其意在乎奔若有罪而不可以不去國者然也夫敖以三十年相國之宗老未見有罪何以出奔故疑其為行父逼之也何以既受如京師之命而奔故疑其畏仲遂盟盾盟戎將不利于此行而奔也其己氏之説則未奔之前行父仲遂引以為逼敖之端既奔之後又引以為拒敖之辭也螽宋人殺其大夫司馬宋司城來奔殺大夫不名諸儒之説義皆難通故從或史闕名及名不足紀兩説于此既不紀名而又紀其官左氏曰公子卬握節以死蕩意諸效節于府人以出故書以官皆貴之也然如死君難而著忠節者皆名何以此獨不名耶吕氏曰死于其官而奔得其職皆不名者其人他無可稱獨死其官得其職為可錄也然如荀息成君邪志而一死以殉卓子之難春秋猶著其名何以獨不名公子卭蕩意諸耶恐當以劉氏所云稱官者不能于其官為是葢司馬者主兵之官司城者守土之官國之强弱治亂興衰存亡係焉非忠貞而有謀勇足以服國人而威隣國者不足以當之宋昭之在喪也欲去羣公子而為穆襄之族所攻致殺大夫甚衆初立其位而國難未靖卿大夫之職宜擇才賢今甫逾年而司馬見殺司城出奔公子卭公子蕩之不才賢可知矣故書司馬司城者見司馬司城之職之重也不書公子卬公子蕩者見公子卬公子蕩之非才賢也以不才賢之人而居重大之任見宋昭之不為官擇人而致為臣庶所殺所逐其後卒不免為國人所弑也故此之書官為華孫來盟之書司馬起也華耦之書官為宋人弑君起也公子卬以不能于司馬見殺繼其後而為司馬者華耦也國人弑君耦即不與聞故而掌國之兵權既不能保其君之不見弑而又不能得弑君之賊以正其罪宋固王者之後得有命官而人之不稱其官如此則司馬司城亦不足為重輕也已矣九年春毛伯來求金書毛伯求金魯不供天王之葬見矣諸侯不供天王之葬見矣周益削弱不能自供其葬見矣天王葬事不供至不得已而出于求可慨也己夫襄王遣使㑹葬僖公又含賵㑹葬成風禮有加而無已襄王之崩一遣公孫敖奔喪不至遂不再遣他卿而喪事不供致煩毛伯之求豈非魯君臣之罪哉夫人姜氏如齊呉氏以為必有所不安而歸寧以愬于父母夫文公在位仲遂未必敢無禮于國母是或文公寵嬖敬嬴而出姜失職敬嬴私事仲遂已有奪適之萌故假歸寧謀自安耳歸寧合禮不書而此書者見出姜之不安已久而如齊實非歸寧異日仲遂之逆則文公有以致之也葢是時魯親晉而失齊好夫人之不安忽而如齊忽而至魯而齊魯聘問之使未嘗一見遂以釀成交殺其甥之禍仲遂行父罪固不勝誅而文公亦烏能辭其責哉二月叔孫得臣如京師使卿㑹天王之葬者魯十二公于十二王始終二百四十二年惟文公與昭公事僅見于春秋則似猶有禮者然公不親往而使卿亦但愈于往㑹而不使卿及并不往㑹者而已攷于隠公不葬平王莊公葬桓王而于莊王僖王崩葬并不聞焉僖公輔齊桓以尊周室為名而不葬惠王然則文之使得臣葬襄王者亦以報襄王㑹葬僖公又來錫命又含賵㑹葬成風加恩稠叠之禮也與昭公使卿葬滕子以報其親來㑹葬襄公何以異哉又與公之于晉襄宣之于齊惠昭之于晉平晉昭宋平哀之于齊景絶不見有禮於我而使卿㑹葬孰敬而孰慢哉夫諸侯于天王應行之禮必待施而後報而且施之過于禮報之不及于禮視周如列國而并不如事齊晉之勤即一葬事而凌替已極魯君臣意中葢無天王矣故其後頃王之崩葬亦皆不問而宣公葬匡王成公即不葬定王襄公葬簡王而即不葬靈王至于叔鞅之葬景王則昭公為稍有禮而魯自昭公以後雖小國之喪紀亦視昔有加又豈能獨致誠敬于天王者歟辛丑葬襄王襄王之身及桓文兩伯名為尊周而實卑之葢諸侯皆朝于伯主而稟受其命天下有伯無王矣晉人殺其大夫先都據左氏則箕鄭父先都士縠梁益耳蒯得五人者作亂使賊殺先克如是則春秋合書晉人殺其大夫先克而于五人者當為討亂之詞以示其擅殺大夫之罪今殺先克不書而但書殺先都殺士縠箕鄭父則五人殺克之罪隠矣又且稱人以殺不去其官則知春秋專罪趙盾也葢晉靈幼弱趙盾專國使盾公忠之素足以服人彼五人者必不敢殺其佐使盾以擅殺先克為五人罪則當明正五人之罪不當使羣下殺之使其罪反不明也左氏所云賊殺先克是無主名之詞未必果出自五人即或一二人使之未必五人合謀也盾以先克之殺坐莫須有之罪于五人為一網打盡之計彼實惡强家作敵撓政奪權耳故春秋書人以殺者其人為盾之私人而非衆人討賊之詞書殺其大夫者其大夫為國之大夫而非大夫有罪之詞也何以知之于不書殺先克知之也觀前則襄公甫葬而稱國以殺陽處父此則靈公逾年而稱人以殺先都殺士縠箕鄭父春秋之義了然矣三月夫人姜氏至自齊文定以為書至者見小君之重也呉氏以為不得已而出以得至國為喜也皆非也葢書以别于文姜也春秋賤惡文姜之出屢書特書以醜之出姜之如齊非文姜之比并非聲姜于卞陽穀之比苟不書至以别之則疑于文姜矣疑于文姜不可也即疑于聲姜而失其情事亦不可也吕氏曰為歸于齊起也自有見如齊則至歸齊則不至以示魯人竟絶夫人為魯人之罪也晉人殺其大夫士縠及箕鄭父士縠嘗主垂隴之盟則其用事在趙盾之先宜趙盾忌之矣據左氏士縠之不得將中軍由于先克則怨先克而謀殺之者宜士縠為之而箕鄭父之怨未深鄭父或可貸也觀春秋書及則知原鄭父矣而盾并殺之其為盾之欲專國政而盡去異已何疑哉楚人伐鄭公子遂㑹晉人宋人衛人許人救鄭書楚人伐鄭即書公子遂㑹救未嘗歴時逾月皆在一月内事何得為緩又不書次何以見春秋不書卿為懲其不恪哉即楚果有囚公子堅公子尨之事亦是楚師猝至鄭緩于告難非諸大夫之救緩也事在一月之内鄭告于晉而請救晉告于諸侯而㑹救但見其神速不見其怠緩而謂春秋猶譏之失其義矣左氏泥于稱人為貶而文定兼罪趙盾者皆非也文定又以楚子親將貶而稱人然則自此而次厥貉伐麇侵陳侵宋稱楚子為襃而爵之耶夏狄侵齊秋八月曹伯襄卒九月癸酉地震坤德順承乎天宜靜而不宜動者也任氏曰逆其常理而不得其節則震而不安其所承諸侯變而不承天子大夫變而不承諸侯逺方變而不承中國之象也統天下以為論其義是已但天子奉天以御世天變則係乎天下諸侯有分疆地變于其所封則係乎一國入春秋踰百年不見書地震自此而書地震者五以言乎弱東周而不朝則不俟今日而然而文宣以後諸公亦未有抗逆甚于先公之事而屢見地震則魯大夫變而不順承公室之象也冬楚子使椒來聘書楚聘一同中國之詞所以著楚之强其聘中國既行中國之禮而中國亦以待内諸侯内大夫者待之也文定以為思善悔過向慕中國春秋褒而進之然前乎此則伐鄭後乎此則次厥貉伐麇侵陳侵宋何為思善悔過哉且商臣弑君之賊因其一來聘遂為褒進之詞是奬惡矣魯桓在位十八年嵗不書王何其治之甚嚴而獨宅心忠恕以待商臣耶秦人來歸僖公成風之襚因惠公而加禮仲子想天王來歸時必有詞為惠公仲子賵也因僖公而加禮成風想秦人歸襚時亦必有詞為僖公成風遂也舊史因來致賵遂之詞以書而春秋仍之一以罪天王之寵臣妾一以著秦人之結好于魯而非以惠公仲子僖公成風分别示義也文定以寵愛仲子者惠公之過故書惠公仲子以教後世為人夫者當明夫道以尊崇成風為僖公之過故書僖公成風以教後世為人子者當明子道其説亦好不可廢也杜氏以為秦僻陋故不稱使然如齊人歸田之類亦不稱使又何義耶張氏曰秦欲伐晉故歸襚于魯然秦晉搆兵已久秦之彭衙王官皆不見先結于魯何獨至此而為逺交近攻之䇿耶葢秦欲通好諸侯而追成喪死之禮以與魯相親厚故自此而秦康秦共之卒皆來赴告而終春秋之世不廢秦之喪紀矣葬曹共公十年春王三月辛卯臧孫辰卒辰為大夫莊公二十八年為國告糴至此五十年之久而㑹盟侵伐曽不一與則三家及逐專之也然夫子譏其知栁下惠之賢而不與立則其在國非盡無權而魯政多疵亦不能辭其責矣夏秦伐晉據左氏文八年秦人伐晉取武城以報令狐之役是年春晉人伐秦取少梁則此秦之伐晉為報少梁之役也武城少梁經皆不書文定以為事不經見固未可據然無論此役為報令狐報少梁其為易世相仇交攻不已明矣但春秋諸侯易世相仇交攻不已者不特秦晉也即以為未若秦晉之甚而既罪其交攻不已則秦晉均罪狄秦而不狄晉用法偏矣伊川以為晉舍適嗣而外求君罪也既而悔之正矣秦不顧義理是非惟以報復為事則狄道也文定從之夫晉之立君舉棋不定既逆雍于秦而又拒之秦非始謀納雍者趙盾為之主先蔑士㑹為之使招致秦師而挫于令狐當其時或出于不得不然而事後不聞遣一使以謝過此在常情亦不能不挾以為怨而思報之胡為狄之哉若以適庶為言宋之歸鄭突奔鄭忽過有甚焉晉自逆公子而屈喪秦師秦之恥辱若何而猶以一報為罪春秋不若此之苛也又陳氏則以為晉主夏盟惟秦能加兵于晉使晉不得專力于楚者秦為之也然秦雖西戎秦穆内交中國晉文之伯秦穆助之自敗于殽而秦晉為仇是晉之絶秦非秦之絶晉也秦穆悔過而卒秦康嗣世正兩國釋先怨講新好之時趙盾謀國舛謬敗秦令狐秦之仇晉益深是晉之開釁于秦非秦之搆怨于晉也其後秦交于楚而唇齒相依則中國為叢驅爵而又何罪于秦哉且不外秦于前後伐晉之師而外于報納公子雍之怨尤為苛也諸儒以此及鄭伐許晉伐鮮虞為春秋狄三伐國説各不同或曰闕文或曰告辭畧諸儒多不然之而所論亦非定義誠不知春秋筆削之㫖果何如也夫春秋諸侯不義之事多矣惟此三條貶之不少假必其罪大惡極聖人絶之至甚而後然也如諸儒所論何至若是哉楚殺其大夫宜申齊商人弑君之賊齊人君之數年而殺之春秋猶書弑其君商人楚商臣弑君之賊宜申北面事之者十年而謀以弑之事成則不免弑君之罪事不成亦難逃今將之誅春秋稱國以殺而不去其官何也弑械未成形跡未見未必非商臣忌其威望而以謀弑之説加之罪也則商臣聲罪宜申之詞不足聼矣文定但曰春秋義微而不明言其故其意葢以謀殺弑君之賊其罪可原也然春秋何以不貸弑商人之齊人乎顧或者里克弑兩君而書晉殺其大夫宜申謀弑亦可以書楚殺其大夫罪固不相掩耶抑又不然也克之弑兩君既著于冊則書晉殺大夫可以使人知殺非其罪之義宜申謀弑事在可疑春秋不以疑罪加人則不可據以為斷也自正月不雨至于秋七月及蘇子盟于女栗明以著盟王臣之罪如曰諱公將為誰及之耶其大夫及之耶微者及之耶果為大夫微者而罪尤甚矣何為諱哉夫内卿視侯内大夫視伯内士視子男以魯侯盟蘇子當罪其為不信之盟不當罪公與蘇子之不可敵也齊桓尊宰周公不使與盟者桓為盟主以約束諸侯不敢等周公于列侯使受己之命也公與蘇子相耦而以事盟何不可敵哉惟不遵受王命而猶為誓神歃血之事為可罪耳其盟之公私皆不可知而春秋書法與及髙子盟防同盟天子之臣與盟列侯之臣異其事而同其禮比而觀之不待貶而罪自著矣冬狄侵宋狄之肆虐于衛為甚齊次之至此而侵掠及宋亦間宋之有内亂也楚子蔡侯次于厥貉厥公作屈據左氏則陳鄭來㑹宋亦以懼伐而來其助楚而次厥貉者蔡也葢蔡在齊桓之時一意附楚楚敗城濮而後懼而内屬踐土之盟温之㑹翟泉之盟皆與焉晉文即世而又附楚故書楚子蔡侯以著蔡之一于楚也若陳鄭則來㑹楚子因同次于厥貉而宋則㑹于厥貉者也其不當比而與蔡侯書次則固其事之實也文定以為原其不得已而故貸之失春秋罪蔡之義矣十有一年春楚子伐麇麇公作圈左氏以齊人滅遂為遂不與北杏之㑹楚子伐麇為麇逃厥貉之㑹皆强為之辭也楚為厥貉之次陳兵虎視欲有事于諸侯宋陳鄭來㑹而兵無所加乃伐不附己之麇以示威中國豈必聲罪致討為有名之師哉此為書楚君親將之始如以稱爵為予之固知春秋必不予弑君之商臣憑凌弱小之麇也夏叔仲彭生㑹晉郤缺于承筐公穀無仲字筐公穀作匡宋陳鄭㑹楚子于厥貉魯晉大夫為承筐之㑹以謀諸侯之從楚葢美舉也然晉靈受制于趙盾而文公怠于政事不親出而使大夫宜汪氏責其謀之不逺而難濟也秋曹伯來朝公子遂如宋左氏以為言蕩意諸且賀楚師之不害未必然也魯久與宋絶好承筐之㑹晉欲得諸侯之從楚者必彭生謀聘于宋以通宋而合諸侯拒楚故使公子遂往而後諸侯晉大夫㑹盟于宋之新城也狄侵齊狄五侵齊矣亦間齊之不競也但狄之於衛兩侵之一伐一入一圍之而於齊則掠其境而去亦猶怯於齊之强也冬十月甲午叔孫得臣敗狄于鹹狄連年侵伐諸侯桓文之時不少降服晉襄敗之于箕而未肯輯也自敗鹹之後但一侵衛而不復加兵于諸侯矣其後晉人敗之于交剛又敗之于大鹵而狄患息春秋不書矣使桓文早為攘狄之謀何至數十年間流毒若此哉又經書狄三傳謂之長狄或亦因其兄弟軀幹之長而號之不似白狄赤狄之為别種也十有二年春王正月郕伯來奔郕公作盛左氏公羊之説趙氏辨之極是孫氏謂莊八年郕降于齊師自是入齊為附庸然諸侯滅國既収其分地未必仍其故封苟為附庸恐不得復稱本爵觀春秋書郕伯則知郕但屬服于齊而實未降其爵也不名或史失其名或來奔而後復國不得比于失國之君而亦未有罪春秋紀小國事不能詳故于來奔不名微示其義也杞伯來朝二月庚子子叔姬卒僖公三十一年乃杞桓之八年書杞伯姬來求婦魯必以子叔姬許之而爾時男女皆幼未嫁閲十五年至今必將嫁而叔姬病故杞桓以正月來朝而叔姬以二月卒也左氏以為請絶叔姬而無絶婚者見此後成五年杞桓之五十一年有叔姬來歸之文八年杞桓之五十四年有叔姬卒之文九年杞桓之五十五年有逆叔姬之喪之文遂以杞伯之來為因叔姬病而請絶後有叔姬之歸卒必再以魯女之字叔姬者嫁杞桓而魯為從其無絶昏之請也或實有其事或出左氏意想之詞皆未可知啖氏疑左氏此傳當在成八年而誤此者啖氏之誤也且杞桓于成八年之後又十七年而卒其間無再昏魯女之文又不見有子匄求昏之事置此傳于杞叔姬卒之下殊屬無謂夏楚人圍巢伐麇者實商臣則書楚子圍巢者實子孔則書楚人有何書爵書人為進退予奪之義哉此後或間稱楚子間稱楚人皆從其實也至諸侯之大夫用事而直目其人則楚公子嬰齊公子壬夫公子貞公子午亦比連直目其人以著于冊矣秋滕子来朝秦伯使術來聘汪氏以為歸襚稱人此年來聘稱君大夫是亦漸進之義非也秦入春秋原來稱伯非楚之比來聘如其本稱何為漸進之哉冬十有二月戊午晉人秦人戰于河曲文定以為秦伯親將晉上卿趙盾禦之其稱人何為令狐之役而貶也然自此以往宋鄭大棘之戰晉楚邲之戰魯四卿㑹晉衛曹及齊鞌之戰晉楚鄭鄢陵之戰蔡呉楚栢舉之戰晉鄭鐵之戰齊呉艾陵之戰君將無不舉爵大夫帥師無不書名者豈皆所以貶之耶故知稱秦人必非秦伯稱晉人亦非以趙盾而貶穀梁所謂秦晉之戰已極而畧之者是已張氏曰不言及無曲直之詞不言敗無勝負之詞于義尤合也季孫行父帥師城諸及鄆城諸及鄆者何也公孫敖在莒懼莒之為難于我而城以備之也然則書城諸及鄆可矣書季孫行父帥師者敖為行父所逼而奔其在莒又托于齊行父患之也前此城邑未有書帥師者書帥師自此始觀春秋直名行父則行父之嗾敖無疑矣且以著敖奔之後軍政在季孫行父也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月世室屋壊世左穀作太文定從公羊作魯公之廟為是冬公如晉衛侯㑹公于沓㑹下公無公字狄侵衛十有二月己丑公及晉侯盟公還自晉鄭伯㑹公于棐還上公穀無公字棐公作斐沓棐之㑹杜氏以為衛鄭貳于楚畏晉而因公以請平然楚子厥貉之次鄭伯及陳侯㑹之于息則鄭之貳楚而畏晉勢當然也衛之于晉在文公之世相與為難至襄公未平故垂隴之盟衛不與焉靈公初立趙盾用事衛侯與于扈之盟矣救鄭之役出師以從比年以來未見有貳楚之實也衛鄭之㑹公烏可一例論哉葢衛之于晉雖暫釋前怨而交未深固又見楚勢方張志在中國蔡既服屬而陳鄭宋又新服之一旦楚有事于諸侯勢必及已故㑹公以通好于晉也惟鄭則自垂隴以來晉方勤我狼淵之役合四諸侯之師以為我拒楚事甫逾年楚子一至而即㑹之於息晉其怒之矣故㑹公以求解於晉也此兩國不同之情事也而新城之盟合于此矣十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾邾文卒甫逾年嗣子在喪輙用師加大國以修須句之怨不義甚矣魯苟正言以責其不義邾人當屈也而彭生但速為報復之舉又豈知義者哉春秋比書而兩罪俱見矣夏五月乙亥齊侯潘卒文公雖事晉而疎于齊然未有大怨何至廢其喪紀不㑹齊侯之葬耶或因有商人之亂亦或行父怨齊之納公孫敖也六月公㑹宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城自垂隴以來晉不㑹諸侯矣至此而㑹楚于息之陳鄭至㑹楚子厥貉之宋至世相怨尤之衛至先公屢伐不服之許至此晉有為之時而惜乎以趙盾專之也晉靈立已八年可以出㑹諸侯而盾專之故盟扈不序諸侯不名晉大夫此序諸侯而名盾者著盾之專也其曰同盟者何也二幽之後此為書同盟之始二幽之同齊桓同乎諸侯齊桓之謙也新城之同趙盾同乎諸侯趙盾之敖也若但謂趙盾不敢主諸侯之盟為是而不知大夫公然同諸侯之盟為非則失其義矣其盟為合諸侯以謀楚左氏以為謀邾者非也秋七月有星孛入于北斗惡逆之氣凝而成星本無而忽有光芒四出强名之曰彗入于北斗者自外而移入斗之環域也公至自㑹齊桓㑹盟未有伐國之事皆不至新城之盟亦未有事而至者齊桓好合諸侯而晉之世主夏盟皆强制諸侯使屬服于己也故自此以後無㑹盟不至矣晉人納捷菑於邾弗克納捷公作接邾文以前年五月卒其子貜且立已逾年晉猶助捷菑以庶奪適罪莫大矣雖屈于邾人之詞而弗克納不過不遂其不義之舉而已何嘉之有哉春秋所以書此者以見晉雖强大不能力制弱小而善邾人能名正言順以却晉人不義之師也文定以趙盾稱人為諱謂外以諱為善然他處稱人皆以為貶而人之何獨于此見其褒而人之耶不可以通矣左氏以新城之前書邾子蘧蒢卒新城之後書納捷菑故以新城為謀納捷菑因遂以納捷菑為諸侯之師然以晉之强大加邾之弱小固不必多役諸侯且經文又明書公至自㑹以析其事矣九月甲申公孫敖卒于齊穀梁以為為受其喪不可不卒固已然書卒于齊亦以見敖之自莒而托于齊挾大國以請復為有要君之心也陸氏以為既許其歸即為我之臣故書其卒以明君臣之義死生一者當是舊史紀卒之義則然夫子作春秋之義不必然也齊公子商人弑其君舍成舍為君以重商人之弑穀梁之説無以易也州吁不稱公子商人稱公子因其無稱而不稱因其有稱而稱之春秋原不以稱不稱示義也文定以州吁以國氏者累上之辭商人稱公子誅止其身其説曲矣既據左氏莊公寵州吁又據左氏叔姬無寵是州吁之弑完由莊公之寵愛有以致之而商人之弑舍亦由昭公之黜叔姬有以致之何以州吁獨為累上之辭而于商人誅止其身哉宋子哀來奔書宋殺大夫司馬宋司城來奔又書子哀來奔以著宋昭之所以見弑也子哀之是字非字原不必論若以昭公欲用子哀為卿是猶能知子哀之賢而用之未為無道之甚也以子哀之賢因昭公有知人之明起而輔其不逮匡正其失以靖國人豈非宋之幸哉見幾而作潔身以去未必春秋急予之也如為春秋予其奔而稱字則華耦來盟不名而氏亦春秋予之耶冬單伯如齊齊人執單伯單伯請叔姬之詞曰殺其子焉用其母是實坐商人以弑君之罪矣商人不能受而又無詞以謝故出横逆之計以抵塞一時從來事悖理屈心怍辭窮之人往往如此或非有意于辱魯也故後雖歸叔姬而屢加兵于魯葢有慙於其人而益為横逆之事以飾之也又商人弑君纔歴一時故執單伯執叔姬義不書齊侯以書齊人為合也然觀于來歸子叔姬亦書齊人歸公孫敖之喪亦書齊人則猶是大畧之辭而非義之所繫其罪之在彼在此或大或小則攷其事可見也齊人執子叔姬陸氏以為叔姬若為舍母春秋例無執本國人者此必魯女嫁齊齊不受而執之呉氏亦以為必舍新立居喪而聘文公之女及其至齊而舍已被弑故商人執之然齊昭卒甫五月葬與未葬雖不可知必無不逾年而即逆婦之理魯人喪娶莫急于宣公事在逾年猶為有罪况在喪稱子齊顧違理而來逆魯竟冒禮而往送哉葢商人之弑舍必不肯居弑君之名不托為合之疾卒必委罪于羣小之人其執單伯以魯誚讓其弑舍而不甘受也其執子叔姬必惡叔姬有責罪之言而因以幽囚拘固之也叔姬之為舍母無可疑者十有五年春季孫行父如晉商人弑舍魯不自討又不請晉以討而使單伯請叔姬已失之于前矣今行父以執單伯執叔姬訴晉晉既不討商人之弑君而又何以為魯而問執魯使執舍母之罪哉葢晉亦必躊蹰于輕重之間難于舍大逆不治而治其小罪也宜乎行父如晉而不得于晉矣三月宋司馬華孫來盟文定毎以春秋書字為褒其賢于華孫來盟義不可通則又以為義不係乎名然則此之不名義不係乎名則彼之書字又何以見其義係乎字哉故當以不稱君命不持國書舊史原不稱名為是也家氏以華耦為公子鮑之黨甚有見葢入春秋魯宋之好始于盟宿雖從王命助鄭㑹伐敗其師于菅猶未甚相惡也宋殤之弑桓公㑹稷成亂取郜鼎立華氏穀丘之盟欲平宋鄭兩㑹于虚于龜而宋皆辭而後怒宋而堅與鄭一敗之于乘丘再敗之於鄑而宋好絶矣桓文創伯㑹盟雖同干戈則不相尋而各不遣一使以通問宋襄㑹諸侯于盂而魯不與薄之盟屈于諸侯公義耳故桓襄成三公之卒皆闕㑹葬而經不書葢至此六七十年矣宋昭之時其國内亂既納司城之奔然後公子遂如宋又四五年而不見報一旦司馬至矣魯人葢喜宋好之將通也又即先公當年所立華氏之孫故華孫請盟而不辭矣又魯之久絶於宋者以齊為昏姻而緩急可恃今新與齊為難而宋為大國既失齊不可以不交宋故不特華欲盟魯而魯亦急欲盟華也夫華氏世濟其惡而魯人于其來猶私盟之自此而交聘通昏史不絶書來聘之使兩見華元一見華定是魯始與宋好而立華氏繼因華氏而復成宋好魯之於宋與華氏相終始而已至於春秋備書其官者司馬之官主國軍政前之司馬既殺今之司馬即弑殤公逆臣之後逾年而杵臼見弑傳稱國人因襄夫人奉公子鮑為亂而經書宋人弑君人者衆辭是華耦亦與夫弑者也魯向以宋弑君而樹華氏之恩今以華耦來盟而宋復有杵臼之難及晉衛陳鄭伐宋以討弑君而魯師不出華耦之盟即定而宋好不可再變故也固知耦之來實為公子鮑以結魯耳人但知㑹稷納鼎以成宋亂詎知華耦來盟而魯再成宋亂哉夫子據當日之事仍史氏之文一以著華氏之禍宋一以著魯之敦信華氏而前後皆失討賊之義也來不稱使以其私來也來為私來則盟為私盟然罪華耦之私來私盟罪魯人之納其私來聽其私盟尤義之小者也夏曹伯來朝齊人歸公孫敖之喪罪臣之喪齊挾而歸之魯畏而受之商人之横逆文公之懦弱俱見矣又當此之時行人則執之君母則執之而急於歸罪臣之喪其横逆何甚哉我之使臣則留而不返我之女則請而不歸而屈以受罪臣之喪其懦弱何甚哉文定乃以此嘉文伯惠叔之哀思無已夫二臣魯之公族也謀國之道誠當如何單伯不歸則國不能有其臣叔姬不歸則君不能有其女出奔之父已死之骨或可緩也單伯不歸叔姬不歸而公孫敖之喪歸先公後私先國後家之義當如是哉即曰原情以體人子之心君許之而子從之可矣而謂春秋嘉其克葢前人之愆縁此以立教示義則非也且春秋書歸喪其文伯惠叔是非之義亦無從而見六月辛丑朔日有食之鼓用牲于社單伯至自齊敖喪歸而後單伯至齊葢遂已歸敖喪之欲而始因以從魯人請使臣之欲也亦齊見行父如晉又新與宋臣盟恐晉連諸侯以伐之故釋單伯以解魯後見晉有事于蔡而不聽魯故復為西鄙之侵也晉郤缺帥師伐蔡戊申入蔡言伐言入又書日者此必晉既入蔡矜其得蔡之速而以至蔡之日入蔡之日詳告諸侯魯史因書于冊也張氏以為罪蔡之不服而後入固是然不若髙氏兼罪晉之暴小國以爭諸侯為更得春秋書日之義也又蔡堅附楚厥貉之次助惡著矣而新城之盟又復不至晉之伐之不為不義但此時商人弑君虐執魯使晉為盟主宜急合諸侯以討之舍大義不為而勞師逺出以伐不附己之蔡春秋書此亦以見晉之兵力非不足而意在不討賊也豈待盟扈而始知其無能為哉又此為大夫帥師入國書名之始亦兼以罪郤缺也秋齊人侵我西鄙髙氏以為貶商人而人之夫以商人之簒弑豈稱人以貶所能盡其辜哉西鄙之侵必非商人親將也季孫行父如晉春行父如晉晉已不興討商人之師西鄙之侵未如執單伯叔姬之辱之甚也而又如晉何哉已不自强而奔走求人又何益矣冬十有一月諸侯盟于扈諸侯不序不成其為盟也何以不成其為盟趙盾為之也夫臣弑君子弑父非一朝一夕之故趙盾無君已久越此五年而弑靈公如申大義以討商人則亦宜悚然于心以自檢㸃其所為矣據左氏則蔡侯與盟葢為入蔡之後蔡既服而合諸侯以盟蔡因遂為魯以謀討齊而實不以討商人弑君為載書之詞也晉既不主討弑君之盟則諸侯亦不受討弑君之盟而載書無詞故事皆欲畧史氏亦因以畧之也使專為魯以討商則西鄙之齊師已去文公何為而不與盟哉是時晉為盟主宋為大國晉靈宋昭皆不久見弑無論志不在討弑君而皆受制于其臣勢亦有所不能固無待于齊之行賂也十有二月齊人來歸子叔姬諸侯為扈之盟而齊人歸子叔姬固知扈之盟但為子叔姬故非為討商人之弑君也子叔姬歸而魯請晉之願畢矣晉為魯之事畢矣趙盾主晉而不討商人盾所以弑靈公也行父仲遂主魯而不請討商人行父仲遂所以弑子赤也齊侯侵我西鄙遂伐曹入其郛齊歸單伯即有西鄙之侵歸子叔姬即又有西鄙之侵者所以示己之無畏于魯也伐曹者怨諸侯之盟扈既不敢加兵於晉宋衛之大國而陳鄭許逺伐曹以示無畏於諸侯也商人之横逆與商臣同宜齊人始與之而卒弑之與髙氏以書齊人為貶而人之然則此書齊侯為無貶耶必商人親將也髙氏于此謂諸侯盟扈不討則諸侯成商人為君故書齊侯以罪諸侯其義亦好則於前書齊人當云不成商人為君矣然則楚商臣弑君之後二年圍江三年滅江四年滅六皆書楚人至八年伐鄭猶書楚人其冬來聘即書楚子亦不見春秋何義而成商臣為君固知春秋以實屬詞非有他義也十有六年春季孫行父㑹齊侯于陽穀齊侯弗及盟齊之虐魯辱魯甚矣文公不能赫然動怒親討弑君始則屈意以請命于晉繼則屈意以求盟于齊齊之視魯固知其無能為也宜其弗及盟歟夏五月公四不視朔若果有疾則雖不視朔不書矣或書有疾不視朔矣諸儒以後竟不視朔者亦不盡然觀春秋書四不視朔則前此視朔後此視朔可知孫氏以為不曰始不視朔或行或廢也却是自是以後文公或行或廢後君或行或廢至定哀而盡廢故聖人有愛禮之言而朱子推原于前以為魯自文公始不視朔也六月戊辰公子遂及齊侯盟于郪丘公作犀丘商人之横逆文公實懼其㑹而遭辱故以病辭且不視朔以信之而不親往也商人于穀不盟行父于郪丘盟遂者視魯無能為而伸縮由已故郪丘在彼而明年師至于穀之口血未乾而明年又戒師期使商人不弑而魯之受伐固未有已時也汲汲求盟何益哉雖公親盟何益哉秋八月辛未夫人姜氏薨毁泉臺楚人秦人巴人滅庸三國滅庸無關於中國之故可以不書而春秋書之者以誌秦楚之合也秦楚合而中國益危矣秦之離中國而合楚則晉之失策也冬十有一月宋人弑其君杵臼公作處臼齊商人以厚施而得國宋鮑亦以厚施而得國春秋歸商人之獄而縱鮑何也商人志在得國而厚施鮑之厚施志原不在得國也不然宋杵臼之無道未至如齊諸兒之甚使謂以無道之故而縱元兇以散罪衆人則無知亦可以逃春秋之誅春秋不縱無知而釋鮑者罪實不在鮑也杵臼即位之始兩書殺大夫而皆稱宋人則知非杵臼所欲殺也國人殺大夫而不忌君是必易杵臼之為君也其後子哀之來奔華孫之來盟必杵臼不足以服宋人而宋人之戴鮑者久也國亂弑君出于衆人之所欲則安得不稱人以散罪衆人哉固知弑君稱人非因其君之無道而寛之也但為一國臣民社稷之主而致為國人所不欲至于弑之則亦可為後世為人君者鑒矣然則公子鮑無罪乎非也陳氏厚施而得國君子惡之鮑為公子能有禮于國人亦必為國人所禮使鮑論國人以君臣之義擇卿大夫之才賢以匡扶宋政昭公猶非無道之甚者宋亂尚可彌也乃國人既惡其君矣君慢而我敬君貪而我惠以先公之子而係國人之望國亂有所由起也則鮑之罪也但初無得國之志而君弑又非出于其手則不當以弑君之罪坐之耳十有七年春晉人衛人陳人鄭人伐宋諸儒以四國稱人為貶然桓二年宋督弑君公㑹齊侯陳侯鄭伯于稷春秋直書成宋亂而不人四國之君何獨貶于此年四國之大夫哉且前之弑與夷實為宋督此之弑杵臼未有主名前討弑君者四國之君此為四國之臣事勢不同而春秋重貶四臣何耶如謂前既書成宋亂則目四國之君以治其罪此不書成宋亂則人四大夫以著之抑又非也外大夫連兵伐國書名自宣六年趙盾孫免侵陳始此時尚未有故雖稱人亦無以著其示貶之義也然而春秋有譏焉弑君大逆也討弑君大事也四國既興有名之師其君不出而委其事于大夫又不見得賊而師散雖不書成宋亂而亂固又成矣此固不在人四國之大夫而可知者也又名大夫者罪大夫之專也此奉君命以討宋弑君猶為扶義以行不當名以罪之其不得賊而師敗則諸侯之罪而非四大夫之罪也夏四月癸亥葬我小君聲姜聲公作聖九月而葬左氏以為齊難故劉氏辨其聲姜薨後乃無齊難髙氏以為文公怠于政事一切皆慢故緩葬聲姜然文雖怠政國卿安在而聽其緩葬悖禮耶葢是時伯主討宋弑君來約出師魯重于變華耦之盟而以齊難辭故緩葬聲姜以示備齊之意猶之怯于盟商人而以病辭故不視朔以示有病之意也是以扈之盟亦有辭而不與也嗚呼畏强隣信私盟而致不有其主不有其母豈非罪哉齊侯伐我西鄙聲姜之葬齊宜使人來㑹而商人親將以伐其喪不仁無禮之甚矣六月癸未公及齊侯盟於穀商人無禮以伐魯喪使魯以在喪之故却之則于穀之盟可以免城下之辱乃魯之君臣前則以病辭而此不以喪辭重視其身而輕視其母堅以偷一日之安而迫以棄先王之禮不亦悖乎諸侯㑹于扈四國討宋不見得賊而散則扈之㑹非為討宋明矣故自此逾年而宋文為棐林之㑹則諸侯之再成宋亂也晉靈不主則諸侯不序猶之前也皆趙盾為之也秋公至自穀凡私盟私㑹皆不至而至盟穀者齊商人方以師加我而脅公出盟為受城下之辱非兩國諸侯之好㑹也且以商人之暴禍不可測則諸儒以為危之者其説通矣冬公子遂如齊既盟矣而復遣拜盟之使然則文公怠於政事而不息於事大國行父仲遂不能輔其君以勤政事而固能輔其君以勤事大國也况其為弑君之商人而且有執吾女執使臣及三至西鄙之怨而顧若是其勤于禮哉十有八年春王二月丁丑公薨于臺下秦伯罃卒秦歸襚來聘而後秦康秦共之卒書則其為通喪來赴何疑舊史紀名而書卒者彼來赴而我往弔也不書葬者我雖往弔而不㑹其葬也夫子仍而書之以著秦之於中國中國之於秦其往來交接之禮與諸侯無異之實也夏五月戊戌齊人弑其君商人成商人為君而書弑所以罪齊人之君之也弑書齊人則以著齊人皆欲弑商人而獨假手于歜職也葢商人初則厚施以結齊人之心及其得國暴戾之性發而莫制觀于經書齊魯事執行人執君母忽伐忽侵忽盟忽背既不解于世好之魯又加兵于無怨之曹則其為政可知矣觀于傳稱掘邴歜之父納閻職之妻則其内行可知矣使申池之禍不發于歜職則齊之起而賊殺之者必更有人也以歜職之賤而齊人不以為戮而縱之去國固知當時之人情無有不欲殺之者也其書齊人宜矣不然春秋何以不書盜殺齊侯商人哉六月癸酉葬我君文公秋公子遂叔孫得臣如齊介副並書文定以為欲起問者見情事是已劉氏以為遂將弑君謀之于齊而後决齊與人之大臣謀弑其君春秋所以異而惡之者非也子赤齊之自出也即不當立猶當懼齊如宋之執祭仲而立鄭突况當立而弑之又盡殺其所自出而謂齊與之同謀未必然矣即據左氏仲見齊侯而請之齊侯新立欲親魯而許之或是請而許立宣公未必請而許殺惡視也向者齊殺魯甥魯人以叔姬請齊并其行人執之魯告于晉諸侯為扈之盟而不克討魯固無如齊何今也魯殺齊甥是以無道為齊報焉豈反謀于齊而行之耶使齊不聽二臣何以善後即自為計亦險矣當是二臣有弑赤之心乗齊弑商人國亂之㑹假賀立拜葬之禮以往先為彌縫使齊不怒而後公然為我之所欲為也其私計以為齊殺我甥我則已矣我殺齊甥齊屈于前事亦難發其殺適立庶之口又賄之以濟田重之以昏姻葢料齊之不得不抑而自已也于是夫人大歸行父如齊而無所忌憚矣嗟乎魯則弑一君而立一君去一夫人而娶一夫人誠不知二三臣何以為心齊則不戚前女之涕面以歸而喜今女之新裝以嫁不惜兩甥之命而利于取濟西之田抑又不知齊人何以為心夫子備書于冊罪魯兼罪齊齊即不同其始謀而亦無可原也此並書得臣者著得臣之與謀也後書行父如齊者著行父之與謀也冬十月子卒公羊以為弑則不日不忍言也穀梁以為子卒不日故也然則子般以弑而日何耶是以有疑子般之卒非弑者文定既不以子般之卒為非弑而於子赤之卒又從公穀不日以遇弑不忍言為解是何議之不定耶夫本之以經文前後所書叅之以左氏則知子般子赤皆由于弑春秋不以書日不書日示義也夫人姜氏歸于齊哀姜與弑齊桓以為戮而猶歸喪致廟出姜無罪魯人殺其子而逐之大歸之後薨葬不見于經則文公之元妃不得以為入廟之配矣有罪而義與廟絶之哀姜魯人喪之無罪而義未與廟絶之出姜魯人逐之莊公之廟可以配哀姜文公之廟不可以配出姜天理絶而人心喪矣夫婦人之出必有出之罪夫人歸而不返而顧加其罪以為于義當出者耶故哀者情可哀也出者禮當出也原情以哀通慶父弑兩君之夫人據禮以出敵先公生適子之夫人魯之國典家法掃地矣季孫行父如齊子卒之前如齊者公子遂叔孫得臣也夫人歸之後如齊者季孫行父也使遂得臣以弑君之情謀之于齊齊與聞其故則行父不必再往即恐齊聽夫人之訴則遂得臣宜執前約以往而不必行父往觀行父之如齊是以知遂得臣未嘗明言弑君于齊而齊不與聞其故矣然則行父獨不懼齊人執之以討弑君耶齊兩弑君惠公新立行父固有所挾而請昏納賂又足以平其怒而塞其口也莒弑其君庶其呉氏疑左𫝊僕因國人之下以字當作之字謂僕因國人之弑君懼并及禍而來奔者非也左氏序季文子之言有云莒僕則其孝敬則弑君父矣是明以為莒僕弑君則因國人以弑紀公之句以字原未有誤也左氏謂紀公多行無禮于國僕因國人以弑其義以稱國以弑與稱國人以弑者皆為君無道之故若是則春秋不當有稱國稱國人之别矣葢莒僕來奔與弑不與弑事在可疑既不可專罪僕又不可分罪衆人不忍以疑罪加人則不得不稱國也又左氏詳錄文子之言文子親與仲遂得臣弑君宣公與聞其故君臣告語之間若深惡痛絶夫弑君之人者文子獨無媿于中耶此必史克之言也葢克見其君臣之間所為若此而又納弑君之莒僕故托為是言以舌誅之也春秋宗朱辨義卷六
