body:
  text: 春秋宗朱辨義卷一髙淳張自超撰隱公元年有天子之元年有諸侯之元年春秋魯史故先書年而以天時王月繫於其下春王正月文定謂魯史本書十一月夫子改作春正月是泥於商革夏命以丑月為嵗首仍謂之十二月而未嘗改月周革殷命以子月為嵗首仍謂之十一月而未嘗改月也夫以嵗首而書十二月十一月固為不順周厯既以十一月為嵗首夫子擅變時王之法大非為下不倍之義尤不可信宜朱子不然其説也朱子以為加春於建子之月則行夏時之義亦在其中又辨劉質夫以為魯史本謂之春秋則似元有此字然無論為夫子所加為元有此字而周之以子丑寅為春無疑也蓋既以子為正月自不應以子月為冬如以為冬則周一嵗之間周以二冬月始以一冬月終商以一冬月始以二冬月終其顛倒四時之序亦甚矣既以子月為嵗首自不應仍謂之十一月如仍謂之十一月則周一嵗之間周以十一月始以十月終商以十二月始以十一月終其錯亂生成之數亦甚矣後儒據詩書所稱而疑春秋不亦誤耶夫春秋者編年紀月之書也今論年月不取信於編年紀月之春秋而反惑於詩書豈足以定先王革命改正之義與惑於書者以伊訓元祀十有二月太甲三祀十有二月謂商以十有二月為嵗首周必以十有一月為嵗首魯史必書元年十有一月而夫子改為春正月則所謂三代正朔不同皆以寅月起數朝覲會同領厯授時則以正朔行事之説也然即以書證之虞書正月上日受終文祖月正元日格于文祖正月朔旦受命神宗月必曰正日必曰元曰上旦必曰朔莫不取義于正始而顧以十有一月十有二月為嵗首以行即位告廟朝覲會同諸大事耶伊訓太甲皆古文尚書出孔安國之手原不足信即以古文之泰誓武成證之泰誓惟十有三年春大會孟津武成惟一月壬辰旁死魄戊午師逾孟津泰誓曰春武成曰一月合之則春一月也其以春為一嵗四時之首何疑則春秋之書春王正月何疑哉召誥洛誥今文古文皆有可信雖紀月日而不紀年召誥始以二月三月而洛誥則始以三月終以十二月則孰謂周非改月哉後之論者不以春秋正伊訓太甲之訛而以伊訓太甲滋春秋之疑未見其允也惑於詩者以豳風之七月流火小雅之六月棲棲正月繁霜十月之交四月維夏及小明之二月初吉謂周本不改月故詩人取用合乎夏正然即以豳詩證之所云一之日二之日三之日者其為子丑寅月信矣豈居豳之時以子丑寅為一二三至於革命改正而反以十有一月十有二月正月為子丑寅以居一嵗之先哉後之論者不以春秋正詩人取義之從時令而以詩詞逆斷聖人之改周正亦未見其允也觀於文王繫卦臨之八月有凶朱子則疑於夏正周正也七月六月諸詩朱子則以為夏正也孟子七八月之間旱十一月徒杠成十二月輿梁成朱子則以為周正也而周禮始和布政則皆於正月而又有正嵗之文又有仲春始蠺上春獻種仲冬斬陽木仲夏斬陰木之異所以不齊者古之三正通乎俗凡立言而從乎時則用夏正凡立言而從乎王則用周正夫子因其不齊所以告顔子為邦而以為行夏之時蓋夏之首寅始春為順乎時周之首子始春為不順乎時故也吳可翁以為商未嘗改月周不特改月而又改時王陽明亦云商書十有二月則商必不改月春秋書春王正月則周必改月余丙仲亦云古者改朔不改月惟周人改月此言直截似乎書與春秋可以兩存其是矣然而春秋者編年紀月之書固當以春秋正書也諸儒又引史記秦及漢初嵗首十月之文然史記於魯衛晉鄭齊楚世家其紀春秋時事年時月日一準乎春秋雖宋以殷之後如書八月庚辰穆公卒春桓公卒及九月楚莊王圍宋之類亦皆春秋之年時月日也至於紀秦漢事始皇二十六年制曰方今水德之始朝賀皆自十月朔則似為改朔之始矣未改以前始皇四年先書三月繼書十月既改以後始皇三十七年先書十月十一月繼書七月九月此固其可徴者也顧考秦本紀昭襄王四十一年先書十月繼書九月四十八年先書十月繼書正月則似未并天下之先已以十月為嵗首也再考其前秦晉韓之戰春秋書十有一月壬戌史記書九月壬戌則人似秦原以夏正紀年者至如書十一月歸晉君夷吾二月重耳立為晉君之類則又與左氏傳合然則史記亦烏可據哉顔師古云秦及漢初月號皆太初正厯之後記事者追改之非當時本稱以十月為嵗首即以十月為正月此言最為允當據此則史記之於秦忽而夏正忽而周正忽而以十月為嵗首忽而不以十月為嵗首皆正厯之後記事者追改之有訛訛而商書所云元祀十有二月三祀十有二月者亦安國因商正建丑而訛訛為之耳故不可不以春秋正之也甘誓曰怠棄三正則三正互用之徴而子丑寅皆可為正無疑左傳梓慎曰火出於夏為三月於商為四月於周為五月則三代建正而商周之改月宜有定論矣後儒之説春秋主周正則強解六月諸詩謂皆周月而於伊訓則引顧命君薨即位之説謂元祀之十二月為太甲即位之月其三祀之十二月為喪滿之月皆為子月以強證商之以丑月為正月則與主夏正者強孟子之十一月十二月七八月為夏月者其為曲説一也至如左氏傳中或周正或夏正主周正則強夏正之文解入周正主夏正則強周正之文解入夏正總由昧於古之三正通乎俗而不知周人立言有或周正夏正之不同也隱公不書即位左氏曰攝也公羊曰將平國而反之桓也穀梁曰將以讓桓也如三傳之説則隱公有讓國之實心矣而又以為春秋成隱公之志則是舊史原書即位而夫子削之以成其美也伊川曰隱公自立故不書即位不與其為君也文定曰內不承國於先君上不稟命於天子諸臣扳已以立而遂立焉爭亂造端篡弒所由以起春秋首絀之以明大法也如二傳之説則隱公有爭國之實迹矣而且以為春秋不正其始則仍是舊史原書即位而夫子削之以示其罪也説雖不合其以為出於夫子削之以立義則一然而不能無疑焉使隱公當日果志存乎讓桓則必不修即位之禮既不修即位之禮則舊史不書而非夫子削之也使隱實修即位之禮舊史必書即位舊史既書即位夫子亦無憑而知其志存乎讓桓削即位以成其美也是左氏公穀之説難據矣使隱公不承國於先君而自立夫子因削即位以著其罪何以不削桓宣以罪其弒君自立何以不削定公以罪其內無所承乎如云桓宣之即位夫子如其意以示其無隱先君之心則定公之書即位亦為示其受權臣之推戴既不痛其兄而又忍于奪其兄之子矣則何不并書隱公之即位以示其受諸大夫之推戴不特未承先君之國而且大違先君之命乎是伊川文定之説難據矣故即位不即位當以修禮不修禮為斷舊史據事之實夫子仍史之文也蓋隱公不修即位之禮志實存乎讓桓伊川責其自立者據有位之實迹而疑其讓桓之虛志也夫隱公讓桓之志即不可知而惠公與桓之事亦未可據何以見隱不當立而即位為自立與文定責其內無所承者亦以惠公命桓不命隱不特不豫其有讓之節而又罪其開篡之端也夫惠既未有成命立桓而隱亦未有陰賊及弟何以見長者不當有國而幼者當有國與則伊川文定之説又不若三傳之説長矣但左氏以為攝夫攝者代其事非有其國也隱既有其國不得為攝矣公羊曰立子以貴不以長然惠公之以仲子為夫人亦未有據謂為應立不可漢人有云母愛者子抱溺愛而亂禮不可不以為惠之邪心也穀梁曰成父之惡蹈道則未然泰伯伯夷之尊父命未可非也責之者又以為泰伯伯夷逃而隱不宜在位然而桓少諸大夫不悅以應有國之長兄始君而終與之從權以濟未有不可也責之者又以為桓少宜攝桓長當讓久居疑地而示賊臣以隙然而十年君國未為久也責之者又以為桓之行暴隱宜知之而早為計然而周公不忍逆料其兄之叛隱公不忍逆料其弟之弒人有以諒聖人亦當有以恕庸人也夫隱公在位十年書於春秋之事可譏者多矣而於君臣兄弟之間亦未為能得其道獨其上承舍長立幼之父而始之甚難下遭欲速行弒之弟而終之以變即不豫其有讓國之美而顧罪其有篡國之惡春秋之用法恐不若是苛也固知隱公之不書即位是隱公不欲修即位之禮舊史不書夫子不益也三月公及邾儀父盟于蔑蔑公榖並作昧盟非先王所禁亦非君子所尚使有聖人當世則天下諸侯不敢有私怨又豈敢有私好而何用盟為哉固知盟為衰世之事也其所謂公私者彼事之有公私而非以同為公離與參為私也高氏以為隱公為桓而立內懼國人之不悅外懼屬國之不從故與邾君首結私盟亦似深文但邾為附庸魯不能以大字小邾不能以小事大至於刑牲歃血要質鬼神不待七年渝盟用兵而已見其非矣又隱公立甫數月斬然在喪他務未遑宴然出國都而盟鄰君尤春秋所譏也及者公羊曰我欲之也榖梁曰內為志也非也史氏之文耳春秋公與諸侯特相盟書及者四受伯主盟書及者三王臣諸侯會侵而盟書及者一桓元年及鄭伯盟越上有會鄭伯於垂之文也文三年及晉侯盟十三年及晉侯盟襄三年及晉侯盟長樗上有公如晉之文也文十七年及齊侯盟榖上有齊侯伐我西鄙之文也定四年及諸侯盟臯鼬上有會召陵侵楚之文也惟隱及邾儀父盟蔑閔及齊侯盟落姑則上無所承史氏於此而獨有異文夫子於此而獨有異義哉又如首止則及而會黃池則會而及鍾離於柤於向則會而會雞澤則叔孫豹及而及史氏因事以為文夫子因文以示義也如諸儒之説則我欲人欲內志外志但取義於書及書會而不合者多矣且有汲汲之盟亦當有汲汲之會春秋有及盟而無及會無及會而有及遇三遇皆書及者蓋兩相及之詞豈三書及遇皆我欲之而內為志耶春秋惟公及外大夫盟書及然如及荀庚孫良夫郤犫孫林父向戌則皆因來聘而及之盟其及高徯及處父則皆削其來聘之文惟及莒人盟浮來則與及邾儀父盟蔑之上無所承同及齊大夫盟蔇則與及齊侯盟落姑之上無所承同然則史氏必不以此數事而特起書及之例夫子亦不以此數事而特起書及之義可知矣又諸儒謂盟以日成者蔑之盟渝故不日然如桓之盟儀父於趡亦渝何以日耶或以為喪盟故不日然如桓之盟鄭伯於越亦在喪何以日耶春秋紀公之盟於齊桓則私盟者三一日一不日一不月公盟者七一日六不日於他諸侯則盟而不日者六或以為齊桓之盟以不日為信日者譏不月者譏他諸侯之盟以日為信不日者譏不月者譏然則葵丘何以譏又何以於柯於扈譏而落姑無譏耶又何以魯桓之離盟參盟不一譏而晉世伯之於扈於蒲祝柯臯鼬譏耶或以為盟而日者謹之也然何以於齊桓之盟獨謹葵丘於晉世伯之盟獨不謹於扈於蒲祝柯臯鼬耶當是載書之詞桓以示信義不矢日以嚴諸侯其他亦矢日則日不矢日則不日故日不日有異耳夏五月鄭伯克段于鄢克者勝敵之辭祗一克字而鄭莊之用徒衆以加其弟鄭段之用徒衆以抗其兄皆可見矣鄭莊之致段有徒衆鄭段之致莊用徒衆皆可見矣并段之未殺而奔亦不必書矣左氏一篇文字都從克字生出秋七月天王使宰咺來歸惠公仲子之賵仲子卒葬無考左氏以為豫凶事者以明年十二月書夫人子氏薨為仲子故曰豫也公羊以為不及事者疑卒葬於未入春秋之前故曰不及也夫生存來賵固為必無之事若卒葬逾年則賵亦無所用之然觀僖公成風卒葬逾五年而秦人歸襚則不及事者容或然也禮之變也既可以不及事則亦可以豫事故亦無憑而斷左氏之非也抑又安知不卒葬於是年而經不書耶總之春秋之義不係乎此也以天王而下賵諸侯之妾儼然以仲子而配惠公所以示貶也伊川以為不天亂倫是已而又以為王不去天為春秋始見天王之義而不知含賵成風而王不稱天者以前後薨葬有夫人小君之稱故不稱天以見其不可夫人小君也此未見薨葬未見有夫人小君之稱故不去天獨為嚴重之辭以著其瀆亂之實也其書天王書宰又書名者天王既使宰宰既稱名魯史書之夫子亦直書以著其非蓋天王不當賵而賵賵不當使宰而使宰宰不當稱名而稱名當時瀆亂本自如此夫子因如此書以示其瀆亂如謂是夫子名宰以治其罪向使舊史原不書名夫子何從得宰之名而書之耶又春秋紀事之書雖或間文必有關於前後之事其書此者使後人考於惠公之寵仲子桓公為仲子所出而隱之所以攝位而志存乎讓桓也其天王來賵之非禮宰喧稱名之非禮魯不辭而受公然書於國史之非禮則因事以著而已而豈専為天王致貶哉九月及宋人盟于宿陸氏劉氏吕氏皆以為公及之諱與宋大夫盟故沒公不書然及戎盟唐及莒人盟浮來不諱而此諱殊無義理公穀伊川文定皆以為微者夫使春秋之初陪臣已専盟則不待至湨梁而始遍刺天下之大夫矣此蓋魯宋之相合不可不志其端當是內大夫及宋大夫內大夫不名者義不係乎名內大夫宋大夫不名者春秋之初會盟侵伐尚不名大夫也義疑於及髙徯盟及處父盟之不稱公以示貶然盟髙徯則出我之國都盟處父則在我之國都此盟於宿可以知其非來聘而及之盟也如為公及而沒公不書則又當與莊之及高徯文之及處父同為在喪而専盟大夫沒公不書以示貶而非諱矣又春秋及外大夫専盟多不稱公觀於及莒人盟浮來稱公則亦不可以一例論也冬十有二月祭伯來穀梁伊川文定皆以為祭伯來朝不書朝者不與其朝也夫使祭伯之來果行朝禮則宜直書來朝以明其罪不應沒其朝使罪反不明矣若以畿內諸侯為王卿士而降體朝魯為不可訓則不書朝為天王諱而非不與其朝以明其罪矣當是交好不行朝禮故書以罪其外交耳或别有事故如桓八年之書祭公來為逆王后於紀也公子益師卒內大夫之書卒與外侯同當是其君加禮之故也加禮則國史書之不加禮則國史不書夫子作春秋一仍之而義見矣伊川曰書之以見君臣之義孫氏曰或君臨之或賻贈之遇臣有禮則卒之也然考隱之世卒四大夫桓莊五十年間桓之公子翬及柔莊之公子結及溺皆用事見經而皆不卒莊不卒大夫而卒公子牙僖文以後八公之世書卒者三家及臧氏辰許之外仲遂用事卒以公子而氏仲叔肹不用事亦卒以公弟而氏叔則踵益師與彄之故而他無聞矣可見大夫之卒而書于史與外侯同者由於是卿之強原非禮之當然夫子仍舊史以著史變也蓋益師與彄皆孝公之子惠公之弟當惠公之薨使引國故而足終弟及則益師與彄皆君矣惟惠欲立桓諸大夫不悅而扳隱以立益師與彄皆不爭故隱德之而寵為公子曲加恩禮既以公子卒之故皆得有後於魯則魯之以公子而世卿自隱公始觀於無駭為公子展之孫而書帥師書卒皆不氏則在孝惠之世無駭之祖父猶未稱公子公孫可知矣隱之世四卒大夫而兩稱公子則謂隱不爵大夫者不必然也其不書日公羊以為逺而失其日者其義是矣二年春公會戎于潛春會戎至秋則與之盟矣會必有禮盟必有事舍中國而親戎自潰其防而蹈不義春秋書外會外盟自魯於戎始何至受楚盟往會吳而始惡內諸侯哉穀梁曰會者外為主也然通春秋公會私會無有不書會者豈皆外為主耶會有實義有虛文如書會於某則有相會之禮而會字之義為實故會於袲伐鄭會召陵侵楚會葵丘而盟葵丘之類會字皆實義也至如會伐會侵則不必先行會禮而會字之文為虛即會救鄭而盟馬陵會伐鄭而盟柯陵盟戲盟亳城北會圍齊而盟祝柯皆有事之後再盟諸侯其會字亦虛文也若襄十一年之書會伐鄭書會蕭魚則上會字虛文下會字實義矣史氏之文不同如此耳又諸儒以會為成於月者其不月皆譏然離會參會可以月成至伯主之合諸侯雖要約有期或先後而至豈可必成於月哉諸儒於春秋之始見隱之四會而三不月桓十四會而無有不月遂以月成為例而以不月為譏至桓文之會不月則又遷其詞以桓文之會皆不月而月者為譏矣考於春秋桓之十四會皆月者離會參會耳自齊桓創伯而諸侯公會不月者多而月者少矣諸儒每以桓文之會不月而其實桓五會而於柳於淮皆月文一會不月則無可比以觀也至晉世伯而合諸侯終春秋之世宣七年黑壤成十二年瑣澤十六年沙隨襄五年於戚十年於柤十一年蕭魚二十二年沙隨二十六年澶淵昭十三年平丘哀十三年黃池則皆不月其襄七年於鄬為鄭伯卒月十六年湨梁為大夫盟月二十一年商任二十四年夷儀皆承日食月二十五年夷儀承弒君月此五會之蒙月不蒙月即不可知而亦可見公會之不月為常矣烏得以不月為譏哉惟趙氏則以為凡公與盟主之會皆不月而人以為必無成事而後月蓋謂於柳於淮於鄬及兩夷儀也然如沙隨之不見公平丘之公不與盟皆不紀月以别異之而又何論乎盟主之成事不成事哉崔氏既以君會例月大夫會例時故於大夫兩會吳之鍾離於向皆月為譏然則善道會吳何以不月耶趙氏以為鍾離於向之會以會又會而月然如公會諸侯會吳於柤亦為以會又會何以不月耶外諸侯自參以上魯君大夫不與者豈無一可譏之事曽不見有紀月以别異之者何耶日月之例崔氏之説不逮趙氏而皆不可以通如此蓋由於不知會有要約至有先後促則月緩則不月耳離會參會月者人少而合之易也其或慢於事而愆其期則亦不得而月成矣盟主會諸侯不月者人衆而合之難也其或期之迫而應之勤則亦可得而月成矣至於有譏無譏則係乎其事必以日月為説未有不失之者也夏五月莒人入向文定以為莒稱人小國也春秋小國卿大夫皆略稱人然春秋之初雖大國之卿大夫亦略稱人文定多以為貶或以為微者非也陳氏謂凡入國入邑君將書君自楚莊入陳始大夫將書大夫自郤缺入蔡始考辨最當蓋後半春秋政在大夫故名其人以著之其初雖有會盟侵伐之事義不係乎名之則從略書人也無駭帥師入極駭公作賅無駭名而不氏以為未賜族者是也稱帥師者以著軍政在無駭也春秋之初天下之政尚不在大夫外大夫書帥師始於晉陽處父距此尚有百年而魯大夫之専師入國早見於經則隱公之失馭也自此公子翬公子慶父疊書帥師而禍亂相尋隱公及身不免矣僖公之世三家比書帥師而魯為三家之魯矣此夫子書內大夫帥師之義也以諸侯而擅相侵伐入人之國書莒人入向即書無駭入極比事以觀魯人之罪莒人之罪一而已矣秋八月庚辰公及戎盟于唐春會戎至秋而與之盟七年戎伐天子之使戎敢無禮於王使而魯乃結其好也又盟而矢日以嚴其詞而信其守亦大非中國馭戎之道矣九月紀履緰來逆女履緰左作裂繻魯女嫁諸侯見於經者紀把鄫郯宋而已而皆未有親迎者紀書逆女宋書納幣履緰不稱君使公羊以為昏禮不稱主人存廉恥之節也家氏遂以公孫夀納幣稱君使為譏其非禮然則冕而親迎為不存廉恥之節耶納幣可以使人逆女不可以使人故彼書宋公使此不書紀侯使特以譏其不親迎耳冬十月伯姬歸于紀文定以為不親迎而使大夫春秋書之以志變常固為正義然魯他女之嫁者果皆親近合禮而不書耶陳氏以為吾女遭人倫之變者是已而不盡然也蓋以志魯女之歸紀紀以婚姻之故求庇於魯終桓公之世大為紀謀而紀卒亡以致伯姬之卒而葬於齊侯也其不親迎之非禮伯姬之不得其所則因事以見而已紀子伯莒子盟于密伯左作帛其為闕文信矣或是魯史誤夫子因之而不能益或是先儒傳授承誤而不能增俱未可知然觀三傳小異則為魯史誤而夫子因之也夫子筆削春秋舊文有誤削之可也因誤闕疑以傳於後者何也以紀故也紀受逼於齊既昏魯而又盟鄰國皆為自托之計而齊卒亡之魯卒不能庇之鄰國卒不能救之苟削而不書不足以著紀之始末亦不足以著齊之暴魯之弱莒之不可恃而鄰國之不能以相保也十有二月乙卯夫人子氏薨左氏以為桓公之母公羊以為隱公之母惟榖梁以為隱公之妻伊川從穀梁而文定因之是已以隱公志存乎讓桓而信之也隱志存乎讓桓使子氏為桓之母則既以夫人薨之亦當以小君葬之隱志存乎讓桓使子氏為隱之母則既不以小君葬之亦不當以夫人薨之薨以夫人而不葬以小君者劉氏以為隱欲不終為君故不以小君之禮葬之也隱既欲讓桓而妻稱夫人者隱稱公矣妻宜稱夫人臣子之詞也伊川用榖梁之説以為婦人從夫公在故不書葬則葬不備禮待君薨而合祔之義也於義亦通鄭人伐衛伊川以為衛服故不戰汪氏以為凡伐而不言戰皆受伐之國自服而不待戰不盡然也伐而不言戰有服者有不服而嬰城固守聽其自去者有既去而以師追之者亦有戰而勝負微經不書者不可以一例論也陳氏以為大夫伐而書名自晉陽處父始通乎此則可以知春秋之初書人之義矣三年春王二月己巳日有食之春秋日食三十六伊川曰日食有定數聖人必書者欲人君因此而恐懼修省也文定曰行有常度災而有異而春秋每日食必書者示後世遇災而懼之意也是則日食不為天變而無關於人事矣顧文定又云或妾婦乘夫或臣子背其君父或政權下移或荒服侵中國皆陽微隂盛之證朱子解十月之詩則云王者修德行政用賢去姦能使陽盛足以勝陰陰衰不足以侵陽則雖或當食而月常避日若國無政則當食必食雖曰有常度而實為非常之變是則人事感於下而後天變應於上矣十月之詩曰孔醜曰告凶曰不臧則亦以為人事之咎徴也文定既謂災而非異與伊川同又謂陽微陰盛之證其説不定故當以朱子之説為長竊意日月嵗十二交會厯家每以百七十有三日一交會交會而不食必其出入黃道之間有交會而不食之常度有交會而不食之常數不食多而食少則交會而不食者其常交會而食者其變也詩曰日月告凶不用其行是必失其避日之常道而後食耳不然以嵗之十二交會厯莫之百七十有三日一交會行之常度既不得有變則食之定數亦不當甚差何以有久而不食頻年頻月而食之異耶考於春秋僖之世凡十八年不食文宣之間定哀之間亦各十五六年不食而莊成襄昭之世頻年頻月而食頻年之食自襄十四年以前一百五十餘年只莊之二十五年二十六年成之十六年十七年兩見自襄二十四年以後幾七十年只昭之二十一年二十二年一見何以襄之十四年十五年二十年二十一年二十三年二十四年近在十年之間凡三見耶頻月之食何以襄之二十一年九月十月二十四年七月八月既三見頻年而又兩見頻月耶其為變而非常可知矣先儒以為行有常度食有常數不以為人事所感者彼見盛治之世亦多有之而衰亂之朝乃無頻年頻月之異故耳然而盛衰治亂幾微隱伏或感於前而示象於後或應於後而示象於前或人事微而天變著或人事雜而天變一占驗之家附會事應則不可據而苟直以為非災非異則如辰弗集房何至遂以為羲和之討哉又春秋之紀日食或日或不日或朔或不朔或朔日並書或朔日並不書公羊曰不言朔者或失之前或失之後也穀梁曰朔日並言者食正朔也言日不言朔者食在晦也言朔不言日者食既朔也不言日不言朔者夜食也蓋用朔之法古今不同一大月一小月則有食在正朔在晦在既朔之占所謂平朔者也四大月三小月則食必在朔所謂定朔者也厯家以為古用平朔故春秋日食有朔前朔後之異但通春秋考之襄十五年以前日食十有九朔日並言者九日而不朔者七朔而不日者一朔日並不言者二而自襄二十年以後日食十有七無有不日不朔似前用平朔法後用定朔法者此或如虞書之命羲和分方與時占日星驗民物蔡氏以為古厯簡易隨時占候修改以與天合則其用朔之法當亦隨時變易時而一大月一小月時而四大月三小月不似漢以後之専用平朔唐以後之専用定朔也杜氏於此年日食二月己巳謂以長厯推之實食在朔考於本年三月有庚戌食必不在晦矣前年十二月有乙卯必間有閏月而後食在朔也但經既不言朔則當在既朔而長厯推其在朔烏可信耶此後之言日不言朔經文前後有日可推者如文元年日食二月癸亥前年十二月有乙巳自乙巳至癸亥七十有九日本年四月有丁巳自癸亥至丁巳五十有五日則二月之癸亥當在晦也宣八年日食七月甲子本年六月有辛巳壬午戊子則七月之甲子亦當在晦也十年日食四月丙辰本月有己巳十七年日食六月癸卯本月有己未經既並不言朔則皆當在既朔矣襄十五年日食八月丁巳本年十一月有癸亥則八月之丁巳又在晦也杜氏槩以不言朔為官失之固不可據榖梁又槩以不言朔為食在晦而偏於言朔不言日者謂在既朔又豈定説哉經既明言朔則不當在既朔其不言日則或史氏之闕文耳先儒多有以或不日或不朔為史氏闕文者然失其日而闕不書日則當有之若古用定朔法而食必在朔則每日食可不待考而紀朔史氏何疑而闕不言朔耶觀於書曰季秋月朔詩曰朔日辛卯言而稱朔則必有不在朔之食可知矣而況春秋明有書朔不書朔之文耶其或經文傳寫有脫朔字之條厯家推其在朔因并疑凡不言朔者皆史氏之闕則宜乎先儒譏長厯之附會矣三月庚戌天王崩文定論春秋十二王或志崩志葬或志崩不志葬或崩葬皆不志以為赴告有及有不及魯有往會有不往會之故其説詳矣即此而赴告不及之或有故或無故可知也魯不往會之有罪君不親往而使卿或微者之有罪可知也春秋有示貶於書事之外者此類是也又天王崩則新王即位而諸侯不朝亦書事之外之不見貶而貶者也十二王志崩志葬者五桓襄匡簡景志崩不志葬者四平惠定靈崩葬皆不志者三莊十二年莊王十七年僖王文十四年頃王崩而不葬以不往會而不志後儒皆無異説惟不志崩以為王室不赴者猶不免有疑焉趙氏歷引經傳以為莊僖頃之崩必無不赴告諸侯之理其崩葬皆不志者聖人削之也所以削而不書者莊僖之時齊桓假尊王以示名義而不能身率諸侯享覲於王庭史書崩葬無異文不足以見天下無王之實頃王之時晉伯中衰王室以無伯而愈卑區區弔葬之禮僅存君子以為猶不弔葬也故皆削之也然而非也當王室易代之際吉凶大禮非若以時朝聘之常事已也一再不朝尚有貶爵削地之罰而況一崩一立兩君大故哉東遷以來平為崩葬之始王桓為繼世嗣立之始王書於春秋者隱無修禮王室之文則送死事生兩大禮自隱始廢矣王室之卑平賵惠公之妾是自辱也桓兩聘隱三聘桓是自屈也隱不賻喪而致來求桓不歸職貢而致來求則隱桓之卑王室也然周日衰微政教號令不行於天下又能遽絶魯哉莊王既立猶加禮於魯而追錫桓公之命於是莊公會葬桓王亦僅使微者一往而已桓王伐鄭蔡衛陳以師從而魯人不出猶可原焉至莊王易置衛君魯會齊宋陳蔡實抗子突之救以納王之所廢逐王之所立王靈之不振莫此為甚而能無深惡夫魯哉故自此而王臣之聘不行於魯則莊僖之不以喪來赴有由然矣齊桓創伯以尊周為名僖雖魯之賢侯亦怨王室之不禮而不葬惠王蓋其交惡之實瞭然可見者逮襄王感僖公輔齊桓椎戴之勤既會葬其身又錫命其子加禮其母而後文公一使卿會葬以報之未葬之前毛伯求金既葬之後及蘇子盟女栗不見一聘京師也則頃王之不來赴又豈無故哉自宣公後崩者五王莫不來告而定靈亦不葬矣魯之弱東周而卑天王若此聖人蓋傷之也於是因乎舊史崩而書崩葬而書葬有其事則書無其事則不書而魯之罪不可掩也夫有諸侯不會葬之理而顧謂無王室不赴告之理乎文定之説無以易矣夏四月辛卯尹氏卒尹左作君王朝之世卿也公羊以為譏世卿諸儒皆用其説亦自有義然尹氏吉甫之後又如家父召伯之類皆見於詩其來已久而王臣之世卿亦多夫子何為獨紀尹氏之卒於隱公之世以示譏哉春秋卒三王臣尹氏王子虎劉卷虎與卷皆與諸侯之盟會因有交而來赴也尹氏未見有盟會之事而卒亦書於史夫子仍而不削者劉氏以為王臣無外交之禮春秋書以譏之也且天王崩尹氏卒相比以書而同一不往會葬隱之視天王等於尹氏其惡可掩哉但王子虎劉卷皆名而尹氏不名名者來赴也不名者不來赴也蓋諸侯之卒赴告以名既以名赴則史亦名之不赴則不名而王臣書氏諸侯舉爵也不赴而亦書於史者既與之有交即不會葬而亦當有弔問之禮故尹氏之不名非如此書尹氏毛伯召伯之無取乎名矣而與滕侯宿男薛伯杞子同不名者皆以邦交之故而紀其卒也觀於滕薛杞之前不名而後名秦之有名有不名名而不會葬不名而會葬可知矣若以為王朝之卿不名則紀其生與紀其死何别又與滕侯宿男薛伯把子之不名秦伯之或名或不名何别哉其義不可以通矣秋武氏子來求賻魯不賻而致來求魯之罪也魯雖不賻亦不當來求而來求者周之失也諸儒之説皆是不稱使者文定用公羊當喪未君非王命之説為是稱武氏子者家氏汪氏之説皆是魯既不會葬而又不賻春秋罪魯之義有加也八月庚辰宋公和卒有生必有死人與物之常稱也人嫌惡其死之聲而不言死言卒生死始終之義無貴賤賢愚一也自臣民尊其君上不敢同凡庶尋常之稱於是天子曰崩諸侯曰薨穀梁曰髙曰崩厚曰崩伊川曰崩者上墜之聲薨者下墜之聲以字義而諧聲會意則崩薨云者蓋有震驚危栗之義也天子為天下君則天下臣民震驚而危栗之諸侯為一國君則一國臣民震驚而危栗之崩之義重於薨則以别天子諸侯也至於他國諸侯則他國臣民震驚危栗之故他國之史各志其君之卒必曰薨也以我國臣民視之尋常焉而已故亦從同而書其卒也如槩書薨亦無以别乎我國臣民震驚危栗我君之義矣文定以為諸侯放恣専享其國因其告喪直書曰卒不與其為諸侯者春秋無此義也卒而或日或不日文定曰謹則書日慢則書時劉氏曰君薨赴以日月禮之常也臣子少慢則赴不以日月大慢則不赴也汪氏曰赴以日史書之則經弗削以見臣子之謹終不赴以日史不書者經亦無憑而書以見臣子之慢先君而忽其死生之大變也然合春秋考之大國不日者什之一而曹滕許薛杞邾諸小國則日不日相半大國之臣子謹小國之臣子慢耶又如楚卒六君皆日吳卒四君皆不日楚謹而吳慢耶又如曹惟終生夀二君卒以日其餘九君皆不日曹之臣子習於慢以為常耶趙氏以為弔贈之禮厚則日薄則不日然有日卒而不葬不日卒而葬者矣厚其弔贈而不會其葬薄其弔贈而又會其葬何耶皆不可以通也而槩以為失其日者亦不盡然也此蓋或有故而不以日赴或抑於禮而不以日赴或不赴而史不知其日或雖赴而史不詳其日故有日不日之異耳而顧可著之為例以求定義哉冬十有二月齊侯鄭伯盟于石門此以著齊鄭之合陳氏以為齊鄭合而天下始多故者得之伊川曰外諸侯之盟來告則書可知舊史於諸侯會盟來告無不書者夫子作春秋視其有關於天下之故及前後之事則書之否則削之也癸未葬宋穆公外葬諸侯或日或不日汪氏辨公羊之説最是而謂備禮則日不備禮則不日者亦不盡然也如使卿會葬晉襄晉平晉昭齊惠齊景宋平豈有不備之禮而皆不日耶考於春秋魯之於晉齊宋則葬而不日者少於衛鄭陳蔡則蔡桓衛穆衛襄之外皆不日於諸小國則不惟不日其以月紀者亦三之一而已崔氏泥於左氏宋文厚葬之説謂大國諸侯之葬例月其日者因其僭禮而加日以譏之小國諸侯之葬例時其月者因其僣禮而加月以譏之然如卿會晉齊宋六君之葬皆不僭禮故不加日耶叔弓會滕成之葬滕獨僭禮而加月耶非也以葬之日告則書日不以葬之日告則不書日耳蓋諸侯卒則無不告惟小國或不告葬則有不告惟大國則皆告葬而求告者以致我之往會也小國不敵不敢致我之往會故不來告也來告則有日故得而書日其大國之不日者不待其來告而遣會葬之使故雖使卿往而亦不日也惟不來告而遣會葬之使故於大國則勤而及其葬之月於小國則多不及其葬之月而以時計也此即觀於使卿之會葬七君於晉襄晉平齊惠宋平則書如書葬皆在一月於晉昭齊景滕成則書如在前月書葬在後月則不待告葬期而先往可知而小國之不來告魯會葬之或先或後以往可知此其所以大國有日不日而書月為多小國有月不月而書時為多也至於文定不葬例所云諱其辱討其賊治其罪避其號而不葬者亦皆非也觀春秋書法不曰某國葬某公而曰葬某國某公原以著我之往會其葬故往會則書不往會則不書但其間有當往會而不往會有不當往會而往會則可因事以見義蓋當往會而不往會者以私怨而廢禮也不當往會而往會者以私好而害義也四年春王二月莒人伐杞取牟婁入國取邑皆春秋所惡春秋之初書入始於莒人之入向書取始於莒人之取牟婁蓋莒雖小而悍所以終春秋之世與魯為敵也陳氏曰春秋之初猶以取邑為重故外取邑自隱以前則書之桓十四年宋以諸侯伐鄭取牛首而後皆不書或以為不勝書也夫取邑而書者所以著取者之罪如因其相習為常以多而貸之恐非春秋之義也當是來告則書取邑而來告者或有望於鄰國之平其曲直而還之也牟婁近魯杞失邑來告事勢必然桓以後爭奪日甚告亦無援故不相告或與魯無關而魯史不書夫子亦無憑而書也戊申衛州吁弒其君完伊川以為春秋之初弒君而不稱公子公孫者身為大惡自絶於先君不復得為先君子孫也大義既明於初其後弒立則皆以屬稱立義各不同也文定以為削其屬籍特以國氏罪其君不待以公子公孫之道使主兵權而當國也非也春秋之初先公之子公子之子猶未公然稱公子公孫以用事於國交政於諸侯也內稱公子自翬始外稱公子自公子歸生始故春秋前不稱公子不稱氏後則相因而稱於書弒君亦然也又終春秋之世衛殺公子瑕稱公子其他如叔儀叔申叔戊兄縶弟鱄弟黑背之類多不稱公子或是衛不以公子為制則州吁在國未嘗為公子以用事交政衛不稱公子來告舊史亦不得以公子書矣又如衛之事衛之人自當繫衛如謂削其屬籍而以國氏則齊公子商人鄭公子歸生楚公子比既不削其屬籍稱公子而又以國氏耶夏公及宋公遇于清公羊云遇者不期也一君出而一君要之也伊川云諸侯相見而不行朝會之禮如道路之相遇也二説合之其義始備張氏云春秋因事而書以譏其非王命而出境無國君之禮也亦是又遇與會有大小輕重之不同或有會而不書遇而書者有關於前後之故則雖遇亦書清之遇以著是時魯尚與宋好也宋公陳侯蔡人衛人伐鄭宋以公子馮之故伐鄭又黨弒君之州吁而與之會伐以定其位其事可貶陳助宋殤而親州吁其事亦可貶如諸儒之説則皆宜貶而人之矣何以兩君皆得舉爵耶乃文定以為衛伐鄭稱人責詞也指國人聽州吁號令從公孫文仲而南行者也然則使春秋不責衛人其將稱公孫文仲耶春秋之初大夫將固不書名也汪氏以為書衛人於蔡人之下所以譏文仲黨惡而忘不共戴天之仇然州吁有寵而好兵必有州吁之私邑有州吁之私人如石厚之類皆是伐鄭書衛人必州吁之私人其為黨惡何疑不必問其是文仲非文仲亦不待序蔡人下而後知其黨惡也蓋伐鄭之衛人州吁之私也殺州吁之衛人一國之公也是非各不相掩如謂人衛大夫不名以示貶則人蔡大夫不名又何義耶且文仲之名不見於經夫子書衛人亦無從使後人知其為貶文仲也秋翬帥師會宋公陳侯蔡人衛人伐鄭前則宋陳蔡衛伐鄭四國皆有伐鄭之罪折之則宋陳蔡有不討衛而會伐之罪宋有疾公子馮之罪衛有篡國虐民修怨之罪此則魯有伐鄭搆怨之罪有不討衛而助宋之罪翬有専將之罪所謂一事而諸惡具見也翬不稱公子是爾時原未稱公子非因弒隱而削亦非因帥師而削也未弒而預削示貶固無是理若以惡大夫之専將則無駭之帥師入極不書氏亦為削之以示貶矣然觀無駭之卒不氏則原未有氏而非春秋削之何以獨削翬之公子耶翬至桓之時稱公子者桓得其助已弒君而寵之以公子之命也觀翬之前不稱公子後稱公子則知命為公子與命氏同其未命為公子未命有氏者雖為大夫不敢有稱史家亦不得而稱之也書帥師者著此時之軍政無駭之外翬亦得而専之也九月衛人殺州吁于濮州吁弒君得國閲八月而桓公未葬又外托於宋求會伐國以自固又問定君於石碏是州吁之君衛未定而衛人不與之者猶衆也衆人皆不與則皆有討賊之心左氏雖載石碏告陳之言必衆人有同謀而非石碏一人所能為故不書石碏書衛人是當日情事本自如此非故舍名碏而變文稱人以為討賊之詞也齊人殺無知於國則不地衛人殺州吁於陳則地以著衛人討賊之難有必討之心而不妨於緩也不曰於陳而曰於濮者陳常會州吁伐鄭不得與有討弒君之義也冬十有二月衛人立晉遇弒而討賊立君以葬先公春秋一經僅見衛事故通春秋外君繼故與非繼故而立者皆不書獨有繼弒君而書衛人立晉者當是聖人以衛事示後人遇有弒君之變者當如衛之討賊立君以葬先公而於晉之立與衛人之立晉未有深責也宋殤弒而馮立宋閔弒而御説立晉靈弒而黑臀立晉厲弒而周立春秋不書立者賊未討也討賊立君惟衛與齊而小白書入不書立者小白有爭國殺糾之罪也然則於衛人何責乎於晉何責乎公穀皆言立者不宜立也而不言所以不宜立之故榖梁則以為立君以正不以賢夫衛桓在位十六年世適之有無存亡不可考又何憑而斷晉之不正耶伊川以為不請命於天子不受命於先君據此則外君繼故之書立不書立與內君繼故之書即位不書即位同義矣文定以為於衛人特書曰立所以著擅置其君之罪於晉絶其公子所以明専有其國之非其義亦猶是也然則晉之書立與桓宣之書即位同乎與莊閔僖之不書即位同乎如謂與桓宣之書即位同則諸儒以桓宣為與聞乎故而晉未有聞也如謂與莊閔僖之不書即位同則諸儒以莊閔僖為有隱先君之心而晉亦宜有也不與聞故無罪有隱先君之心亦無罪然則以何罪罪晉哉以何罪罪衛人哉諸儒曲為之説曰宋馮宋御説晉黑臀晉周之不書立彼有賊不討君不葬之罪故其擅立不足以責齊小白有爭入殺糾之罪故其擅立亦不足以責惟晉無諸人之罪故罪其未受命於先君而又不請命於天子也若是則受命請命之義獨於衛人立晉發之而責其不然矣夫夫子之作春秋用法平而宅心恕恐不若此其苛也故知春秋書衛人者著衛人之公非若尹氏之私也書衛人立晉者著晉為衛人所立非若朝為尹氏所立也不書公子者晉在國時原未受公子之命行公子之事也家氏又以為衛晉得國而驕晚為獸行春秋於其始立而去公子以見衛亂之所從起然則齊桓得國而九合諸侯一匡天下春秋何以不於其入齊之時書公子小白以見齊伯之所由興乎未見為不善而先貶未見有善而先褒於義無之五年春公觀魚于棠觀左作矢於棠固以譏遠然觀僖伯之諫則雖不遠而觀魚亦非禮也夏四月葬衛桓公小白入齊即葬襄公齊人急定小白之為君以外拒子糾也衛晉既立逾年閲八月始葬桓公治州吁之黨內亂既平而葬之緩也此固事勢之不同而弒君討賊以葬先君則雖緩無譏矣秋衛師入郕郕公作盛忘喪興戎輕用大衆以入兄弟之國其罪大矣公羊以為將卑師衆曰師將尊師衆曰某帥師然則春秋前半外諸侯多書師不書帥師者皆非卿大夫將乎不合凡用大衆而悉卑其將也不可以通矣不以著大夫之強而不必名其人耳故凡書師者譏其用大衆而義不繫乎將之尊卑也九月考仲子之宫劉氏曰但曰仲子非夫人明矣其説甚是可見惠公當日未嘗以仲子為夫人也因有手文之異惠公或有其志故隱公欲成先公之志而將讓桓耳觀其為仲子立宫是自表其欲讓之心而不知其非禮也夫子仍舊史書之既以著其非禮而亦以表其欲讓之心也家氏謂必庶子為君而後為其母築宫桓未為君而隱為之築宫以祭其母此為召亂之道所論亦好初獻六羽初者前此不然而今始然之詞也甫考仲子之宫而議羽數未有前此也而曰初者則似羣廟知前此用八之非而今獻六此後祗用六也豈其然哉當合兩句作一句讀下曰考仲子之宫初獻六羽蓋於仲子之宫獻六羽為獻六羽之初非羣廟獻六羽之初也猶云前此羣廟不獻六羽今此仲宫初獻六羽後此仲宫仍獻六羽而羣廟不獻六羽也書仲宫初獻六羽者以譏羣廟之僭八也春秋有書事在此而實示貶在彼者如此之類是也邾人鄭人伐宋著宋鄭構兵有來有往其事之本末始詳此則以邾故而助邾以報宋也既以著宋鄭之故亦以著魯初與宋而後與鄭之故也茅堂胡氏以為將卑師少亦書以見曲直按春秋之初用兵侵伐非君將者多稱人不盡將卑師少也螟水旱螽螟皆盡志災也既以著其有備無備而苟有興作侵伐之事則又以譏其君臣之不畏災而恤民也冬十有二月辛巳公子彄卒益師彄之卒稱公子或是生而寵之為公子或是生未稱公子卒而始稱之如諸侯之葬稱公也諸侯之爵非公及未入為王卿士者其葬稱公皆僭魯君之生稱公為臣子之詞則凡侯伯子男皆不得稱公其子其孫又烏得稱公子公孫乎春秋之初列國尚未有稱者故益師彄之稱公子或是卒而稱之非若公子翬之及身而寵之為公子也左氏於凡諸侯之子皆稱公子恐亦如稱其君之為公為國人虛加之詞而未可以稱於會盟侵伐之地者也其後世卿執政皆有氏族不専稱名因是而其子之用事者亦不専稱名而加以公子之稱矣先儒謂稱公有虛名有定位然則公子云者母亦其初之虛名其後積漸而為定位耶宋人伐鄭圍長葛伐國圍邑伐之雖有名而圍之亦有罪況乎其卒取之耶髙氏以為圍人城邑其師必衆而稱人者貶之也然而恃衆虛鄰即稱師人安得以為非貶耶六年春鄭人來輸平輸左作渝伊川用公穀墮成不果成之義以為鄭來絶交然未入春秋之前魯於鄭有狐壤之怨又前年會宋衛伐鄭魯與鄭原未嘗交不必使人來絶也此因左氏有晉侯使吕相絶秦之文故從公穀取絶交之説耳且此時宋方圍長葛鄭豈復出惡言召釁以動魯師乎觀後之歸祊入祊則文定所云輸者納也平者成也鄭人納成於魯以利相結解怨釋仇離宋魯之黨者為得其情實矣朱子以為變渝舊盟以從新好善會左氏更成之説於義尤精夏五月辛酉公會齊侯盟于艾於鄭人輸平之後即會齊盟其為鄭之構魯以合齊離宋無疑蓋自此而魯於齊之交漸固於宋之好乃漸失矣秋七月冬宋人取長葛宋兩伐鄭及圍長葛取長葛悉書者既以著宋殤忌公子馮而怨鄭之深亦以著宋鄭相惡以致鄭之搆齊魯為黨而相尋干戈其曲誠在宋也七年春王三月叔姬歸于紀書伯姬之逆與歸又書叔姬之歸見魯與紀婚姻之好此後終桓公之世大為紀謀而卒不能助紀以敵齊又不能平齊紀以延其祚使紀終滅於齊以致伯姬卒而不及葬葬於齊侯叔姬無所歸而歸酅皆不得其所也滕侯卒不日失其日也不葬不往會也不名者伊川以為史失其名然列國赴告之及史臣紀之不應大國不失名而獨失於滕宿薛杞諸小國之名不應中諸侯大國不失名而獨失於秦之名左氏謂同盟則赴以名是未同盟則不赴以名矣然考諸侯之未同盟而名其卒者甚多又如晉在僖公以前未見一與諸侯盟會何以佹諸夷吾之卒名耶觀於此年及宣九年成十六年之滕皆不名而自昭三年以後之滕成滕悼滕頃滕隱皆名皆會其葬莊三十一年之薛不名而自昭三十一年以後之薛獻薛襄薛惠皆名皆會其葬僖二十三年之杞子不名自杞托於晉而襄六年以後之杞桓杞孝杞文杞平杞悼杞僖皆名皆會其葬則前之不名者不來赴後之名者來赴也不來赴者微弱不敢以諸侯之禮通於大國也其後之來赴者魯以禮通其喪紀也其前之雖不來赴而書其卒於史者既與其君有邦交之好即不往會葬而亦申其弔問之禮也此觀於紀秦伯之卒而可知矣秦交於中諸侯雖敗殽喪師與晉失好而中諸侯之喪紀猶通故文九年來歸成風之襚而十八年之秦伯罃宣四年之秦伯稻皆名則來赴之徵也至成十三年會諸侯伐秦而明年之秦伯卒不名矣則不來赴之徵也其後叔孫豹再會伐秦而昭五年之秦景定九年之秦哀哀三年之秦惠皆不來赴故皆不名矣而於三公皆會其葬者魯之於秦因晉而用師非有仇怨故雖不來赴而秦強大不得不往會其葬也則名不名之由於來赴不來赴何疑哉蓋諸侯卒而以名赴禮也來赴以名則名之不來赴則不名大夫既卒尚不斥名而況名諸侯哉夫子一仍舊史而魯之前弱小國後畏秦而會不來赴之葬俱著矣夏城中丘城以聚人民而防寇盜也魯以王制四百里之侯國通春秋書城者十九書大夫帥師以城者三可見春秋以前天下無事而防禦疏至此而爭戰日起守備日嚴民力所以日困也其時與不時則於按時以書而知之齊侯使其弟年來聘齊通好於魯不使大夫來而使弟來是齊侯之寵用其弟也即無後來寵過釀禍之事亦為不得其道矣年之書弟是著其實以示貶非以不稱公子為貶也此以著艾之盟齊魯既合而又通聘問之好也秋公伐邾左氏因隱公元年與邾為蔑之盟意邾與魯好也而今忽親伐之故以為宋之故也又邾嘗與鄭伐宋必邾鄭相合今鄭已與魯平胡為為宋仇邾而伐鄭之所與哉故又為宋及鄭平之説也夫鄭原為敵宋而平魯故明年復來歸祊未必中問忽已平宋則左氏不足據矣而公擅興甲兵以伐邾或别有故春秋書以譏之豈必為人伐人而始為不義哉通春秋考之魯之専師伐國兩伐莒一伐於餘丘之外則公伐邾者八大夫伐邾者八於他國未有也於齊則受其君大夫専師以伐者十三侵者三而魯則一納子糾伐之一以楚師伐之一會諸侯圍之一四卿會三國大夫戰敗之最後則公兩侵之大夫一侵之而已未有一書伐齊者齊邾皆鄰也齊大邾小凡十三受齊之伐而不敢一以伐報齊凡有事於邾書侵者四而書伐者十六則非小用師矣屈於齊而伸於邾畏服強大而憑凌弱小春秋以明著魯之不義也冬天王使凡伯來聘此為書王臣聘魯之始隱不會平王之葬新天子立已四年而又不朝使政教號令得行於天下則當有詞以問其罪矣既不問其罪而又修禮來聘此周之所以日衰也戎伐凡伯于楚丘以歸非伐國而言伐惟此及鄭伯伐取之用徒衆也以歸不言執蓋既書伐則不書執與滅國以國君歸之不書執同故以為諱言執者非也不直書戎執凡伯以歸而曰戎伐凡伯以歸者以著戎之以徒衆加王臣故謂諱執言伐者非也於楚丘者見其已出魯境也隱之盟戎必誓言相好矣今凡伯來聘戎伐之以歸而魯不問戎罪唐之盟固不可渝耶盟有以渝為非者有以不渝為非者如魯以劫執天子命使而伐戎神其殛之耶是知盟固衰世事渝盟尤亂世事使盟以奬王室為詞則盟猶哀世之善者使盟以奬王室而戎得罪於王使則渝盟以伐戎猶為善者何不可於盟盟何不可於渝哉惜乎隱之不知義也先儒以書楚丘為罪衛而究其情事魯固不能無罪矣又先儒以書侵書伐之不同為有罪無罪有名無名是非于奪所寓又以傳言伐經書侵者為聖人不豫其伐然則戎伐凡伯為聖人豫其伐者通乎此則知春秋書侵書伐為因乎舊史而舊史之書侵書伐亦因乎事之大小入之淺深時之久暫名之有無之實也聲罪致討潛師掠境有鐘鼓無鐘鼓鳥足以為定義哉八年春宋公衛侯遇于垂左氏因齊原與鄭好何以與宋衛為瓦屋之盟而後又與鄭伐宋故以垂之遇必齊侯欲平宋衛於鄭而宋衛先相見以謀之也如果平宋衛則瓦屋之後不應宋衛猶惡矣如宋衛不肯平不應與之盟矣竊意垂之遇是宋公衛侯相見以謀結於齊也蓋宋見魯既與鄭平矣而齊鄭之交不解則終不能得志於鄭故約衛盟齊以搆之而齊鄭之交卒不可解於是渝年而有齊鄭伐宋之師也觀瓦屋以宋為主則知宋之有意於齊非齊之有意於宋矣三月鄭伯使宛來歸祊魯於宋為婚姻之國自盟宿以來其交甚固於鄭則有狐壤之嫌鄭仇宋而欲結魯知非啖以大利則我之嫌不能釋而宋之交不可解故輸平而以祊餂之其謂釋太山之祀而祀周公者假為此言俾魯有可受之名而志實不在得許也魯初猶以為宋之好不可失故輸平兩年而不報至此而決意歸祊鄭之設意必以為魯苟受我祊不必與我許魯亦明知鄭之必欲歸我祊而不必我之與以許也故鄭竟歸之而魯竟受之受鄭之祊則不得不從鄭之欲鄭之欲在攜宋則不得不為鄭出師以伐宋矣使實以祊許相易魯鄭各有其利則魯何德於鄭而攜宋以親鄭哉其後桓公篡弒得國初立未定然後再申前言加璧請許則挾桓以不得不從之勢也鄭莊為小人之雄信哉庚寅我入祊既書來歸則我之入祊可以不書然不書入祊則似祊原為我之祊如歸濟西田之類無以著受祊之罪而為祊以合鄭離宋之情實亦不見矣夏六月己亥蔡侯考父卒辛亥宿男卒卒而不名者亦多不日其日者三此年宿男成十六年滕子哀三年秦伯蓋雖不來赴苟得其日則亦書日也趙氏弔贈厚薄之説於宿男則曰魯宋盟於其國以嘗受地主之供而備禮以弔也於滕子則曰其施於我者或厚則不得不視施為報也於秦伯則曰其從厚之由不可考夫以卒葬大故而於含賵之微謂視施之厚薄以為報其細亦甚矣而史氏又因以為國書紀載之詳略豈復成大體哉諸儒日月之例穿鑿生義大約如此秋七月庚午宋公齊侯衛侯盟于瓦屋宋欲搆齊以離鄭齊無意於絶鄭而又同宋衛之盟先儒以齊僖貪結諸侯以圗伯者是已夫陽交宋好而陰協鄭謀懷二以待諸侯又何以使諸侯之不我二哉八月葬蔡宣公九月辛卯公及莒人盟于浮來浮公穀作色莒國小而悍故敢以大夫盟公公降尊而及之盟者為紀屈也螟冬十有二月無駭卒無駭為公子展之孫卒而不氏未賜族也夫慶父牙友之孫皆稱氏而公子展之孫不稱氏則必賜而後敢稱不賜而不敢稱可知矣氏必賜而後敢稱則不命為公子而敢稱公子不命為公孫而敢稱公孫乎若凡子不命而可稱公子凡子之子不命而可稱公孫則凡子之孫不賜族而可以王父之字為稱矣何以無駭又不氏耶觀左氏衆仲論族曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之則知大夫而賜族者皆許其有後於國也其稱公子者及身而許其有後於國其子不待命之為公孫而稱公孫其孫不待賜族而可以王父之字為氏而稱氏此慶父牙友之孫稱仲孫叔孫季孫不若公子展之孫不氏而稱無駭也通乎此則公子翬前不稱公子後稱公子可知矣慶父牙友之稱公子而許其世有後於魯可知矣齊侯之弟年鄭伯之弟語為未命為公子可知矣州吁不稱公子無知不稱公孫為未許其世有後於國可知矣諸儒紛紛削公子書公子示貶示褒之義豈定論耶九年春天王使南季來聘周禮大行人時聘以結諸侯之好則天王之來聘為常事可以不書然諸侯抗天子而不修朝禮但見天子懷諸侯而修聘禮則為非常事不可不書矣於魯隱則凡伯來聘而隱之朝聘無聞焉凡伯見執於戎而隱不問戎罪焉而天王又有使來則尤為非常事而烏可以不書哉三月癸酉大雨震電庚辰大雨雪不當震電而震電既震電又不當雨雪而雨雪且不微而大則變異甚矣文定之説甚好挾卒桓之世不書大夫卒不書大夫帥師莊之世慶父帥師公子牙卒之外無聞焉隱之世書大夫卒者四帥師者三春秋以著魯國世卿専政之漸而重譏隱公也蓋魯自考公以後一繼一及父子兄弟相間以成世惠公以子繼父惠之後以國故言之又當兄終弟及矣而惠意在乎立桓諸大夫既不悅乎惠之授桓而扳隱以立隱順諸大夫之欲而有其國而又欲成父之志故不得不曲加恩禮於大夫而不顧乎權之下移矣觀莊公之後公子牙尚以國故生逆志則惠終隱繼之時其多危疑可知也公子友忍於慶父牙而既正傳子之緒猶不絶逆臣之世而使有後於魯則皆隱之寵用大夫有以基之而魯為三家之魯者非一朝一夕之故夫子所以詳書以重譏之也夏城郎春有大變異不自修省猶動衆城郎為備敵之計而後用干戈以伐所好以報歸祊之利所失不小矣秋七月冬公會齊侯于防防公作邴魯與宋素好齊又與宋新有瓦屋之盟一旦助鄭而伐之先儒以為謀假王命以為出師之名者是已然防之會鄭不與而公特會齊侯者亦魯之將與宋絶而先托齊以自固也故中丘之會三國始合十年春王二月公會齊侯鄭伯于中丘伐宋鄭志也中丘之會先齊侯者鄭藉報宋而推之為主亦齊僖圗伯志勤而欲資魯鄭之兵力以脅宋衛也夏翬帥師會齊人鄭人伐宋書翬帥師會伐又書公敗宋師文定遂疑翬先期而往不由公命以為兵柄下移非也當是使翬先會齊鄭公後出以繼之耳齊鄭稱人伊川以為非卿夫鄭蓄謀連兵以伐宋何等重大安有不使卿行之理大約三國先使卿往其君繼之後特書公敗宋師者春秋欲甚隱公之罪故齊侯鄭伯不書也書帥師者著翬專軍政而屢帥師所以能黨桓而弒隱也六月壬戌公敗宋師于菅辛未取郜辛巳取防三國會伐而魯獨敗宋師又取其二邑書之以甚魯也夫魯與宋世為婚姻隱之適母生母及妻桓之生母皆宋女一旦反面為仇以云為鄭不當若此其甚一祊之溺心亦不當若此其甚喜功而貪利能讓千乘之國者所為如是乎哉宜桓翬稔其行事而疑其心此不卒讓之謀所以易興而易入也秋宋人衛人入鄭鄭方與齊魯伐宋宋戰而敗鄭必不虞宋衛之入已也宋知鄭之不備連衛乘機用偏師以入之其師必少故鄭伯因其去已伐戴而恣兵以取之也宋人蔡人衛人伐戴鄭伯伐取之戴公穀作載觀下書齊鄭入郕則因宋合蔡衛伐戴以報之可知矣郕為宋之與國無疑戴為鄭之與國無疑伊川鄭戴合攻盡取三國之衆為是文定以為一舉而兼四國非也鄭既與宋蔡衛為敵敵之所伐我顧取之以快敵人耶戴即非鄭之與國鄭亦必不伐戴冬十月壬午齊人鄭人入郕郕公作盛鄭伯無王之甚者也假王命以伐宋入郕入許其誰信之蓋為齊魯未可與宋遽變故相與假之以濟其私也然既敗宋矣郕許何罪齊豈有不可釋於郕魯豈有不可釋於許者乎齊僖則欲得志於諸侯而魯隱之黷武亦春秋所譏也十有一年春滕侯薛侯來朝魯隱用兵敗宋入郕滕薛畏之相率來朝而不辭先儒以為志驕而荒者是已桓所以益疑而急於弒也夫夏公會鄭伯于時來夏字下公穀有五月字時來公作祁黎左又作郲會於中丘魯地也會於時來鄭地也前則鄭欲鈎致助已故與齊侯來魯以為會此則魯隱既收鄭祊又取宋邑獲利甚厚因往鄭謀許以為報也鄭誘魯以利始求之而後則招之魯為鄭利所誘始從其求而後遂不得不應其招甚矣鄭莊之狡猾而魯隱之貪庸也秋七月壬午公及齊侯鄭伯入許三國入許為鄭利也雖兼書齊侯而時來之會無齊則所以専罪公也冬十有一月壬辰公薨朱子曰凡魯君被弒則書薨而以不地著之蓋臣子隱諱之義聖人之微意也公穀及伊川文定論皆如此無以易矣而文定又謂舊史必以實書聖人削之以為萬世隱避國惡之法夫隱之弒主逆者軌也操刃者翬也閔之弒主逆者慶父也操刃者卜齮也準以春秋斷獄之義則當書軌弒公慶父弒公矣如舊史歸獄兩人而書得其實則當夫子之時著於國史信於耳目者已二百餘年魯之後君魯之孟氏雖孝子慈孫不可得改夫子何為而削數百年徵信之史以疑後人哉是必舊史書公薨於蒍氏公薨於武闈夫子不得已而削其地以不沒其實也且古者史官雖以直為職而春秋外君見弒疑案亦多若史皆盡職無不直書之事則晉董狐齊太史不足稱於當時傳於後世矣所謂臣子於君父有隱諱之義者夫子為魯人不當暴揚先世未彰之惡非謂前之人既不諱而後之人又當諱之也據魯史而筆削非夫子自為一家之文史不直書不可以直書史直而故曲之豈義也哉又公穀以為賊未討則不書葬伊川文定皆取其説而竊有疑焉內而隱之賊未討不葬是已桓之仇未復而葬閔之賊既討而不葬何耶外而衛完齊諸兒及陳平國之賊討而葬宋與夷齊舍齊商人晉夷臯鄭夷晉州蒲莒密州薛比齊荼之賊未討而不葬是已蔡固許買之賊未討而葬宋捷晉卓及齊光衛剽之賊既討而不葬何耶古之葬事亦綦重矣周禮諸侯之喪天子緦衰冢人以爵等為封丘之度與其樹數而又為之正墓位蹕墓域守墓禁春秋之時禮或不行而尚有會葬之使傳稱五月而葬同盟畢至則知非草草卒事遂以為葬也當是內而以禮葬則書不以禮葬則不書外而來告往會則書不來告不往會則不書舊史據事之實夫子因史之文而討賊不討賊書葬不書葬謂出於夫子之筆削者非也蓋嘗以事之理事之情事之勢斷之凡弒君之國未有不懼諸侯之討者諸侯即不討未有公然以禮往會其葬者惟既討賊則不懼諸侯之討而諸侯亦當以禮往會其葬矣魯桓之賊在齊國人無懼於諸侯之討蔡景許悼事在可疑亦無懼於諸侯之討故皆成禮以葬告於諸侯而諸侯皆會也若既討賊宜無懼於諸侯之討而君弒國亂新君初立上下危疑又或討賊之義未明如魯之殺慶父宋之殺萬齊之戮崔杼晉之殺里克衛之殺寧喜皆不能名之為弒君之賊以告於國人告於諸侯故皆不能成禮以葬以來諸侯之會葬也又嘗以春秋之明文左氏之實事斷之言乎內事隱公志在讓桓不自成為諸侯因亦不成禮以葬其夫人而又考仲子之宫以示必讓之志必其事聞於諸侯信於國人故天王亦來歸仲子之賵桓翬弒隱必托為成隱之志遂不成諸侯之禮以葬以來諸侯之會舊史不書夫子因不得而書矣桓之見殺於齊也魯人畏齊之強而又欲匿文薑之醜公然赴於諸侯而成禮以葬舊史書之夫子因而不得不書矣至於閔公之弒季友殺慶父而史書奔齊齊桓戮哀薑而史書薨夷觀其易名立後歸喪致廟季友為仲薑諱之惟恐不深而閔又慶父所立慶父季友之於閔僖各有所主魯人亦未服慶父之立閔故猶躋僖於閔之上其不以慶父所立兩年十一嵗之君赴告諸侯而以禮葬焉恐亦情事之必至者舊史不書夫子亦不得而書矣言乎外事州吁無知夏徵舒公孫翩既討而其國之臣子名正言順以來告魯人往會舊史得書夫子書之也許止之不嘗藥想為國人所恕蔡般事在宫閫幾微可疑君弒而國不亂則竟來告魯人竟往會舊史得書夫子亦書之也彼夫不討不葬其不來告不往會皆可考而得之宋督弒君諸侯會稷宋方薦賄以求解魯方取鼎以納廟會葬之禮宜其闕矣宋萬奔陳齊桓會諸侯於北杏宋君新立不敢親出其敢告葬於諸侯哉里克弒卓經雖成卓為君以定克之罪夷吾弒克必不成卓為君而葬之以禮也齊舍之稱君亦春秋成之商人不以舍為君而顧以禮葬之哉宋人奉公子鮑因襄夫人以弒杵臼夫人主於內公子正乎外以為殺無道矣其不以禮葬無道之君明矣商人弒君之賊國人惡之即其兄元亦惡之在春秋則以為弒君而其時之國人必尚以為討賊也而猶告葬於諸侯耶莒僕來奔命與之邑不以為賊也行父拒之使不得入其葬庶其無論不來告即來告亦不往會且魯於莒子之卒葬往會之禮原疏史又何書也趙穿弒君罪在趙盾子公弒君罪在子家彼此不得相指為賊而又相與用事於國則不肯以弒君告諸侯又何辭以告葬於諸侯哉欒書以車一乘葬厲公崔杼四翣不蹕下車七乘以葬莊公此尚告於諸侯以來列國之會葬乎剽為孫寧所立衛獻復國直以剽為篡耳其不成篡賊為諸侯而以禮葬也宜已展輿弒君奔吳及薛弒君比左氏傳之其事甚略當亦未有異焉陳乞以陽生而入必不以茶為君既廢之後而又成禮以葬必不然矣若夫吳楚之君雖無故而卒亦不往會春秋固不書葬寧於弒君之葬不葬示義乎然商臣親以宫甲弒父棄疾弒囚年之王服以葬彼直無所忌憚矣吳初通上國閽之弒餘祭光之弒僚皆以傳聞得書其不來告不往會無可疑者也如以賊不討不書葬為夫子削之何難并削蔡景許悼使歸於一而顧自變其例使後人求其故而不得哉蓋春秋弒君不討賊而不葬有其義焉無其例也有其義者君父之仇不共戴天寢苫枕千圗報仇人仇一日不復則一日不葬示不敢一日忘也無其例者彼討賊而葬則仍其事而書葬彼既討而不葬未討而葬則亦仍其事而或書葬或不書葬而義固有在焉而豈有意以貸誰之罪有意以治誰之罪哉而後人讀之則可以知討而不葬者有不葬之罪不討而葬者有葬之罪如蔡許之葬則可以知蔡許臣子有不討賊之罪魯既不討賊而又有往會之罪前後不聞會伐之師則諸侯皆有不討賊之罪通春秋弒君不聞天王申九伐之法或且榮寵其人則王法不行天王有縱賊奬亂之罪故於隱公之不葬當罪魯之臣子推戴弒君之桓而不能申義致討以告諸侯成禮以葬隱公也於閔公之不葬當罪季友不能大義滅親如衛人之殺州吁及石厚立公子晉使閔公之葬無聞於諸侯也於桓公之葬當罪莊公及魯人畏齊之強而蒙恥飲恨如葬其無故之君親也蓋因舊史以書之而各知其罪之所在矣左氏曰隱公之不葬不成喪也疑有得於春秋不書葬之義而謂弒君未有不葬舊史未有不書為出於夫子削之者豈其然哉且以春秋字之法文之義論之內而薨稱公稱夫人葬稱我君我小君公者臣子之詞稱諸異邦則曰寡小君生曰寡君寡小君卒曰我君我小君我者對人而言謂諸侯之人來會葬我君我小君也隱公之葬不赴於諸侯諸侯無來會者則舊史不可以書葬我君隱公矣外而卒稱名葬舉諡名之者從彼來赴之詞諡之者為我往會之詞卒則曰某國某爵某卒葬不曰某國葬某公而曰葬某國某公也遇弒之君魯不往會則舊史不可以書葬某國某公矣故內而以禮葬則史書之不以禮葬則史不書外而魯往會則史書之魯不往會則史不書夫子一仍之而義自見也春秋宗朱辨義卷一
