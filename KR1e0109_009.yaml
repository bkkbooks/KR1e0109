body:
  text: 春秋宗朱辨義卷九髙淳張自超撰襄公元年春王正月公即位仲孫蔑㑹晉欒黶宋華元衞甯殖曹人莒人邾人滕人薛人圍宋彭城彭城係宋左氏以為不登叛人也公羊以為不與楚之専封也穀梁以為不與魚石也然則即不係宋亦何見其登叛人與楚専封及與魚石耶左氏又以為齊衞圍戚不係衞為不與齊衞大夫助子圍父圍彭城係宋為不與荆蠻取中國之地以與叛臣其義甚正然而非也圍彭城者諸侯之大夫及宋大夫也係宋者歸美於諸侯之詞也如書圍彭城則似宋之事而非諸侯之事不足以著晉悼討叛之義矣圍戚者齊大夫及衞大夫也不係衞者歸罪於衞之詞也如書圍衞戚則似齊之事而非衞之事不足以著衞出拒父之罪矣但魚石親荆蠻脅故君據彭城為宋患且為中國患晉悼執而歸於宋人使戮之則法嚴而義正矣乃以五大夫歸而置之瓠丘故春秋但書圍宋彭城而為晉悼惜之也又晉悼初政討叛義舉不親出而使大夫此後㑹戚城虎牢皆大夫為之故春秋皆歴序諸侯之大夫以著晉悼之失也夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人杞人次于鄫厥公作屈鄫公作合晉既討魚石即興伐鄭之師意不欲再煩諸侯而五國大夫則出師次鄫以俟命故以為有待以見再伯之難者固非以為與齊桓伐楚次陘同者亦非也秋楚公子壬夫帥師侵宋晉既降彭城禽五大夫又問鄭從楚之罪而楚不敢出師以與晉敵但為侵宋解鄭之常策固知其無能為矣九月辛酉天王崩邾子來朝邾修禮以朝新君而書於天王崩之後邾不奔天王之喪而朝於魯魯不奔天王之喪而受邾之朝文定於此等處發明義理最好雖係通春秋寓貶大義不闗𦂳要而亦未可忽不著意也冬衞侯使公孫剽來聘晉侯使荀罃來聘晉衞聘魯如成四年荀庚孫良夫及此年公孫剽荀罃春秋皆兩事比書以著魯之事晉衞居其間亦以著衞助晉伯之堅也二年春王正月葬簡王鄭師伐宋鄭助荆蠻納叛臣既為諸侯所討而復興大衆以加宋是真無名不義之師矣而春秋書師書伐其可謂之無貶哉夏五月庚寅夫人姜氏薨六月庚辰鄭伯睔卒鄭成以楚子為鄭之故親集矢于目遂終身不肯負楚未嘗非義也然遂以此背中國而就荆蠻以迄於死尤為非義之大者矣是以君子之交貴謹於始始之不謹因依附托不幸而身受其惠至於情事交見從之則害於大義違之則忘其私恩遲迴於二者之間苟且避就恩義皆傷矣必不得已則晉文之退舎以避而決城濮之戰為無譏於春秋也不葬則晉方問罪於鄭諸侯不㑹其葬也晉師宋師衞甯殖侵鄭衞侯速卒於秋八月至冬而楚鄭侵衞是既知其卒而侵之為不恤衞喪也鄭伯睔以六月卒即於是月三國侵鄭是三國出師之日未有鄭喪師出在途或至鄭聞鄭伯卒而不還也士匄侵齊聞喪而還春秋嘉士匄之義而不罪士匄之専今晉宋之師未有主名甯殖奉伯令而不能導伯主以義駐師境上以請於晉而公然侵之此為甯殖之罪也然觀逾月而大夫㑹戚及冬遂城虎牢則晉亦不恤鄭喪又豈獨甯殖之罪哉夫鄭固有罪而睔已即世苟懐之以不伐喪之徳示之以往㑹葬之禮安知嗣君不感而内屬乃一迫之以强兵扼之以險計其於伯者假仁義以服人之道亦失之矣晉宋稱師而名甯殖者衞衎出奔逐君之賊未有主名故於前後因事以著甯殖孫林父使讀者知二人之専師専㑹而衞衎之所以出奔者罪有所歸也又以不名晉宋大夫使讀者所以名甯殖之故也秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚㑹戚謀鄭而城虎牢天下之大計也君不出而使大夫大夫相率而専其事政之在大夫不特大夫之罪而亦其君下移之罪也先儒以為大夫専政自悼公始者責之是己巳丑葬我小君齊姜叔孫豹如宋襄公即位未聘晉齊斬然父喪又甫葬夫人而急於聘宋必以宋屢遭楚鄭之師故也然亦不免於忘喪修聘之罪矣豹為僑如之弟叔孫氏復見於經慶父之後敖奔而蔑以孫後之牙之後僑如奔而豹以弟後之皆得奕世用事於魯仲遂之後歸父奔而嬰齊以弟後之春秋一書仲嬰齊卒而自是子孫無聞焉則三桓抑之也冬仲孫蔑㑹晉荀罃齊崔杼宋華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢城虎牢不繫鄭伊川文定以為責鄭不能有其險非也設險守國所以安輯人民而防禦冦盜今鄭附楚而敵中國是鄭之險為荆蠻守而棄義以殃民也春秋豈望其能守險而以責其失於中國哉張氏以為以伯主而討不服從之國地非鄭之所可私有非也夫討不服在有以服之不在有以制之彼之負固固非此之扼其險要臨以重兵威脅力制亦非也虎牢虢邑鄭既得而據之即非鄭之所可私有又豈伯主之所可强取而擬於天子之不朝削地哉家氏以為虎牢之險闗乎中國陸氏以為城虎牢可以安中國息征伐亦非也中國之守當在四夷設險以限楚可也以虎牢為中國之險是棄鄭許陳蔡於楚矣既不能服楚使不為鄭許陳蔡患又不能庇鄭使鄭不憂楚而就中國但為扼鄭之計以危鄭而謂聖人許其能立中外之防耶葢城虎牢者春秋所譏也虎牢之險諸侯守之則可以外制鄭楚鄭楚守之則可以内制諸侯諸侯有時而散而虎牢在彼鄭終得而有之也其後鄭人反覆向背於晉楚之間依然故智何在乎虎牢之城不城哉不繫鄭者前有三國侵鄭之文後有同盟雞澤之文如書城鄭虎牢則疑于侵鄭鄭服此為諸侯為鄭而城虎牢不足以著諸侯之扼鄭矣戍虎牢繫鄭者明虎牢之為鄭地葢於彼前則為諸侯伐鄭之文後則為楚救鄭之文可無疑於諸侯之戍非以拒楚而以保鄭也楚殺其大夫公子申楚敗城濮而殺得臣敗鄢陵而殺公子側用法之嚴若此此殺公子申於城虎牢之後殺公子壬夫於陳内屬之後左氏以申為受賂以壬夫為貪未必然也或是惡二大夫有失策致不保鄭而失陳耳三年春楚公子嬰齊帥師伐吳此為書吳楚交兵之始秦楚合而中國勞吳楚爭而中國息然則吳楚相爭誠中國之利哉然既屢與吳㑹以通好於吳則宜合謀併力以弱楚而又與楚為交見之盟是但為偷安旦夕之計而非有强中國之長策也使中國諸侯因吳楚搆兵及其休息之時明君臣之義以尊奬王室事大恤小以固邦交崇禮義而靖干戈中國日强則吳楚罷於戰鬬而請服不暇矣乃外患不作内變日多强家悍族執國専政葢諸侯不有天子則大夫不有諸侯田氏之篡齊三家之分晉其端已見於春秋之終矣詎惟吳楚之能為諸侯患哉公如晉以七歳之童子侯而朝於晉魯人謀國若此何其謬也夏四月壬戌公及晉侯盟于長樗出國而盟固見晉悼之有禮然盟者惟恐其不信而盟以信之也悼不信七歳之童子侯耶七歳之童子侯不信悼耶世風之變而人心相疑若此亦可慨矣公至自晉襄公五如晉幸無宣成之辱今即位三年雖成公之喪既滿而齊姜之服未終葢受晉之來聘已逾兩年久而不報獲罪大國以童子侯而忘哀往朝明知其謬豈得已哉故始書至而此後四朝亦皆屈於不得己也六月公㑹單子晉侯宋公衞侯鄭伯莒子邾子齊世子光已未同盟于雞澤鄭服而假王命合諸侯以堅之故單子與焉晉悼但知尊王命之重而忘乎盟王臣之非既稱同盟其載書之詞必王臣同矣又何得謂之尊王命哉以晉悼之賢而襲晉厲柯陵之謬亦可惜矣汪氏以為非繼事而再繫日與新城之盟同以見其紊上下之分不可不書日以謹之夫雞澤盟單子與柯陵之盟單尹平丘之盟劉子其皆為紊上下之分無疑而苟謂春秋因此謹而書日則葵丘不盟宰周公何以亦日馬陵于戲亳城北皆無王臣又何所謹而日耶如謂彼皆間事不可不日祝柯皋鼬亦皆間事何以又不日耶新城以趙盾而盟諸侯其為紊上下之分亦無疑而謂春秋亦以此書日則垂隴以士縠盟諸侯何以不日耶如謂趙盾弑君之賊不可不謹而日之虚朾有崔杼亦弑君之賊何以不謹而日之耶春秋諸侯之盟文公以前不日者多日者少文公以後日者多不日者少時有逺近史有詳畧故也且如鹿上鄟陵不日不月而時豈聖人别有所削以示義哉又李氏以不再書地不得與首止葵丘同者以其不足乎揚也然如平丘再書地為足乎揚耶春秋之義固不繫乎此也陳侯使袁僑如㑹晉楚爭鄭鄭則時晉時楚陳服於楚者且三十年而晉亦未嘗爭陳陳亦未嘗視鄭以為向背於此而内屬於晉者彼見楚困於吳其勢漸弱晉悼賢於景厲其勢漸强故也左氏以為子辛侵欲小國者固非而髙氏以為聞鄭受盟而因以求成者亦不盡然也自此以前鄭嘗受盟於戚矣又前則嘗受盟於蒲矣又前則嘗受盟於蟲牢矣何以皆不見陳之視鄭以求成耶陳蔡皆近楚蔡久絶於中國而陳則自齊桓之世未嘗一屈於楚晉伯以來文襄靈成之㑹盟皆與焉自盟辰陵而徵舒受討楚入其國都易置其君臣而元氣喪矣楚又戰勝於邲其勢方强雖欲抗楚以附中國而力有所不能彼固未嘗一日忘中國也而勢衰力微卒為楚所困以致存亡皆係於楚則亦陳之不幸也夫戊寅叔孫豹及諸侯之大夫及陳袁僑盟事有以得而失者如袁僑之盟是晉悼不欲屈諸侯之尊以下盟大夫為得尊卑之體而忘乎以大夫而盟大夫為開凌替之端也此宜以不盟為是而晉悼既喜得鄭又喜得陳急盟以信之使不我貳而為此權宜之事致啓大夫之専故天下事毎於最得意中有背禮傷義之失不可不慎也李氏以再書陳為喜得陳與召陵再言盟為喜服楚同義非也書諸侯之大夫不可不書陳袁僑也汪氏以詳書及為著諸侯之失權亦非也既書叔孫豹則必書及諸侯之大夫既書諸侯之大夫則必書及陳袁僑也皆文法當然非義所係也秋公至自㑹雞澤至㑹杜氏以為逾時而返故至之然如於戚沙隨皆不逾時何以至耶自桓文以後凡㑹盟皆至矣不必有事無事逾時不逾時也冬晉荀罃帥師伐許既得陳鄭即用兵於久不内屬之許而許卒不服張氏責其規模欲速并陳不能保者是已故春秋名荀罃以并譏之也四年春王三月己酉陳侯午卒陳成以子繼父實為徵舒所立自楚討徵舒之後三十年不與中國盟㑹末年悔過得遣大夫一受雞澤之盟而卒是亦可謂得正而斃者矣不然目其得瞑耶夏叔孫豹如晉荀罃來聘之後公親往朝之矣豹之如晉不必為報荀罃也當别有事髙氏以為為鄫世子者或然也秋七月戊子夫人姒氏薨僖公之尊妾母哀姜受戮故也宣公之尊妾母出姜不復故也未知魯人於莊文廟墓如何配祔而成風敬嬴之薨葬已見譏於春秋矣齊姜未有故而定姒亦薨稱夫人葬稱小君沿襲故事以犯分亂禮襄公年幼不足責而當國者之罪不可辭也葬陳成公髙氏汪氏皆以為陳為雞澤之㑹既即中國魯往㑹葬然如蔡許不㑹中國其君之卒皆往㑹葬不必盡以同盟故也八月辛亥葬我小君定姒薨二十四日而速葬此必有故也冬公如晉去年如晉今年又如晉連年往朝事大之禮不應若是之數左氏以為公請屬鄫毋乃仍為鄫故豹請未許而公親往以請之耶然夫人之薨逾月而速葬葬逾月而以鄫故奔走大國忘親而貪利當國者亦不應若是之妄毋亦晉以事召公而不敢以妾母之喪辭耶陳人圍頓陳之於頓猶鄭之於許頓若於陳而屬楚陳屈於楚而釋頓袁僑甫受雞澤之盟而即圍頓者示己之絶楚以信晉而亦藉以舒己之積忿於頓也襄三十一年間諸侯専用兵於隣國君自將舉爵之外稱大夫帥師者十有九稱人者止陳人圍頓莒人滅鄫鄭人侵蔡秦人伐晉宋人伐陳五事秦莒原未有大夫見經其三則陳以内屬而圍附楚之頓也鄭以内屬而侵附楚之蔡也宋以合伯主之謀而伐逃㑹之陳也頓蔡陳有附楚之罪而陳鄭宋亦有虐隣之罪其罪均故平其是非而從畧書人也如以書帥師書人為褒貶則自文公之世始書大夫帥師文宣兩公三十六年間書帥師者十有二書人者十有四猶參半也歴成襄昭定哀終春秋百一十年間書帥師者六十有九書人者十有一則多少懸矣蓋大夫用事積漸以甚故春秋亦積漸因其事以著之也通春秋内大夫㑹盟侵伐前後名者詳内大夫用事之始末也外大夫自文宣以後名者詳外大夫用事於國之始末也其有不名而稱人稱師者義不係乎名其人則亦不名也諸儒泥於舉爵稱名書人書師之例則褒貶失實而是非亂矣是故不可以不辨也五年春公至自晉前猶終成公之喪葬齊姜逾年而朝此則速葬定姒而朝其至以為罪之則猶得乎春秋之義也髙氏以為危之又云襄之出二十四至者二十一皆危之也然則救陳而㑹鄬伐鄭而盟戲澶淵而盟四國之大夫其皆不至者將以為安之耶故諸儒之例不可以通也夏鄭伯使公子發來聘魯鄭兄弟之國素未有仇怨自語來盟之後百三十年不通聘問之好者何也或間有之而無闗於國故故春秋不書耶抑干戈不靖無暇修好於隣國而伯主爭鄭魯師多從因以有隙至此來聘者豈鄭之執政者賢將堅以内屬故受伯主之盟通兄弟之好耶叔孫豹鄫世子巫如晉鄫果苦莒而欲請於晉以屬魯則鄫子之事也鄫子安在而如晉使世子㑹戚又使大夫耶或世子有不安而求托於魯是世子之私也魯受世子之屬而請晉以定世子是魯之私也晉不以大義示鄫君臣又不以大義示鄫父子而受魯君臣挾世子之朝是晉之私也仲孫蔑衞孫林父㑹吳于善道晉欲合吳故命魯衞之卿通意於吳也夫勾吳一荆蠻耳又皆僭王中國不能抗吳楚而為和吳敵楚之計成十五年既以七大夫往而為鍾離之㑹兹又以魯衞之大夫往而為善道之㑹吳子卒不自來而使大夫來㑹於戚以抗諸侯豈非中國之屈於勾吳哉晉前失於不和内助諸侯之秦後失於和内抗諸侯之吳至於黄池爭盟幾主中夏矣秋大雩楚殺其大夫公子壬夫公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人于戚左氏以為盟於戚陳氏以為不書盟為晉諱也晉吳之盟春秋終諱之竊恐不然使以盟為善則不必諱以盟為不善亦當書以著其失而又何必諱哉葢吳之來未必肯受晉盟晉亦未必强之使受盟也蜀之盟辰陵之盟以中國諸侯受楚盟且不諱而諱吳之受晉盟耶齊以伯主之後聽宋同楚為鹿上之盟且不諱而諱晉之同吳盟耶黄池之盟吳主晉魯或晉魯以為恥而自諱之故舊史不書耳此則晉主盟吳來受盟不當自諱春秋何義而諱之耶固知其㑹而不盟也又晉以魯故列鄫於㑹既稱鄫人必非鄫子鄫世子矣左氏以為鄫大夫列鄫大夫於㑹者恐是晉有深意以吳為大夫因列鄫大夫以見諸侯之不専為吳大夫屈也公至自㑹結吳為好㑹又不逾時而亦書至則凡他㑹盟以為過時危之而至者皆非也冬戍陳㑹戚而兼謀戍陳則此為諸侯同戍陳矣不書諸侯戍陳者髙氏以為諸侯各還國而遣戍與書城楚丘同義者是也楚公子貞帥師伐陳公㑹晉侯宋公衞侯鄭伯曹伯齊世子光救陳曹伯下公穀有莒子邾子滕子薛伯既戍陳而又救之晉悼之義也然亦因陳受雞澤之盟耳背則伐之附則救之晉楚皆以為常春秋獨紀其事之實而已十有二月公至自救陳穀梁以為善救陳也范氏以為善之故以救陳至然成七年救鄭何以獨不善救鄭而至㑹耶救鄭而為馬陵之盟以盟㑹為大故至㑹救陳不盟故至救陳非有别義也至如㑹鄬救陳而陳侯逃不成其救故不至救而又不可書至㑹以没其救陳之義則竟不書至矣辛未季孫行父卒季氏之専魯論者以為至宿而僭亂至意如而悖逆至斯而無復公室矣而不知皆始於行父之相三君也行父以孫嗣季友文公之世初出用事即附仲遂以逐久専國政之公孫敖宣公十八年間聽於東門父子宣公甫薨宮殯未寒而歸父去國成公信用僑如季叔相軋凡僑如所謀以陷行父者而適以自陷也則三人者固皆不能出行父之手行父隂鷙之性以柔制剛相三君而奔三卿既倚成季之勲而又托晉以自固雖奔三卿而魯人不忌猶稱其忠於公室則其所以致飾以斂譽者必有非人之所及窺者矣六年春王三月壬午把伯姑容卒把在春秋初托於魯魯以弱小撫之故把桓以前卒葬不書僖二十三年書把子卒猶不往㑹葬也自把桓屬晉晉以列於諸侯而又重之以昏姻故魯之於把既以舊好又以晉之故至把桓之卒以列國待之而不廢其喪紀把來赴魯往㑹矣夏宋華弱來奔華弱來奔魯與華氏有好故也秋葬把桓公滕子來朝莒人滅鄫左氏序其事前後頗詳以為莒實滅之也穀梁因後有取鄫之文前有魯屬世子巫於晉之文以為莒非滅鄫立異姓以涖祭祀為有滅亡之道也文定取穀梁之說觀世子巫之不安而求屬於晉則其事容或有之然春秋書此與他滅國同而未有異文亦似未可信也且穀梁以為立異姓亦不詳所立為莒之何人公羊以為莒女有為鄫夫人者葢欲立其所出則亦立庶黜適也何氏以為莒女嫁為鄫後夫人夫人無男有女遣嫁於莒有外孫鄫子愛後夫人而欲立之趙氏以為莒人以兵破鄫立其子守之其子鄫之外孫令奉鄫祀說各不同要皆臆㫁也家氏以為苟莒實滅鄫晉悼主盟不應置之不問然使鄫果欲立外孫世子巫必以情事告晉晉既列鄫於㑹而又豈可聽其立異殄祀置之不問哉冬叔孫豹如邾據左氏邾莒伐鄫臧孫紇救鄫侵邾而敗於狐駘今莒人滅鄫叔孫豹必以滅鄫無益於邾之說問莒以平邾而仇莒也季孫宿如晉莒滅鄫魯當告於晉以討莒逾時而宿始如晉此左氏所以有晉討何故亡鄫之說也觀晉竟不討莒其以鄫委魯而責魯之不能存鄫理或有之但魯不遣他卿而宿廢喪出聘則宿之繼行父以結外援於晉也十有二月齊侯滅萊王氏以為齊滅萊為滅同姓而不名者萊居東鄙事在所畧此泥於衞侯滅邢書名之義也滅邢書名原為傳寫之誤春秋滅同姓無書名以貶之義如晉滅虞虢不書又何義而没其事以減其罪哉七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費費為季氏之私邑城費為季氏之私役而春秋書法與書公邑無異季氏既以公役城之而魯亦若為國卿營食邑者然也秋季孫宿如衞如衞報聘雖邦交之常然亦必有事故觀下書孫林父來聘而公及之盟則為晉責不能存鄫而宿之如衞為求解於晉左氏之說當得其情實也八月螽冬十月衞侯使孫林父來聘壬戌及孫林父盟盟孫林父以示信於衞侯以釋疑於晉也晉牽於莒之從己又以莒為齊之屬國齊方抗晉晉恐激怒齊故不討莒之罪而反藉口於魯之不能存鄫以罪魯此晉悼之不誠而苟且以收合諸侯也致莒人無忌加兵於魯齊師亦因以起而邾又助之終悼之世不定其曲直悼卒而晉平始執二國之君於湨梁而卒無救於鄫之亡豈不惜哉楚公子貞帥師圍陳前伐陳不服至是圍之是其志在必得陳也晉悼之救未嘗不急而陳侯逃㑹以下楚毋亦力不足以支楚之强而懼晉悼之卒棄陳耶方晉之未嘗有事於陳陳成遣大夫受盟乗楚之搆兵於吳也及楚銳意爭陳雖以晉悼之勤於來救而復易心以向楚怵於勢而昧於義豈非陳君臣之罪哉十有二月公㑹晉侯宋公陳侯衞侯曹伯莒子邾子于鄬鄬公或作䧦㑹於鄬本以救陳陳侯逃㑹故不成救汪氏以罪晉悼之怠者不盡然也鄭伯髠頑如㑹未見諸侯丙戌卒于鄵髠頑公穀作髠原鄵公穀作操據左氏鄭成公疾子駟請息肩於晉不從而卒是鄭之背楚即晉子駟志也今子駟弑僖公公穀皆以為大夫將背晉即楚不欲其見諸侯而速於行弑文定因之左氏又以為不禮於諸大夫之故其說不合則其見弑之由當亦甚隠矣𫝊因經文有異遂謂夫子不書弑為中國諱如果以諱為義則當如楚麇齊陽生之直書卒以深諱之又不當故異其文使後人疑而思思而得其見弑之實矣如謂鄭僖無不善之積以欲背荆楚從中國見弑異於他見弑之君積不善以殃其身為之隠其不幸使後人知其弑而隠之之故然則彼弑君之賊反以弑有道之君得不見誅於天下後世而弑無道之君者不幸而不得逃春秋之誅矣又以諸侯卒於境内不地鄵鄭地而曰卒於鄵見其弑而隠之者亦不然也魯君薨於内尚有路寢小寢臺下楚宮髙寢之異外諸侯卒於師於㑹皆書今諸侯㑹鄬鄬亦鄭地若鄭伯㑹諸侯而卒將以其在内地而不書卒於㑹耶外諸侯卒於境内不地者以其無故而從畧也鄭伯如㑹未見諸侯而卒鄭人安得不以地赴諸侯耶大約髠頑之弑其說難據與楚麇齊陽生同春秋無從攷得其實則不得不從舊史書卒其文之有異者亦因其事之有異而實書之也即以情事度之鄭之忽晉忽楚已習為常髠頑即欲従晉諸大夫不妨聽其即㑹而再為之謀乃於盟主壓境之時急弑其君不畏諸侯之討耶諸大夫既弑君以謀從楚即當堅事楚矣又侵蔡而㑹邢丘何耶即云侵蔡致楚以從楚則既從楚而又同戲之盟何耶故髠頑之弑終當闕其疑也陳侯逃歸陳自逃㑹之後晉楚分伯而始與宋虢之㑹陳固堅事楚而晉亦不復急陳矣卒以内亂為楚所滅終春秋之世不復列於中國諸侯亦可惜矣齊桓㑹首止而鄭伯逃誘於楚也晉悼救陳而陳侯逃怵於楚也葢陳有戒心於前而即晉之危不若即楚之安甚矣楚之强也八年春王正月公如晉距㑹鄬雖隔年而只逾月故孫氏以為㑹諸侯於鄬不至而朝晉也然春秋不書自鄬如晉則既歸而出計其途之不逺可無疑於期之太促也夏葬鄭僖公魯於鄭悼成兩公之葬皆不往㑹者鄭背中國諸侯聽於晉而不修禮於鄭也此以鄭僖内屬諸侯同盟故往㑹葬而春秋書之公羊以其卒為弑故以賊未討書葬為中國諱然春秋既不書弑不當責其討賊諱其不討賊也鄭人侵蔡獲蔡公子燮燮穀作濕后同鄭僖甫葬幼主新立無故用師於蔡即有晉命亦為罪也春秋罪諸侯之伐喪況有喪而伐人國耶當國者之罪矣蔡堅事楚楚之所庇鄭既背楚又加兵於蔡是攖楚怒而授以來伐之名如謂侵蔡以信於晉則當知楚之必來伐而早為備楚之計不當楚來又從楚矣然則鄭欲從楚侵蔡致楚以絶晉之說或不誣耶季孫宿㑹晉侯鄭伯齊人宋人衞人邾人于邢丘君與大夫㑹不名衆大夫而人之張氏所謂嚴君臣之分謹上下之辨而革伯者苟且之政也晉悼虚朾之盟仲孫蔑崔杼與焉何以不人崔杼葢衆諸侯中兩大夫與猶為未甚以五大夫而㑹二諸侯則已甚矣然澶淵以魯君而㑹四大夫其三不名而名良霄義係乎名良霄也此則義不係乎名齊宋衞之大夫也故以為貶大夫者非也晉悼重煩諸侯使大夫聽命而諸侯失政政在大夫此當貶晉悼不當貶大夫也又孫氏以為公在晉晉侯不與公㑹而與宿㑹襄公微弱政在季氏者亦非也此不譏季孫専魯譏晉悼以姑息之私而蔑尊亡等敗禮失政也其書季孫宿者以我大夫不書則或疑於公方在晉是公與㑹而諱公以貶矣春秋書人有人微而書人者有事畧而書人者有小國僻逺而書人者有未爵命而書人者有衆而書人者有散而書人者文宣以前則大夫一例書人文宣以後則義不係乎名其人而書人稍有不同也公在晉不與而鄭獨不以大夫來鄭伯親與者鄭僖不與鄬之㑹而其卒必有可疑故鄭簡親㑹既以釋晉悼之疑而亦藉以自定其位也晉悼列鄭簡於㑹者既喜其侵蔡絶楚而亦以堅其志使不復貳於楚也公至自晉王氏以為留晉半歳不與㑹而歸故書至以危之然公自朝於晉晉自徵㑹諸侯之大夫各自為事晉不因公之來朝使與大夫之㑹而使季孫宿者猶為有禮於公故非卑公使不與㑹而實不欲屈公使與㑹也莒人伐我東鄙莒為小國數與魯抗觀其初入春秋即有入向取牟婁事當亦小國中之最驕悍者也晉文之時踐土之盟溫之㑹始列於諸侯晉厲以來與諸侯㑹盟以子爵列把薛之上葢伯主以强弱為先後則莒之强可知矣宣公之世藉齊以平莒郯而莒不服今藉晉以列鄫於㑹而莒滅之又因以伐魯至四莒之抗伯主而弱魯甚矣葢晉悼之政因循苟且方有事於秦楚既牽於莒之從己而又恐生釁於齊故終其身不治滅鄫之罪而魯之連年受伐亦置之不問也秋九月大雩冬楚公子貞帥師伐鄭鄭及楚平不書以鄭之從楚則晉來伐從晉則楚來伐書晉楚之伐則鄭之反覆相從不待書而可知矣又鄭之於晉楚直行事大之禮非但如敵國息爭講好請成之云也晉侯使士匄來聘左氏以為拜公之辱告將用師於鄭夫用師當有約㑹晉悼自乞師圍彭城之外九用魯師不必盡來聘以告也葢乞師是乞其必出師凡約㑹而不乞者無期必之意或重煩諸侯之師既難於乞又難於徵因聘以告猶為晉悼之有禮也九年春宋災凡他國災異左氏以為來告故書是已但春秋書災異於宋獨多豈他國或有不來告耶然災者火也兩書宋災一書陳災當是以火變為重雖不必如齊之大災如四國之同日而災而亦必書也或曰夫子於宋其聞之祖父也最詳豈其然手夏季孫宿如晉魯之往聘勤於晉之來聘士匄之來原以答公之朝即不使大夫往晉亦未必以為罪也而季孫又如晉矣何其僕僕道途不憚禮之煩耶五月辛酉夫人姜氏薨秋八月癸未葬我小君穆姜齊姜之喪速葬而朝於晉則及冬伐鄭之師宜其不敢以穆姜之喪辭矣冬公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲晉悼嘗盟鄭僖於雞澤猶歴四五年終僖之世不變者獨倖於楚師之未至耳僖卒楚至而鄭大夫從之矣於戲之盟諸侯方散而楚師即至至即從之然則晉悼勞諸侯之師必欲盟鄭亦何益哉但其不與楚戰為得屈楚之道所以卒成蕭魚之績也楚子伐鄭觀明年春諸侯㑹吳而鄭不與則其從楚可知矣鄭自以為甘餌委之於地以鬬兩虎兩虎卒不相鬬耽耽逐逐咆哮而來蹂躪而去木披草偃獸驚鳥散所傷多矣十年春公㑹晉侯宋公衞侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光㑹吳于柤㑹吳人者吳大夫也㑹吳者吳子也大夫來故㑹於戚吳子不來故往與之㑹於鍾離於柤也吳子之不來非特吳子之抗亦有所疑於諸侯而不敢深入諸侯之地也夏五月甲午遂滅偪陽㑹吳而滅偪陽必非無故以為通吳之道者或當然也左氏以為封向戍戍辭乃與宋公是既滅以後事亦當然矣夫開道强吳而滅中國小侯以封宋卿宜春秋書遂事以惡之也晉雖世伯伯業不及齊桓然桓有存邢存衞之美亦有滅譚滅遂降鄣遷陽滅項之惡而晉文之伯晉襄繼之見於春秋者從無吞併小國之事則其優於桓者也晉悼纘文襄之績而蹈晉景滅潞滅甲氏之武故蕭魚非不極盛而以偪陽自瑕論者所為深惜之哉公至自㑹杜氏以不至偪陽為諱然如牡丘伐厲於淮伐英氏皆至㑹雖滅國之惡甚於伐國固未可以書至自滅偪陽也既書滅偪陽即書至㑹而滅偪陽之罪原不可逃烏在為諱耶楚公子貞鄭公孫輙帥師侵宋鄭從楚即連兵以加宋者四皆春秋所惡也宣元年楚子鄭人成十八年楚子鄭伯此年楚公子貞鄭公孫輙明年楚子鄭伯君將則舉爵大夫帥師則書名所為實著其君大夫以貶之也宣元年書鄭人者此時諸侯之大夫自晉陽處父郤缺外無書名者故也諸儒必以稱人為貶失之矣晉師伐秦晉悼之世秦怨未結即據左氏去年秦師之侵亦於晉無損既勞諸侯之㑹吳而滅偪陽又聽楚鄭之侵宋而不救動衆挑釁互相報復致起十三國之師而卒未有成功晉悼之失多矣觀春秋不書秦人之侵晉固知其罪晉悼也秋莒人伐我東鄙莒既滅鄫又連年伐魯不義甚矣魯與莒雖素不相睦而自晉悼合諸侯屢同盟㑹悼獨不為言歸於好之約耶而莒之無禮於魯若此久而不討亦不足以服諸侯矣公㑹晉侯宋公衞侯曹伯莒子邾子齊世子光滕子薛伯杞伯小邾子伐鄭晉悼爭鄭盟雞澤而鄭服盟戲而鄭再服然雞澤之盟猶守六年戲之盟不逾年而即背鄭固不足信矣但其背晉即楚易則其背楚即晉亦易故復連諸侯以履鄭境也而不意鄭之堅附楚矣悼於是一駕不已而再再駕不已而三振旅以來不戰而退逾時歴歳卒致蕭魚其道用柔雖以楚之强而為其所制矣漸進齊光於小侯之上者方在治楚不可失齊不特不忿怒於齊侯之不至而且尊異其世子之肯來蓋其純乎用柔者也冬盜殺鄭公子騑公子發公孫輙騑公穀作斐既稱盜即不稱殺其大夫與盜殺蔡侯申同文李氏謂宜稱盜殺鄭大夫某某方合殺蔡侯申例者非也稱公子稱侯不稱大夫不稱君其義一也春秋書盜者五其殺大夫者三此據左氏則尉止聚羣不逞因公子之徒以作亂何以不書國人哉按春秋稱國人以殺者陳人殺御宼其故未詳至宋人之兩殺大夫左氏以為昭公欲去羣公子而公族為亂晉人之殺先都殺士穀箕鄭父則三人有擅殺之罪陳人之殺公子過則過有殺世子之罪其所殺之是非有闗於國故書國人此及衞縶則出於尉止齊豹之私故不可以書國人而書盜也戍鄭虎牢城虎牢於八年之前未見諸侯戍守者雞澤之盟鄭僖服於戲之盟鄭簡再服故也至此伐鄭而鄭不服乃戍之矣諸侯既留戍則楚師之來其意原不欲與之戰也楚公子貞帥師救鄭文定以為以救許楚所以深惡諸侯不能保鄭肆其凌逼曽荆楚之不若也非也春秋書救鄭非善楚之救鄭以著諸侯伐鄭而鄭未服也前書戍陳是諸侯之保陳也此書戍鄭虎牢是諸侯之扼鄭也如不書楚救鄭則疑於伐鄭鄭服而戍虎牢猶之戍陳矣此與書楚人救衞同義也夫伯者之不能以義服諸侯豈惟晉悼雖桓文皆然蕭魚之㑹論者比績於召陵城濮而戍虎牢則致蕭魚之勝算也如以戍虎牢為不義則蕭魚亦不得為美如以蕭魚為美則戍虎牢不得譏其不義文定美蕭魚而惡戍虎牢則亦不善於論伯者之事矣蓋泥於凡書救皆善之之說也公至自伐鄭此年至伐鄭明年再至伐鄭而後至蕭魚之㑹以著晉悼勤於伐鄭不急於得鄭而卒服鄭也十有一年春王正月作三軍周制大國三軍則魯為大國宜有三軍矣齊氏以為魯以伯主之令軍多貢重減為二軍今復増置中軍也胡茅堂以為文宣以下軍政隳壞不補其闕三家各毁其私乗以補足三軍之數也惟文定則以為廢公室之三軍而三家各有其一若是則為改作三軍春秋當有異文矣又如齊氏之說則為復舊制之三軍如胡氏之說則為補足三軍之數復舊補數皆不當云作也觀春秋書法與書作丘甲同又於此書作三軍於後書舎中軍竊恐魯舊祇有二軍也蓋魯為侯爵視公為次視伯為大周禮諸公之地封疆方五百里侯四百里伯三百里使侯封四百里之間田野開闢人民殷庶則以備三軍有餘矣其或不然似亦未可以軍數之備而盡役其耕作之民也伯禽侯東啟宇之初或不足大國之賦閟宮之詩曰公車千乗公徒三萬者必魯向來無此至僖公而盛故史克追頌其美耳但其車徒雖盛一時成攘楚之功或未必為三軍之制以遺後人抑或史克侈言三萬舉其成數朱子曰三軍者車三百七十五乗三萬七千五百人其為步卒不過二萬七千人舉其中而以成數言故曰三萬也然又安知非以二軍之二萬五千人而以成數侈言三萬之多耶此時魯之二軍必皆出於公或季氏欲分公室而無其便故謀之仲叔作為三軍而各征其一軍蓋其名則毁私乗以足公車出私民以備公徒而其實則公車公徒皆三家之有矣但作三軍後昭元年叔弓亦稱帥師抑或未必三家各専其一也夏四月四卜郊不從乃不郊鄭公孫舎之帥師侵宋據左氏子展曰與宋為惡指此條侵宋之師也曰諸侯必至則指十二國之伐鄭也曰吾從之盟則指亳城北之盟也曰楚師至吾又從之則指楚子鄭伯之伐宋也曰晉怒甚矣晉能驟來楚將不能吾乃固與晉則指十二國伐鄭而㑹蕭魚也子展又曰師而伐宋可矣若我伐宋諸侯之伐我必疾吾乃聽命焉且告於楚楚師至吾又與之盟而重賂晉侯乃免矣再理前說然後侵宋以致諸侯若是則晉楚皆在鄭人算中鄭之謀國雖不合道而亦紓難固圉之勝策矣然皆左氏因經而附為之說也鄭從晉則伐蔡或晉命之伐蔡以絶楚或鄭自伐蔡以信於晉也鄭從楚則伐宋或楚命之伐宋以絶晉或鄭自伐宋以信於楚也公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭盟戲而楚子伐鄭則鄭之與盟可知矣盟亳城北而楚子鄭伯伐宋則鄭未必與盟也但前伐鄭鄭不服而諸侯不盟此伐鄭鄭仍不服而諸侯何煩自為盟耶然觀厲公伐鄭不服而盟柯陵則悼公伐鄭不服而盟亳城北事有相同也左氏以亳北之盟鄭與而再從楚猶盟戲而即從楚之故智鄭瀆鬼神而欺晉楚可以不信戲之盟則亦可以不信亳北之盟但經不書楚伐鄭而書楚鄭伐宋則鄭未必與盟矣從經可也秋七月己未同盟于亳城北亳公穀作京亳北盟諸侯蕭魚不盟鄭豈於諸侯則盟以信之於鄭則信而不盟耶抑以諸侯信故復盟諸侯鄭伯不信故不復盟鄭伯耶然蕭魚之後鄭不背晉從楚者二十餘年則盟而不信固不若不盟而信矣然則盟固不足恃而必要盟何為哉公至自伐鄭此至伐鄭與前至伐鄭同皆以著鄭之未服也但前伐鄭而諸侯不盟此伐鄭而諸侯盟何以不比於盟柯陵之至㑹蓋柯陵之至㑹罪其同王臣此則諸侯之盟也何以不比於於戲之不至蓋於戲鄭服而速叛不可以至此則鄭不與盟可以直書至自伐鄭也楚子鄭伯伐宋楚知鄭之再從晉而出師伐鄭鄭逆之而言其情楚子因與之伐宋以示絶於晉左氏云然也然使當日事果如此則春秋宜書楚子伐鄭遂及鄭伯伐宋不當合書楚子鄭伯伐宋矣固知亳北之盟鄭未服而不與也公㑹晉侯宋公衞侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭㑹于蕭魚晉悼三伐鄭至㑹蕭魚而後鄭服楚不能爭論者以為春秋美蕭魚以與召陵城濮比績也汪氏謂齊桓召陵以服楚晉文城濮以勝楚晉悼蕭魚以敝楚三者以較竊以為莫善於服之莫不善於敝之蓋楚敝而諸侯亦敝也齊桓九合諸侯以謀楚惟召陵一用諸侯之衆後則救許救徐兩役而已楚雖滅弦滅黄而東方大國未有一受其屈辱者晉文城濮一戰楚人十年不見於經而勢為稍衰晉襄繼之遂以世主夏盟晉悼當君弑國亂之後以亡國公子入繼為力實難然使増修徳政内輯諸侯釋秦之仇平齊之忿養力蓄威乗吳楚搆兵之敝合諸侯之師聲陳鄭之罪致楚一戰楚不戰則有以服之楚戰則有以勝之以之比績桓文庶幾無愧乃即位逾年即使韓厥伐鄭又逾年而合宋衞侵鄭陳鄭既服而叛親役十二國之衆三年之間三至鄭郊何其急也晉但為不戰敝楚之計而諸侯之國連年出師不且交敝乎哉計悼在位之十六年自用兵者三襄元年伐鄭三年伐許十年伐秦用諸侯之師者十有二襄元年九國圍彭城又五國次鄫二年三國侵鄭又十國城虎牢五年七國救陳七年八國救陳㑹鄬九年十二國伐鄭十年十二國滅偪陽又伐鄭十一年十二國伐鄭又伐鄭十四年十二國伐秦又不侵伐而㑹盟者九蓋諸侯大夫無歳不奔走於途士民無歳不披甲執兵以聽晉命也蕭魚烏足以方召陵城濮哉雖然晉悼之時非桓文之時而事勢亦㑹有變也齊桓之時楚之病中國未甚其欲得中國之志未堅桓定其規模蓄其謀慮然後臨之以重兵責之以大義既示以必戰之勢而又開其來盟之門楚雖欲不服而不能也齊桓既卒宋襄召釁盟鹿上㑹盂延盜入室戰敗於泓而天下震恐魯則乞師以伐齊陳蔡鄭許則從師以圍宋長勝而驕輕敵者敗晉文一出而楚不能當城濮之戰楚固有必敗之道而晉文亦以為不戰而勝之不足以遏其方張之勢也是以楚之畏晉甚於畏齊㐮靈以來雖以商臣之暴而厥貉之次但能耽耽虎視而已無何中國之禮義日敝而楚之威力日强既不能服之又不能勝之即幸以服之而終不足以制之至於勝之而不可制則伯主攘楚之道窮矣晉悼敝之之法豈得已哉蓋鑒於鄢陵之戰不能收城濮之功而不得不為此變計也故雖諸侯與楚同敝而蕭魚之後得以休息則謂晉悼之伯比績桓文不為虚美矣然而淪夷而至於盟宋諸侯皆朝於楚則亦蕭魚之流禍也公至自㑹書至㑹鄭服也以著兩至伐之未服鄭也李氏曰厲公三伐終以伐至悼公三伐終以㑹至最得春秋書至之義者楚人執鄭行人良霄書楚執鄭行人而鄭之告絶於楚可見鄭之堅以從晉可見楚之怒鄭可見楚之怒鄭有所屈而不能爭可見冬秦人伐晉晉師敗績不書家氏以為不與秦之為楚而救鄭者非也春秋於秦晉之爭前則詳書者所以詳其結好致怨之由以著晉之有得有失也其後雖有侵伐無闗於中國之故故皆從畧其書秦人秦師亦不必其為秦伯為秦大夫如中國之舉爵稱名稱帥師也然亦非春秋畧於秦詳於楚為有進退予奪之義蓋秦不為中國患故其事不必詳楚為中國患故其事不可得而畧也夫秦以西方大國地廣兵强僻處西陲不若楚之爭盟中夏雖曰受制於晉然使終年治兵以與晉報復不已晉能一日休息哉晉又得免西顧之憂而南向爭鄭哉故左氏多載秦人助楚之師而春秋不書者所以恕秦也十有二年春王三月莒人伐我東鄙圍台台穀作邰下同莒人再伐魯而伯主不討不自斂戢更興伐國圍邑之師宜其失鄆而卒招見執之辱歟髙氏以莒見伐不已歎魯之弱為莒所欺然魯猶不弱於莒兩伐不報者以告於伯主而俟其令為有禮也至伯主終不見討而後救台因以入鄆則知魯之非弱矣季孫宿帥師救台遂入鄆鄆公作運救台入鄆宿固有遂事之罪然亦憤莒之見伐不已晉悼釋之不問激而為之也莒伐魯不討則魯入鄆亦不得而責之矣悼之苟且如此也夏晉侯使士魴来聘莒圍台魯入鄆同盟之國兵爭若此伯主若罔聞知而但修聘講好難以主夏盟矣秋九月吳子乗卒鍾離於柤兩㑹吳子之後吳始通喪於上國矣蜀杜氏以書吳子乗卒與宣十八年書楚子旅卒同義以著諸侯赴告之相親為是其不書葬是魯不往㑹孫氏以為罪大惡重而貶之者非也冬楚公子貞帥師侵宋齊桓㑹葵丘之明年書楚人滅弦晉悼㑹蕭魚之明年書楚公子侵宋皆無害於兩公之伯一以著楚之强項終不服善一以著楚之計窮力竭技止于此也公如晉襄公即位於晉悼之世無歳不㑹伐㑹盟三年初朝四年八年及此年無事則皆往朝之蓋未有一歳寜居也十有三年春公至自晉夏取邿邿公作詩許氏以為晉始息民是以楚侵宋而不報魯取邿而不討取無大亂而已夫滅國大亂之道非若楚侵宋之用師小而入境淺也齊桓不能存黄晉文不能存江且以為譏今中國諸侯以大滅小置之不問春秋所以惡魯兼惡晉也但魯以削弱之國公然取邿而無忌者晉既不討滅鄫之莒其能討魯之滅邿乎葢亦有詞於此也秋九月庚辰楚子審卒楚方爭鄭而侵宋楚子之卒而赴告諸侯者習於中國之禮雖侵伐相尋不廢喪紀也魯之不㑹楚葬與不㑹吳葬其不待以中國諸侯之禮則一而已矣冬城防救台入鄆有懼于齊故城防以為之備也十有四年春王正月季孫宿叔老㑹晉士匄齊人宋人衞人鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人㑹吳于向齊宋衞書人於事無獨貶三國之義左氏以三卿為情也趙氏辨之謂春秋大義不當從怠惰生文是已李氏又以若果微者不當列於鄭上比於蜀之盟齊大夫列鄭卿下謂當從左氏非也成十五年㑹吳既名大夫則此不必名矣伐秦亦不名者猶文二年伐秦三年伐沈之不必名也責不在大夫故也㑹戚名者罪季孫宿士匄華閱公孫蠆之黨孫林父也以㑹向伐秦之兩不名著㑹戚名之之義也名公孫蠆者著蠆之導君從晉㑹向伐秦而蠆之名未嘗見經如書鄭人恐人疑於公孫舍之良霄公孫夏之儔也此不名北宮括而伐秦名之者括於成十七年嘗帥師侵鄭葢與孫甯同用事於國者伐秦之月衞侯出奔以著逐衞侯者孫甯而非括所以脫括而實坐孫甯也魯二卿皆書者以著晉列二卿之非禮二卿並與之非禮也此名士匄伐秦名荀偃者以著欒郤之後晉政在士氏荀氏也二月乙未朔日有食之夏四月叔孫豹㑹晉荀偃齊人宋人衞北宮括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦晉厲合九國之諸侯以伐秦晉悼合十三國之大夫以伐秦其為動衆勤逺取譏春秋一也乃厲則見弑於逆臣而悼則取譽於諸侯者一則剛而惡一則柔而善也故伐秦之役重煩諸侯而徵列國之卿其道皆用柔而其失也損威喪徳諸侯不畏大夫無忌及己之身滅國不問出君不問交相侵伐不問而以圍齊執邾莒之事遺之後人晉伯因以漸衰豈不惜哉左氏於向之㑹魯列二卿則為晉人輕魯幣而益敬其使之說於伐秦名公孫蠆北宮括則為蠆言於括勸諸侯之師濟涇之說而以崔杼華閱之不書為惰且謂向之㑹亦如之夫伐秦而遷延以為惰於事可也㑹而有惰容惰言於何見之使主㑹者因其惰而削名書人則魯史為仍載書春秋為仍舊史而非有褒貶矣使以春秋因其惰而削名書人則失子未親與㑹烏從而知之耶故不可以通也己未衞侯出奔齊春秋書君奔者九鄭突衞朔衞鄭郕伯衞衎燕款蔡朱莒庚輿邾益皆以自奔為文其大夫之奔者亦以自奔為文豈無有道無道有罪無罪之别哉何其文之不異也夫有弑君有逐君有殺大夫有逐大夫弑君不論有道無道皆書弑其君殺大夫不論有罪無罪皆書殺其大夫其有道無道有罪無罪則於前後之文槩可攷而得之則君之出奔大夫之出奔其有道無道有罪無罪亦可於前後之文攷而得之矣文定於衞衎之奔據左氏甯殖之言以為舊史必書孫林父甯殖出其君而春秋書衞侯出奔者聖人筆削不因乎舊史之文蓋以著衎之無道故不書所逐之臣以警人君為後世鑒也孟子曰貴戚之卿君有過則諫反覆之而不聽則易位孫甯衞之世臣衎果無道出之立剽是行貴戚安社稷鎮國家之常道而又以為臣而逐君其罪已明為誅孫甯之詞者何哉夫使春秋有書出君以罪臣者有書出奔以罪君者則君臣之罪誠以聖人載筆而定乃春秋一例以出奔書則何知聖人於誰為因舊史於誰為不因舊史耶且如衞衎在位十八年輔晉悼以伯未見有虐鄰國殺大夫諸無道之事一無禮於孫甯而即為所逐春秋不若是其罪之深也觀春秋於衞衎未奔之前書衞大夫之交政於諸侯者非林父即甯殖於衞衎出奔之後書衞大夫之交政於諸侯者非林父即甯殖則孫甯之當國可知矣無故而衞衎出奔非孫甯逐之而誰哉故一例書奔而孫甯之罪不可逃固非以不書孫甯出其君為罪衞侯也衞侯之奔諸儒不書名之義可通而李氏以不書名為歸功於弟鱄者經文亦無此義也又晉為盟主衞衎之輔晉伯甚力衞衎為孫甯所逐不奔晉而奔於晉所不相下之齊者林父為晉所納既托于晉而又以衞事晉晉之直衞侯不如其庇林父也然而晉為盟主君臣之義其知之矣置之不問而且因以定剽之為君則此後大夫無君之禍豈非晉悼釀之哉莒人侵我東鄙晉於衞之逐君且不問宜莒之四侵魯而無忌也秋楚公子貞帥師伐吳吳楚相攻可以無書書伐吳者著楚以患吳之故而不能爭鄭也書公子帥師者著楚之大用兵於吳所以不得爭鄭於晉也公子貞凡七帥師亦見其専矣冬季孫宿㑹晉士匃宋華閱衞孫林父鄭公孫蠆莒人邾人于戚魯之季氏晉之士氏宋之華氏鄭七穆之公孫皆専國無君林父之儔也㑹於林父之私邑以定立剽其實則助孫甯也魯晉宋鄭之君亦危矣哉其勢固不能禁諸卿之黨林父也齊卿不㑹衞衎在齊之故不然崔杼其不為㑹中人耶十有五年春宋公使向戍來聘二月己亥及向戍盟于劉魯盟晉衞之卿於國都此出國都以盟向戍非輕晉衞而重宋也方受莒人之兵又不睦於齊而晉悼怠於政事故結宋為援於向戍之來聘既盟之而又尊異之也劉夏逆王后于齊左氏卿不行以譏非禮自是應有之義公穀以為過我也當是過魯而魯有應交之禮耳春秋書此者以著齊女入為王后方過魯而魯以禮遇之逾時而齊侯即親帥以伐其國禮之不足以靖干戈如此也夏齊侯伐我北鄙圍成公救成至遇齊爭魯於晉自敗鞌之後屈於晉而相忘者三十年此間晉悼之不振而復起釁端四年而兵六至齊環之不道雖以凌魯而實以抗晉也環之抗晉凡㑹盟侵伐皆以其臣其子厠於諸侯之列而晉悼以彌縫為忠厚至列其世子於小侯之上此環之所以易視晉而間以兵加於魯也髙氏以為衞侯在齊季孫宿㑹戚以定衞剽北鄙之伐以此之故使齊果以此故則誠有名而晉宋鄭莒邾皆不能解於助臣出君之罪何獨以惡於魯哉使環能振旅向衞討孫甯以納衞侯晉必屈於大義難以助衞敵齊他諸侯亦必不能扶不正以敵正乃釋逐君之孫甯不問而問黨孫甯之魯不一加兵於衞而於魯則四年而兵六至失公義而爭私憤此諸侯所以並起而仇齊也季孫宿叔孫豹帥師城成郛書城成郛見成以被圍而壊其郛著齊師之暴也秋八月丁巳日有食之邾人伐我南鄙邾於成公之世再朝於魯又朝襄公於即位之年至今未有怨也忽起南鄙之伐者魯素弱邾而凌之瞷齊莒之交惡於魯而亦因以抒其積忿也冬十有一月癸亥晉侯周卒十有六年春王正月葬晉悼公依五月而葬之期則當在㑹湨梁之月速葬而速㑹非禮之甚矣三月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于湨梁㑹於戚而孫林父甯殖定矣㑹湨梁而衞剽定矣晉悼失於其終而及身之伯衰晉平失於其始而晉之世伯衰甚矣為國不可牽於私而失大義也戊寅大夫盟晉文之時翟泉以大夫而盟王人而諸侯未失政者諸侯不在而奉諸侯之命以盟也於向伐秦於戚之以大夫㑹而諸侯不與亦已甚矣湨梁之諸侯皆在而大夫盟是無諸侯而有大夫也夫盟者惟恐其不信而盟以信之也諸侯不信而始盟諸侯盟而後信諸侯信則大夫不敢不信矣至於政在大夫則諸侯信而大夫或有不信不特大夫互不相信而且不信於諸侯而且不信於其君故有諸侯盟而大夫渝之諸侯不能守於是諸侯不必盟而使大夫盟矣大夫盟則大夫信大夫信則大夫守之諸侯不得而渝之也故自此以前有大夫盟者而政在諸侯皆以諸侯之命盟而大夫之盟為文而已自此以後仍諸侯盟焉如以大夫之命盟而諸侯之盟為文而已於湨梁一書大夫盟則諸侯大夫之一大交闗也晉人執莒子邾子以歸莒邾誠有罪也責之以嚴詞使謝過於魯可也執之甚矣而況以歸耶即曰莒四伐魯或曽責之而不悛則又不當以一伐魯之邾與莒同罪也故治二國之背盟棄好未嘗不為伯討而動不中禮又釋逐君篡國之公孫剽而且定之雖欲治莒邾烏足以服莒邾哉春秋書執莒邾以著晉之失而其釋兩君可以不書也然如邾子既執而嗣子不悛再遭執辱伯令不行而小國怙惡若此亦可以勸世變矣齊侯伐我北鄙湨梁未散齊侯親將伐魯是明以晉執莒子邾子之故因以加兵於魯以與晉為難也夏公至自㑹至㑹於齊伐我之後兼以著齊靈之褊急暴戾不及待湨梁諸侯之散也五月甲子地震叔老㑹鄭伯晉荀偃衞甯殖宋人伐許許欲遷晉當與大夫謀而請不當許男私請而後大夫不可也左氏因許久屬於楚晉已舎陳必不無故爭許故為此說然魯晉衞皆卿宋人又不名而鄭獨君親則仍為鄭之請晉以求遂其凌許之志也即有許男欲遷之言亦必鄭假為許男有此志以動衆而興師耳秋齊侯伐我北鄙圍郕一年而再伐魯前書圍成此書圍郕後連書圍桃圍防四書齊侯一書髙厚一書齊師若此其詳者以著齊環之惡之甚也大雩冬叔孫豹如晉齊三伐魯矣魯告於晉又二年伐魯至六而始圍齊晉固重於伐齊也魯六受齊伐而猶仰鼻息於晉襄公弱不足責而當國者無修詞引義睦隣靖難之道亦難以為國矣十有七年春王二月庚午邾子牼卒宋人伐陳宋陳之不睦久矣宋之伐陳是自修怨也如奉晉命問陳逃盟之罪則當一例書卿帥師書侵矣其事無大闗繋故從畧書人先儒於此等處多不以稱人為貶彼見齊侯五伐魯舉爵故知其不可以通而於此無說也夏衞石買帥師伐曹曹與衞為同盟未有怨也已則逐君而出師以伐人國何所執言乎此必孫甯蓄怒於大夫之㑹戚而曹不與也秋齊侯伐我北鄙圍桃齊髙厚帥師伐我北鄙圍防桃公作洮髙厚上左無齊字一時而君臣分兵來伐各圍其邑此春秋所未有詳書之以罪齊環并罪髙厚也九月大雩宋華臣出奔陳春書伐陳此書華臣奔陳是所謂違難而適仇國也故不必詳其出奔之故而華臣亦有罪矣冬邾人伐我南鄙邾之罪再世相繼而伐大國一也盟主治之而不服一也在喪而用師一也宜其復遭祝柯之執歟十有八年春白狄來夏晉人執衞行人石買伐曹者石買帥師則執之以治其罪買亦不能為之辭矣而書行人石買者以見行人之不宜執也故書法與楚執鄭行人無異而事之是非則見於前後之文各不相同秋齊師伐我北鄙穀作齊侯冬十月公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊齊環無道合十二國而圍之内諸侯無有不至者故書同以見非但魯之藉晉以報怨亦非但晉之惡其異已假虐魯之罪摟諸侯以伐之也諸儒以為同心圍齊夫齊固背盟棄好凌虐神主而莒邾亦屢加兵於魯蓋與齊合者亦在㑹圍之列是迫於晉令而來非果同心也觀再執邾子可見曹伯負芻卒于師楚公子午帥師伐鄭蕭魚之後歴今八年鄭之事晉無㑹不與無役不從未有微隙可乗而楚欲得志於鄭必不能矣子孔一人之私其能抗諸大夫逆君命而叛晉哉十有九年春王正月諸侯盟于祝柯柯公作阿自盟新城以來晉㑹諸侯之盟而與諸侯同者歴五公矣平之伯業不逮悼悼之虚朾雞澤戲亳城北皆同而平之祝柯澶淵不同者平襲悼之餘烈執莒邾以討伐魯執衞石買以討伐曹實行乎伯主之事至合諸侯以圍齊齊不敢戰威加齊衞莒邾而徳在魯曹祝柯之盟懐徳畏威不得不推晉為主而晉平亦儼然主之矣澶淵而齊又來服復何讓哉逮其後商任沙隨失於㑹錮欒盈以致齊背盟而見伐楚乗隙而爭鄭一㑹夷儀而威喪於畏齊再㑹夷儀而徳衰於受賄平丘之盟諸侯當不復推之為主而平亦自媿不足以主諸侯又不得不與諸侯同之也晉人執邾子邾牼已與莒子同見討於晉矣莒人靖而邾人不靖謂以修先君之怨則非魯之虐邾而邾之仇魯也晉人以前執其君而後人不悛雖再執之而終不肯靖故又劫其地與魯以重其罰而未免於失之太過矣不言以歸者削其地而釋之也公至自伐齊晉文圍許而至圍許定公圍成而至圍成始終圍之一義而已此圍齊而至伐齊者書圍齊以著諸侯之已甚書至伐以著齊環實有以取之也又與伐鄭圍新城至伐不同伐鄭為齊桓之仗義故前後皆書伐而圍邑之罪又減於圍其國都也既盟祝柯而不至㑹者固以著齊之未服而亦以見諸侯以伐齊為本事而盟為末事也取邾田自漷水左氏以為疆我田取邾田自漷水家氏遂謂因復舊疆挾伯主之威多取田於邾若是則晉未命取邾田而魯强取之矣非也左氏曰次於泗上疆我田取邾田自漷水歸之於我次於泗上者晉侯次於泗上也歸之於我者晉侯命歸之於我也然春秋書取邾田自漷水祇若魯自取之者所以罪魯也其於晉則書執邾子罪之矣季孫宿如晉葬曹成公夏衞孫林父帥師伐齊衞之伐齊即有晉命然獨不曰故主在齊非臣子所敢加兵乎晉不以此諒衞而命衞伐齊衞不以此辭晉而受晉命以伐齊交有罪矣宋公子馮在鄭宋摟諸侯以伐鄭春秋猶惡之況十年在位而遭逐之故主耶齊之不睦于晉原以衞衎之故如衞剽猶有良心則圍齊之役亦當辭乃更使林父帥師専伐天理絶矣𫝊稱欒魴同役而春秋削欒魴不書者専罪林父也又春秋凡奉伯主之命多書侵而此獨書伐者専罪衞也秋七月辛夘齊侯環卒環公作瑗晉士匃帥師侵齊至穀聞齊侯卒乃還春秋譏伐喪則于聞喪而還者其為善之無疑矣孫氏以春秋有貶無褒朱子取士匃還師之事謂是春秋予之蓋春秋之時天子弱而諸侯强中國衰而荆楚横王者跡熄而伯主迭興以大并小以强兼弱亂臣賊子接跡于世三綱五常之理無有存者端本清源其大段無非可貶而節目之小善書于册者如此之類亦不一事雖為予之亦孟子所謂彼善于此也即以此論之十二國圍齊齊不敢戰齊已屈矣兩執莒邾而齊不能爭魯之屈已伸矣晉師可以已而不已必欲服齊而後快毋乃已甚耶而士匃之知義則不可以不書也八月丙辰仲孫蔑卒齊殺其大夫髙厚髙厚從君于昏欲黜世子而立庶誠為有罪然獨不曰有先君之命乎光既即位廢厚不用可也殺之甚矣髙國齊之世臣書殺髙厚著崔慶之所以専齊也髙氏以為厚嘗帥師伐魯今晉新行義于齊齊侯始立而欲親晉故歸罪于髙厚而殺之以悅于晉非也齊晉勢力均敵而魯為弱齊苟欲親晉晉喜得齊不必殺髙厚而後怨釋也又齊六伐魯齊環親將者四髙厚帥師者一若以伐魯之故而殺厚悅晉是惡其父矣必不然也鄭殺其大夫公子嘉嘉公作喜楚公子午之伐鄭左氏以為公子嘉招之也然即據左氏嘉告午而午不許迫于楚子之命一試用兵則嘉之謀未顯而事猶在可信不可信之間子展子西欲加其罪何患無辭乎文定謂子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉夫使嘉之謀實有可據子展子西不難討以叛君即楚之罪嘉之謀實無可據而楚之伐鄭亦未有害則嘉以公子之親或可少原也乃必殺之以遂其私固子展子西之罪而亦鄭簡之失也即不分其室而亦為殺之不以其罪矣冬葬齊靈公城西郛莒四伐皆東鄙齊六伐皆北鄙邾兩伐皆南鄙此城西郛知為國都之西郛也魯之西境不與三敵國為鄰豈不保其鄙而直虞强齊之造其國都耶怯亦甚矣叔孫豹㑹晉士匃于柯魯之事晉晉之庇魯皆可謂勤矣豈猶不信而恐其親于齊將疎于我致煩邀其大夫于途而㑹之哉蓋是時權在大夫信晉侯不如其信晉大夫托於晉平不如其托于士匄也城武城既城西郛又城武城皆懼而備齊也是必齊尚未釋然于魯也故以殺髙厚為歸罪于厚之伐魯者必不然也二十年春王正月辛亥仲孫速㑹莒人盟于向莒四伐魯晉雖執之于湨梁未見莒人如何屈服而魯亦竟釋之不報但為向之盟以締新好蓋莒雖小而强魯固不能如之何也夏六月庚申公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵齊來受澶淵之盟者崔杼因亂立君而欲結諸侯之好也髙氏薛氏以為士匄不伐其喪為能修徳來逺尚未必然不書同盟者晉侯主盟諸侯受盟故也孔氏以為服異書同齊服而不書同者齊晉已為大隧之盟非至此始服然大隧之盟春秋不書何以示義而使後人知其故耶秋公至自㑹仲孫速帥師伐邾齊莒邾同時伐魯齊為甚莒次之邾又次之伯主執莒邾之君合十二國之師以圍齊所以治三國虐鄰之罪也而治邾為甚既執其先君又執其嗣子又割其田亦已不平矣而魯之于三國則盟莒以釋前怨聘齊以通新好獨不釋然于邾而伐之何哉蓋齊為大國雖六伐之怨而不敢報莒小而强即四伐之恥而亦不復洗惟邾最弱小伯主既重其罰而魯猶不復守澶淵之盟也其不平甚矣哉蔡殺其大夫公子燮燮公作濕鄭殺公子嘉左氏以為嘉招楚以伐鄭也蔡殺公子燮左氏以為燮欲舎楚以從晉也若是則嘉不義而燮義矣春秋書法無異嘉之不義燮之義皆不可得而見則兩人之有罪無罪無從而别于此可見春秋書殺大夫但以著其専殺之罪而不屑屑于所殺大夫之有罪無罪也然則大夫之有罪無罪春秋竟不一置是非乎大夫用事于國以事見于經者即可以其事為㫁其未有事見于經如嘉之招楚燮之從晉皆無事實不可據以論定也蔡公子履出奔楚據左氏則燮以欲舎楚從晉見殺履其母弟何以反奔楚不虞楚即以其罪罪之耶左氏殆不可信抑或履將訴于楚以明燮之不叛而轉以為國人之罪也陳侯之弟黄出奔楚黄公穀作光蔡履陳黄皆奔楚舎中國而適荆蠻固其罪也然蔡陳舉國皆服屬楚又何責乎履黄哉蓋履黄之必奔楚以為苟奔中國但足以容身而已奔楚以愬于楚則燮之寃可伸而二慶之専可去故黄卒能殺二慶而復國也夫其君臣兄弟之是非一質于楚而生殺榮辱皆為楚所制亦可慨矣杜氏以為兄而害弟者稱弟以彰兄罪然如陳招之稱弟豈亦為兄之害弟耶而衞鱄之奔亦非衞侯有害鱄之意也大約春秋稱兄稱弟有本不稱公子而為兄弟之辭者有本稱公子而書弟或以罪兄之不能容弟或以罪弟之為禍于兄者不可以一例論也叔老如齊釋怨修好不以譏也然觀其用兵于邾則聘齊亦有畏于齊耳豈澶淵之盟于邾不足守而于齊不可渝耶冬十月丙辰朔日有食之前紀日食或言朔或不言朔自此終春秋之世無不言朔者楊氏曰史之詳畧異也然用朔之法不同明有食在晦食在既朔之占不得謂前則逺而難詳後則近而可攷也又春秋頻年而食者五而襄之世三前此十四年十五年而此年明年二十三年二十四年又有頻月之異天道固渺而難知安得竟以為非人事所感耶季孫宿如宋向戍來聘及盟之後越五年不報既盟澶淵先聘齊而後報宋猶成公之世盟于馬陵魯于齊之怨既釋而後于宋之婚姻始成也蓋魯之忌于齊者如此二十有一年春王正月公如晉圍齊取邾田已三年矣至此始往拜者葢魯猶患齊澶淵盟而聘問通然後朝于晉晉亦不責公之緩也邾庶其以漆閭丘來奔魯納三叛臣恰值君皆不在國先儒遂以為春秋不書莒僕之納寳玉而書三叛之以地來者不書為公諱其書以罪季氏也然而聖人未必有此意也寳玉非盜邑之比原不足書而左氏以為行父使司宼出僕于境則魯未嘗受僕之奔其事亦不應書也三叛之納其書以罪季氏何疑如公在國而苟有以地來者春秋其將不書耶必不然矣夏公至自晉秋晉欒盈出奔楚欒盈未有得罪于君與國人獨為强家所迫其奔不為罪也罪在奔楚而欲藉楚以求入耳不得于楚既而奔齊齊强納之幾以亂晉晉固絶之已甚而盈之志亦惡矣九月庚戌朔日有食之冬十月庚辰朔日有食之頻月而食之變即見于頻年之後日月之不用其行也甚矣春秋之世只襄此年及二十四年兩見而此後又只漢初三十年間兩見先儒謂天度有時而變其常使天度果變其常則以常數推春秋日食者宜乎其多不合而凡厯算家推其不在食限因以疑史文之有誤者不得有定說矣曹伯來朝公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子于商任商任之㑹左氏以為錮欒盈也是時盈方在楚晉㑹内諸侯以錮之將使盈終于楚齊侯與㑹而卒受于明年之來奔然則錮之何益耶齊既納盈而沙隨之㑹齊侯又未嘗不與而卒不聽于晉然則雖再錮之又何益耶不仁之人絶之已甚無所容于天地之間則必為亂晉雖殺盈因此而致晉齊再惡謀動干戈所傷多矣二十有二年春王正月公至自㑹凡公之出或逾月或逾時或逾年而書至皆以誌其實也至在正月亦是以實屬辭諸儒以為著不朝正于廟者春秋無此義也夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨邾子下公穀有滕子㑹商任盈未至齊也㑹沙隨盈已在齊矣晉侯錮之齊侯納之兩君相見何以為詞甚矣諸侯之不以誠相與也公至自㑹汪氏以商任沙隨晉㑹錮欒盈齊强納之故兩書公至以危之然晉絶惡以致亂齊納亡以召釁此晉齊之危而公何危哉楚殺其大夫公子追舒追舒之徒多馬楚子疑而殺之又言諸其子倘其子以告于追舒追舒謀先而難作楚子其危矣乎然據左氏楚子三泣棄疾必有不堪于追舒之専者不但疑于觀起之多馬也二十有三年春王二月癸酉朔日有食之二月己巳杞伯匄卒夏邾畀我來奔公作鼻我畀我邾之叛臣庶其之黨也庶其不可受畀我獨可受耶庶其之以邑來適公不在遂以為不諱而書則畀我之來公在何獨不為公諱耶自南鄙以來魯邾相仇久而益深書之不詳不足以見其歴久用兵之由故知庶其之以二邑來雖公在亦必書也葬杞孝公陳殺其大夫慶虎及慶寅陳殺二慶黄自楚歸家氏以為春秋書法祇若陳人自殺之自復之者不與楚之専制中國也然則放陳招殺陳奐何獨與楚之専制中國乎蓋未嘗滅陳之前則殺公子過猶書陳人既書滅陳之後則放招殺奐楚得而専之則亦不得不據實以書矣今陳侯在楚楚挾以臨陳陳人殺二慶以悅楚則二慶實陳人殺之也既殺二慶陳侯返國公子黄從陳侯以歸則非陳侯不欲黄歸而楚强納之也事勢如此故書法如此而豈有與不與之義哉但二慶為陳人所殺宜稱陳人不稱人而稱國者陳侯既不能制二慶之不讒黄又不能抗楚以庇二慶則二慶之殺國殺之也陳侯之弟黄自楚歸于陳二慶之愬黄曰與蔡司馬同謀黄果與蔡司馬同謀不可謂非謀國之正者也舎荆蠻而從中國黄即以此得罪而死是以義死也春秋固將與之矣黄之奔楚者必以己之不敢叛楚即晉為辭也是自昧其行義之初心矣自楚歸陳者必楚人信黄之不敢叛楚即晉也是自蹈于不義之實跡矣顧使但以求伸于楚楚釋黄不罪止矣何恨于二慶而必殺之哉楚之所以必殺二慶者必黄轉以二慶之欲去異己以叛楚即晉為辭使楚曲聽而殺之也然而左氏不足據不可漫為之說觀春秋書法明示黄有挾楚殺二大夫而强歸于國之罪不特脅國人而且蔑君兄也若春秋無罪黄之義則黄之奔楚自楚而歸亦削而不書矣晉欒盈復入于晉入于曲沃奔臣復入或入國或入邑未有若欒盈之詳者亦其事勢然也據左氏盈先入曲沃自曲沃入晉為亂不勝而再入曲沃不先書入曲沃者盈志在入晉不若他叛臣之但欲據邑故先入曲沃之文可省也其再書入曲沃者盈據其私邑晉實于曲沃殺盈故復入曲沃之文不可省也秋齊侯伐衞遂伐晉書欒盈奔楚不書欒盈自楚奔齊盈之入晉不書自齊入于晉何以知齊之黨欒盈耶于盈入晉入曲沃之後書齊侯伐衞遂伐晉知之也然則春秋惡齊之黨叛臣矣何不詳書以罪之葢齊實非為欒盈也齊怨魯之不事齊而事晉因以怨晉之庇魯而加兵于晋勢相傾軋獨屈于不得已而强與盟㑹未嘗一日不欲乗機以弱晉也盈為晉之巨族一旦為同列所擠而奔其黨猶足以亂晉故助之入曲沃俾為亂于内内亂則外以兵臨之而可以得志于是伐衞而晉果不救伐晉而晉果不出明年晉㑹夷儀而果不敢報使齊莊不見弑于崔杼晉齊之勝負固未可知也然則欒盈雖殺而晉之勢頺齊之計得矣使春秋書欒盈之奔齊書盈之自齊入晉不幾使後人疑于齊之實黨欒盈哉然則不即伐晉而先伐衞者何也魯之背齊向晉衞居其間衞又嘗奉晉命伐齊而是時衞衎尚在齊戚之㑹以定孫甯湨梁之㑹以定衞剽齊皆未與伐衞固有名故先伐之以試晉晉不救衞而乃乗勢以伐晉也春秋書遂者以著齊之本謀在晉也八月叔孫豹帥師救晉次于雍榆榆公穀作渝以行軍之禮言之或次以俟主軍之令如公羊先通君命之說是也以行軍之機言之或次以伺敵人之隙如外傳所云與邯鄲勝擊齊之左倚是也春秋書次者雖非善之而亦非以譏之也觀八月次雍榆至冬齊侯還師襲莒則齊師久于晉晉保境而不輕戰無譏于魯之駐師而不能救矣己夘仲孫速卒季氏欲廢長立幼而訪于臧紇宜其事之成矣葢紇固廢賈為而立者也使紇以為幼不可立則已何以立哉孟氏豐點欲廢長立幼而難于季孫因以謀之公鉏亦宜其事之成矣葢公鉏季孫之所廢以立悼子者也使公鉏廢長而季孫以為不可廢則已何以廢哉左氏敘事而當日之情理皆得其用意精矣冬十月乙亥臧孫紇出奔邾武仲奔邾之後復入據防納龜請後得請奔齊春秋但書奔邾而入防奔齊不復書者情惡而叛亂未成不得而罪之也故夫子平日之論以防求後罪其要君而不筆之于經非以恕武仲也可見春秋于奔大夫必有叛亂之跡而後書之以著其惡其他逆理千分之小事則置之且亦不勝書也晉人殺欒盈六卿和而諸侯服欒范軋而世伯衰欒盈雖殺而内害己深故齊侯在境師老而不敢戰齊師既去㑹諸侯于夷儀而不敢報氣餒而志憚南北之分伯亦由于此齊侯襲莒通春秋加兵人國惟此書襲杜氏曰輕行而掩其不備似已然潛師以掠境非掩其不備耶何以書侵隠十年宋衞入鄭僖三十三年秦人入滑之類非皆掩其不備耶何以不書襲蓋侵者無志于深入也入者罪其已甚而書其重者也齊侯有入莒之志不可但加以侵莒之名既不可加以侵莒之名而又不見有入莒之實銜枚截鈴而來掩旗息鼓以去從輕而書侵不可從重而書入又不可則為變文書襲而已矣實書齊候以深惡之也二十有四年春叔孫豹如晉穆叔之如晉既以謝雍榆之無功亦以請于晉而起侵齊之師也葢晉以為魯之故而被齊師魯于勢亦不得不然耳仲孫羯帥師侵齊齊六伐魯魯不敢報此而動侵齊之師者雖牽迫于為晉之故而亦倚晉為强也夏楚子伐吳吳楚相攻可以不書書楚子伐吳者錄吳楚之搆兵以著荆蠻之所以息患于中國也秋七月甲子朔日有食之既齊崔杼帥師伐莒齊既襲莒而又伐之怒莒之屈于晉而又盟魯也左氏云崔杼帥師送薳啟疆因以伐莒若是則仍是掩其不備矣春秋必不書伐春秋既書伐是必假為罪莒之辭以致討而非送使者之師也大水八月癸巳朔日有食之公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀晉受齊之伐逾年而始㑹諸侯于夷儀以謀伐之諸侯之師既集又逾時而不克伐者何也欒盈之難魏氏猶庇之而諸卿之仇盈者范氏為甚韓趙知中行之怨猶未深也盈之族大而士多除大族而戮多士國亂已極人心必摇勢不能和諸卿一衆志以用大師于齊也冬楚子蔡侯陳侯許男伐鄭李氏以蕭魚之後楚兵再至鄭而無功為悼公之餘澤者非也齊桓之伯不五年而楚子㑹盂晉文之伯不十年而楚子次厥貉其餘澤安在哉楚君臣虎視中國與晉爭伯未嘗一日忘也今晉有内亂齊以東方大國而與之為仇楚内結强齊外率附己諸侯之師乗晉之亂以加兵于鄭得鄭必矣而棘澤之次無功即還者楚患吳也故春秋于前書楚子伐吳以著楚之所以不能爭鄭也汪氏以為楚伐鄭以救齊不書救齊為不予楚人之救者非也晉㑹夷儀實未伐齊何以書楚救齊乎汪氏又以為諸侯去齊而救鄭救不及事所以不書諸侯之救者亦非也楚合蔡陳許之師伐鄭原未有必得鄭之志其為宼未深受害未甚雖微諸侯之師亦將解鄭而去諸侯之救既不為功亦不為罪功罪皆無是以不書非為其救不及事也公至自㑹春秋但書㑹夷儀不書伐齊救鄭則其至㑹宜矣又何有不至齊為不能正齊之罪不至鄭為薄其救鄭之功之義哉許氏之說非也陳鍼宜咎出奔楚大夫出奔必有内亂書之以著鄭師之所以入陳也叔孫豹如京師聘于天子禮也然自此以前五十餘年不聘自此以後終春秋之世不聘此為僅有之事雖書以美之而實示其譏也大饑二十有五年春齊崔杼帥師伐我北鄙齊素弱魯魯既救晉而又侵齊齊未有不報之者也在魯必明知有齊師而先為之備故齊之來伐雖當大饑之後而不為病也夏五月乙亥齊崔杼弑其君光太史書崔杼弑其君崔杼殺之其弟嗣書而殺者二人其弟又書乃舎之南史氏聞太史盡死執簡以往聞既書矣乃還夫齊光受殺于崔杼之家而杼又無可委罪之人獄無可疑其當書崔杼弑其君也必矣而杼猶殺其三人則凡弑君而有可疑者其當國之人必不許史氏歸獄于己矣彼列國之史氏詎盡如晉史之書趙盾不畏其死齊史之書崔杼死三人而猶不畏哉故春秋書弑君恐多不得其實者也夫子作春秋審其情事一㫁以天理王法之公而是正之此所為春秋成而亂臣賊子懼也公㑹晉侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀晉再㑹諸侯于夷儀將以伐齊也晉之再謀伐齊者齊搆叛臣亂晉因以伐晉而取朝歌也欲報朝歌再㑹夷儀而不克伐者齊以莊公之弑兑晉以納賄請成也嗚呼是非公私之義亡矣向背者鄰國之常情篡弑者天下之大惡朝歌之怨可以不報弑君之賊不可以不討乃為報怨而來反見弑君而去是十二國之諸侯為晉討叛侯而崔杼之弑君亦為晉誅叛侯矣天理王法至此不且澌滅殆盡哉故春秋書崔杼弑君于前書同盟重丘于後事不可掩而罪無所逃貶之至矣六月壬子鄭公孫舎之帥師入陳君在㑹大夫専師以入人國豈非罪乎然陳嘗助楚伐鄭鄭怨而報之或者其君臣之定謀也但伐人而至入其國都為己甚矣書公孫舎之書帥師書入亦所以罪之也髙氏據左氏子產子展之有禮以為春秋無貶者非也李氏又以為子產子展之入陳同于子國子耳之侵蔡二子之心不同故舎之得稱名而子國稱人亦非也夫侵者師淺入以掠其境也入者奔其人民破其城郭而造其國都也雖應侵不應侵應入不應入曲直别有義在而即以用師言之侵之為輕入之為重而罪之輕重亦視乎此諸儒以稱人為貶以舉爵稱名為無貶大失春秋之義也秋八月己巳諸侯同盟于重丘重丘齊地盟于齊地則明著其釋弑君之罪而不問矣杜氏以為齊亦與盟則不然齊景為崔杼新立必不敢出㑹崔杼亦必懼討而不敢出盟既書諸侯同盟必無齊大夫與焉夫晉以伐齊之故而㑹夷儀齊適有弑君之變即不能易伐叛之辭為討賊之辭以聲崔杼之罪則釋此而去可也而又盟諸侯何哉彼祇以遂其初志而已叛則伐之服則舎之我之伯事舉矣齊弑齊君不足問也其稱同盟者載書之詞義不係乎書同也伊川以為同病楚夫春秋不罪其成齊亂而顧予其治楚患哉必不然矣公至自㑹汪氏以為著其黨惡附奸之罪也文定至例所云黨惡附奸祇桓公伐鄭莊公伐衞及此數處可通然政不必為此拘說也衞侯入于夷儀鄭突入櫟名衞侯入夷儀不名文定正不正之說亦有義理然而奔君復國使奔既不名而復又不名則不知其為誰矣突書入櫟不再書歸于鄭故入櫟時不可不名衞侯入夷儀其後書復歸于衞故于復歸衞名而入夷儀時不必名也文定以為有世叔儀以守有母弟鱄以出或撫其内或營其外有歸之道于義未絶故爵而不名者非也春秋奔君書名惟衞鄭衞衎稱爵二君于義原未絶然亦于復歸書名故奔可以無書燕款為齊卿所納不名故奔書名蔡朱莒庚輿邾益不復歸故奔書名忽突羈赤有奔有入若不書名則于兩人無别鄭突之一奔一歸一入皆名衞朔奔入皆名亦所以著其惡也郕伯奔而不名者國微而史失之也楚屈建帥師滅舒鳩楚滅舒鳩稱大夫帥師自北而晉荀吳滅陸渾之戎蔡公孫姓滅沈鄭游速滅許皆書大夫帥師矣如以書人為貶書大夫帥師為與之然則春秋與大夫之滅人國耶冬鄭公孫夏帥師伐陳夏公作蠆鄭于六月已入陳矣至冬又帥師伐之一年而再加兵于陳亦可謂之不義矣春秋比書以深惡之也家氏以春秋不人公孫夏為無貶辭謂陳叛華即楚鄭服晉既久能一歳再出師以伐陳撓楚為春秋予之然則宣成之間鄭許皆服于楚鄭屢用兵于許以許之故受楚責而歸晉成公四年一歳而再用兵于許諸儒又以書鄭伐許為春秋狄鄭者何耶于再伐許則甚其罪于再伐陳則又嘉其義是非曲直不當若是其懸也如以予從晉之鄭以伐從楚之陳則去年四國伐鄭以蔡陳許之君同楚子舉爵又何義耶十有二月吳子遏伐楚門于巢卒書伐楚以見非伐巢也書門于巢以見未有侵掠宼患之事及巢也書門于巢卒以見吳子之卒不以正也吳子以伐楚而出害不及巢而卒不以正則為巢人之詐而殺之可知矣兵不加已隠謀設伏以戕其國君巢之罪也宜其卒為吳所滅與二十有六年春王二月辛夘衞甯喜弑其君剽季氏逐昭公于外八年既薨喪歸而後立君季氏之罪未可逃也即昭公卒能復國自季出之自季復之専國攬權威福由己詎可藉口于伊尹太甲之放桐歸亳哉甯殖助林父逐君立君剽之在位已十有二年使殖尚在而廢剽復衎亦未可解于易置其君之罪而況弑剽乎而況喜之弑剽乎喜之弑剽以為遵父命也以為復故君也夫父命則遵矣故君則復矣而弑君之惡名誰任之哉使喜親為弑君之逆而可以脫殖逐君之罪則陷身以貸父猶之可也逐君弑君世濟其惡甯氏所謂狠而愚者也弑君之名里克不能辭喜顧可辭耶喜果孝子則于殖逐君之時宜諫于殖既死之後宜去范氏以為父立以為君則子宜君之者亦不然也衞孫林父入于戚以叛文定以為據土背君當是時也衞剽已弑衞衎未入林父之叛為叛何君哉然而林父之叛叛衞也戚為衞邑受之自先王守之自先公凡國君而内失一邑外取一邑且以為罪豈人臣所可竊據者哉況林父以之如晉而負巖邑挾大國以抗其君哉林父之逐君也春秋書衞侯出奔而逐君未有主名此于甯喜弑剽之後衞衎復歸之前書林父入戚以叛而後林父逐君之罪并著矣不然二月辛夘剽弑越四日甲午衎歸林父即倉猝如戚而叛之形未著衞之侵戚晉之戍戚皆在衎歸之後春秋何以書叛于辛夘甲午之間哉葢使既書衞衎歸衞而後書林父以戚叛則或疑林父以他故不悅于衎衎迫之以叛而不見逐衎之為林父矣惟書叛于剽甫弑衎未歸之間而後可以知衎之出林父出之剽之立林父立之治林父之叛衞并以治林父之逐君也甲午衞侯衎復歸于衞奔君不名則不知其為何君衞鄭衞衎奔不名者以復歸書名見之也衞衎入夷儀不名復歸名者兩見而卒名之也文定謂其歸國之後失信無刑是以名之然使衞衎不殺甯喜而春秋既書弑其君剽而衞衎不名何以見兩君之名實哉衞衎自圖復國而搆喜弑剽為己之故而教為人臣者以弑其君是悅其忠于己而不悅其忠于所事之君即不殺喜亦為非義春秋亦不以其于義未絶而姑予之也使春秋以殺喜之故而名衞衎豈不殺喜即宜舉爵以予其搆臣弑君以納己而因以尊寵之哉剽為孫甯所立雖亦不免于篡春秋既以弑君之罪罪甯喜則剽非喜之所當弑既非喜所當弑即非衎所宜搆之以弑矣固知春秋之名衞衎不以殺甯喜示義也夏晉侯使荀吳來聘觀下書澶淵之㑹則荀吳之來為約公㑹可知矣夫孫甯逐君伯主釋而不討則晉悼之失也晉平之時剽立已十二年列于諸侯之㑹者七甯喜一旦弑之烏可以無討哉甯喜弑君之罪大于林父之據邑晉悼既釋林父之逐君則林父之據邑猶為惡于甯氏者而不忘所立之剽而晉平之助林父為助其忠于剽也先儒責晉平之約㑹諸侯為奬叛臣為率天下之人臣使之盡叛其君夫以林父之君為剽則林父之據邑為剽弑之故而非叛剽以林父之君為衎則林父逐衎于十二年之前君臣之義已絶而其據邑亦非為叛衎春秋書法書甯喜弑君以罪甯喜書林父入戚以叛于剽甫弑之後衎未入之前以罪林父而各當乎兩人之罪故林父之叛為叛衞而非叛衎晉之助林父為助叛衞之林父而非助叛衎之林父也使春秋至此而始罪林父之叛君豈貸林父逐君之罪于十二年以前哉晉平但知十二年君衞之剽不可弑十二年去衞之衎不可納而忘乎逐君據邑之林父不可助故約諸侯為澶淵之㑹也使晉平執甯喜戮之使林父辟邑以定衎之為君則于義得矣而晉平不能也然而春秋猶恕之者林父逐君事在已往今之據邑不為無罪而晉平之助林父猶視助凡據邑叛君者罪為稍減故戍戚不書討衞疆戚田不書執衞侯不書也公㑹晉人鄭良霄宋人曹人于澶淵據左氏㑹澶淵以討衞疆戚田取衞西鄙懿氏六十以與孫氏夫卿大夫之食邑君所賜者非君所賜則尺寸不可以私有衞之戚豈林父所宜據衞之西鄙豈晉所宜强取以與孫氏哉故澶淵之㑹春秋書以示譏也葢晉平但知衎已非衞之君而忘乎林父原為衞之臣但知今日君衞之剽不可弑而忘乎當日君衞之衎不可逐但知剽已殺而林父非衎之臣而忘乎衎既復而戚為衎之邑但知助不弑剽之林父而忘乎助逐衎之林父但知助林父以抗十二年失國之君而忘乎逆衞衎以黨十二年専國之臣是非公私之介不明失大義而開逆亂之端此為甚矣所以然者衞之歴世堅輔晉伯皆孫氏父子主其君而為之晉徳孫氏而不徳衞故衞逐林父則林父奔晉林父逐衎則衎不奔晉而奔齊林父奔晉則晉納之衎奔齊則晉定剽之為君而絶衎于衞也觀于魯之聽衞以從晉文三年孫良夫來聘及盟襄七年孫林父來聘及盟則孫氏父子不特以衞從晉而又為晉以致魯宜晉徳之哉故魯與孫氏亦世有盟好澶淵之㑹三國皆大夫而獨襄公親往也是以春秋目公以著之至于晉宋書人鄭書良霄以為貶趙武向戍不貶良霄為子產新得政鄭伯為衞侯如晉為不助孫氏者春秋亦無此義也宋序鄭下或非向戍晉之是趙武非趙武皆不可知即為趙武而不名者㑹澶淵之罪滅于㑹戚而不必名以著之也不然澶淵人之以貶豈㑹戚名季孫宿士匄華閲公孫蠆而反無貶哉鄭良霄名者為後五年殺良霄起也自書楚執行人良霄之後十五年無事見經故于此及盟宋名之以著良霄用事于鄭之久也如以人趙武向戍示貶則亦當没公以示貶今觀于公則公之人則人之名則名之固非屑屑于名某不名某以為貶某不貶某也且使以鄭伯為衞侯如晉而不貶良霄則晉之執衞侯春秋不書未嘗著晉執衞侯之罪何以示書良霄為予鄭伯不助孫氏之義哉秋宋公殺其世子痤痤穀作座晉獻寵驪姬愛奚齊而殺申生孽自己作也宋平以伊戾之讒而殺痤莫親于父子莫重于世適一讒人搆難而即自殘其骨肉甘受殺子之名則宋平為愚于晉獻矣然而讒言之入必乗其隙宋平之嬖棄猶晉獻之嬖驪姬也宋平之愛佐猶晉獻之愛奚齊也故兩君初無易世子之心而惟恐世子因我有私愛而疑我有易世子之心始則虚意世子之疑已繼則實以己而疑世子嫌隙成而形跡著于是讒間行而禍亂作矣春秋直筆書之與書弑君同為嚴重之詞以為殺世子者非他人即爾君父也君父所殺者非他人即爾世子也其以垂戒天下後世深切著明矣晉人執衞甯喜晉人之執甯喜公羊以為不以其罪執之不得為伯討劉氏以為執其不應納君而伐孫氏也髙氏以為討其伐戚而殺晉戍也家氏以為坐林父之訴而執之則悖也其說皆非也雍廩以私殺無知春秋猶予以討賊之義晉人執甯喜雖有怒其伐孫氏殺晉戍之私未嘗不以討弑君為名既以討弑君為名則雖受林父之訴而亦未為不義何為不予以伯討哉春秋所以不予晉者罪其既執甯喜不以為戮而猶釋之使歸衞而為卿也蓋甯喜弑君之賊晉為盟主討而殺之則得其義矣徒執何為耶有執則有釋春秋書執則不殺之詞也討弑君之賊而但執之失刑甚矣故春秋以執甯喜書者罪晉平不殺之而執之也八月壬午許男甯卒于楚春秋附楚之國許為可憫許之于鄭既有先世滅國不祀之仇許叔入許之後而鄭積世加兵不已晉為伯主曽不能制鄭使無侵小許之附楚豈得已哉春秋書許甯之卒楚所以惡鄭虐許之甚而憫許男之死不得其所也冬楚子蔡侯陳侯伐鄭楚合陳蔡以伐鄭諸侯之救不至鄭不服而猶未受楚害者楚以應許男之求而志不在得鄭故也葬許靈公二十有七年春齊侯使慶封來聘魯反覆向背于齊晉之間齊爭魯于晉致受諸侯之伐其往年之聘魯則以報魯君臣朝聘之勤也今魯堅事晉而齊聘忽來則邦交之常也齊景即位之初而有禮于魯以為賢也可矣夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衞石惡陳孔奐鄭良霄許人曹人于宋弭兵息民事非不善屈中國之諸侯以庭見于楚則冠裳倒置而齊桓晉文之業掃地盡矣據左氏則向戍本為弭兵之謀而晉楚之從交見則子木請之而趙孟許之也論者不以罪趙武而以罪向戍何哉宋在春秋獨能抗楚楚屢伐之至于圍之逾年而不肯服齊桓之伯宋實輔之晉文城濮之戰宋師與焉宋襄鹿上之盟猶有兼伯齊楚之勢執于盂敗于泓而不悔其後晉主夏盟未嘗一背晉而向楚也今向戍但為和解晉楚以講好睦隣而趙武竟諾其諸侯交見趙武累向戍矣約盟既定明年朝楚聞楚子卒宋公及漢而返向戍曰姑歸息民待其立君而為之備葢悔為趙武所誤而為備楚之逺圖猶凜凜乎中原正氣不可得而辱屈之也衞殺其大夫甯喜晉殺里克衞殺甯喜而書殺其大夫與齊弑商人而書弑其君同齊人弑君之賊也齊人既君之則其君矣不書弑其君而何哉里克甯喜弑君之賊也晉惠衞獻既大夫之則其大夫矣不書殺其大夫而何哉而衞獻之殺喜又甚于晉惠之殺克葢惠以里克弑兩君而入立克之弑兩君克自為之也惠之失在不于入國之時即正克弑君之罪而徳其迎立成為君臣及知其本欲謀納重耳而後忌而殺之也衞獻盟喜以納已教之弑剽則剽之弑獻與聞焉紿之以弑君納已授之以國政為其大夫者逾年然後惡其専而殺之則為殺大夫而非討弑君明矣故晉惠殺克猶可曰子弑兩君而衞獻殺喜不能明正其罪曰子弑剽也衞侯之弟鱄出奔晉鱄負羈縶執鈇鑕以從君于外者十有二年而心不貳不可謂非忠于衞侯者矣納君之策告于天王請于方伯討剽而戮孫甯名正言順以復國正也即不能然托于大國以兵伐衞廢剽逐孫甯而納其君猶之正也再不能然告無罪于國人國人羣起而攻孫甯以請故君反正猶之正也乃衞獻之復國由于甯喜甯喜之納君由于弑剽甯喜之弑剽由于鱄之約言穀梁氏曰已雖急納其兄與人之臣謀弑其君是亦弑君者也責之是矣而又以為衞鱄之去合乎春秋則非也葢鱄之去以殺甯喜而去知信之不可失而不知君之不可弑知納我者不可殺而不知弑君者不可用使衞獻不殺甯喜而鱄顧可與弑君之賊比肩事主哉知大義者苟知不殺甯喜而與之同朝之非義亦可以知既殺甯喜而憤然去國之未為義也與人之臣謀弑其君既失之于前雖惡其失信以去亦無救于後不以義始者必不能以義終故無論喜之殺不殺鱄之去不去無適而可也秋七月辛巳豹及諸侯之大夫盟于宋自諸侯之大夫盟宋而中國諸侯北面朝楚由今論之晉之罪也然在當日諸侯則固相與安之矣葢楚之初入春秋即以敗蔡師虜蔡侯書固已横暴之甚矣其後入蔡伐鄭見于經者皆非侵掠細故也齊桓創伯以攘楚為義諸侯藉以稍安至宋襄召釁辱盂敗泓諸侯畏楚而為通好請命之計非晉文城濮一戰諸侯之北面朝楚尚得延至襄昭之世哉厥貉之次辰陵之盟蜀之盟幾幾乎無中國矣晉君臣强霸横爭為諸侯捍外侮力支中國幾及百年而内潰之勢卒不可救不得已而為弭兵息民之說固不得甚其一日之罪而冺其百年之功也嗟乎晉為諸侯禦楚誠晉之功晉即不為諸侯禦楚何至遂以為晉之罪哉蓋春秋之勢諸侯不能自强屢欲從楚晉强制之使不從楚非諸侯之力可以不從楚而晉迫之使從楚也故不得以北面朝楚為晉罪也雖然晉非天下諸侯之罪人而趙武則晉之罪人也晉世主夏盟天下諸侯之安危視晉晉之先公當楚勢昌熾之時猶能戰城濮戰鄢陵㑹蕭魚以挫其鋒比年以來楚有吳患勢稍衰矣趙武當國使能輔晉平増修徳政和輯臣民結好諸侯為必能勝楚之勢楚不内宼則為衣裳之㑹以震懾之楚入侵則為兵車之㑹以戰却之振先緒而纘伯功則楚可弱而諸侯可安數世之利也奈何失可乗之時而反使諸侯北面于楚耶夫齊桓晉文周之罪人顧春秋猶或義而取之者則以其攘楚也有攘楚之功故天下諸侯不朝天王而朝伯主齊晉偃然受之功罪猶足相當今以天下諸侯而分為晉楚之從天王安在哉是不以為周之諸侯而以為晉楚之諸侯矣嗟乎晉不以諸侯朝周而以朝己至此又以己之諸侯朝楚又以己之諸侯易楚之諸侯使並朝己罪為大矣以此罪晉雖有百年捍諸侯之功不足贖也則皆趙武之累晉也冬十有二月乙亥朔日有食之自十四年至此凡十四年之間而日九食又三見頻年兩見頻月變亦甚矣如謂行有常度食有定數則頻月亦非異何有于頻年哉然而通春秋觀之惟此為數則不以為有感而致然不可也二十有八年春無氷無氷紀異明是子丑之月主夏正者謂是年前未藏氷而春無氷供用說烏可從夏衞石惡出奔晉衞衎復國逾年而弟奔再逾年而卿奔其不見直于國人可知矣然而晉方庇林父而仇衎二人皆奔晉亦不免于逺難適仇之罪也邾子來朝邾近于魯不能盡以小事大之道忽起伐魯之謀以致君辱地削至于無可如何而仍朝于魯則亦不得為謀國之善矣秋八月大雩仲孫羯如晉襄公二十一年以前五朝于晉大夫亦五聘之及今八年終襄公之世不復朝晉而聘問亦疎羯之如晉亦以公將朝楚而告為宋之盟故也亦可以知晉平之不足以致諸侯而魯亦不勤于晉矣冬齊慶封來奔慶封來奔齊來讓而後奔吳則魯已受其奔矣慶封與殺其君來奔而受魯之黨惡不能免于春秋之譏也諸儒多以春秋為魯諱惡此非惡耶如義存乎諱則楚殺慶封于伐吳之後于此可以不書或書遂奔吳以示魯之不受矣十有一月公如楚公之朝楚與朝齊晉其為不歸職貢于宗周而庭見諸侯取譏春秋一也然齊晉假尊周為名而天子致伯則其朝也為朝伯主未為有罪而罪在不朝天王耳至于朝楚甚矣而又奉晉命以往尤為非義之至也十有二月甲寅天王崩周來告喪公雖不在而以葬期按之則當于公至自楚之後而竟不往㑹豈非罪哉若天王速葬而以送楚子之葬故不及往㑹罪尤甚矣乙未楚子昭卒天王崩楚子卒相比以書合觀前後之文則見魯之勤于楚而不一加禮于周也春秋事外寓貶如此之類不可不知二十有九年春王正月公在楚前書十一月公如楚後書五月公至自楚雖不書公在楚亦可知公之在楚矣而春秋書公在楚者以示公不宜在楚而在楚也而上又有天王崩之文有楚子卒之文天王崩則當急奔天王之喪而何以在楚楚子卒則朝楚之禮可已而奔喪送葬皆不當行而何以在楚哉文定兼罪季氏取卞而著人臣不敢一日忘君非經義也夏五月公至自楚晉景既卒而成公如晉是明著其以奔喪往也襄公如楚而楚子卒是以朝楚往而適有楚子之喪也其有送葬之辱則一而已矣人君舉動不可以輕使若宋公之及漢聞喪而還楚其能旦夕亡我哉此則非趙武之罪而魯大夫之罪也庚午衞侯衎卒閽弑吳子餘祭盜殺蔡侯者無主無名之詞也閽弑吳子者有主無名之詞也無主者散也有主者専也無名者賤也盜曰殺者盜非臣也閽曰弑者閽臣也閽既為臣而不曰弑其君者有大臣有小臣有貴臣有賤臣僮僕隸卒之賤君可以槩而臣之而彼不敢同于卿大夫士庶人以君其君也仲孫羯㑹晉荀盈齊髙止宋華元衞世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞儀公作齊莒人下公穀有邾人歴敘諸侯之大夫以見晉之役諸大夫諸大夫之聽命于晉専以城杞也杞未若齊桓時有淮夷之急患乃合十一國之大夫以為之城而又不及農隙之時其為譏何疑哉晉即能恤宗周親諸姬而亦為舉動之過矣左氏以為治杞穀梁以為杞危而不能自守故諸侯之大夫相率以城之汪氏以為修其城郭然使就杞之故都而増修之用晉一國之力足矣不必煩十一國而為此大役也惟杜氏以為杞國本都陳留雍丘縣桓六年淳于公亡國杞始并之遷都淳于僖十四年遷緣陵襄二十九年晉人城淳于杞又遷鄀若是則此為城淳于乃春秋不書城淳于而書城杞者必杞既遷淳于晉人為之擴大其城如邢既遷夷儀而三國為之城不曰城夷儀而曰城邢也故春秋城緣陵與城楚丘同城而後遷也城杞與城邢同遷而後城也然邢遷夷儀書杞遷淳于不書者邢為狄所迫不書遷夷儀不足以著狄之暴與齊桓之功今杞非有不得已而遷之故晉亦非有不得已而城杞之故故不書遷以著晉之私于杞也晉侯使士鞅來聘士鞅之來必是告魯使歸杞田而以拜城杞為名也僖公二十七年杞桓來朝而公子遂即帥師入杞宣公之世杞不來朝而十八年公親伐杞其侵削杞田必多矣杞初托昏姻于魯魯不能撫存之而又侵削之杞之弱魯弱之也今杞托昏姻于晉晉使魯歸其侵田誰曰不宜當不得謂魯義而晉不義矣故韓穿來言汶陽之田歸之齊則書者魯田不可以歸齊故書以著晉之不義也士鞅來言歸杞田不書而書來聘者杞田不可以不歸杞故不書以隠魯之不義也杞子來盟莊二十七年杞惠來朝稱伯僖五年杞伯姬來朝其子其年惠卒不書子成公立為淮夷所病齊桓以諸侯為之城緣陵而不列之于㑹則微弱可知二十三年成公卒稱子必既降而為子矣弟桓公立二十七年來朝稱子仍其兄之故稱也杞桓要為能自樹立者初以伯姬之故托魯存己魯不加恤又侵削之是以忿而逺托于晉故文十二年來朝稱伯成四年來朝稱伯五年來逆叔姬之喪稱伯其年晉侯列之蟲牢之盟其後馬陵于蒲皆以杞伯書則晉之扶殖之也由是桓公之卒稱伯而魯始以邦交之禮往㑹其葬桓卒匄立晉悼以夫人之親于獻于柤亳城北蕭魚杞伯無不與者杞又能㑹伐鄭之師又大夫亦得共伐秦之役蓋與列侯等矣晉平則溴梁祝柯澶淵沙隨終杞孝之世無不列于諸侯也襄二十三年孝公卒子益姑立二十四年猶與夷儀之㑹二十五年盟重丘不與逾五年晉㑹諸侯之大夫以城杞必其積漸微弱又不能自存而晉再為扶殖之也百年之故都又將他徙此必有故晉役諸侯之大夫又强魯以歸其田亦必有故恐其微弱又有似于病淮夷時矣宜其來盟于魯復降從先世稱子之禮歟葢過自挹損以求侵田俾魯不怒以彌他日之釁端也其為自降何疑哉自此而杞終春秋稱伯雖魯怒其挾晉歸田而于文平悼僖四公無不盡其喪紀者則皆以晉之故也吳子使札來聘書吳子使札來聘與楚子使椒秦伯使術同未有異義也固無賢札讓國之義亦無貶札辭國生亂之義陳氏以為書札如椒術者皆非命大夫之辭也亦是葢春秋但以著楚秦吳之通聘上國其于椒術札之賢不賢無闗也又何褒貶于札之讓國哉内諸侯來聘之使名則名之有氏則氏之雖以公孫剽孫林父之篡國逐君亦不于來聘削其氏以為貶則于札來聘而非削公子以示貶可知矣季札之于吳國朱子曰可以受可以無受可以受則季歴也可以無受則叔齊也季歴叔齊皆不失為仁賢則受不受各有其義不可以叔齊之不受責季歴之受亦不可以季歴之受責叔齊之不受也文定以叔齊之徳不越伯夷孤竹之舎長立幼為私志故叔齊之讓為賢然季歴之徳又豈越泰伯而太王之舍長立幼豈獨非私志而季歴之受將亦不得為賢哉文定又以諸樊兄弟父子無及季札之賢者其父兄所為眷眷而欲立札為公心故季札之辭為生亂然孤竹之中子恐亦不及伯夷叔齊之賢叔齊逆父兄之命而去初不計其國之治否則札何以逆料其國之必亂非己不可治而必不讓而受哉且諸樊餘祭夷昧既有賢札立札之公心而堅意讓札則三人者亦不得謂之不賢也獨是季札之讓而以方之泰伯仲雍伯夷叔齊則亦不可伯仲夷齊皆以讓國而去則國人之望絶而季歴中子受之而安季札有讓之名有讓之實而獨不得其所以讓之道使札于壽夢既卒諸樊甫立之日托故以去遨遊上國長往不返則兄弟迭為君致國季子之謀寢當諸樊餘祭之間諸樊或不授之弟餘祭或不受之兄舎弟而𫝊子則光之得國已久而僚不致死于光手矣札既不去而猶用事于國諸樊將卒而札在焉是以致國于餘祭也餘祭遭弑而札在焉是以致國于夷昧也光雖凶戾當諸樊及餘祭餘祭及夷昧之時而黙然無一言者亦以其祖其父之命欲致國于季子耳夷昧卒而季受則先命不可以違也季既不受則若光若僚宜㫁以義如以光為諸樊之冢嗣壽夢之適孫則正光為君而國可以無事矣如謂兄終既不弟及則父死當以子繼引泰伯仲雍不祀于周季歴以𫝊文武之義諭光使無覬大位可也夫以光之凶戾札宜知之雖諭之而亦不見聴獨奈何不自為計哉即及身之變及後世之變雖賢者亦有所不及料而札既賢而能讓獨奈何不酌處于所以讓之道哉如札者能讓國而不能去國不去國而又不能定國聖人原無所取之也又子西季札皆不能改吳楚之僭王聖人于子西無取何取乎札但諸儒之論謂當受國而不當讓以生亂是父命不可不遵有季歴不當有叔齊矣未見其允也秋九月葬衞獻公齊髙止出奔北燕髙止奔燕于前後事無闗可以不書而春秋書者以著齊舊族之衰而陳氏所以弑君得國也冬仲孫羯如晉晉脅魯以歸杞田猶使羯往以報士鞅之聘魯之屈于晉者如此三十年春王正月楚子使薳罷來聘罷公作頗來聘以報朝此齊晉伯主之禮即天子諸侯相朝聘之禮也不行于天子而伯主行之則楚亦行之矣夏四月蔡世子般弑其君固蔡般弑君左氏敘其事以為蔡景為般娶于楚而通焉般弑之若是則蔡般弑君之跡在于閨門袵席其事微而隠故景弑般立而國不亂般必諱其為卒以禮葬之而公然赴于諸侯魯是以往㑹其葬也其書般弑君者必史臣之直筆也五月甲午宋災宋伯姬卒詳書月日著伯姬以災之日卒也然使災自災卒自卒何以知伯姬之卒于災乎觀下書葬書叔弓往㑹是魯憫其守禮以死故使卿往而春秋特書之以著伯姬之卒于災也天王殺其弟佞夫公作年夫據左氏儋括謀逆而佞夫不知然凖以舜封象之義佞夫即知之亦可以不殺雖曰舜為匹夫時象有殺舜之心及為天子象謀遂寢亂匹夫之家與亂天子之家不同舜可以不殺象而周公所以必誅管叔也然即以周公之義言之三叔同叛誅管放蔡猶分首從儋括倡謀以正厥辜可矣佞夫顧不可免耶書天王殺弟佞夫與書刺公子偃同皆為不當殺而殺也王子瑕奔晉臨川吳氏以瑕為天王之子與聞乎儋括之謀括事敗而佞夫見殺瑕懼禍及而奔夫佞夫者景王之弟也若瑕為景王之子則括黨弟以謀兄豈肖不密于兄之子耶瑕助叔而謀篡其父以圖利耶左氏以儋括之謀佞夫不知顧瑕反與聞之耶必不然矣觀其同儋括奔晉必靈王之子景王羣弟而助括為逆者也秋七月叔弓如宋葬宋共姬共姬上穀無宋字杜氏以為卿共葬事其禮過厚然春秋書之者兼以著伯姬之卒于災也薛氏以為古者夫人無諡從夫之諡東遷之後其制隳矣共姬執禮而死宋人不敢加以非禮之諡也然則他夫人之諡為臣子敢于以非禮加之耶見于春秋者魯夫人不從夫諡宋之稱夫人或歴來從夫或惟伯姬從夫皆未可知然又安知非春秋稱共姬以著伯姬為共公夫人嫠居三十四年老而守貞知禮雖死不亂耶鄭良霄出奔許自許入于鄭鄭人殺良霄子晳不以君命而攻良霄亦不能無罪春秋専為罪良霄之辭者良霄既奔而又入鄭為亂也且前書楚人執良霄書良霄㑹澶淵良霄盟于宋是内與國政而外交諸侯矣内與國政外交諸侯者卿也汰侈而嗜酒何以為卿汰侈必貪嗜酒必暴貪暴之人人必怨之觀左氏良霄以子皮之甲不與攻己而喜則其與攻良霄者必多矣又良霄入鄭伐舊北門駟帶助國人以伐之則國人交惡之也故子晳之攻良霄必猶托為從衆人之欲兩罪較而有其重者則治重者而輕者可以姑貸也冬十月葬蔡景公蔡人不討般而葬景公蔡人之罪也魯置蔡般弑君不問而又往㑹蔡景之葬魯之罪也書魯往㑹則諸侯可知諸侯皆往㑹葬而不以蔡般為賊則諸侯之書罪也諸儒以春秋之義弑君而不討賊則削其葬不至蔡景許悼之葬不可以通則又多為詞說而大義反晦夫弑君之賊國人不討則隣國當討他弑君而不討者既有罪矣而其國人猶畏隣國之討不敢告葬也隣國猶知賊之當討不往㑹葬也今蔡景之弑即在幃闥許悼之弑即以藥物蔡許即以正卒來赴亦當詢其卒之故也觀春秋直書弑君在當時必有忠憤抗直之士明言其弑君者而事正在根究之列乃置之不問反以邦交喪紀之常往㑹其葬蔡既如葬其無故之君魯亦如㑹其無故之君之葬罪益甚矣晉人齊人宋人衞人鄭人曹人莒人邾人滕人薛人杞人小邾人㑹于澶淵宋災故左氏有叔孫豹又敘豹歸見孟孝伯之語文定遂以為諱魯卿而不書陳氏以為譏不在魯則不書皆不然也共姬魯女既使叔弓往㑹其葬則賻遺有禮諸侯之大夫謀歸宋財穆叔雖在而不與矣又翟泉于蜀澶淵諸侯之大夫從畧書人諸儒以為翟泉以大夫而盟于王城之側于蜀以中外之大夫同盟而主嬰齊澶淵不討蔡般弑君而謀歸宋財故皆貶而人之三者之當貶其義是矣但必人之而後為貶則他之舉爵稱名者將以為無貶不可以通也翟泉以大夫盟王城之側踐土則以諸侯盟天子之側孰近孰逼不人踐土而人翟泉固知春秋義不繫乎此也于蜀之大夫為楚所迫猶為要盟于宋之大夫晉楚成言楚爭先歃諸侯北面朝楚不人于宋而人于蜀固知春秋不以人不人為義也蔡般弑君大夫㑹澶淵以謀宋災齊崔杼弑君諸侯㑹夷儀以謀報朝歌既以朝歌之役怒齊而來反以弑君之故解齊而去不人夷儀之諸侯而人澶淵之大夫固知春秋不必人之為貶不必不人為非貶也葢春秋既書宋災故則其釋蔡般不討而徒為謀歸宋財失于本末輕重常變之義了然矣雖歴序趙武公孫蠆向戍北宮佗罕虎而何嘗非貶哉春秋所以不名大夫者罪諸侯之不討弑君也書宋災故者恐後人疑于㑹澶淵以謀討弑君也三十有一年春王正月夏六月辛巳公薨于楚宮秋九月癸巳子野卒子野卒立公子稠未嘗不正穆叔為武子謀曰不度之人鮮不為患若果立之必為季氏憂武子不聴而卒立之夫立君以為季氏也則視為季氏之休戚可也立君為魯穆叔不為社稷民人計而憂季氏者蓋當日三家皆自為謀季氏之憂即孟叔之憂也必其時昭公在喪露聰明出意見為穆叔所忌故言之以聳武子使更立君即不更立而亦思有以防制之夫魯之勢在三家公室之積弱已久昭公何能為逮其後也但見季氏為昭公之憂不見昭公能為季氏之憂也己亥仲孫羯卒冬十月滕子來㑹葬魯為晉楚所止受送葬之屈豈不知其非禮哉滕子之來使能以禮止之則魯之受屈于晉楚猶可原也今受之于滕而安則其行之于晉楚當亦安矣可勝悼哉癸酉葬我君襄公十有一月莒人弑其君密州經稱國人則弑密州者必非展輿也左氏于莒弑庶其謂僕因國人以弑紀公于此謂展輿因國人以攻莒子弑之乃立若是則兩人者雖事出于因而志實成乎弑春秋何以分其罪于國人哉吳氏趙氏皆謂左氏之文當云因國人之弑紀公因國人之攻莒子以字為𫝊寫之誤然非𫝊寫有誤也左氏但以弑君者因乎國人則合稱國稱人之例而不知莒僕展輿果與弑其君春秋必不貸其罪而稱國稱人也觀後去疾入展輿奔則展輿即為弑君者所立而不能討賊春秋亦未嘗深罪之不得坐以弑君也春秋宗朱辨義卷九
