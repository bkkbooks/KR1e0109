body:
  text: 春秋宗朱辨義卷二髙淳張自超撰桓公元年春王正月公即位桓書即位桓修即位之禮也繼弑君不即位者不忍於先君之弑也桓弑君兄而惟恐諸侯國人之討急修禮以自定其為君也春秋仍舊史以書之而可以使後之讀者推求其故因以知桓之忍於先君矣桓之所以忍於先君者他人弑君則已有不忍已自弑君而又何不忍耶則因以知桓之與聞乎故矣三月公會鄭伯于垂垂雖近魯而實衞地桓弑君簒國甫五閱月而公然出境以㑹鄭伯不虞魯有石碏其人而鄭伯為陳侯哉其所以絶無忌憚者必隠之譲桓其説聞於諸侯其志信於國人也雖諸侯聞其説國人信其志而桓則身有弑君之事何以塗諸侯之耳塞國人之口而免其誅討必當日諱弑為薨或委罪於人而諸侯不得其實國人無以為名也故其修即位之禮既藉以蔽罪而其不成禮以塟隠公亦借口讓國之一端也鄭伯以璧假許田桓宋女之子也鄭伯恐其得國而親宋故挾其弑君新立不敢仇我而急於來會人加璧以請祀周公既自偽輸其祀周公之誠而又實得許田之利葢一舉而兩利存焉桓亦因鄭莊為王卿士簒弑懼討既幸其為好會以自定而亦不得不従其請也高氏責鄭莊與隠同盟和好不能為隠討賊夫鄭莊豈討賊之人即其初交於隠又豈真有同盟之心者哉夏四月丁未公及鄭伯盟于越文定以為垂之㑹鄭為主也越之盟魯志也亦自有見但以為鄭人欲得許田以自廣猶似鄭之歸祊加璧為真欲得許田者而不知鄭之結魯専為仇宋易許田以祀周公獨其名耳故自宋殤既弑子馮既立鄭既得志於宋而即無意於親魯所以七年即有會齊衞來戰於郎之師矣秋大水伊川曰桓行逆徳而致陰沴文定曰陰逆而與怨氣并之所致也又以為堯之洚水警予為天地開闢以來未得所歸之水非堯有以致之而責後世人為不善感動天變召水溢之災者不得引堯為解其説甚正但後世解天災者動曰堯水湯旱然則堯水固非恒雨所成湯旱亦非恒𤾉所成耶堯之水非堯有以致之湯之旱豈湯有以致之耶夫天道人事原有感應之理有人事變於下而天道應於上者有天道變於上而人事應於下者然亦有感而不應著而不驗者未可以拘見論之也葢無逆徳以致災則災為變有逆徳以致災則災為常聖人遇災而恐懼修省勤勞咨警有預備之策有補救之方則災不為災後世人君既以逆徳致災而又絶不闗於心而為之計則災真為災矣冬十月二年春王正月桓十八年間書王不書王説終難定但借文立義則元年書王以正桓弑隠之罪十年書王天道人事十年一變而桓弑君之罪不可滌十八年書王明弑君之罪雖其身已殁而王法不得赦茅堂胡氏之説亦自可通至二年書王穀梁以為正與夷之卒文定以為正宋督之罪茅堂又以為治桓之會稷成亂俱屬牽合惟家氏以為喪事未終猶望王討者庶㡬近之戊申宋督弑其君與夷督弑殤公召公子馮於鄭而立之春秋不書鄭納馮不書馮入於宋者以其謀出於督既非鄭納又非馮自入也若書納書入則疑於已討督而殺之矣又不書宋督立馮以罪督及馮者馮之在鄭為殤公所忌而頻年加兵馮未必有復國之志及殤公見弑馮以親穆公子非有必不當立之義乃為弑君之督所立而不討督之弑君則馮固不得無罪然觀於諸侯會稷立華氏則馮以十年去國之公子一旦援立而督又有諸侯之助馮之勢亦有所不能想亦春秋所恕也及其大夫孔父如邾儀父則父為字如蔡侯考父齊侯禄父宋公茲父公子慶父季孫行父公孫歸父㔻鄭父國歸父陽處父箕鄭父胥甲父儀行父荀林父孫林父則皆為名孔父之為名為字雖不可攷而於弑君稱名則大夫不當稱字疑其名孔父也伊川文定以孔為氏父為名者亦自得之穀梁以為孔子之祖為祖諱故稱字趙氏辨其非孔子家𫝊不當諱者最是孫氏以為天子命大夫亦未必然也滕子來朝滕本侯爵降而稱子朱子取程沙隨自降之説為妥伊川以為滕後屬服於楚故狄之然春秋服楚之國甚多未見降爵而蔡之稱侯許之稱男未嘗一著貶削也文定以為首朝桓公降而稱子狄之也夫四夷雖大稱子是周制為然葢與中國子男之爵一也若春秋貶中國侯伯之爵稱子為下比於狄則中國本爵子男者其稱子與吳楚同豈相比而狄之耶且春秋諸侯之罪有大於滕之朝桓者夫子獨降滕爵以變亂其數百年來封自先王受自先君之名實必不然矣三月公會齊侯陳侯鄭伯于稷以成宋亂春秋書成宋亂諸儒多以為聖人特筆朱子亦曰如成宋亂宋災故之類皆是聖人直著誅貶然通春秋不按事作斷語即宋災故亦止言其所為而此成字若云遂其事之謂成則明坐四國以罪固春秋所無也恐亦是史氏之文耳葢史氏以立君定國為能靖亂成字只作平字解諸儒則以討弑君之賊為平亂今既不討督而立督又相其君得有後於宋則亂以之而成成字不作平字解也従來弑君之國有黨賊之人亦必有仗節守義致仇怨於元惡不與共戴天日之人宋督弑君宋之人其肯唯督是聼哉聴其弑君又聴其立君即力不足以討賊而洶洶之人心未能遽靖也自四國會稷而馮之立國督之立家皆定宋之人内屈於賊黨外迫於強國衆怒既息而干戈不起四國之君曰宋之亂平矣平與成字不同而義相通故兩國釋怨解兵曰請平亦曰行成於是史氏以成亂書而夫子仍之者因事為文因文索義凡所以定國人之亂者皆所以遂華氏之亂也成字即作平字解亦不没其黨賊奨亂之實而況春秋既不書殺宋督下文又明書取郜鼎納大廟哉杜氏曰成平也程氏曰諸侯當討宋亂不當平宋亂也義自明白胡氏曰成就也如三年有成之成也趙氏曰言宋之惡逆自此而成也轉費解説亦與會而言故之義不合夏四月取郜大鼎于宋戊申納于大廟取之不義納之非禮書以罪桓也桓之會三國成宋亂使取鼎納廟不書則似桓為齊鄭所脅出於勢之不得不然而非其本心矣今所取於宋之鼎則弑君之賂也而以納於大廟臧孫曰百官象之其又何誅夫桓身自弑君無誅葢直以身象之矣又何宋鼎之不可象哉秋七月杞侯來朝公穀作紀侯紀來朝稱本爵不與前後來朝者同貶文定以為紀為齊故求庇於魯非為桓立而來則誠如汪氏所謂聖人憫紀之弱小傷其無所赴愬而求援於姻國故原其情以恕其罪之説矣然試思罪至削爵罪莫大焉因弱小求援而即恕其莫大之罪豈聖人用法之公哉且為紀計以先事言之即不朝桓何至於亡以後事言之即朝桓又何救於亡紀不自強仰望於人以求延區區之國原非聖人所許而況朝簒弑之桓謂聖人反従而恕之耶必不然矣然則觀於紀之稱侯則滕之稱子非聖人狄滕其名穀鄧而人邾牟葛亦非以示貶矣葢朝桓之罪直書而自見也蔡侯鄭伯㑹于鄧外侯相㑹無闗於故則不書書蔡鄭於鄧之會左氏曰始懼楚也諸儒發明皆是九月入杞伊川以為杞稱侯皆當作紀前之杞侯來朝者紀侯也後之公會杞侯於郕者紀侯也左氏以杞為説故前則云杞侯來朝不敬杞侯歸而謀伐之此云討不敬也後云杞求成也然杞在周為王者之後入春秋稱伯降而稱子後以附晉而復稱伯未見稱侯也魯桓之時紀托於魯其始末甚詳而紀之本爵為侯故前之來朝為紀侯後之會郕為紀侯惟此入杞則實為杞也公及戎盟于唐隠公盟戎戎伐凡伯而不能救又不問戎之罪春秋已書以譏之矣而桓人盟戎何也觀詩人作頌以戎狄是膺為僖公之功而夫子錄之則兩公盟戎而夫子書以示譏可知矣冬公至自唐伊川以為書至有三告廟也過時也危之也文定以告廟常事不書而以去國踰時之久會盟侵伐之危黨惡附奸之罪三者列於告廟之外胡茅堂又據左氏增策勲一説諸儒之論皆不出此是魯史於君之出而反無不書至者夫子作春秋於常事則削而不書必時久可危有罪策勲而後書至以著之矣然合春秋觀之分十二公觀之而義有不可以通者葢䇿勲不䇿勲視乎其事時之久暫則書至而後可知不書至不可得而知至於危之罪之則有可危有罪而不至不危無罪而至者故不能無疑於其説也竊合春秋觀之則似前畧而後詳分十二公觀之則或因人以示義或因事以示義或因地以示義或因時以示義而不可拘以為例也如桓公始至盟戎終至伐鄭莊公始至伐衞中至三如齊終至伐戎僖公至兵車之會不至衣裳之會文公兩至如晉宣公五至如齊成公四至如晉㐮公五至如晉一至如楚昭公未遜以前至如晉如楚既遜以後至如齊如晉之類則皆因乎人以示義也如桓公至伐鄭以著突之未入鄭荘公至伐衞以著朔以諸侯之師入衞成公至伐鄭於兩至會之後以著鄭之未服㐮公至會於兩至伐鄭之後以著鄭之已服哀公至伐齊於齊侯卒之後至黄池之會於於越入吳之後之類則皆因乎事以示義也如僖公會温而至圍許成公如京師而至伐秦昭公至乾侯定公至瓦之類則皆因乎地以示義也如宣公五年春如齊而夏始至成公十年七月如晉逾年三月始至㐮公二十八年十一月如楚逾年五月始至之類則皆因乎時以示義也又有以書至示不書至之義者如僖公牡丘之盟於淮之會皆至牡丘救徐於淮伐英氏以著於檉首止甯母於洮葵丘於鹹之皆無事也又有以不書至示書至之義者如莊公於穀之遇於扈之盟皆不至以著納幣觀社逆女之三如齊皆為有罪也又有不可至而不至者如成十年㑹納鄭伯既不可以至伐人不可以至會㐮七年會鄬救陳陳侯逃會既不可以至會又不可以至救陳㐮九年伐鄭盟戱鄭伯速叛既不可以至伐鄭又不可以至會二十六年澶淵會四國之大夫不可以至會哀十一年會吳伐齊齊吳為艾之戰既不應至於戰前又不可至於戰後故皆不至之類是也又有不成其會不成其盟不成其伐而不得不至者如成公沙隨之會不見而至會又會伐鄭不用其師而至會昭公會平丘不與盟而至會之類是也又如隠桓莊僖之私會私盟私侵私伐皆不至而至文之盟穀宣之伐萊定之會夾谷盟黄侵鄭侵齊者以著隠桓莊僖皆自為政而後則受制於強鄰也莊僖之公會公盟皆不至而文宣㐮成之公會公盟無不至者以著前則言歸於好而後則受迫於勢也僖公三如齊兩不至而最後一至文宣成㐮昭之如齊如晉如楚無不至者以著後之朝於齊晉及楚皆非得已也桓僖文宣哀之伐邾皆不至而至定之圍成者以著定之失政而不能墮其強邑也葢聖人之筆削示義㣲而著變而不窮而豈如諸儒危之罪之之粗見又區區計其時之久暫及策勲告廟之常事而已哉若隠公盟戎不至而至桓之盟戎者春秋於隠原不以書至示義故不至此為書至之始始至盟戎終至伐鄭以著盟戎伐鄭之均失也伊川文定以為危之其説迂矣若準以春秋誅簒賊之義則當望戎之能討惜戎之不討而顧惟恐其見討乃為簒賊致危耶三年春正月伊川曰不書王明桓之無王也文定曰自是以後凡十四年不書王者見桓公無王與王之失政而不王也惟兼責王之不王其義既著故終桓之世王四使於桓皆不必去天以示貶矣公會齊侯于嬴左氏以為成昏於齊者亦謂齊昏以會嬴而成也杜氏家氏遂以為不由媒介親會乞婚葢見春秋不書納幣而亦未遣如齊之使故也而不知公子翬之逆齊侯之親送公之親會讙春秋譏其重者而納幣可以無書也又魯宋世為姻好隠以鄭之故敗宋結怨桓為仲子所出齊恐新君復通宋姻有意來親魯以既失好於宋則不得不脩睦於齊故嬴之會不特魯欲娶女於齊而亦齊欲嫁女於魯也自此而莊僖文宣成皆娶齊女而宋之交絶至伯姬歸宋而始通也然則公之㑹嬴乃齊魯世好之始當是請婚有使納幣之禮行而逆女有期先為好會非必桓之親為乞婚也夏齊侯衞侯胥命于蒲胥命者相推為牧伯也朱子取其説汪氏疑於莊二十一年左氏𫝊鄭虢胥命於弭同謀納王不可云相命以伯然王室有難齊宋魯衞大國置若㒺聞鄭虢納天子定王室以如此大事自任則其相推以伯也勢或有之如謂相結以言而不盟則凡諸侯之會而不盟者獨無相結之言耶且胥命云者夫子之文耶舊史之文耶抑舊史但紀其事而夫子特起胥命之文耶如為夫子特起胥命之文亦必舊史記蒲之事與記他會盟之事有異辭而後夫子變文為胥命也舊史之記事有來告有傳聞齊衞之於蒲如其來告齊豈曰不穀以某事命衞侯衞侯以某事命不穀衞豈曰不穀以某事命齊侯齊侯以某事命不穀耶如以傳聞得書則與他會之相結以言何異而舊史獨變其文不以為相會而以為相命耶如謂舊史無異文則夫子亦何慿而知其相結之事異於他諸侯之會耶固知齊衞於蒲非徒相結以言也則謂其相推為牧伯疑得其義矣夫命猶令也天子致伯以天子之命為重齊衞非由天子之命而自相推以為伯故舊史得之傳聞異而書之夫子因以罪齊衛之僭而妄也六月公會杞侯于郕杞公作紀郕公作盛紀逼於齊而托於魯魯與齊不相好則附魯以為敵於齊魯與齊相好則藉魯以求解於齊故公既與齊侯為嬴之會而紀急結郕以會公也秋七月壬辰朔日有食之既公子翬如齊逆女隠之時翬帥師兩見不稱公子桓之時逆女一見稱公子伊川以為不稱公子隠之賊也稱公子桓之黨也諸儒議論多與此合是夫子削公子於未弑君之前書公子於既弑君之後恐後人不知翬之為賊而故反其名實為文以發後人之疑使思而得之也亦太曲矣何不書公子於未弑君之前削公子於既弑君之後為更明白直㨗乎葢翬在隠時雖主軍政隠尚能制之君眷未深已威未立未嘗命之為公子也至桓之時桓感其戴己之恩翬恃有立君之績眷深於主威加於人桓以公子命之史臣亦以公子書之矣於是夫子因之而義自立也若曰是前之未嘗稱公子而今稱公子者也何以得稱公子弑隠立桓桓徳之也弑君之賊泰然受公子之命行公子之事而國人不能討天王方伯不之問而人道絶矣初入春秋舊史大夫直書其名者未賜族也隠桓及莊之初年内大夫無駭柔溺皆不氏外大夫紀裂繻鄭宛鄭詹皆不氏内而翬不稱公子外而齊侯之弟年鄭伯之弟語不稱公子稱公子自翬始而後三桓之子孫稱公子公孫久而外亦稱公子公孫矣此世風之變終春秋之世強家悍族世専國政有崛起者無非公子而史臣依世變例雖欲不稱公子不稱氏不可得也説春秋者以書名為貶然則何貶於前之數人而獨不一貶於後之數百人乎即以弑君言之州吁不稱公子無知不稱公孫宋督宋萬不稱氏而自里克以後楚商臣許止蔡般稱世子齊商人鄭歸生楚比稱公子趙盾夏徵舒崔杼甯喜陳乞無有不氏者非前之弑君貶後之弑君無貶可知也觀乎此則知史臣以世風而變而翬於隠之時不稱公子非夫子故削之於桓之時稱公子非夫子故筆之以示義明矣至於不親迎而使卿逆不使他卿而使翬失禮而寵逆臣則直書而義自見也九月齊侯送姜氏于讙伊川言親迎者迎於其所館故有親御授綏之禮豈有委宗廟社稷遠適他國以逆婦者乎且如秦娶於楚豈可越國親迎耶於此又云齊侯出疆送女非義也然則迎者不越國送者又不出疆如秦娶於楚楚女出國門之後未至秦館之前遥遥數千里車馬在途晨起暮止閨中弱息可徒委之傳母之手乎文定以為婚禮親迎則授受明後世親迎禮廢於是有父母兄弟越境而送其女者其説是已然則齊侯送女之非義殆桓公失親迎之禮以致之也夫婚姻大事禮當親迎以明授受雖遠適而閱月踰時不為委宗廟社稷也如天子巡方諸侯朝覲委宗廟社稷而出出而閱月踰時不可以已焉則婚禮大事人生一行耳何必以委宗廟社稷為疾哉倘迎者不越國則父母兄弟不得不送齊侯之送春秋又何必書以示譏乎公㑹齊侯于讙齊侯在讙公於情事亦不得不出會矣是公以不親迎而致齊侯來送之非禮齊侯以來送而致公出會之非禮也夫人姜氏至自齊莊公親迎而姜氏書入桓公會讙而姜氏書至是公之於讙為會齊侯而非迎姜入矣其不言公子翬以來者公羊以為既得見乎公也穀梁以為公親受之於齊侯也亦不必然葢既為齊侯所送則非公子翬所以矣冬齊侯使其弟年來聘致女而使弟來吳臨川以為情之私而非禮之正者是已惟不以禮制情所以不能别嫌明㣲卒致諸兒為鳥獸之行歟有年公羊以為喜固非伊川以為記異謂桓弑君而立宜有凶災今乃有年故以為異義亦未盡惟孫氏謂桓十八年祗此一年有收以著桓世之多凶殣也張氏謂桓十八年水旱與螽叠見獨此年五穀僅熟故以為異特書於冊著桓公之罪憫魯國之民也二説為當四年春正月公狩于郎於郎諸儒以為譏遠固是左氏以書時為禮者獨就狩言狩如及齊人狩禚西狩獲麟之類以子月雖春而時令在冬狩亦無害不為共祭之狩言耳然此以言昭定年間之書大蒐為僭禮而簡車徒則可此年之書狩恐是譏時狩之非禮也四時之田曰春蒐夏苗秋獮冬狩四時之祭曰春祠夏禴秋嘗冬烝皆舉於四仲周正之二月五月八月十一月也諸儒溺於周不改月而敬授民時巡狩烝享皆用夏時之説故皆以正月狩正月烝為得時惟孫明復以春烝為非禮而曰四時之祭用孟月者則又以春秋書正月烝為當祠而烝而以周正之孟月言之也然周實以周正之仲月祭此年正月之狩八年正月之烝皆書以示譏耳攷於司馬中冬教大閱獻禽以享烝則田以共祭國之大事桓踰時亂禮其罪為大也此年及七年闕秋冬伊川文定以此年為天王來聘七年為穀鄧來朝之故殊無義理杜氏謂為闕文吕氏取之朱子亦然其説然昭十年闕冬字定十四年闕冬則杜氏為是桓之世十四年不書王兩年闕秋冬恐未必無義也或是田祭大事桓惟失冬狩冬烝之時故闕二時以著其罪但狩闕二時於本年烝闕二時於前年有不同者狩之前年秋冬有逆女齊聘大事烝之本年秋冬有伐邾逆王后大事故不得而一也夏天王使宰渠伯糾來聘名咺名糾諸儒之説詞嚴義正似不可易但所云王朝公卿書爵大夫書字上士中士書名下士書人者舊史之例耶抑夫子作春秋之例耶如為舊史之例則來賵仲子之宰來聘桓公之宰必不書名矣如為夫子作春秋之例變例書名示貶則舊史原不書名夫子亦無従得其名而書之也豈舊史於王臣之來者官爵氏族名字備詳於策故夫子得以考核而寓筆削耶然則何以聘桓之王臣又不盡書名以貶而使後儒強為従同同之説耶此必天王重歸賵聘桓之事而使宰宰自謙抑而稱名以致來歸來聘之詞舊史據直書之夫子仍而不削以著天王之命使同於列侯咺糾之來使同於侯國之大夫而魯之不辭而受又公然書於國史為交有罪也五年春正月甲戌己丑陳侯鮑卒甲戌下當紀陳佗作亂事全簡脱之趙氏之説為是三傳不作闕文曲為之説殊不可従也夏齊侯鄭伯如紀春秋諸侯不世相朝矣小朝於大弱朝於強其勢然也外來朝書朝内往朝書如者魯以朝於諸侯為諱也齊之凌紀而欲呑併之也久矣又有鄭以助之二國豈朝紀者哉若假朝禮以往而圗襲取則掩耳盜鈴其計拙矣齊鄭必不為此拙計以取笑於天下諸侯也故不特紀必不信而備之即齊鄭亦不妄意紀之必信而先自托此辱名也且使果假朝禮以僥倖紀聾而墮其計則紀必以朝告於魯魯必以朝書於史夫子何不直書朝紀以明著其跡而罪之而亦以諱魯者諱齊鄭不書朝書如哉當是假事以往不但不實行朝之禮而亦不虚托朝之名也又外如書祭伯來實來介葛廬來之類非朝也亦書來内如成公如晉會塟非朝也亦書如外如齊仲孫來非聘非盟也亦書來内如大夫之如他國而非聘非盟者多也亦書如則齊侯鄭伯之如紀何必斷以為朝紀哉天王使仍叔之子來聘仍公作任書仍叔必仍叔尚在書子而不書官必未嘗官既未嘗官則王不宜使仍不宜任使不宜使而使不宜任使而任使王與仍叔交譏也故以為世官者猶疏也如世官則其子已官當以其官來舊史必書其官而不煩錄其父使舊史不錄仍叔夫子何由知其父為仍叔乎且所云世官者謂不宜不擇其子之賢不賢也如其子果才賢則用其父何妨并用其子哉塟陳桓公城祝丘秋蔡人衞人陳人従王伐鄭書従王則王之首兵可知矣孫氏不使天子首兵之説非也恐是國史之體宜然大雩孫氏以為謂之大者著其僭用天子之雩也文定以為特謂之大皆國史所不能與也其意皆以舊史不書大夫子書大以著其僭耳然使舊史書雩何以知其非雩境内山川夫子必坐以雩上帝而加大字以著其僭耶當是魯人侈其得舉重祭而自大之史臣因而以大書之而不知其僭之妄夫子作春秋一仍之以著其僭之妄也凡書大蒐大閱恐皆如此螽冬州公如曹紀侯去國本末分明州公如曹何以知其不復下書實來何以知實為州公之名夫子前不書實後不書州公但欲於稱爵稱名之間以寓襃貶反使後人疑於事跡豈作經𫝊信訓世示後之意乎左氏以為淳于公又若實有攷證者然云度其國危遂不復又不載當時侵凌而驅迫之者為何國實來之為州公三𫝊皆同而州公之始末各不能詳張氏攷昭元年𫝊云城淳于意其因州公不反國為杞所併夫杞在春秋時㣲弱不能自存而敢併淳于以動諸侯之兵哉若因其不反而後併之則前之致其國之危而不反者又棄而不取俾為杞有何也此等處皆難據以為論而三𫝊所云無害於義姑従之可也六年春正月實來夏四月公會紀侯于郕郕公左作盛紀不自強畏齊而謀於魯魯力不足以抗齊而存紀徒與之會而受其朝夫春秋小國之托大國以自存者多矣而紀托於簒弑之桓桓以簒弑之賊不可容於天地之間而強欲庇紀家氏以為義之不容己春秋無譏者非也秋八月壬午大閱盛暑大閱伊川以為妨民害人失政之甚者是已又以為不言公者懼鄭畏齊為國講武非公之私欲者不必然也桓與鄭莊易田結好閱五六年未變於齊則新締姻盟即鄭忽以班後之故怒而愬齊齊亦未必見聴齊鄭之師何名而起而顧汲汲講武於盛暑之候哉葢桓欲庇紀則不得不反顔於新婚之齊欲背齊則不得不渝盟於易田之鄭夫徳與力既不足以屈齊鄭而存紀而徒簡車徒習戰陣以冀與齊鄭僥倖一戰之勝以為謀紀之策而謂非其私欲乎哉春秋於會紀於郕之下即書大閱固明以著公之閱武葢為紀也蔡人殺陳佗陳殺州吁非陳之意衞人之意也故以討賊之義予衞人蔡殺佗非陳人之意也故不以討賊之義予陳人蔡雖或殺之以私而佗實弑君之賊以私殺之而不害其為公故予以討賊之義而使亂臣賊子知不容於天地之間也佗之為賊不可成之為君而又不得不繫之於陳固知書佗非予陳人之不君之書陳佗非予陳人之能討賊而實罪陳人之不能討賊也九月丁夘子同生諸儒以為正嫡嗣而防僭亂也然文成皆嫡嗣而生不書子赤以嫡嗣見殺而生不書何耶穀梁曰疑故誌之推穀梁之意以為文姜與齊侯亂事雖在後而桓有同非吾子之語必當時魯人多有疑同為齊侯之子者夫子以為周公之祀豈至是而斬乎書子同生以破疑而決同為桓之子也公羊必非無因而撰同非吾子之説或桓無是言而齊魯之人謗之齊魯之人造此謗必文姜於子同生之前亦嘗如齊而經不書非十八年如齊而齊侯始通也夫子葢為此懼故詩錄展我甥兮春秋書子同生以正周公之世祀也雖然春秋之立義若此是反以滋後人之疑矣左氏曰以太子之禮舉之接以太牢卜士負之士妻食之公與文姜宗婦命之疑有得於經意者周禮諸侯之世子誓於天子春秋之時雖無有請天子以世其國者而桓儼然舉以太子之禮命名紀日登於國史僭亦甚矣桓之世天子連年來聘而不朝又不使大夫聘大受諸侯之朝而穀鄧稱名邾牟葛稱人田祭違時變禮而又以太子之禮舉其子葢皆無王之實跡也此春秋所以十四年不書王而叠書其僭亂之事以明著其罪歟冬紀侯來朝責紀侯者但當責其和輯人民效死以守雖至於亡不當朝簒弑之桓以求庇如責以上訴天子下赴賢侯則當時大國孰為賢侯而赴之天子㣲弱雖訴何濟哉且此後亦出通婚王室之計而歸女為后矣反觸齊怒而速其亡非但無益而已也左氏以來朝為請王命以求成於齊公告不能者不然也紀之通婚王室必魯為之謀故逆王后而祭公來齊因怒魯之為紀謀而有郎之師也又諸儒欲實朝桓貶爵之説謂春秋憫紀而恕其罪使果恕紀朝桓之罪則兩書會郕亦足以著畏齊求援之本末矣其兩來朝可以不書而春秋兩書來朝是既以著其附魯之跡而亦明治其朝桓之罪義不係乎貶爵不貶爵也七年春二月己亥焚咸丘夏穀伯綏來朝鄧侯吾離來朝朝簒弑之桓或貶爵或書名或書人諸儒以為各立義以示貶説近嚴正但疑於紀不貶爵滕終春秋之世稱子則於諸儒之説有不可以通者公穀以為穀鄧失國比於實來之書名然攷左氏逾此兩年巴子聘鄧鄧猶能力抗楚師未失國也如遭國人之簒逐則當來奔不當來朝矣又如郳黎來朝莊公亦書名郳固附庸不若穀鄧之為侯伯向使舊史原不書名夫子雖欲書名立義恐亦無憑而攷曲禮有云諸侯見天子曰臣某侯某是必穀鄧以見天子之禮稱名朝桓桓不辭而受其禮舊史書之夫子因而直書以交著其罪也八年春正月己夘烝伊川以為冬烝非過書之以見五月又烝為非禮之甚然即不書正月烝専書五月之烝亦足以著夏烝之非禮何必誌此以起彼乎夫四時之祭舉於四仲周既建子首春則當於丑月舉春祭於辰月舉夏祭於未月舉秋祭於戌月舉冬祭是烝祭在十一月矣以夏時言之則十一月為季秋以季秋而舉冬祭疑於時令不合即有改移亦當改於十二月葢十二月為周之季冬已為夏之孟冬故也文定據逸周書謂商周革命改正示不相沿至於敬授民時巡狩烝享猶用夏時汪氏引洛誥王在新邑烝祭嵗在十二月辨之以為周用亥月烝者亦自有據然觀十四年八月書御廩災乙亥嘗則周本以周正之仲秋嘗其烝祭必舉於仲冬而為嵗之十一月也左氏昭元年𫝊曰十二月晉既烝趙孟適南陽將會孟子餘甲辰朔烝於温趙氏以十二月朔烝於家廟則晉之既烝云者當在十一月此亦其可證者也葢烝以獻獸為義嘗以薦新為義豳風一之日于貉二之日其同民間之狩獵也六月食鬱及薁七月烹葵及菽民間之食新也若以夏正之仲冬烝仲秋嘗則田狩之肉已充民庖蔬菓之熟者庶人食之久饜而人君始以享先祖是嘗非薦新而薦先祖以民食之餘矣何以為名為義乎禮至周而備祭之名祭之義皆因以定莫善於以周正之仲冬烝仲秋嘗也先儒以四時之祭在孟月卜日不吉則於仲者是必夏禮之四祭在夏正之孟月以夏正之七月嘗猶不失薦新之義耳此年之書烝終當以穀梁之説為是葢既逾年而又非時亦以譏其不及事之慢非以起五月復烝之瀆也天王使家父來聘四年五年既連年來聘纔逾三年又遣來聘之使何天王加禮列侯之勤耶列侯朝聘闕如而天王之禮有加不已即非施於簒弑之桓而亦不能無譏矣夏五月丁丑烝五月而烝是必以前年失冬烝既補烝於春祠之先因禮不備而又復烝於夏禴之時也非時而瀆亂甚矣秋伐邾陳氏以為桓師非君将皆不言大夫固知此與及齊師戰奚及宋衞伐鄭大夫而不名不稱帥師者以他公稱大夫帥師皆有義而桓之世義不係乎名大夫也冬十月雨雪祭公來遂逆王后于紀紀者魯之婚姻也齊實逼之紀乃附魯以求援紀之通婚王室必魯為之謀故書祭公之來以著事由於魯也詳書逆王后紀季歸者又以著紀通婚於王王亦不能庇紀也其後魯不得已為黄之盟以平齊紀齊卒不肯釋紀以聴魯而尊王又王姬歸齊之下即書遷紀三邑越二年而紀季歸齊三年而紀侯去國數十年間紀侯之來朝會盟紀季之歸齊紀侯之去國悉書者詳紀之始末也紀姜之歸京師王姬之歸齊伯姬之卒塟悉書者見天子諸侯婚姻不足以相固而齊之強暴周魯之懦弱也諸儒但於祭公之來紛紛議卿逆公監之禮専命遂事之罪猶未悉當日之情事也九年春紀季姜歸于京師文定以為逆稱王后示天下之母儀也歸稱紀姜化天下以婦道也然則魯逆稱女何不示一國之母儀歸稱夫人何不化一國以婦道乎不可以通矣陳氏以為諸侯逆稱女至稱夫人尊夫人也天子逆稱王后歸稱季姜尊王也其説似矣而未盡也葢如是云云者魯史之體也使不書逆王后而書逆女則失尊王之體矣使不書紀季姜歸於京師而書王后姜氏歸於京師則又失記他國事之體矣至於魯逆書女者未至不成為夫人至書夫人者或為夫人其義又别也高氏以為古者后夫人必娶嫡女今曰季姜則非嫡不可以母天下故春秋嚴其名亦是一義夏四月秋七月冬曺伯使其世子射姑來朝朝簒弑之桓曺伯之罪有甚於滕穀鄧邾牟葛者六國弱小難以自存或不得已假世朝之禮以托大國曺在春秋之時諸侯會盟無不與者不煩附魯以求列於諸侯也六國皆其君來曺伯有疾又何急於朝桓而使世子來哉汪氏以與降爵書名稱人示貶之義不合謂朝桓皆貶而射姑不貶者葢世子不當攝君朝諸侯沒其名則罪不著而従伊川别立義之説而不知世子攝朝當貶世子尤當貶曺伯使春秋以示貶為義準諸滕子之降爵則當書曺子使其世子射姑來朝準諸穀鄧之書名則當書曺伯終生使其世子射姑來朝準諸邾牟葛之稱人則當書曺人使其世子射姑來朝如是則既以示貶而使世子之罪世子不辭而攝之罪亦未嘗不著何必别立義而使後人疑於其故哉又諸儒従同同之説春秋未嘗有也葢諸儒強立為例至於義不可通則以為従同同使春秋有従同之義則滕子降爵而穀鄧邾牟葛皆可従同矣或一書名而他皆可同或一稱人而他皆可同矣何以一降爵一書名一稱人罪之大小輕重如此其嚴謹而獨於曺伯不一定其罪之何等而姑従同同哉觀於此則知滕之降爵非以朝桓而降榖鄧亦非以朝桓而名邾牟葛亦非以朝桓而人之矣十年春王正月庚申曺伯終生卒夏五月塟曺桓公秋公㑹衞侯于桃丘弗遇魯不得於齊故結衞為好會以計與齊為敵衞畏齊之強而不敢親魯故始約中變而失信於桃丘也魯之不得於齊者為紀故也冬十有二月丙午齊侯衞侯鄭伯來戰于郎左氏以三國來戰為鄭人怒魯請師於齊齊以衞師助之夫班次後鄭者魯以周制定之也鄭即怒魯不當若此其甚且鄭怒小事耳齊魯以昏相親北戎之役魯亦以師救齊顧不徳魯之助已而曲聴鄭言伐其昏姻以洩鄭之小怒哉固知齊亦怒魯也齊之怒魯以魯庇紀近又為紀謀昏於天王也夫伐國必有詞鄭以周班而後既不可以執言齊以紀侯之故亦不可以執言是以突師來戰齊之怒甚於鄭故齊為之主兵也其不書伐竟書來戰者凡伐人國必受伐之國不服而後戰此以著三國志主乎戰雖修詞以謝而亦必不釋此以去也十有一年春正月齊人衞人鄭人盟于惡曺三國稱人文定以為貶而人之然不貶於來戰而貶於盟當不然矣但使來戰稱人盟舉爵則似大夫帥師而諸侯盟故爵於來戰人於盟惡曺然後知事雖逾年而實不過間一月戰者三君盟者即三君則貶而人之之説未嘗不是而不知春秋之義於來戰舉爵者實坐三君之罪至於盟惡曺則罪減於來戰而従畧書人也又以此之畧而書人著前之詳而舉爵所以目三君而治其罪也趙氏曰一役而再見故畧而人之義亦未盡夏五月癸未鄭伯寤生卒秋七月塟鄭莊公髙氏以為鄭忽既立不待五月而塟其父是生亂階夫忽之速塟其父或亦有不得已者也忽以世子為質於周突為公子於内勢必植黨圗簒及鄭莊之卒而謀作亂事既不成懼而出奔其奔必於宋者葢宋馮居鄭十年其於鄭突必氣味相合故於其來奔而執祭仲脅使立之也然則忽之速塟其父知有宋難而將有以備之耳夫身為世子將有鄭國無策以靖突之亂而禮不備於喪死是亦不足以負荷先君之業矣九月宋人執鄭祭仲宋馮以父命出居於鄭宋殤惡之鄭為之出死力以抗宋者十年殤見弑而馮得立皆鄭之力也鄭莊甫卒即執其臣以助庶奪嫡使鄭亂者二十年溺雍氏之寵希一日之賂而反恩為仇非有人心者矣突歸于鄭突不稱公子突原未稱公子也如以削公子為貶則楚比歸楚稱公子顧為無貶耶其不繫鄭則與赤之不繫曺諸儒以為皆以正其不當立之義者是也鄭忽出奔衞先君既卒不當稱世子據朝於天子稱童子侯未逾年之君稱子之義則忽以嫡子嗣位實未有罪何以槩無稱也竊恐童子侯者亦朝於天子自抑損之詞非常稱也稱子者如魯新君未即位而卒為臣子之辭列於會盟而従諸侯末爵之辭皆非常稱也文定以為出奔而名不能君也夫忽之於國内則突欲簒嫡外則宋欲亂鄭内所恃者大臣而祭仲則脅於宋矣外所恃者鄰國而齊魯則與我有隙不可以告難矣忽固計無所出也向之不婚齊以托大國雖謂之能自強可也又嘗救齊北戎之難而有功葢亦能軍矣一旦外脅於大國内制於權臣不得已而出奔遂議其不能君過矣出奔而名者在喪未即位不可以稱爵既不稱爵而又不名則知奔者為鄭之何人耶如以不稱爵為譏其不能嗣先君然則突之奔而稱爵為予其能嗣先君耶柔會宋公陳侯蔡叔盟于折魯宋舊好自隠公以菅之師而絶宋絶而親於齊鄭至此以紀之故将為之出力以抗齊故又欲與宋陳蔡合未必為宋責鄭賂為鄭而求解於宋也或是既盟之後宋好通矣然後為平宋鄭之舉耳柔之以大夫盟諸侯蔡之以弟與盟皆直書以示義如以柔不氏為貶然則蔡叔之稱字又為春秋賢之耶公㑹宋公于夫鍾鍾公作童冬十有二月公㑹宋公于闞柔盟三國公則専會宋公結好於宋也於夫鍾於闞一時兩會可謂勤已十有二年春正月夏六月壬寅公會杞侯莒子盟于曲池杞公穀作紀曲池公作歐蛇伊川以為盟莒以援紀難極是前之盟宋陳蔡後之盟宋燕皆為紀故也兩盟宋者諸國之中惟宋為大可敵齊耳秋七月丁亥公㑹宋公燕人盟于穀丘左氏以為平宋鄭若既盟矣則平兩國之言已刑牲告神而定之矣何必又與宋屢會又速盟鄭而連師伐宋哉吳氏以為合宋與燕别有他事非為鄭賂者是已葢皆為紀也又致燕人者多為之黨以恐齊而樹其敵也八月壬辰陳侯躍卒公㑹宋公于虚冬十有一月公㑹宋公于龜穀丘之盟雖以他事合宋亦必有為鄭致請之意故又兩為會以求之而宋卒不従是以與鄭為武父之盟也丙戌公會鄭伯盟于武父鄭為齊以苦紀魯為紀以求合諸侯乗突新得國将以攜齊鄭之交故為之屢會宋公以求免鄭賂所以示徳於鄭也宋既不従而鄭亦怒宋之深而謀合於魯矣是以為武父之盟也魯之盟鄭者必為鄭而圗宋故逾月而有宋之戰也鄭之盟魯者必為魯背齊以扶紀故逾年而有七國之戰也丙戌衞侯晉卒盟不可以不日卒不可以不日各為一事不可并日而書故兩書日葢得其日則不妨兩書日不得其日則亦竟不書日可見以書日不書日為有義者未必然也十有二月及鄭師伐宋丁未戰于宋孫氏以為不言公諱之也夫以魯桓之簒弑十八年間明文以著其罪者多矣何必為之諱伐宋哉高氏以内沒公而稱及鄭不爵而稱師為均其罪然内即目公鄭伯即稱爵如郎之戰諸侯皆稱爵又豈非均魯鄭之罪哉諸儒以戰之日丁未距盟武父之日丙戌纔二十二日必公及鄭伯而没公稱鄭師也然稱鄭師必非鄭伯魯亦必非公諸侯盟而大夫帥師以伐以戰亦事之常無足異者十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績鄭莊死心為齊以圗紀鄭突反其所為而助魯為紀以抗齊者非有扶小弱抑強大之公心也所以報魯戰宋之施也而忽又在衞故戰勝之後又與魯為曺之會又使其弟語來盟所以固魯之交以與宋齊衞為敵也文定辨左氏宋責鄭賂之非而以齊紀世仇謂齊人合三國以攻紀魯鄭援紀而與戰其説甚合而責紀之義尤精三月塟衞宣公夏大水秋七月冬十月十有四年春正月公會鄭伯于曺會于曹疑曹伯亦與然觀前後之文未嘗一連曹師則恐曹或與會而不與謀也無氷夏五鄭伯使其弟語來盟鄭結魯以敵諸侯既懼諸侯之莫敵又虞魯之不相信而終惡也故會曺之後急於求盟不使大夫而使其弟者以最親者來示已之誠意於魯也又與齊侯寵愛弟年者不同文定概謂諸侯弟兄例以字通春秋書名以罪其寵愛之私者不盡然也持國書将君命來會魯君以邀於神既以名通而有不列名於冊者乎但春秋諸侯之背盟傷信多有以親盟而變者況於弟耶況突不有其先君之適子而愛其弟耶盟亦未可恃也秋八月壬申御廩災乙亥嘗災四日而嘗是譏其用災餘以祭之不敬非譏嘗之不時也諸儒兼譏不時者謂周之八月為夏之六月六月為季夏非嘗祭之時然使周之嘗祭本用夏之仲秋而當在十月則何為既遭廩災而反先兩月以嘗耶嘗祭物備豐於祠禴閟宫秋而載嘗夏而福衡若當在十月則八月之時白牡騂剛方在戒有司省視畜養之時而顧倉猝用之耶王氏以為秋嘗以成物而薦新為義夏之六月物未西成未可以嘗誠如所言則六月禾稻未熟御廩本空雖災不害何必書以示譏耶須知六月之時蔬菜初成而禾稻亦有最先熟者不謂不可以嘗也冬十有二月丁巳齊侯禄父卒宋人以齊人蔡人衞人陳人伐鄭宋立突以簒忽突在國而宋合四國以伐鄭怒突之合魯以伐己也其後突失國入櫟而復兩合諸侯以伐鄭惟恐忽終有鄭不若突猶為我之所立也劉氏王氏以此為均五國之罪貶而人之然則十五年四國伐鄭十六年五國伐鄭皆舉爵為貶其伐突而褒其伐忽耶又如齊僖甫卒喪未逾月與伐者必非齊㐮則其書齊人者齊大夫也何用知蔡衞陳非大夫而謂春秋人諸侯以示貶哉葢著其事而畧其人是君是大夫不必詳也其書以者歸罪於宋之主兵以著前之齊衞燕師雖均敗績於鄭而三國不怨突怨突者獨宋也亦以著後之兩伐鄭為魯衞陳蔡之皆欲納突而非特宋之欲納突也與書以楚師伐齊同此書以罪宋彼書以罪魯也十有五年春二月天王使家父來求車天王下求於諸侯固為非義然亦可見王畿侵削國用不足而諸侯職貢之闕矣來求於魯則其求於他國可知而春秋於隠書求賻於桓書求車於文書求金亦以著魯之於王室既不供塟事而時獻之禮并廢也三月己未天王崩夏四月己巳塟齊僖公天王崩而不奔喪齊僖卒而往會塟春秋有書事在此而示義在彼者此類是也五月鄭伯突出奔蔡忽奔不爵未即位也突奔而爵已為君也春秋非崇突之不正而卑忽之正也従其實而已忽復歸君鄭卒諡昭公未嘗一事見經者忽未交政於諸侯也突保一邑鄭之宗廟社稷不得而主者十餘年而垂之與齊侯陳侯遇猶稱鄭伯者突交政於諸侯也春秋非黜忽亹子儀而録突也亦従其實而已伊川以突之奔蔡為避祭仲而出非國人出之其意以突稱爵忽不稱爵謂國人君突不君忽而不知突奔忽歸鄭人助忽亹子儀拒突於櫟者㡬二十年國人固君忽亹子儀也突既自櫟入鄭𫝊子世國而突卒諡厲國人固非誠心君突矣又祭仲立所不應立而後復専國致突出奔罪有加焉突惡仲之専而欲除之其罪不甚於祭仲張氏責其反覆盜賊之計而自取亡者不盡然也鄭世子忽復歸于鄭嗣世而未即立不得稱爵又如在喪稱子則既五年不得稱子若仍前無稱而名之又無以見其當立故雖先君既卒而塟不得復稱世子而亦不得不仍其世子之稱以示忽之宜有鄭其復歸為正矣葢使出奔而稱世子則疑於無先君之命而未嗣世復歸不稱世子則疑於羣公子争立而􅊳之入鄭非簒故以稱忽為世子而大書復歸之文而後可知突之稱鄭伯従其簒鄭有國之實而非因其能君與國人之君之也許叔入于許隠十一年魯齊鄭入許春秋書入不書滅則許固未嘗滅也據左氏則鄭已全有許矣許荘奔衞而不可復雖居許叔於東偏名則存許祭祀而實則鄭之外臣不謂之亡也得乎哉許叔因亂入許居二十年即得因齊桓之伯同諸侯為幽之盟許之社稷亡而復存葢許叔之能也方其居許東偏以伺鄭其心當不能一日忘其先世觀變待時相機乗勢不藉外援克復舊土不可謂非許叔之謀勇也使其昏愚慵惰無有為之志而又失可為之時太岳之裔其不祀矣而猶罪其因亂竊入非復國之義何哉文定謂其宜上告天王下赴方伯此時之天王告之何濟此時之方伯赴之孰聴鄭即有内難而天王方伯亦未必因之以復許也但許莊奔衞而經不書奔衞之後存亡不攷豈無嫡嗣或庶子生存者乎方許之亡也許叔甘心受鄭之撫存及鄭之亂也許叔則幸其災禍乗其危急而因以為利則知春秋未必賢之也特以紀許之所以有君有國與鄭世為敵怨之實耳故書許叔者以著非許之故君亦非許君之嗣子不得比於蔡廬陳吳之稱爵也書入者祗若許原有國而叔自入之以著前之所以不書滅許莊之所以不書奔而許之故土尚存亦不得比於蔡廬陳吳之書復歸也公會齊侯于艾艾公作鄗穀作蒿前書公及齊侯鄭伯入許則許之入非特鄭之罪而亦魯與齊之罪也閱十六年魯隠卒矣齊僖卒矣鄭莊卒矣三國新君嗣立不聞有葢前人之愆憫許之不祀而謀復其國者許叔既入而魯齊為艾之會左氏以為謀定許未必然矣自此以後兩君皆不見有㑹許盟許之事則所云定許者果如何以定之哉此㑹也諸兒新立欲解舊怨而訂新好魯亦謀所以釋紀也故逾年而有黄之盟矣邾人牟人葛人來朝蔑之盟邾君舉字稱儀父三𫝊皆以為未命有爵故不書爵伊川文定皆以為附庸之君稱字孫氏以為附庸之君不得列於諸侯故書字以别之若是則邾君不得稱子矣然則來朝而書邾人何以知其貶耶既以附庸而未爵命不可書邾子如仍前稱儀父則未必牟葛皆有字可舉而一例書字舊史畧而書人或是附庸之君於載筆之體宜然而夫子因之非有意以寓貶也故明年趡之盟仍稱儀父僖元年檉之會諸侯皆舉爵而邾獨稱人豈諸侯皆無貶而獨貶邾耶豈大國皆君而邾敢以大夫與會耶則邾未爵命不得稱子私盟書字公會稱人無疑矣又何疑於來朝之稱人而以為貶也至晉文列邾於温之會而稱子必晉文請而爵之故自此終春秋之世與諸侯盟會皆稱子雖宣元年首朝簒弑之宣而亦書邾子來朝矣若儀父卒而書邾子克卒者魯既通其喪紀魯史亦尊稱其君而以諸侯之末爵舉無爵而爵之亦魯之僭於禮也又如曲禮有云庶方小侯入天子之國曰某人豈邾牟葛稱人以尊桓桓亦居然自尊夫子仍舊史書之如書穀鄧之名以交著其罪之義耶秋九月鄭伯突入于櫟趙氏以為衞衎之出國固其國也鄭突之出位非其位也衎自夷儀入春秋書之明衎之當有衞也突自櫟入春秋不書明突之不當有鄭也於義甚正然未晰當日之情事也衞衎之奔也衞人立剽衎未入夷儀十餘年間諸侯列之於㑹者剽也同之於盟者剽也而衎無聞焉當時已忘乎衎之為君矣剽既弑而苟不書衎之入衞則後之交政於諸侯者何以著其為衎耶鄭突之奔也鄭人立忽突既入櫟十餘年間忽之後繼以子亹而不見於經也子亹之後繼以子儀而不見於經也而突如故焉當時葢莫不以突為君矣子儀既弑即不書突之入鄭而後之交政於諸侯者可以知其為突也葢不書入鄭則兩郢之會不疑於非突一書入鄭則垂之遇疑於子儀矣冬十有一月公㑹宋公衞侯陳侯于袲伐鄭宋公上公有齊侯袲公作侈魯既於忽有怨而突又嘗為魯援紀以戰齊魯之助突伐忽宜矣宋以賂責突突因而怨宋突奔則宋宜乘機以報而亦助之者何也突以宋而立忽以宋而不得立突有鄭即不以為宋恩忽有鄭則必以為宋仇故與其存忽不如存突也忽奔於衞自衞入鄭衞宜助忽而反助突者何也突之立不以正朔之立亦不以正使輔正以圗不正則衞國之人将有辭矣故亦助突以伐忽必以為突之君鄭已久不可以易既為突亦自為也陳則曲従諸侯而已十有六年春正月公㑹宋公蔡侯衞侯于曺夏四月公會宋公衞侯陳侯蔡侯伐鄭四國伐鄭不克五國伐鄭又不克則忽固能君而鄭人君之矣忽弑亹立亹殺子儀立其國内亂突在櫟日謀於諸侯而不得入者㡬二十年然則鄭人之君突於後果非出於心之誠然也秋九月公至自伐鄭前伐鄭不至而此至者以著鄭人為忽守雖臨以諸侯之師而突終不得入也而黨不正以伐正實為不義故桓之世前至盟戎後至伐鄭以並罪之文定至例有所謂黨惡附奸之説者惟此及莊之伐衞可通然使春秋専以罪桓而書至則桓之會稷以成宋亂豈不甚於黨突伐忽何以不至㑹稷即冬城向十有一月衞侯朔出奔齊公穀以為得罪於天子召而不往張氏因莊六年有子突救衞事深以為然然爾時之天子尚能使列侯以事又召之往不往而又治其罪乎殆無之矣或是二公子者請於天子立黔牟以逐朔其後五國伐衞納朔天子助其所立之黔牟而使子突救之耳十有七年春正月丙辰公㑹齊侯紀侯盟于黄齊必欲得紀非魯之所能庇也今齊又欲連魯以納朔陽為平紀之謀而巧借其納朔之力魯在其術中矣魯乗其納朔之機而陰遂其平紀之志其小智也而反為齊所用以為矢諸神而可恃也夫以齊㐮之鳥獸行而人能忍於殺一國君豈知鬼神之可畏哉二月丙午公㑹邾儀父盟于趡會公穀作及前年來朝則兩伐之怨已釋而復盟之者必有故也然何以春盟之而秋即又伐之耶夏五月丙午及齊師戰于奚公闕夏字奚穀作郎左氏以此為疆吏之戰但不稱齊人而稱齊師則齊用衆兵恐亦非疆吏所能敵也當是大夫帥師以戰而不名者桓公之世不名大夫也孫氏以為公及之其不稱公為諱則政不然六月丁丑蔡侯封人卒秋八月蔡季自陳歸于蔡蔡季譲國三𫝊未言其詳説經者皆以春秋稱字為賢之然伯夷叔齊太伯仲雍之譲去而不返而後中子季厯以安今封人之存也而季辟亡也而季歸嫌疑之間非讓國者所宜處也設有乗間而起挾季而謀獻舞者季何以處之乎泰伯仲雍之奔喪猶斷髮文身以示不可復立季亦有所以絶國人之望者乎故有譲而國興者有譲而國亡者譲而興者周是也譲而亡者吳是也周之興以伯仲之偕逃吳之亡以季札之不去而光因以藉口矣蔡季之始末不可詳季之復歸於國亦不見有内亂而究不得其所以譲之道也顧謂春秋賢之哉癸巳塟蔡桓侯桓侯以六月丁丑卒以八月癸巳塟相距僅七十七日蔡季知請諡之為禮而不知速塟其親之為非禮何耶能使國人以禮請於王而不能使國人以禮塟其君何耶經書季以八月歸即以月之癸巳書塟桓侯歸即在月之初塟即在月之終相距亦不過二旬有餘日自蔡而請於京師自京師而頒於蔡天子之策書若是其易而速乎國無危亂得諡而即塟何耶恐諸儒亦泥於稱字之為賢之稱侯之為變文而強為之説也陸氏以左𫝊及史記世本蔡之諸君皆諡為侯經皆稱公者以其私諡與僭同也惟桓侯請諡王之策書則云諡曰某侯諸史國史因而紀之故春秋特書之然則蔡他君本不稱公春秋因其私諡改侯書公是夫子強坐蔡他君之稱公矣夫私諡而不僭猶愈於既私諡而又僭者罪原不可以同科況又強坐以不僭之僭豈義也哉且又何以知桓侯之諡為請而得之而特仍之耶當是左𫝊史記之稱侯者蔡之本史原不稱公魯史於封人之稱侯偶従其國之舊稱其前後則因諸侯皆於塟稱公故於蔡亦一例書公而夫子仍之耳又家氏以説左氏者謂蔡季獻舞為一人為非然春秋於蔡季不再見於經安知其非一人耶許叔入許稱字而叔即為許男蔡季歸蔡稱字而季即為蔡侯何所見季之稱字為賢之而為蔡侯者必非季叔之為許男而人許之稱字為非賢之耶及宋人衞人伐邾盟趡未逾年而即伐之傷信未有若此其速者汪氏謂以宋故而背盟是已書及書人諸儒多以為㣲者夫邾小國以三大國伐之即為㣲者亦可得志然而非定論也或皆大夫而不名耳内大夫不名則桓時不名大夫之義外大夫不名則文宣以前侵伐不名大夫之義也冬十月朔日有食之言朔不言日食在朔而史失其日也穀梁以不言日為食在既朔然經既明言朔則不當在既朔矣十有八年春王正月公會齊侯于濼黄之盟也齊速背而侵疆又會於濼何也豈盟不可恃而會可恃哉會濼而夫人往者将因夫人而終締之好也於是夫人欲如齊而公不能制矣公與夫人姜氏遂如齊公無與字書與書遂玩其文氣有順風隨流不可得泊之勢是必齊侯欲挾文姜以歸文姜決意従齊侯以歸而桓不能制不得不偕之以如齊也此句當連上句作一氣讀至今讀之而當時魯人歎息痛恨莫可挽救之意夫子作春秋歎息痛恨莫可挽救之意猶可想見夏四月丙子公薨于齊隠閔書薨而以不地著其見弑之實其書薨者舊史也不地者夫子削之也桓在外不可以不地則一仍舊史之文也説春秋者謂隠公之弑舊史必委罪於人以脱桓翬之罪夫子改弑為薨而以不地示賊之為桓翬然則舊史於桓公之死必書齊彭生弑我公或齊侯殺我公為得其實矣夫子又何用為齊㐮彭生諱而一例改弑為薨乎如謂諱我君之為齊所殺何以舊史不諱而夫子諱之乎又何以既欲諱之而又於前後文著其實乎可知桓公之薨於齊舊史原來如此書也葢魯憤其君之見殺既不甘専歸獄於彭生而人畏齊之強不敢實罪齊侯而又欲掩文姜之醜俾不聞於鄰國故隠恥含恨而書公薨於齊也然則隠公之死舊史必書公薨於蒍氏無疑矣又左氏齊侯通於文姜公謫其事文姜以告齊侯齊侯使彭生乗公而殺之夫公之謫文姜私謫之也文姜之告齊侯私告之也誰見誰聞而左氏得其實以載筆哉毋亦因公與夫人如齊及後屢如齊之文而為此想當然之説耶葢齊必欲亡紀而桓強庇之齊人憤焉因其來齊而授刀於彭生以速斃之庶以逞其數公以來有事於紀之志是以桓薨一年而遷紀三邑三年而紀季入齊四年而紀侯去國也而其禍起於文姜之如齊又屢如齊而宣淫不制則推本窮源而文姜與弑之罪不可逃矣丁酉公之喪至自齊魯人之不欲仇齊也不待莊公修舊好通婚姻而後知之也使有仇齊之心則當於聞訃之日號哭而起上告天王下赴鄰國世子凶服即戎親壓齊境有必得仇人而甘心之憤一戰不勝而再戰再戰不勝而頓兵曠日則雖桓公之喪逾年不歸而固未有罪也即不然喪至而兵起可也乃不逾月而喪至自齊矣而魯安之也喪至而塟又遲而齊㐮則晏然用師於鄭殺子亹轘髙渠彌若不警心於魯者而魯人亦竟安之也是誠何心哉魯人以為彭生既除而仇人得矣是可恨也秋七月左氏𫝊齊人殺子亹而春秋不書何也葢鄭人立子亹子亹儼然鄭伯矣如書齊人殺鄭伯則與突之稱爵無别如書齊人殺子亹則似子亹不當立而齊人為鄭突討賊故春秋寜没其事使不詳而必不詳其事使亂名實而害義理也葢忽之弑子儀之弑鄭或不來告舊史或不書齊人之殺子亹齊未必不來告齊來告舊史未必不書而春秋不詳其事者疑於夫子之削之也冬十有二月己丑塟我君桓公桓公書塟公穀以為仇在外不責其踰國而討文定因之以為此春秋之法其説之害義也甚矣殺父之仇不共戴天天有内外乎在内而為臣子則為賊在外而為鄰國則為仇内賊必討外讎必復臣子之心其義一也在外不責其踰國以為有任之者天王方伯之罪而非其臣子之罪此後世父不受殺必告於有司聞於司寇不得相為賊殺之論也然魯何以竟不告於天王赴於方伯耶且賊即在内雖為其國之臣子又何嘗不當請於天王而誅之耶但内賊弑君人人得而誅之外仇以國君而殺國君不得比於弑君之律而臣子之痛未有異也烏得以其在外而寛其復仇之責哉夫子於其塟也而仍舊史以書塟正以治魯臣子忘仇之罪而非原其在外而寛之也春秋宗朱辨義卷二
