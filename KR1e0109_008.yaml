body:
  text: 春秋宗朱辨義卷八髙淳張自超撰成公元年春王正月公即位二月辛酉葬我君宣公無氷三月作丘甲作丘甲以禦齊難實行父惡歸父以啓釁于齊而因以重困吾民貽害于無窮也行父之罪多矣夏臧孫許及晉侯盟于赤棘魯既㑹晉為斷道之盟已與晉合矣許復為赤棘之盟雖奉成公之命為公而實則受行父之命為私也臧氏之黨行父如此秋王師敗績于茅戎公榖作貿戎公榖所云晉敗之者罪晉之詞謂晉不能為王興伐戎之師而平戎于王是等王戎為敵國也劉康公伐戎而晉不以師從王師敗績而晉又不以師救故為歸獄之詞以罪晉耳啖氏駁之非是也冬十月二年春齊侯伐我北鄙以大義之公論之齊惠助宣遂弒君得國安受魯之䖍事者自惠至頃幾二十年君朝臣聘殆無虛歲一往㑹晉遂以為隙問罪之師易世而至惠頃之罪宜相繼而治之也以人情之私論之君齊所定也夫人齊之女也平州之㑹信而不盟濟西之田受而即復何負于魯而舍之即晉哉且齊晉之不相下也齊既怨魯之背已又怒魯之挾晉默而不討為諸侯笑北鄙之師齊亦有所不得已也春秋治公義不治私情齊之罪固未可曲為原之矣但文公之世齊商人弒君執叔姬執單伯無名之師三至西鄙告晉不救納賂請盟辱亦至矣爾時當國用事者非行父耶主憂臣辱主辱臣死而行父猶往來齊晉之間為苟且圖存之計何其懦也今以惡歸父之故激齊搆怨齊師之來獨不可修詞謝過以平之乎逾時而四卿並出請晉師連衛曹以速報齊而戰敗之又何其勇也則以歸父猶在齊也嗟乎商人虐我之恥則不思雪歸父専國之恨則不能忘用公徒以泄私忿脅新主而仇先君蓋自此而魯為季氏之魯矣夏四月丙戌衛孫良夫帥師及齊師戰于新築衛師敗績新築衛地此必齊以兵加衛而衛出師逆戰於新築耳左氏所云衛將侵齊與齊師遇者恐是因春秋不書齊師侵衛伐衛而附為之說也衛之於齊自助宋伐喪以來未有兵爭之事今脅於晉而世子臧從晉伐之曲在衛也齊即來報何不可修詞以謝而急於一戰哉春秋書孫良夫帥師而齊師不目主將則知其専罪良夫矣六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉郤克衛孫良夫曹公子首及齊侯戰于鞍齊師敗績首公榖作手將稱元帥屬辭之體是役也據左氏則晉亦四卿郤克士燮欒書韓厥春秋獨書郤克而于魯四卿並書則知其罪四卿矣穀梁以為行父郤克孫良夫公子首同時聘齊受一笑之辱左氏亦大略相同其事容或有之然其本意固非専為此也晉欲世主夏盟而齊獨以伯主之後抗不與其盟㑹晉景將合諸侯故假齊楚結好之名乘機而連兵以加齊衛于新築之敗則又不得不因諸侯之師以報之也曹亦為晉所役而已至于行父之仇齊則全不以一笑之故也宣公十八年間仲遂歸父父子相繼専國用事將無季氏矣季氏之隱忍莫敢如何者宣公在也宣公既薨歸父雖逐而猶在齊若少需以時而苟慢於事齊聽歸父之言起南陽之甲納歸父而盟成公三桓危矣于是急托于晉為先發制人之計使齊自救而不暇于為歸父謀也蓋晉有晉之私而巧借必致死力于齊之行父行父有行父之私而巧借必欲得志于齊之晉也文定責其以一笑之故殘民毒衆幾獲其君而怒猶未息為憤兵之戒者猶未得春秋之義也使春秋之義在此則書季孫行父及郤克孫良夫公子首可矣而何以于魯則四卿並書哉又以為成公初立主幼國危為季孫一怒掃境興師雖無人乎成公之側有不恤者亦非也行父明欺其主之幼初不顧夫國之危必一戰勝齊而後齊不生納歸父之心晉德我輔伯之力三桓安而幼主在其掌握也茅堂胡氏以為公室卑弱四卿擅命各得乎魯之兵權夫臧孫許與公孫嬰齊其能得魯之兵權哉春秋並書以見許之聽于行父而不聽于君嬰齊以宣成之近屬而亦不敢不惟行父之是從焉耳此為內大夫及外大夫連兵伐國相比書名之始未有若此其詳者也秋七月齊侯使國佐如師己酉及國佐盟于袁婁穀作爰婁召陵書屈完來盟于師來者自外而來也來盟者著其來之意本為盟也國佐之如師齊侯使之以請諸大夫之欲也兩言既成而後為袁婁之盟也故召陵之盟楚之受盟于諸侯袁婁之盟晉之盟齊也八月壬午宋公鮑卒庚寅衛侯速卒速公作遫取汶陽田內邑為外所取則史諱之前既諱取則後不得不諱其歸也取汶陽田與取濟西田書法無異彼諱因晉而取曹田謂若我取之曹者然此諱因晉而歸齊之侵地謂若我新取之齊者然也冬楚師鄭師侵衛據左氏則蔡許皆從矣據經則十一月公㑹蜀即于月之丙申十二國盟蜀而秦大夫與焉秦距魯逺使約㑹而秦始至不應若此其速是必秦大夫亦從楚師矣而春秋皆不書獨書鄭師者専罪鄭之從楚也猶厥貉之次専罪蔡也十有一月公㑹楚公子嬰齊于蜀楚師壓境責我之從晉伐齊宜嬰城固守以待晉援即不得已而請成則四卿安在而煩幼主親出耶行父以私而背齊向晉四卿並出非公意也行父自危而不敢出故隱與仲叔謀而迫公親往其請成之詞必曰先公合齊以通好于楚宋之㑹未嘗敢忘幼主新立脅于晉之强不得不遣大夫以從以此為詞可以釋楚之怒然而齊怨既深楚猾不可測公之往得毋危哉而行父不顧也春秋于公㑹公盟兩書不諱論者但于其背華即楚以望國之君而下比于荆蠻之大夫為成公罪而不知聖人以罪行父也伐齊則四卿並出㑹楚大夫則幼主親行比書于冊不深切著明哉丙申公及楚人秦人宋人陳人衛人鄭人齊人曹人邾人薛人鄫人盟于蜀主此盟者必嬰齊也嬰齊主盟而諸國大夫聽之魯君聽之其為春秋所惡何疑伊川責其不能保固疆圉要結鄰好以圖自存為是文定謂其宜専事晉室則非也春秋豈以舍天王而事伯主為義哉又諸儒以大夫不名為貶者非也凡大夫書名所以貶大夫罪大夫之専也大夫而不書名則所以罪其君也其于十一國亦各有其罪也罪秦之與楚合也罪齊德楚師之來救也罪陳鄭之久屬服于荆蠻而鄭又以師從也罪宋之受圍逾年力能相距前之及平為不得已而今之受盟可以已而不己也其他小國不足責而曹衛從晉仇齊楚師一至何背之速耳罪尤甚矣夫以中國而受楚大夫之盟即書名何嘗非貶而受楚盟之罪又豈待貶而人之而始著哉若于宋為諸侯交見之盟則名諸侯之大夫而春秋罪之尤深也惟不名諸侯之大夫則亦不名嬰齊矣又左氏以蔡許乘楚車不得列于諸侯亦非也蔡許屬服于楚楚役使之已久無煩于盟故不使之與于盟非春秋惡其乘楚車而削之也三年春王正月公㑹晉侯宋公衛侯曹伯伐鄭嬰齊至蜀魯親往㑹宋衛曹皆約而至蓋既受楚盟矣才逾一時而即叛盟從晉以伐鄭如曰義當從晉何如初不從楚如曰叛楚盟不為不義何如不盟楚之為義家氏以去强盛之楚從衰弱之晉以伐有罪之國為春秋嘉之者非也夫鄭為楚導其罪固大魯宋衛曹之受楚盟薄乎云爾盟主固有辭于伐鄭魯宋衛曹何辭于從晉以伐鄭哉家氏以鄭罪當討正諸侯之爵以示義者亦非也此當作聖人之心公而恕子四國之悔過而罪鄭伯之怙惡說則無弊矣辛亥葬衛穆公穆公作繆嗣君即戎倉猝歸國遽葬先公即迫于晉命不得已而然亦春秋所惡也二月公至自伐鄭㑹伐未有不至者吳氏以為雖未逾時伐鄭無功亦危而至之然如僖公伐楚有功而至則又豈不危而至其逾時耶甲子新宫災三日哭公穀皆以哭為禮文定用劉質夫之說以為非禮如為得禮則常事不書矣公羊又以為記災故書如為災故則書災不書哭矣疑當從文定也但魯自周公至文公父子兄弟相繼相及共十九世而考之于煬幽之于魏厲之于獻真之于武懿之于孝隱之于桓閔之于僖兄弟相繼者凡七宣公之時如兄弟異昭穆則莊為髙廟閔為曾廟僖為祖廟文為禰廟當祧莊遷僖而以宣入僖廟矣如兄弟不異昭穆則隱桓為髙廟莊為曽廟閔僖為祖廟文為禰廟又當祧隱桓遷閔僖而以宣入閔僖廟矣考于春秋不稱廟稱宫又至哀公之世而桓僖宫災故疑不以兄弟分廟數而同廟異宫當宣公入廟必祧隱不祧桓而以閔主遷于隱宫遷閔不遷僖而以宣主入于閔宫所云新宫者當是于閔宫而修葺丹堊之也所云新宫災者當是修葺丹堊之時而災也是必舊主既遷新主未入也顧難既遷未入宫尚無主而于五廟之中火燬一宫豈不驚動而虧傷其在廟祖考之精神乎果有三日哭之禮行之非過而春秋書以譏之者豈舊主既遷則舊主之精神已去乎此新主未入則新主之精神未屬乎此而于他廟神主之精神雖驚動而無虧傷無取乎三日之哭耶古制既淹魯禮亦變或宣别為新宫或古無三哭之禮難以考据未可為定論也乙亥葬宋文公衛穆宋文皆卒于去年八月皆迫于晉命出師伐鄭因是而逾五月之期觀春秋于伐鄭書宋公衛侯是明著宋衛不以喪辭晉晉役宋衛背殯之嗣君為皆有罪而舉爵者以罪其不行如期葬親之禮而行逾年稱君之禮也宋文之厚葬亦左氏云然文定獨為後世示戒春秋無此義也夏公如晉去年八月取汶陽田不速往拜者以有楚師也至冬不往拜者懼晉怒其盟楚也㑹師伐鄭以解晉而後往拜之假拜田以朝晉而成以宣事齊之禮事晉矣鄭公子去疾帥師伐許鄭許自桓公以來久輯兵戈文公九年許昭從晉以救鄭新城之盟鄭許同與至此忽興伐許之師以後加兵不已必滅許而後甘心鄭屈于晉楚而圖伸于許已不恤小而何辭于晉楚之不恤已哉春秋于去疾稱公子稱帥師惡去疾也公至自晉宣公終身朝齊成公終身朝晉至于宣奔齊元之喪成奔晉獳之喪則後先一轍也辱亦甚矣秋叔孫僑如帥師圍棘去年秋書取汶陽田逾年而棘不服當是棘大夫為齊人不聽田之歸魯故僑如帥師以伐非其民之不願歸故國也觀後韓穿來言汶陽之田歸之于齊想是時齊雖許歸侵地而邑之大夫齊所命者據邑未去相持不決也書僑如帥師著成公之用僑如之専魯師也大雩晉郤克衛孫良夫伐牆咎如牆公作將穀作牆晉連衛以伐牆咎如則牆咎如猶强非僅是赤狄之餘黨散入牆咎如也冬十有一月晉侯使荀庚來聘魯君親朝而大夫報聘齊晉皆然非獨晉為盟主之禮然也當時大小强弱之勢如此衛侯使孫良夫來聘宣七年良夫之來為晉以致魯故書來盟是衛之欲盟以信魯也今年則良夫以聘而來非以盟而來而及良夫盟是魯之欲盟以信衛也盟以信衛者以明因衛從晉之志也丙午及荀庚盟丁未及孫良夫盟書來聘是著晉衛之君以聘使非以盟使也書及盟是著盟之出于公意也而荀庚良夫不辭則當時因聘而盟習以為常非但二臣之専且抗也鄭伐許伊川以為鄭附于楚一年而再伐許故外之然襄十五十六十七十八年齊人連年加兵于魯十六十七則皆一年而再伐圍成圍桃圍防襄二十五年鄭一年而再加兵于陳春秋何以不外之耶何氏以為惡其與楚同心比周為黨故外之范氏以為伐衛之喪又叛諸侯之盟故外之文定則曰晉楚爭鄭鄭兩事焉及邲之敗始専意事楚不通中華其所以異于外者幾希若是則當于事楚外之于背晉外之于伐衛外之于叛諸侯之盟外之何獨外于伐許哉文定又以為馮弱犯寡一歲之中再動干戈于鄰國夫春秋諸侯大之凌小强之兼弱衆之暴寡率以為常若欲外之當比二百四十二年之諸侯而外之何獨外于鄭之伐許哉前此伐許不外以為惡未甚也今則惡稔而外之矣明年之伐稱鄭伯即以譏其忘親即戎而此後書圍書伐又稱人稱公子何耶鄭以中國諸侯而堅附楚其罪一也犧牲玉帛陳于境上以待强者其罪二也鄭不以道義自强附楚亦外朝晉暮楚亦罪罪比鄭君臣終春秋之世而外之何獨外于是年之伐許哉乃陳氏則以為諸夏之變于楚鄭為亂階至于辰陵鄭帥諸夏而事楚敗晉于邲盟十有四國之君大夫于蜀皆鄭為之若是則當于盟辰陵外之于盟蜀外之不當外其伐許且如蔡許之世屬于楚如魯之不受楚兵而朝于其庭或薦賄以悅或乞師以內伐則鄭罪猶可原也諸儒之說殊難以通四年春宋公使華元來聘魯宋之好自華孫來盟復通宋鮑在位二十二年既無相惡之事而又往㑹其葬故嗣君新立來修聘禮且以通婚姻也三月壬申鄭伯堅卒杞伯來朝杜氏以為將出叔姬先修朝禮以言其故恐未必然或是將出叔姬懼魯怒而見伐先修朝禮以彌縫之也夏四月甲寅臧孫許卒公如晉公去年如晉以拜汶陽之田今年如晉或以取汶陽田而棘人不服故也髙氏以為嘗即楚故然自㑹伐鄭後晉已釋然矣且晉不以盟楚來討者東諸侯皆受楚盟不可勝討不得不姑隱忍之也葬鄭襄公秋公至自晉據左氏此年朝晉而受不敬之辱然晉即加禮又豈得為榮耶知此則可以得春秋于僖公兩如齊不至而于諸公無不書至之義矣冬城鄆鄭伯伐許連年伐許鄭罪大矣又速葬其親而以吉禮從戎宜其不能久于位歟五年春王正月杞叔姬來歸吳氏以叔姬為僖公女謂三十一年杞伯姬來求婦而魯以歸杞桓者也然諸儒于文十年書子叔姬卒謂即所許杞桓之女既卒而魯再以女字叔姬者嫁之而吳氏于彼無所發明殊難徵信據此書來歸家氏以為或以疾來歸吳氏以為或故姬無子他妾有子不安而歸故書杞伯逆喪以歸而無貶詞未必然也即有疾即無子不自安亦于義不當歸叔姬之來歸書者以示譏也魯之于杞猶齊之于魯大小强弱相形杞之逆喪未必非屈于魯之故如魯請歸哀姜之喪為屈于齊也又歸卒歸葬詳書者以著魯杞離合之始末也杞以夏禹神明之裔自入春秋至今一百三十餘年未嘗一與諸侯盟㑹弱小難以自存而托婚姻以親魯自莊二十五年伯姬歸杞之後再訂姻盟通好八十餘年而叔姬忽不自安而歸此必有故也叔姬既歸而杞伯即于是年與諸侯蟲牢之盟自此而諸侯㑹盟之中始有杞伯蓋杞伯懼以叔姬故得罪于魯魯以為討而托于晉也由是觀之則叔姬之歸未為善歸而杞之逆喪必有所屈不得謂春秋無譏矣仲孫蔑如宋報宋聘若是其速魯之急欲固宋交也魯宋交聘而齊于是忌之矣夏叔孫僑如㑹晉荀首于穀前書叔孫僑如帥師圍棘與書公孫敖帥師及諸侯之大夫救徐公孫歸父帥師伐邾取繹同著三臣之専師也此書叔孫僑如㑹晉荀首于榖與書公孫敖㑹晉侯于戚公孫歸父㑹齊侯于榖㑹楚子于宋同著三臣之専㑹也著三臣之専師専㑹者著三臣之所以見忌于行父而奔也至于荀首如齊不過魯境必無往饋之事髙氏責其非禮之禮者非也即往饋亦小事舊史可以不書往饋之非禮亦小失舊史書春秋可以不書且書㑹又何以示失禮之譏于後世耶當仍是為汶陽之田也梁山崩秋大水冬十有一月己酉天王崩十有二月己丑公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾子杞伯同盟于蟲牢鄭以許之故不得志于楚即請成于晉晉急合諸侯就鄭地而盟之是晉之喜于得鄭也此鄭所為以去就自權于晉楚之間歟鄭之圖存以此鄭之失道亦以此文定以為天王崩赴告已及不奔喪而九國㑹盟故書同盟以著其不臣然上書天王崩下書九國㑹盟不往奔喪之罪著矣義無取乎書同以示之也書同者齊侯與㑹晉謙不自主推而與諸侯同之也六年春王正月公至自㑹㑹蟲牢之前書天王崩汪氏以為成公當自㑹如京師以奔天王之喪乃㑹同之後奄然歸國故書公至自㑹以著其無王不臣也然而齊桓㑹葵丘于天王崩之後而于僖公不書至㑹則知春秋無此義矣且天王崩之日盟蟲牢之日相越四十日是其赴告已在諸侯不輟㑹奔喪而猶泰然同盟其罪己著政不侯書至于㑹後而始治其無王不臣之罪也蓋有通春秋之義有逐人逐事之義如天王崩而不奔喪之類則通春秋以示譏不必隨事以譏也二月辛巳立武宫武公者以昭穆言則周公之六世孫成公之九世祖也以繼及言則始封以後之十世侯新君以前之十二世先公也祖孫之屬皆逺矣武公以弟繼兄舍嫡立庶在位九年卒遺篡弒攻殺之禍于後非魯之令辟也魯追逺而立其宫何為者耶左氏謂季文子以鞍之戰立武宫其意以武宫為武庫之類然觀後之立煬宫書法相同及昭十五年書有事于武宫則此當作武公之宫也其立武宫或亦仍以鞍戰故也蓋武公諡武在周宣王時必有戰勝攻取之事行父既以鞍之戰為己庸而又憤魯之積弱不振將以武力爭衡于諸侯故復立其既毁之廟以示意于臣民也夫魯以秉禮之國為列國所重惟不修文德自隳其防故往往見誣于强鄰不思復修周公之道而矜尚武力其能與齊晉秦楚爭哉失之矣其宫廟即逺有毁無立之義則文定言之詳也其以武宫為武世室與魯公之廟為文世室並稱見于明堂位者則漢儒附春秋為說汪氏亦辨之詳也取鄟才立武宫而即滅附庸之國甚矣武力之為禍烈也大國吞併小弱若此又何怪乎楚之蠶食諸姬耶魯作丘甲而戰勝立武宫而取國行父以此謀國而國之衰弱益甚是皆自為操兵柄擅國權之計也衛孫良夫帥師侵宋宋衛未見有仇而忽以兵侵魯宋方往來通聘亦以兵侵則兩國之于宋其皆奉晉命無疑夫宋既受晉盟魯衛又與同盟蟲牢甫散而侵師即至左氏以為宋辭㑹故夫辭㑹非罪也而强命與國一侵再侵晉景之不義也如是夫齊桓盟召陵之後兩加兵于陳陳有轅濤塗紿師之罪江黃之伐七國之侵齊人親主其師春秋猶譏之況宋無罪而晉師不出専役魯衛儼然有天子命討之意可乎哉然春秋書孫良夫帥師書仲孫蔑叔孫僑如帥師聽命于人而伐所好之國又非有罪而不能辭如受天子命以討有罪者所以罪良夫及蔑僑如也左氏以此役為晉伯宗夏陽說衛孫良夫寧相鄭人伊雒之戎陸渾蠻氏然而春秋獨書良夫必無他師觀魯侵宋無他師則衛侵宋無他師可知矣其衛人無備衛人登陴之事及夏陽說欲襲衛伯宗不可之說或盟蟲牢之後晉師歸途過衛時事左氏誤以為侵宋時事也故家氏以為不與晉之率戎蠻以攻中國者非也晉果率戎蠻以攻中國春秋當書以罪之而顧不書以隱其惡耶竊疑宋以子靈之難辭㑹不得為罪蟲牢之後又不見有諸侯再㑹而宋不與之文何罪于宋而一再侵之哉當是齊晉方合齊既仇魯而又忌魯宋之新好懼其因以婚姻而將易世與齊為敵故間魯宋于晉晉欲拒齊則恐失齊欲罪魯則魯方勤于事晉故因宋辭㑹假為之罪使衛侵之以示其意也此後公孫嬰齊之如晉必以此為解而晉即命魯侵宋以離其交至逾年魯衛齊宋為馬陵之盟又逾年歸汶陽之田于齊而後齊之怨釋齊怨釋而後晉之意解齊晉不忌而後華元再聘魯宋之昏姻始成也夏六月邾子來朝公孫嬰齊如晉衛侵宋之後而嬰齊如晉是必解親宋之故于晉也晉命侵宋以絶之而魯不敢辭故親宋之後行父復如晉者是必報絶宋之命于晉也壬申鄭伯費卒秋仲孫蔑叔孫僑如帥師侵宋二卿並將大衆兼行以示己之用武于宋以解齊晉也然自四卿戰鞍之後終春秋之世凡用師或二卿或三卿大夫専國同出帥師而公室益微故吕氏謂其侵宋之事小而専權之患大者是已李氏以為春秋凡奉伯主之命或為伯主而興師皆書侵者本非有怨但屈于不得已故亦無志于深入而成侵其說亦是但奉伯主之命而苟聲罪致討則疑于奉王命矣不特春秋不書伐想當日諸侯亦不肯以奉命伐國尊事伯主也楚公子嬰齊帥師伐鄭爭鄭而伐喪春秋深惡楚矣此為書楚大夫帥師之始亦所以罪嬰齊也文定因其書法與中國書卿帥師同謂無貶辭者非也中國書卿帥師未嘗非貶而況楚之爭鄭而伐其喪乎必以書晉救而始見春秋惡楚是又泥于凡書救皆善之之義也冬季孫行父如晉一年而再聘晉必非無事而但修聘禮者左氏以為賀遷也即據左氏晉以四月丁丑遷于新田則六月嬰齊之如晉宜致賀矣魯敢後賀而至于冬哉故知是為報侵宋之命于晉也又內聘他國苟為常事則春秋不書其書者必有關前後之事及往聘之人也若賀遷則亦常事不書矣晉欒書帥師救鄭救公作侵楚伐鄭喪晉師救之誠為善矣而非因其善而書卿書帥師也此及後侵蔡伐鄭三書樂書帥師以著欒書之久専晉帥也著欒書之久専晉帥者罪書之不能以仁義輔晉厲及厲見弒而又不能討賊也亦以著晉厲之見弒無主名而非書一身之罪也蓋欒書久専晉帥力能弒君力能討賊若晉厲果書所弒春秋不當縱之矣若書既已討賊春秋不當沒之矣弒君稱國則知春秋不以弒君罪書也君弒而賊不討則知春秋以不討賊罪書也蓋于三書欒書帥師知之也七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛郊天之物而為隂賤殘賊之小蟲所傷此亦似有使之然者不待又食而始以為非有司之過也不然定十五年哀元年食而改卜不又食則將過有司耶吳伐郯吳始見書吳猶楚始見書荆也其後漸交于中國而書人書子猶楚漸交于中國而書人書子也使春秋不終吳不滅㑹盟侵伐其交中國漸與楚同則其書大夫書帥師亦與楚同矣然則此後詳于書楚略于書吳豈春秋進楚而退吳哉伐郯而兵連上國始書者以見吳之將為中國患也夏五月曹伯來朝不郊猶三望免牛在正月三望在五月既歷一時又間有事故書不郊猶三望也蓋三望亦非禮書猶三望則必書不郊以起之與僖三十一年宣三年稍異者事理文勢然也秋楚公子嬰齊帥師伐鄭楚連年用兵于鄭如諸儒之說即不狄之亦當人之矣而春秋書公子書名書帥師無異詞則稱人為貶舉爵稱卿非貶之說不可以通矣固知春秋重惡嬰齊専楚國之師而連年伐鄭也公㑹晉侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭晉以八國諸侯救鄭義也春秋善之宜矣然于鄭則救之為義而于宋則命魯衛以侵之為不義連交侵之諸侯以救被楚師之鄭春秋豈無刺譏于其間哉亦據直書之以見晉之內則强制諸侯而外則爭鄭于楚以世圖伯業也八月戊辰同盟于馬陵蟲牢之後既兩侵宋已知諸侯之不信矣救鄭徵師而宋後至晉固不得不為馬陵之盟以再籠絡之也自盟于馬陵而後魯宋之交成晉衛齊且有來媵之禮矣左氏以為莒服故莒于春秋為小國自晉文之後不與諸侯盟㑹莒何恃而敢與諸侯抗哉莒素服屬于齊齊不與盟㑹故莒亦不至自齊為魯兩用兵于莒莒因舍齊而事晉然猶未公然列之于㑹也今齊既合于晉晉又為之命魯衛侵宋以攜魯宋之交于是救鄭徵師而齊至莒亦至乃使莒同于諸侯之盟也不然晉豈為褊小之莒而煩諸侯以盟之哉凡春秋小國多不列盟㑹者各有所屬服也其或間與者或伯主列之或所事之國列之也又同盟之義諸儒不主載書稱同立說而隨事索義所見參差如自蟲牢以後齊來與盟以自晉文以來歷襄靈成數公所不能致而至此合之既列于宋公之上以尊異之又取魯田以饜飫之顧敢主盟而使齊受盟哉必不然矣故當以不主諸侯之盟而推與諸侯同之為說也公至自㑹㑹溫而至圍許救鄭而至㑹夫救鄭豈不善于圍許哉如諸儒至伐楚至伐鄭以大伐楚伐鄭之功之例則此當善其救鄭而至救鄭矣不至救鄭而至㑹者楚師既退而㑹盟為大也比觀于此則可以知至圍許之疑于朝王而不至㑹之義矣吳入州來此以志吳敵楚之始以楚之强而吳入其與國必內諸侯所喜者然吳與楚爭吳勝則吳興楚勝則楚益强皆足為患于中國也冬大雩衛孫林父出奔晉大夫去國有有罪者有無罪者林父為良夫之子必良夫既殁而衛侯惡林父林父不安而奔也其父始殁而即使其子不安于國亦似失恩禮臣子之道矣然比觀經文良夫用事㑹盟侵伐自専其後林父歸國而逐其君則其父子之間非循法奉公之臣可知而春秋書出奔亦凖其前後事以罪之也據左氏林父奔晉衛侯如晉晉反戚焉是林父以戚奔矣林父實非叛故以戚不書也晉之納林父則德其父之堅以衛從己也八年春晉侯使韓穿來言汶陽之田歸之于齊魯田為齊所侵借晉力而復之此所以晉來言歸齊而不敢辭也可見魯不自强依晉無益晉以得齊為重而視魯輕寧非魯之恥耶至晉之以非道强魯而以不義示諸侯則直書而可見矣晉欒書帥師侵蔡蔡與楚近不得已而服屬于楚如晉文之時蔡何嘗不舍楚內向哉蔡之甘心事楚固為有罪晉不能制楚以來蔡而興師動衆以殘毒其臣民竟不能强其附己亦何益矣此春秋所惡也公孫嬰齊如莒魯與莒素不相好雖同馬陵之盟莒人不來魯未必使往聘此與行父如陳公孫兹如牟皆為私出無疑宋公使華元來聘魯侵宋而宋不報故知魯之屈于晉命也再盟馬陵既歸齊田而華元復聘遂通昏姻故知魯衛之侵宋皆晉聽齊以解魯宋之交也魯宋之請好通昏皆受制于齊齊頃固不義而晉景又烏足以令諸侯哉甚矣魯之屈也夏宋公使公孫壽來納幣華元來聘之後書仲孫蔑如宋來聘如宋之後書侵宋侵宋之後書盟馬陵馬陵之後書歸齊田歸田之後再書華元來聘來聘之後即書公孫壽納幣若春秋不再書來聘不即書納幣至明年二月始書伯姬歸宋則亦不見齊之忌魯宋而間于晉既而歸田相釋魯宋之昏始成矣公羊以為録伯姬何氏以為伯姬賢所以殊于衆女然則魯之衆女豈皆不賢而春秋不録之耶文定以為譏卿納幣此就事以論事未嘗非義然而春秋之紀昏姻則以著邦交也先王分土建國參錯天下朝㑹聘問而有玉帛之好燕享之樂者不曰兄弟則曰舅甥禮讓之可以為國實係乎此故春秋既書娶婦而又詳録內女之嫁也魯之于紀也紀逼于齊魯為之求盟于齊為之通婚于王為之糾鄰國以與齊為敵伯姬叔姬故也書伯姬叔姬之始卒者詳魯于紀之始卒也魯之于杞也杞為先代王者之後微弱不能自存托婚于魯而得以免伯主之誅求歷莊閔僖文宣成六公之世七八十年之間無有怨惡伯姬叔姬故也書伯姬叔姬之始卒者詳魯于杞之始卒也季姬歸鄫雖逾年即卒其後魯僖猶怒邾人之用鄫子而再伐邾以報之伯姬歸郯雖異日來歸其初魯宣則合齊以平莒郯而又伐莒以曲庇之其于宋也惠隱世為昏姻自娶齊女而宋好失歷莊僖文宣至成伯姬歸宋而復通魯宋大國也嫁女娶婦三國來媵諸侯所不能忌而魯宋之交固是以詳録伯姬而事凡八見于經也顧合觀春秋魯六公皆娶齊女一子叔姬嫁齊而見執其紀杞鄫郯皆小國而魯以女嫁之莒慶宋蕩氏齊髙固則又以魯女而下嫁于大夫國勢相敵而為魯甥者獨一宋耳豈樂小國之附己而妻之以女望大國之援已而以其女為夫人耶若是則昏姻不以義而以利宜乎朝昏姻而暮仇敵以此而合即以此而離既以此而離又以此而合所為邦交之大藉以成禮讓之天下者漸而為戎狄漸而為禽獸矣嗟乎春秋諸侯私其昏姻則大義不顧利其土地則昏姻不顧又其甚者脅于强大則嫁義不當嫁之女托其助己則娶義不當娶之婦人倫之道喪而禮義衰可勝歎哉故春秋于宣成之後終襄昭定哀之世娶夫人不書而內女之嫁者亦不復見于經也晉殺其大夫趙同趙括同括有原屏而强故莊姬之言得入而晉景亦追念盾之専國無主弒君立君有戒心于同括而殺之也然同括之罪不明則為殺之不以其罪矣史記謂并殺朔嬰皆滅其族汪氏疑于經文止書同括然觀左氏稱武從姬氏育于公宫則滅族之說宜可信而朔或前死也秋七月天子使召伯來賜公命賜公穀作錫書天子當以陸氏或依䇿命之文或為傳寫之誤為妥如謂春秋以天子書則又當有别義矣其實撰不出别義也其錫與賜亦祇字義相通為是冬十月癸卯杞叔姬卒孫氏陸氏皆以為為明年歸喪起固是然使魯不以禮卒叔姬則舊史不書夫子雖欲為歸喪起亦無由得其時月日而詳書之也舊史所以書其卒者魯以杞伯夫人之禮卒之故杞伯不敢不以夫人之禮喪之而逆之歸葬也晉侯使士燮來聘叔孫僑如㑹晉士燮齊人邾人伐郯晉侯伐郯而聘魯知郯為魯之昏姻也伯姬雖來歸必魯與郯之好未絶也然晉聘于魯而伐魯所與之國魯屈于晉而從晉以伐己所與之國晉之强魯之懦皆見而道義不足以維國本昏姻不足以固邦交矣使上不先書士燮來聘則似魯以伯姬來歸之故有怒于郯而伐郯出于魯志矣衛人來媵衛晉齊來媵皆書公羊曰録伯姬也穀梁曰以伯姬之不得其所也伯姬守禮而死于災使春秋憐伯姬之不得其所而書媵以録伯姬則他女不書納幣而伯姬書納幣他女不書致而伯姬書致皆所以録伯姬而公羊之說是矣然公羊又以齊媵過數為非禮文定又以納幣使卿致女使卿皆為非禮何耶夫欲著伯姬之賢以示訓于後世顧又三書非禮之事以重為賢女之纍春秋之義亦大不可解矣夫子春秋書娶婦嫁女固以示夫婦之大倫而亦以著昏姻之國相好相惡之由非為女婦之賢不賢起義也魯君六娶齊女莫賢于聲姜而逆至皆不書陽穀于卞之㑹猶書以示譏何獨于共姬之賢而詳録之哉蓋魯他嫁紀杞鄫郯小國納幣無卿來故不書致女不使卿往故不書若衛若晉若齊諸大國未必來媵小國之夫人即或有之而無關于國故故亦不書因知春秋非削他女之事而獨詳書伯姬以著其賢矣然于伯姬獨詳而春秋不削者何也書納幣者以著宋娶魯女尊魯而重其事因以使卿來也書致女者以著魯女嫁宋尊宋而重其事因以使卿往也書衛媵晉媵齊媵者以著衛晉齊結好于魯宋而各以女來媵也所以然者魯宋自入春秋不通昏姻至此始通華元謀昏公孫納幣以寵異魯女魯之嫁女于宋有加于紀杞鄫郯而宗卿獨往以為禮也衛受晉命侵宋晉聽齊間而使魯衛侵宋齊惡于魯而忌其昏姻至此皆釋怨以相好也故書以志五國之合也其納幣致女之不當使卿媵女之不當過數則因事以見之而已矣其于伯姬之守禮以死則于書宋災之下書伯姬卒書叔弓如宋葬宋共姬見之蓋內女之葬而舉諡㑹內女之葬而使卿通春秋祇此一見也而前之詳書納幣致女來媵非為録伯姬故也又伊川以為媵小事不書伯姬之嫁諸侯來媵書之以見伯姬之賢聞于諸侯家氏以為春秋內女諸國來媵皆不書伯姬有賢行雖齊晉大國亦忘其勢而樂以女來媵是皆因伯姬之守禮以死而為是想當然之說也如謂媵小事不書他女來媵不書是他女雖不賢皆有來媵者而媵伯姬非以其賢矣如云大國慕其賢忘勢而來媵是他女之不賢者諸國不來媵春秋本無可書而非以媵為小事不書矣其義難以通也九年春王正月杞伯來逆叔姬之喪以歸文定以為杞伯來朝然後出叔姬叔姬卒而後逆其喪以歸必叔姬不應出故魯人得以義責之使歸其喪未必然也魯大杞小杞久托魯使叔姬不應出杞必不敢出即杞伯欲强出魯于來朝時當責之以義使勿果出不當至卒後而始以義責之使歸葬也公羊脅而歸之為是或杞有懼于魯來請其喪也先儒以無貶辭者謂當如哀姜削姓而後見其有罪然哀姜內淫與弒其罪大故削姓以治之叔姬未有大惡不當罪同哀姜則比以郯伯姬之來歸不卒伯姬而卒叔姬者魯不以禮卒伯姬則不書魯以禮卒叔姬則書之夫子因乎舊史以示既出而有加禮又歸其喪其事可譏也公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子杞伯同盟于蒲左氏以歸汶陽之田諸侯二晉晉懼而㑹蒲以尋馬陵之盟非也晉所欲得者魯衛宋齊諸大國也汶陽歸齊齊不二矣衛且奉命侵宋必不以歸齊田二也魯宋畏晉亦不敢二曹莒邾杞小國又敢二哉又左氏以始將㑹吳吳人不至者亦非也晉方怒郯之事吳而伐之越此七年晉厲始使諸侯之大夫㑹吳又七年晉襄始合諸侯㑹吳此時吳雖伐郯入州來諸侯尚未震之也蓋晉初得鄭蟲牢則就鄭地以盟馬陵則因救鄭而盟至此必晉有疑于鄭之二楚故復為鄭以尋馬陵之盟也觀下執鄭伯可見公至自㑹蟲牢至㑹馬陵至㑹則于蒲之至㑹宜矣三至㑹者以著晉景之終失鄭也明年伐鄭不至者伐鄭以納鄭伯如書至自伐鄭則疑于前後之至伐鄭為鄭不服之故矣二月伯姬歸于宋宋逆伯姬不書劉氏以為君自逆則常事不書然則納幣致女為非常事而春秋書以示譏矣使春秋賢伯姬而詳其事以録之顧反不書其合禮者以表之而書其不合禮者以纍之哉夏季孫行父如宋致女伊川以為伯姬賢魯國重之故使卿致然則齊僖親送文姜又何云耶伊川見文姜淫而與弒則以齊僖親送為非義見伯姬守禮以死則以魯人賢伯姬而使卿送此皆事後之論也惟文定責其溺愛越禮書以示戒為妥黃氏不信左氏伯姬死災之說但即為實事則死災自死災其書納幣致女來媵何必定為死災起義哉晉人來媵文定以為諸侯三歸適夫人行則姪娣從二國來媵亦以姪娣從凡一娶九女多則以欲敗禮然則禮以九女為制多則逾少則不備逾與不備皆非禮矣此時伯姬已歸宋晉媵又來而九女之數已備其後之齊媵齊逾禮以歸于宋耶抑宋逾禮以求于齊耶葉氏謂宋為二王之後一娶當得十二女說無引据疑不可從抑又安知魯之女衛晉之媵果否各有姪娣九女之數備不備齊媵之來逾不逾哉蓋古禮已不可考而春秋諸侯又復變亂舊制總難以臆斷也但春秋書衛晉齊之來媵則是因事以志五國通昏姻之好見其岐而復同而非為媵女逾數起亦非為伯姬賢而録之也秋七月丙子齊侯無野卒晉人執鄭伯鄭伯㑹楚公子于鄧不書則不見鄭二楚之罪使鄭果㑹楚公子春秋何不書以罪鄭哉蓋欲甚晉之罪則不書㑹鄧以貸鄭也于蒲之盟不久而鄭復朝于晉則雖一㑹楚公子何害于從中國事伯主之義十二國盟蜀而晉不問鄭一㑹鄧而即執其君殺其行人伐其國晉尚足以服諸侯哉晉欒書帥師伐鄭書欒書帥師則欒書當國也執鄭伯殺行人又帥師以伐之春秋所以并罪欒書也文定泥于書卿書帥師為無貶而専歸罪于鄭之受賂㑹楚惟利之從而不要諸義非也使春秋罪鄭則前宜書㑹鄧以著晉執鄭伯之端後宜書楚侵陳救鄭以著鄭伯所以致執致伐之實今春秋皆不書祇若鄭無罪焉者故知其罪晉也文定又泥于凡救皆善之以為春秋不書救鄭鄭無可救之善楚不得有能救之名者亦非也晉文伐衛書楚救之明其衛之附楚而晉伐之為伐有罪也此之伐鄭不書楚救者沒其鄭之附楚而晉伐之為伐無罪也其實左氏侵陳救鄭之說不足據也不信經而信𫝊誤矣冬十有一月葬齊頃公楚公子嬰齊帥師伐莒庚申莒潰楚人入鄆左氏以為楚子重侵陳以救鄭自陳伐莒然陳自盟辰陵楚子入陳之後至此十七年不與中國㑹盟其不事晉久矣楚欲救鄭無取乎侵陳惟莒則馬陵于蒲之盟皆與故楚伐之也莒既潰楚既入鄆晉不見救莒鄭亦不見即二于楚而楚師退者必楚有事于吳而不暇爭鄭也秦人白狄伐晉宣八年晉連白狄伐秦秦久而不報君子未嘗不少晉成而多秦桓也越二十年而即連白狄以伐晉桓德不終矣此其所以致十三年九國之伐歟鄭人圍許君見執而用兵圍許張氏以為大臣之罪者是矣雖用公孫申之謀示晉以不急君然如晉人之請盟于秦穆以歸晉惠未嘗不可以得君也乃鄭人忌于行人之見殺鋌而走險立公子繻而又殺之以致國亂于內亦左計矣城中城穀梁罪外民之義却好雖不必聖人之意果如此差勝于左氏書時云也十年春衛侯之弟黑背帥師侵鄭衛専事晉未嘗非內中國之道然如侵宋侵鄭皆不義也侵宋無名至于鄭則晉以無道執其君衛當陳大義以匡晉而釋鄭伯既不能然而又助桀為虐尤為不義之甚者也其名黑背稱帥師是著黑背之専衛師為公孫剽逐君篡國之由而非以稱弟不稱公子示義也即稱公子何嘗不足以示世卿専國之罪哉蓋與書齊侯弟年鄭伯弟語同原不稱公子故也文定謂春秋稱弟以示寵愛之過致有無知弒君剽篡國之事然則書鄭伯之弟語者又何義耶無知不稱公孫剽稱公孫又何義耶春秋惟衛多稱兄稱弟稱叔是衛本以叔兄弟為稱之故不然春秋何特于衛之兄弟多致意也夏四月五卜郊不從乃不郊卜郊不從者四僖三十一年襄七年書免牲不書不郊既免牲則不必書不郊也此年襄十一年書不郊不書免牲不書免牲者不行免牲之禮也不書免牲則必書不郊也五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭晉執鄭伯致其國亂而伐以納之所為若是不足以主夏盟矣又左氏以晉立大子州蒲為君者見伐鄭而晉侯卒不書卒于軍而卒于國又有殺巫之事其所書伐鄭之晉侯謂為州蒲然即據左氏言之晉侯尚忌巫不食新之言而殺之詎未死而肯君州蒲哉納鄭伯而鄭不拒未嘗需時曠日則師歸而卒未可知也又公不書至則以著伐鄭之日淺而此役與前後伐鄭不同其為納鄭伯之故并見矣齊人來媵晉逾年而始來媵齊再逾年而始來媵毋亦以頃公之喪故耶然喪尚未滿亦不得不謂之悖禮也丙午晉侯獳卒秋七月公如晉宣奔齊元之喪成奔晉獳之喪成之勤事晉一同于宣之勤事齊矣宣奔喪返國再遣㑹葬之卿何其各有禮也晉胡為于成之奔喪而又止之送葬以辱之哉蓋考于經文而知兩公之奔喪有不同也齊元卒于四月宣即于其月如齊五月而至是為宣之奔喪也晉獳卒于五月成至七月始如晉是必成本不奔獳之喪晉怒其不奔喪而假二楚來責以致成之奔喪成然後如晉而晉因以止公送葬也則左氏謂晉人以公為二于楚故止公之說為有據矣冬十月公無此三字十有一年春王三月公至自晉書至自晉與前後如晉書至同而時之久則按之可知送葬之辱則于不書葬著之故明年瑣澤之㑹為晉厲結好于公則不書至矣晉侯使郤犨來聘己丑及郤犨盟公甫返國而晉使踵至蓋晉既止公㑹葬懼公因辱而怨二于齊楚故郤犨急來以禮慰公公因及犨盟以示不二非晉迫公使盟以再無禮于公也夏季孫行父如晉魯既盟郤犨知晉之疑我矣故行父速往報聘以釋晉疑其實則憤晉之辱將結好于齊而先以彌縫之也秋叔孫僑如如齊汶陽之田既歸于齊齊以女來媵怨釋而好通矣近又惟恐不得于晉不可不先修禮于齊僑如一聘而齊婚又成也冬十月十有二年春周公出奔晉左氏以自周無出周公出奔周公自出故也然則諸侯大夫之奔有逐之奔者有自奔者槩書出奔何耶曲禮曰天子不言出此亦附𫝊為說耳天王出居于鄭言出矣居皇居狄泉不言出者畿內也居鄭言出者出于畿內也子瑕子朝不言出汪氏以為瑕朝皆為逆亂比之滅國之君與在外之臣其不書出乃書法之常所見最是而又以為襄王萬乘之尊周公三公之貴皆當以天下為家其書出為貶則似春秋别立義以書出者猶未合也夫出居出奔之為貶何疑而在春秋則亦書法之常諸儒以春秋書王臣出奔只此一見遂謂與諸侯之出奔大夫之出奔有異罪其王既復之而叛盟出奔為自絶于周故書出然王即未嘗復之而亦必書出以罪之也夏公㑹晉侯衛侯于瑣澤公作沙澤左氏晉士燮楚公子罷于宋西門之盟前後言之甚詳又載郤至如楚涖盟公子罷如晉涖盟汪氏李氏辨其不足信其義甚當然即據左氏之事似亦與瑣澤無關蓋彼為晉楚大夫之盟而此為魯晉衛三君之㑹也晉厲初㑹諸侯祇魯衛二國髙氏謂其略諸侯而致魯衛不能謹始而使諸侯解體者亦不然也晉以止葬辱公恐郤犨行父之交聘未足以解故特㑹公以示親厚之意雖冒忘喪即吉之譏有所不顧而衛之堅輔晉伯猶宋之堅輔齊桓當年桓㑹盟諸侯無論為公為私宋無不與又魯之背齊而向晉原因衛講好其間故瑣澤之㑹獨魯與衛而他諸侯不與也惟其為三國之好㑹故不書至以别之秋晉人敗狄于交剛左氏以為秋侵晉然交剛狄地而晉敗狄于此其為來侵往伐皆不可知髙氏以為白狄或是晉怒其助秦之故而敗之以為明年伐秦之先聲也冬十月十有三年春晉侯使郤錡來乞師伊川文定謂晉不以王命興諸侯之師故書乞然兩伐鄭皆有王臣是假王命以伐鄭何以亦書乞耶齊桓以來伯主用諸侯之師多矣不必皆奉王命何以不書乞耶張氏以為齊桓以來召兵侵伐雖不出王命而攘楚討罪為中國舉猶足以令諸侯晉以私怨報秦則義不足以令諸侯故卑詞以乞之然如鄢陵之戰亦為中國以攘楚何以亦乞師耶當是晉厲急于報秦戰楚伐鄭而伯業既衰不足以致諸侯又諸侯憚于伐秦楚大國恐其不從故遣使乞之重之以禮俾諸侯不可辭也悼公初立救宋義舉因有先世故事未可遽變以失諸侯故亦踵而一行之又張氏所云卑詞以乞者亦不然晉强魯弱晉之乞師于魯必不若魯之乞師于大國蓋乞同而所以乞者詞之卑抗不同諸儒泥看乞字作丐乞之乞以為凡乞皆卑詞耳若必卑詞以請而後書乞則魯之乞師于諸侯而書乞顧史臣自著其卑詞以請之醜耶三月公如京師因㑹伐而行故不成其朝而春秋以是譏之諸儒之說皆是但謂春秋以伐秦為遂事明朝王為重以存人臣之禮者亦不然春秋正以遂㑹伐秦著如京師之非本意也蓋三月如京師五月㑹伐秦中間兩月使以如京師為一事㑹伐為一事是猶若以朝王為事者故聖人獨書公自京師四字以著公之如京師為㑹伐秦而往其如京師之事即為㑹伐秦之事也若不書公自京師四字後人讀之疑于中間兩月或京師既歸而又㑹伐秦則公有朝王之事矣然亦當日事勢如此故聖人不得不如此書而以公自京師示之也公之如京師亦因伐秦之必過京師過京師不可不朝王故不先㑹諸侯而往諸侯亦必立意皆同故公與諸侯先後至京師以俟于京師諸侯絡繹皆至而㑹之以伐秦也左氏乃云公及諸侯朝王若諸侯羣朝則當先㑹後朝今先書朝而後書㑹非諸侯羣朝明矣夏五月公自京師遂㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦秦在西陲雖與楚合未若楚之內患諸侯晉以己之私怨連諸侯以伐之諸侯無怨于秦而聽晉以㑹伐之皆罪也曹伯廬卒于師伐秦以報私憤則動諸侯之師不恤其勞討曹以扶公義則却諸侯之請而自憚其勞兩失其道也秋七月公至自伐秦如京師而至伐秦與圍許于㑹溫之後而至圍許義各不同蓋㑹溫朝王其本事也不至本事至圍許以著假狩而朝之非禮也此則伐秦其本事也至本事不至京師以著途過京師而朝王之非禮也冬葬曹宣公曹宣公葬而負芻之君曹定矣魯往㑹葬亦有罪也程氏以曹伯書卒書葬無異文疑負芻無殺太子事而以後之曹伯見執比于晉文之執衛侯然觀執之歸于京師則非晉之有私怨于曹也左氏之說宜為有據矣十有四年春王正月莒子朱卒夏衛孫林父自晉歸于衛大夫奔而歸國者有之矣春秋多不書其書者必其為患于國者也林父以良夫之子良夫死林父初為之後未見有大惡為定公所怒而奔晉晉侯歸之亦不料其卒禍衛也故責晉者當責其逐君立君而不討又為林父討衛而疆田其納林父之時尚可原也秋叔孫僑如如齊逆女聘齊而釋舊怨講新好者僑如也故逆女使之自此而鍾離之㑹僑如専焉而季叔相軋之勢又成矣鄭公子喜帥師伐許許附于楚鄭附楚時不忌楚而伐之鄭不附楚時亦不忌楚而伐之鄭志在亡許也髙氏以責晉厲之不能伯而致鄭之怒鄰兼弱夫許不內屬厲苟得志于陳鄭則又將以次而加兵于蔡許又禁鄭之不怒鄰兼弱耶九月僑如以夫人婦姜氏至自齊書僑如以夫人至與書遂以夫人至同罪大夫之以夫人也穆姜不氏而齊姜氏伊川以穆姜為脫氏字趙氏以齊姜為誤增氏字以穆姜為脫氏字是以出姜之不稱氏為有罪而穆姜無譏也以齊姜為誤增氏字是以有姑宜稱婦姜而不氏而出姜穆姜皆無譏也說不可定陳氏有成風則出姜不氏有敬嬴則穆姜不氏之說却好又春秋十二公桓莊僖文宣成皆娶齊女襄昭定哀皆不娶齊女娶齊女則書逆書至獨詳不娶齊女則逆與至皆不書而從略詳于書齊女者聖人惡魯之娶齊女也文姜淫于齊侯而與弒桓公于文姜則當絶于齊侯則當仇即牽于情不能絶屈于勢不敢仇而桓之後人宋陳許杞異姓之國皆可請昏何用娶女必齊之姜哉乃莊公則又娶之矣十公不親納幣而莊公親納幣矣十公不親迎而莊公親迎矣親迎禮也而行禮于仇人之女豈先王制禮之意與嗚呼醴泉無源而淫風有自齊女固善淫焉而又好殺通齊侯者齊女也通慶父者又齊女也與殺其夫者齊女也與殺其子者又齊女也齊女世濟其惡以亂魯魯人當一戒之再戒之矣所幸齊桓創伯行法不貸其所生則齊女未可盡棄也聲姜之逆至不書者不以內纍僖公外纍桓公也詩云令妻乃謂聲姜而陽穀于卞之㑹猶是一眚聖人不能為之終諱然齊女亦自此稍知裁制矣出姜未有失德殺其二子使不終于魯抑又不知魯人何以為心惡齊女與好齊女與若懲文姜哀姜之能亂人國則聲姜出姜不應繼世而至若輕出姜而逐之以辱齊人則穆姜齊姜不應繼世而再至此聖人所以重惡魯人也故詳書以譏之也據左氏齊歸為敬歸之娣則襄公之夫人敬歸也敬歸之薨葬不見于經昭公娶吳女即有所諱而不書定公或娶于未即位之前而不書哀公四歲即位至十四年而春秋終或娶于春秋之後而不書敬歸之逆至不書誠何說也觀敬歸之不書則昭公未必以娶吳女之故定未必娶于未即位之前哀未必娶于春秋之後而不書矣說春秋者以為昏姻常事不書何以獨桓莊文宣成之昏姻非常事耶又以為昏姻合禮則不書何以獨襄昭定哀之昏姻合禮耶蓋以襄昭定哀之夫人非齊女也非齊女故從略也略于後以示前之詳于書逆書至者詳于書齊女也詳于書齊女者惡魯人之娶齊女也于惡之中又有惡者焉惡逆女之使逆臣也使宗臣也惡不親迎也惡莊公之親迎也惡齊侯之送也惡桓公之往㑹也惡其娶于喪中也惡其緩于娶而必齊之女也惡其急于娶而必齊之女也嗚呼何用娶女必齊之姜哉冬十月庚寅衛侯臧卒秦伯卒魯助晉伐秦秦以為怨故自此以後之秦伯卒不來赴矣不來赴故不名也既不來赴而書于冊者魯原無怨于秦雖不來赴而亦申其弔問之禮也此不書葬者但申弔問之禮不往㑹葬也昭以後之秦景秦哀秦惠皆書葬者雖不來赴而往㑹其葬也諸儒于書葬不書葬每强為之說至如秦之書卒而或名或不名名而不書葬不名而又書葬不得其義則皆置之不論苟通于書名不書名為彼之來赴不來赴書葬不書葬為我之往㑹不往㑹何至于說之窮哉十有五年春王二月葬衛定公三月乙巳仲嬰齊卒氏仲者後歸父也不稱仲孫者以别于仲孫氏也公子遂弒君之賊不宜有後歸父既奔又使其弟嬰齊後之而謂仲氏不可以無後是豈義哉當日牙與慶父皆有後于魯則不能名正言順以絶遂矣嬰齊既後歸父是亦魯卿而㑹盟侵伐不得一事見經者行父抑之使不得用事于國也癸丑公㑹晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚宋公不㑹而使世子宋公有疾故也君父有疾而世子出以天理言之則不孝以國事言之亦當虞其變亂也宋之君臣豈不計及乎此哉見迫于晉不得已也若齊國佐之來則齊之抗晉也晉不辭宋世子而責齊國佐不仁于宋而甘受齊之無禮侮弱而畏强晉尚足以伯哉其後齊侯屢却㑹盟而使世子光者實權輿于此晉侯執曹伯歸于京師經書晉侯執曹伯歸于京師則曹伯有罪可知矣左氏以為無不道于民故不稱人以執夫殺世子而自立篡國之賊尚可以其患不及民而減其罪哉春秋惡晉侯于負芻篡立之始諸侯請討而以伐秦勞苦為辭遷延三載使負芻有國有民儼然曹伯而後盟于戚以執之也負芻之得稱爵春秋以為責有所不可辭者也至于明年又儼然以曹伯歸自京師以見王法之不行而晉之不足以主盟中夏也諸儒但責其既同盟而後執之為未盡善然當日晉必不與之盟其書法敘曹伯于㑹盟之中者如書公㑹某某于沙隨不見公公㑹某某于平丘甲戌同盟于平丘公不與盟之類雖書公㑹實不見公雖書公㑹同盟實不與盟則雖書曹伯同盟實執曹伯何以獨見其盟而後執哉蓋以著晉以㑹盟召曹伯曹伯以㑹盟而來也公至自㑹晉厲于戚之至㑹與晉景蟲牢馬陵于蒲之至㑹同非有别義也夏六月宋公固卒楚子伐鄭觀鍾離之㑹鄭公子鰌與則此楚子雖伐鄭而鄭未即楚矣據左氏則鄭非但未即楚而且侵楚取新石也使晉肯勤于鄭則鄭亦或不終即楚然鄭之力既足以抗楚而利汝隂之田以背晉豈非鄭之罪哉秋八月庚辰葬宋共公宋華元出奔晉宋華元自晉歸于宋宋殺其大夫山宋魚石出奔楚據左氏則華元至河而返然經明書奔晉又書自晉歸宋必非至河而返也春秋書法與書有罪出奔挾大國而歸者無異固知其責華元也是時新君初立蕩山敢于専殺公子其心叵測元必以為我在晉山當有所忌而不敢無禮于君然使桓族合謀急不擇音鋌而走險竟不利于新主元即能以晉討賊而君弒國亂所傷多矣況晉自主夏盟以來曽討幾弒君哉故諸儒以為山不書氏罪山也然不去官而稱國以殺亦罪元也至于魚石出奔而適荆蠻後又挾楚鄭而入彭城罪無可逃矣但元既殺蕩山亦當有以安桓族又況魚石實復元而請法者耶諸儒以為書詞重復必有大美惡存謂元能去弱公室之蕩山春秋豫元而著其正者未必然也是年秋八月書葬共公其下即書宋事四條至十一月書鍾離之㑹四事大約在兩月間或得之赴告或得之𫝊聞隨時得之則隨時書之記事之體自當重復若此云云也使夫子削第二條宋華元三字詞則省矣何所示義乎則重復存宋華元三字亦非必以此示義也安知書華元奔晉之後自晉歸宋之前歸宋之後殺山之前舊史不間有他事而夫子削之耶使所間有殊事不可以削夫子又何從書詞重復以示美惡之義耶如後書冬十月宋華亥向寧華定出奔陳明年夏書宋華亥向寧華定自陳入于宋南里以叛又明年春書宋華亥向寧華定自宋南里出奔楚使中不隔以年月不間有蔡侯卒葬士鞅來聘日食輒卒蔡侯奔公如晉齊伐莒等事其書重詞復亦與此同矣美惡之義豈係乎此哉子皮止子産而逐豐卷事與此類然子産以豐卷之害政去而患不及國華元為右師新主所恃以為安危未可去也春秋于子産之事不書者不罪子産也使春秋無罪華元之義則元之出奔晉自晉歸亦削而不書矣又山不氏伊川以為山去族害公族也文定亦云然據左氏云蕩澤弱公室殺公子肥又云攻蕩氏殺子山曰澤曰子山似澤名而子山字者春秋何以不書其名而書其字耶若澤與山兩人則宋不罪殺公子之澤而殺蕩氏之山為失刑矣若以經為據而不必信𫝊則山殺石奔之事實無考若考事實于左氏則左氏所云蕩澤子山者必非鑿空以與經糾紛也意者舊史據𫝊聞書蕩子山如書宋子哀來奔舉字之類夫子恐後人疑于書字為别有義而又難于改書蕩澤與舊史互異故削其氏以山一字書耶抑或山為蕩氏之族而非世適本不稱氏如魯彭生為叔孫得臣之弟或稱叔仲彭生或稱叔彭生以别于叔孫之世適而山亦本不氏以别于蕩氏之世適左氏蕩澤子山云云不足信耶冬十有一月叔孫僑如㑹晉士燮齊髙無咎宋華元衛孫林父鄭公子鰌邾人㑹吳于鍾離公羊以殊㑹吳為外吳非也鍾離柤向殊㑹而外吳戚何以獨不殊㑹而外吳耶不可以通矣蓋于戚吳來㑹也于鍾離于柤于向往㑹吳也來㑹如一人延衆客來者同在衆客之列則與衆客同序其常也往㑹如衆人往㑹一客衆人先相㑹然後往與客㑹亦其常也書法合當如此春秋外吳楚不必以殊㑹示義如楚入主中國之盟又何嘗殊變書法以示外之之義哉哉諸儒于首止謂殊㑹為尊王世子此為殊㑹以外吳其義皆春秋所無也又如以勾吳而僭稱王以中國大夫往與之㑹其為非禮甚矣如諸儒褒貶之例則人六國之大夫以示貶為得其義而皆書名者豈春秋與其通吳以拒楚耶必不然矣文定於此無說知其不可以通也許遷于葉書許遷葉一以罪許之托於楚一以罪鄭之逼許而遷也十有六年春王正月雨木氷夏四月辛未滕子卒鄭公子喜帥師侵宋鄭既背中國即楚又奉楚命以侵中國無道極矣固知非其力之不足以抗楚而實自挾以為晉楚之重也鄢陵戰敗而不懼者輕晉厲之不足以有為耳喜稱公子稱帥師者罪喜以公子之親為國大夫得専鄭師而不能以道持其國也凡事不善而書名書帥師多有此義諸儒以為非貶者誤也六月丙寅朔日有食之晉侯使欒黶來乞師晉來乞師必并乞於諸國而戰無諸國之師者戰之期促諸國之師不及㑹也甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績矢集楚子之目而全軍宵遁戰勝過于城濮而楚不懼鄭不服者何也桓文之時楚雖强橫而交於諸侯者淺故虛聲可以懾之强兵可以創之自晉楚之勢互為盛衰鄭之叛服習為常事楚之進退亦習為常事一戰之勝負不足為利害也而是役也鄭公然助楚以戰晉故雖敗而服之尤難矣楚殺其大夫公子側城濮之戰楚成欲退而得臣逆之則敗而殺得臣宜矣此則楚共親率衆以與戰而亦歸罪於主將而殺側則不當其罪也蓋楚之嚴於軍法如此秋公㑹晉侯齊侯衛侯宋華元邾人于沙隨不見公鄢陵之戰魯衛齊宋之師皆不與何以獨怒魯而不見公耶左氏以為入僑如之讒者宜其然矣又黑壤之盟不與不書沙隨之㑹不見書平丘之盟不與書非有諱有不諱也黑壤之盟與不盟原不可考即有之而不書亦非春秋諱之而於沙隨之不諱為自反而縮不足恥也沙隨之後有執季孫行父之文有僑如出奔之文有刺公子偃之文不書不見公則事蹟不著矣平丘之前有如晉至河乃復之文其後有執季孫意如之文有如晉至河乃復之文有如晉止公之文不書不與盟則事蹟亦不著矣黑壤之後無事故雖不與盟而亦可以不書也公至自㑹沙隨之㑹苟以不見而不書至則疑于晉厲之止公矣而晉實未止公則雖不與㑹而不得不虛托至㑹以著其事之實也公㑹尹子晉侯齊國佐邾人伐鄭晉假王命以伐鄭尹子在軍必以為行王命也然諸侯有罪則天子命方伯以討之今晉主軍而王臣與是名為奉王命而實則役王臣矣故春秋據其事直書尹子晉侯齊國佐邾人以見王臣諸侯大夫之齊等也曹伯歸自京師歸於京師晉執之也歸自京師晉釋之也王得専乎哉然使晉侯執歸京師之時王速發討賊之辭以正負芻之罪晉亦不敢止王命也需之逾年何為耶故以為天王之釋有罪者責之是矣九月晉人執季孫行父舍之于苕丘苕公作招不見其君而又執其臣晉之辭必曰師出後期也以後師期之故而執其臣以辱其君謂非魯之恥哉而亦以著晉厲之不道也冬十月乙亥叔孫僑如出奔齊行父當國魯奔三卿文公時之叔孫敖也宣公時之公孫歸父也成公時之叔孫僑如也觀春秋書法則三臣之中僑如為有罪然文公用敖而敖奔宣公用歸父而歸父奔成公用僑如而僑如奔則行父忌其用事而勢不兩立逼之去國豈獨軋三臣并弱公室矣三臣皆奔齊者何也蓋三臣托齊而行父托於晉也文公之初猶兩事於齊晉之間六年行父一如晉而敖奔然後一意向晉及宣公德齊元之助已君臣之間傾心事齊仲遂卒歸父繼幾無季氏矣行父乃致公為斷道之㑹而後歸父奔故成公至今未嘗舍晉以事齊也於是僑如為之請昏於齊又將改事齊以擠行父而齊方與晉合未可以二故即嗾行父於晉以為去行父之計而不知力不足以勝之也行父雖専魯人念成季之功三臣者敖為慶父子歸父為仲遂子僑如為牙孫皆逆臣之後故皆以惡行父而至於自敗也自此以往仲叔兩家皆聽於季氏矣然而僑如通國母以脅君讒宗臣以怒大召致危辱幾成禍亂惡甚於敖而罪大於歸父也十有二月乙丑季孫行父及晉郤犨盟于扈受僑如之讒而執行父者郤犨也聽聲伯之請而釋行父者亦郤犨也郤犨之専晉如此宜其不免與公至自㑹沙隨之㑹不見公而至㑹虛托之詞也此不虛托伐鄭而至㑹者以著伐鄭之不用其師而行父之執僑如之奔扈之盟皆為伐鄭不與起也此與柯陵之至㑹不同柯陵盟於伐鄭之後故也乙酉刺公子偃穆姜托為脅公之詞非公子偃有逆謀也成公不顧傷其母之心是為不孝行父不顧賊其君之親是為不忠其實則行父為之成公無如之何耳故公室之弱自此始矣且忍於殺君之母弟而不忍於絶叔孫之後召叔孫豹於齊而立之何哉髙氏以為刺得其罪劉氏以為先刺後名是得其罪非也使刺之果得其罪則春秋不書矣十有七年春衛北宮括帥師侵鄭鄭叛中國衛因晉而加兵未嘗非義而書北宮括帥師者罪其稟晉命而為之役也然稟晉命而君不出使大夫為主將是猶有不以諸侯命諸侯之義故凡受晉命者皆書大夫皆書侵以著之夏公㑹尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭再假王命以伐鄭而兩王臣並出則晉役王臣之罪甚矣髙氏以為晉厲失道而能數合諸侯力捍强楚者由於假王靈扶義以合天下而不知名假王命實役王臣政晉厲之所為失道也六月乙酉同盟于柯陵盟而同盟是其載書之詞公然以王臣同諸侯之盟矣柯陵雞澤平丘一也蓋不自主盟而稱同盟是以為同諸侯之謙而忘乎同王臣之倨矣秋公至自㑹晉厲伐鄭不服盟柯陵而至㑹晉悼伐鄭不服盟亳城北而至伐何以異耶晉厲同王臣之盟故至㑹與柯陵雞澤平丘同以著其失非如晉悼盟諸侯于亳城北而一意主乎服鄭者也齊髙無咎出奔莒髙無咎出奔書殺國佐書以著髙國之所以衰崔慶之所以得國齊光之所以見弒也九月辛丑用郊郊非其時故書用以譏之趙氏以為有所祈而郊者當是矣吳氏謂不卜日不卜牲而强用其禮故曰用者不必然也卜日至四至五故書牛傷改卜故書此而用郊安知其非卜日而吉卜牲而吉耶晉侯使荀罃來乞師晉厲三乞師於諸侯伐秦逺役也戰楚强敵也此則以連年伐鄭又一年而再伐鄭也蓋知諸侯之艱於出師而加禮以請之又惟恐諸侯之不出師而加禮以脅其不得不從也冬公㑹單子晉侯宋公衛侯曹伯齊人邾人伐鄭晉幸鄢陵之勝欲得鄭而鄭不服連年興伐鄭之師瀆王臣而勞苦諸侯不道之至矣固晉厲之驕侈而亦郤氏之好大喜功也齊人不名義不繫乎名其人也觀前年伐鄭名國佐固知此為無取乎名不然何貶於齊大夫而人之耶此後凡役大夫與而有名有不名者諸儒以不名為貶非也十有一月公至自伐鄭三假王命㑹王臣合諸侯以伐鄭而卒不得鄭故終至伐鄭以著鄭之未服也壬申公孫嬰齊卒于貍脤脹公作軫穀作蜃大夫卒於外則地公羊以為嬰齊走之晉其說難據左氏以為還自鄭或是從公㑹伐鄭而還也以十二月朔丁巳逆數之十一月不當有壬申此非壬字為丙戊之誤即申字為辰寅子之誤也公穀之說更沒理㑹劉氏辨之極是抑或十一月有閏也十有二月丁巳朔日有食之邾子貜且卒晉殺其大夫郤錡郤犨郤至郤氏族大鄢陵之戰功髙震主又連年用衆伐鄭臣民之所忌怨也而厲公殺之則不以其罪矣據左氏則欒書亦與殺者然而君出令者也受胥童之讒與受欒書之毁一而已矣楚人滅舒庸庸雖舒之别種而荆舒原相比者楚自殘其類以示强於中國而不能復出師以救鄭其亦無能為也矣十有八年春王正月晉殺其大夫胥童晉厲殺三郤書偃殺胥童皆以國殺為文者皆所以病厲公也殺三郤不以罪其病厲公宜矣而三郤之所以殺者胥童之讒也胥童之讒足以亂國是胥童有可殺之罪而厲公嬖之不以病厲公可乎書偃殺有罪之胥童既不得比于衆人之擅殺而胥童之罪非弒逆又不得為討賊之詞故以國殺為文而不去其官也庚申晉弒其君州蒲州蒲之弒左氏以為欒書中行偃使程滑弒之葬於翼東門之外使當日之事果考得其實春秋何為貸書偃而不加以弒君之罪哉左氏以稱國人弒君者其君無道而於稱國以弒無說文定聖人無私與天為一即無道自取之說也然君雖不君臣不可以不臣父雖不父子不可以不子君臣父子之間可以有道無道論哉周禮司馬九伐之法賊賢害民則伐之內外亂鳥獸行則滅之伐與滅之用法輕重懸矣晉厲所謂賊賢害民者也至如齊襄鳥獸之行豈不為無道之極而見弒猶不縱無知則其他之見弒而稱國稱人以縱元凶不得為聖人之用法矣晉厲喜功黷武在位八年六用大衆驅國人以四戰强諸侯以用兵執魯臣役王官固為無道之為然於內地肆侵之狄則敗之於合楚東窺之秦則伐之於猾夏爭鄭之楚則一戰以勝之其功固不可沒也跡厲公之所為其無道未至於亡國即殺三郤而不殺書偃亦非専任胥童魚矯者乃書偃懼其不悛他日之禍且不可測急起而弒之此與趙盾何異而顧以曲貸之耶先儒謂春秋於晉厲八年間敗狄伐春敗楚伐鄭盟蒲盟柯陵㑹鍾離㑹沙隨無有寧嵗叠書於冊以著其殘民逞志宜及於弒然春秋於齊襄十二年間遷紀入酅伐衛降郕享齊侯㑹齊侯其書於冊者亦所以著其宜及於弒也彼不以弒貸無知而此以弒貸書偃何哉薛比莒庶其亦未見春秋書何事以罪之而亦稱國以弒與州蒲同何哉左氏以稱國以弒與稱國人以弒作一例看然而各有義也大約見弒之君不論有道無道其弒也實出一人而罪有所歸則書名國人與弒者衆而罪無所歸則書國人若事在可疑文史無徵𫝊聞失實其本國既無董狐之直筆又未有引義抗賊忠節之士攻發其私既不得實坐一人又不可散罪衆人則稱國以不沒其弒君之實而闕疑於其弒君之人也蓋當日晉厲有戰勝之雄才必自謂文襄以後積衰可振而巨室梗命用斷以行一時晉之宗室人人自危遂有竊發而加刃者矣以為書偃則實非書偃為之也以為衆人則與弒者猶未衆也不可以書名不可以書國人則不得不闕疑於弒君之人矣臨川吳氏以為左氏書偃使程滑之言非經意者是也齊殺其大夫國佐國佐殺慶克不書克有罪也以邑叛不書原佐之情而恕之也故書殺其大夫以病齊靈也公如晉夏楚子鄭伯伐宋宋魚石復入于彭城文定謂諸侯失國諸侯納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也義亦未盡諸侯而為强鄰所逼為巨族所迫納之正也若得罪於宗廟社稷而為天王所罰納之非正也大夫而得罪失位納之非正也若為同列所逐或有故不得已而去其於故君猶有未絶之義則請於其國而納之未嘗非正也何必以世不世為論哉魚石之奔原未有罪罪在奔楚魚石奔楚罪猶可原而罪之大在挾楚以復入夫挾楚復入罪已大矣而況導楚伐故國據彭城逼宋將以為宋無窮之禍哉春秋不書楚鄭取彭城者孫氏以為不與楚鄭之伐宋取邑以與宋叛臣也然使春秋書楚鄭伐宋取彭城是猶若楚鄭取宋邑以居魚石而魚石亂宋之志不著矣春秋書楚子鄭伯伐宋書魚石復入彭城者既惡其事又誅其意也故比之良霄則良霄無據邑之罪比之欒盈則欒盈無導敵國伐故國之罪而魚石之罪所以不勝誅也春秋於大夫之入而據邑者書叛於奔大夫之入而據邑者書叛則不書復蓋既明書叛矣復入之逆不足云也魚石據彭城豈非叛宋哉不書叛何也叛者自叛其君也魚石導楚鄭以伐故國據巖邑以逼舊君主楚而敵宋非但如他大夫之自叛其君而已也故書入不書叛以異於他大夫也又劉氏以不書納為不與其納者亦非也實取彭城居魚石以為禍於宋非如納公孫寧儀行父于陳使仍為其國之大夫而已也公至自晉如晉以朝新君而晉實弒君之後成公猶屈己以下之恥益甚矣晉侯使士丐來聘急答公之朝固晉悼之有禮於諸侯然來朝往聘實行天子諸侯之禮則所謂非禮之禮也秋杞伯來朝八月邾子來朝左氏於杞伯來朝以為問晉故公以晉君語之杞伯朝晉請昏汪氏以為杞邾相繼來朝皆謀從晉皆非也杞邾自盟蟲牢以來從晉久矣晉厲見弒國亂恐不可托故來朝魯及晉悼能致諸侯乃復相率而從晉也築鹿囿己丑公薨于路寢冬楚人鄭人侵宋汪氏以為不曰救彭城者彭城不可救也非也楚可以取彭城居魚石以逼宋何以不可救哉然則晉侯師於台谷以救宋不書又豈宋不可救耶春秋不書老佐華喜圍彭城則楚鄭不書救楚鄭之師書侵則晉侯之救亦可以無書蓋事繁而可省則省其文非有别義也前不書取彭城者以専罪魚石之親敵脅君也此書侵宋者以兼罪楚鄭之助惡危宋也汪氏以書人為貶然不貶於前之伐宋入魚石而貶於後之侵宋救魚石耶李氏以為前舉爵而今稱人晉之勢漸盛而楚之勢漸衰然明年侵宋又稱公子壬夫帥師矣何盛衰之云耶蓋前既舉爵以實著兩君之罪於此不必復名以罪帥師之大夫也晉侯使士魴來乞師晉悼初合諸侯用厲公故事以乞師者固晉悼之謙而亦懼失諸侯也十有二月仲孫蔑㑹晉侯宋公衛侯邾子齊崔杼同盟于虛朾晉悼初得國即為虛朾之盟以討宋之叛臣此諸侯所以服而晉伯所以復興也雖有智慧不如乘勢固適有此事以資悼公之伯亦悼公之志足以有為也是役也齊靈不與而使崔杼至圍彭城則崔杼并不與此後凡㑹盟皆世子光而齊靈不一與齊實抗晉而悼亦故容世子光之聽命焉亦足以見悼之寬柔矣丁未葬我君成公春秋宗朱辨義卷八
